<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 결재 상세</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 구분 — 카테고리 텍스트 (approval.html과 동일, 색 없음) */
  .rtag { display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.01em; white-space: nowrap; }

  /* 상태 — 진행만 pill, 완료는 차분하게 */
  .spill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 800; white-space: nowrap; }
  .spill-progress { background: var(--warning-soft); color: var(--warn-text); }
  .spill-apply { background: var(--info-soft); color: var(--info); }
  .spill-done { background: transparent; padding: 6px 0; color: var(--text-tertiary); font-weight: 700; }
  .spill-reject { background: transparent; padding: 6px 0; color: var(--text-tertiary); font-weight: 700; }

  /* 신청 정보 key/val */
  .info-row { display: grid; grid-template-columns: 150px 1fr; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--text-tertiary); font-weight: 600; }
  .info-val { color: var(--text-primary); font-weight: 600; line-height: 1.6; }
  .info-val.reason { font-weight: 500; color: var(--text-secondary); }
  .info-arrow { color: var(--text-tertiary); font-weight: 800; margin: 0 5px; }

  /* prog-steps 여백 (common.css 재활용) */
  .prog-wrap { padding: 8px 8px 4px; }

  /* 결재 이력 배지 */
  .hbadge { display: inline-flex; align-items: center; padding: 4px 11px; border-radius: 100px; font-size: 12px; font-weight: 800; white-space: nowrap; }
  .hbadge-done { background: var(--success-soft); color: var(--success); }
  .hbadge-active { background: var(--warning-soft); color: var(--warn-text); }
  .hbadge-wait { background: var(--bg-subtle); color: var(--text-tertiary); }
  .hbadge-reject { background: var(--danger-soft); color: var(--danger); }
  .h-actor { font-weight: 700; color: var(--text-primary); }
  .h-role { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .h-step { font-weight: 700; color: var(--ink); }
  .col-date { color: var(--text-tertiary); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .h-comment { color: var(--text-secondary); line-height: 1.55; }

  @media (max-width: 760px) {
    .info-row { grid-template-columns: 1fr; gap: 4px; }
  }
</style>
</head>

    $('statusPill').innerHTML = `<span class="spill ${p.cls}"><span class="sdot ${p.dot}" style="margin:0"></span>${p.txt}</span>`;

    $('infoBody').innerHTML = `
      <div class="info-row"><div class="info-key">신청번호</div><div class="info-val" style="font-variant-numeric:tabular-nums">${reqNo}</div></div>
      <div class="info-row"><div class="info-key">구분</div><div class="info-val"><span class="rtag rtag-${KIND[d.kind]}">${d.kind}</span></div></div>
      <div class="info-row"><div class="info-key">대상 VDI</div><div class="info-val" style="font-variant-numeric:tabular-nums">${d.vdi}</div></div>
      <div class="info-row"><div class="info-key">신청자</div><div class="info-val">최정식 책임 · IT기획파트</div></div>
      <div class="info-row"><div class="info-key">신청일</div><div class="info-val" style="font-variant-numeric:tabular-nums">${d.date}</div></div>
      <div class="info-row"><div class="info-key">사용 용도</div><div class="info-val">${d.purpose}</div></div>
      <div class="info-row"><div class="info-key">신청 내역</div><div class="info-val">${d.detail}</div></div>
      <div class="info-row"><div class="info-key">신청 사유</div><div class="info-val reason">${esc(d.reason)}</div></div>`;

    $('progSteps').innerHTML = STEPS.map((label, i) => {
      const s = d.hist[i].s;
      const cls = s === 'done' ? 'done' : s === 'active' ? 'active' : s === 'reject' ? 'fail' : '';
      const inner = s === 'done' ? '✓' : s === 'reject' ? '✕' : (i + 1);
      return `<div class="prog-step"><div class="prog-circle ${cls}">${inner}</div><div class="prog-label">${label}</div></div>`;
    }).join('');

    $('histBody').innerHTML = STEPS.map((label, i) => {
      const h = d.hist[i], a = ACTORS[i], b = HBADGE[h.s];
      return `
        <tr>
          <td><span class="h-step">${i + 1}. ${label}</span></td>
          <td><div class="h-actor">${a.actor}</div><div class="h-role">${a.role}</div></td>
          <td class="col-date">${h.t}</td>
          <td><span class="hbadge ${b.cls}">${b.txt}</span></td>
          <td class="h-comment">${esc(h.c)}</td>
        </tr>`;
    }).join('');

    // 액션 (진행중일 때만 회수 노출)
    if (d.status === 'progress') {
      $('withdrawBtn').style.display = '';
      $('actionHint').innerHTML = '결재가 완료되기 전에는 <strong>신청 회수</strong>로 취소할 수 있습니다.';
    } else {
      $('withdrawBtn').style.display = 'none';
      $('actionHint').textContent = d.status === 'reject' ? '반려된 신청입니다. 사유 확인 후 재신청해주세요.' : '처리가 완료된 신청입니다.';
    }
  }

  function withdraw() {
    if (!confirm('이 신청을 회수하시겠습니까? 회수 후에는 다시 신청해야 합니다.')) return;
    showToast('신청이 회수되었습니다.');
    setTimeout(() => location.href = 'approval.html', 1400);
  }

  render();
</script>
</body>
</html>
