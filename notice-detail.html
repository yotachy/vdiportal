  .pn-row.disabled .pn-title { color: var(--text-tertiary); font-weight: 500; }

  }

  function renderArticle() {
    const att = d.files && d.files.length
      ? `<div class="att-wrap"><div class="att-title">첨부파일 ${d.files.length}개</div>${d.files.map(fileChip).join('')}</div>`
      : '';
    $('article').innerHTML = `
      <h1 class="art-title">${d.title}</h1>
      <div class="art-meta">
        <span class="am"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${d.author}</span>
        <span class="am"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${d.date}</span>
      </div>
      <div class="art-body">${d.body}</div>
      ${att}`;
  }

  function pnRow(dir, id) {
    if (!id) {
      return `<div class="pn-row disabled">
        <span class="pn-dir">${dir === 'prev' ? '이전 글' : '다음 글'}</span>
        <span class="pn-title">${dir === 'prev' ? '이전 글이 없습니다.' : '다음 글이 없습니다.'}</span>
      </div>`;
    }
    const t = DETAILS[id].title;
    const arrow = dir === 'prev'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
    return `<div class="pn-row" onclick="location.href='notice-detail.html?id=${id}'">
      <span class="pn-dir">${arrow}${dir === 'prev' ? '이전 글' : '다음 글'}</span>
      <span class="pn-title">${t}</span>
    </div>`;
  }

  function renderPn() {
    const idx = ORDER.indexOf(curId);
    const prevId = idx > 0 ? ORDER[idx - 1] : null;
    const nextId = idx < ORDER.length - 1 ? ORDER[idx + 1] : null;
    $('pnNav').innerHTML = pnRow('prev', prevId) + pnRow('next', nextId);
  }

  // 포탈 공지로 지정 (관리자) — 시안: 안내 토스트 (포탈 메인 하단에 1건만 노출)
  function setPortalNotice() {
    showToast('이 공지를 포탈 메인 하단 공지로 지정했습니다.');
  }

  renderArticle();
  renderPn();
</script>
</body>
</html>
