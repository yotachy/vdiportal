<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 공지사항</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 공지 리스트 — 표 형태 (제목 좌측 / 작성자·등록일 가운데) */
  .list-head, .notice-item { display: grid; grid-template-columns: 1fr 150px 110px; gap: 18px; align-items: center; }
  .list-head .c-author, .list-head .c-date,
  .notice-item .c-author, .notice-item .c-date { text-align: center; }
  .list-head { padding: 12px 22px; background: var(--surface-2); border-bottom: 1px solid var(--border);
    font-size: 12.5px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.01em; white-space: nowrap; }
  .notice-item { padding: 11.9px 22px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  .notice-item:last-child { border-bottom: none; }
  .notice-item:hover { background: var(--surface-2); }
  .notice-item.pinned { background: linear-gradient(90deg, var(--kb-yellow-soft), rgba(255,246,220,0.35)); }
  .notice-item.pinned:hover { background: var(--kb-yellow-soft); }

  .notice-title { min-width: 0; font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px; }
  .notice-title .t-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notice-pin { width: 15px; height: 15px; color: var(--kb-yellow-dark); flex-shrink: 0; }
  .new-badge { flex-shrink: 0; font-size: 10px; font-weight: 800; color: var(--danger); background: var(--danger-soft);
    border-radius: 5px; padding: 1px 6px; letter-spacing: 0.03em; }

  .nm-cell { font-size: 13px; color: var(--text-secondary); white-space: nowrap; font-variant-numeric: tabular-nums; }

  .empty-state { text-align: center; padding: 56px 16px; color: var(--text-tertiary); font-size: 14px; }

  @media (max-width: 820px) {
    .list-head, .notice-item { grid-template-columns: 1fr 110px; gap: 12px; }
    .list-head .c-author, .notice-item .c-author { display: none; }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header" data-header></header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" data-sidebar="notice"></aside>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-secondary);font-weight:600">공지사항</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">공지사항</h1>
        <p class="page-desc">VDI 운영 관련 점검·업데이트·보안 공지를 확인합니다. 항목을 클릭하면 상세 내용을 볼 수 있습니다.</p>
      </div>
      <div class="page-header-right">
        <a class="btn btn-admin admin-only" href="notice-new.html" title="관리자 전용">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          공지 등록
        </a>
      </div>
    </div>

    <!-- 검색 + 필터 -->
    <div class="filter-bar reveal" style="animation-delay:.1s">
      <div class="search-hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="제목 · 내용으로 검색">
      </div>
      <div class="filter-chips">
        <div class="date-drop" id="dateDrop">
          <button type="button" class="date-drop-btn" onclick="toggleDatePop(event)">
            <svg class="cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="dateDropLabel">최근 1개월</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="date-pop">
            <button type="button" class="date-quick" data-q="all" onclick="setQuickRange('all')">전체 기간 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick" data-q="week" onclick="setQuickRange('week')">최근 1주일 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick on" data-q="month" onclick="setQuickRange('month')">최근 1개월 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick" data-q="month3" onclick="setQuickRange('month3')">최근 3개월 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <input type="hidden" id="dateFrom">
            <input type="hidden" id="dateTo">
          </div>
        </div>
      </div>
    </div>

    <!-- 공지 리스트 -->
    <div class="fc reveal" style="animation-delay:.14s">
      <div class="list-head">
        <span>제목</span>
        <span class="c-author">작성자</span>
        <span class="c-date">등록일</span>
      </div>
      <div id="noticeList"></div>
    </div>
    <div class="pager" id="noticePager"></div>

  </main>
</div>

<script src="common.js"></script>
<script>
  // ===== 데이터 (최신순) =====
  const NOTICES = [
    { id: 1, cat: 'important', pinned: true,  isNew: true,  title: '[정기점검] 06.01(일) 02:00~05:00 VDI 정기 점검 안내', author: '관리자', date: '2026.05.29', views: 1284, summary: '안정적인 VDI 서비스 제공을 위해 정기 점검을 시행합니다. 점검 시간 동안 가상PC 접속이 일시 중단됩니다.' },
    { id: 2, cat: 'important', pinned: false, isNew: true,  title: '[보안] 랜섬웨어 주의보 — 출처 불명 메일 첨부파일 실행 금지', author: '관리자', date: '2026.05.28', views: 2317, summary: '업무 메일을 사칭한 랜섬웨어 유포 시도가 다수 탐지되었습니다. 출처 불명 첨부파일은 실행하지 마세요.' },
    { id: 3, cat: 'normal',    pinned: false, isNew: true,  title: 'Citrix Workspace v23.11 배포 안내 (자동 업데이트)', author: '관리자', date: '2026.05.26', views: 903, summary: '가상PC 접속 클라이언트 Citrix Workspace가 v23.11로 업데이트됩니다. 다음 접속 시 자동 적용됩니다.' },
    { id: 4, cat: 'normal',    pinned: false, isNew: false, title: 'VDI 사용자 매뉴얼 v2.0 배포 안내', author: '관리자', date: '2026.05.20', views: 1042, summary: 'VDI 사용자 매뉴얼 v2.0을 배포합니다. 접속 방법, 신청 절차, 자주 묻는 질문이 보강되었습니다.' },
    { id: 5, cat: 'normal',    pinned: false, isNew: false, title: '가상PC Windows 5월 정기 보안 패치 적용 안내', author: '관리자', date: '2026.05.14', views: 658, summary: '5월 Microsoft 정기 보안 패치가 전체 가상PC에 야간 시간대 순차 자동 적용됩니다.' },
    { id: 6, cat: 'important', pinned: false, isNew: false, title: '05.11(일) 네트워크 장비 교체 작업 안내 (접속 일시 중단)', author: '관리자', date: '2026.05.08', views: 591, summary: '데이터센터 네트워크 장비 교체 작업으로 해당 시간 동안 가상PC 접속이 일시 중단됩니다.' },
    { id: 7, cat: 'normal',    pinned: false, isNew: false, title: 'PC가상화 프로그램 설치 파일 안내', author: '관리자', date: '2026.04.22', views: 712, summary: '신규 및 재설치 사용자를 위한 PC가상화(Citrix Workspace) 설치 파일을 안내합니다.' },
    { id: 8, cat: 'normal',    pinned: false, isNew: false, title: '고정가상화 신규 자원(8 Core/16 GB) 도입 안내', author: '관리자', date: '2026.04.15', views: 834, summary: '고정가상화에서 선택 가능한 고사양 자원(CPU 8 Core·메모리 16 GB)이 신규 도입되었습니다. 자원 증설 신청 시 활용할 수 있습니다.' },
    { id: 9, cat: 'important', pinned: false, isNew: false, title: '[복구완료] 일부 사용자 접속 지연 현상 정상화 안내', author: '관리자', date: '2026.04.10', views: 1576, summary: '04.10 오전 발생한 일부 사용자 가상PC 접속 지연 현상이 정상 복구되었습니다.' },
    { id: 10, cat: 'normal',    pinned: false, isNew: false, title: 'VDI 접속 경로 이중화 구성 완료 안내', author: '관리자', date: '2026.04.05', views: 487, summary: 'VDI 접속 경로 이중화 구성이 완료되어 장애 발생 시에도 안정적으로 접속할 수 있습니다.' },
    { id: 11, cat: 'normal',    pinned: false, isNew: false, title: '4월 가상PC 사용 현황 리포트 공유', author: '관리자', date: '2026.04.01', views: 312, summary: '4월 한 달간 부서별 가상PC 사용 현황과 자원 사용률 리포트를 공유합니다.' },
    { id: 12, cat: 'important', pinned: false, isNew: false, title: '[보안] 분기 비밀번호 변경 안내 (2분기)', author: '관리자', date: '2026.03.28', views: 1203, summary: '정보보안 정책에 따라 2분기 비밀번호 변경을 안내합니다. 기한 내 변경하지 않으면 접속이 제한될 수 있습니다.' }
  ];

  const $ = id => document.getElementById(id);
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let curSearch = '', curPage = 1;

  const PIN_SVG = '<svg class="notice-pin" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M16 3l5 5-3 1-3 3-1 5-2-2-3 3-1-1 3-3-2-2 5-1 3-3 1-3z"/></svg>';

  function render() {
    const q = curSearch.trim().toLowerCase();
    let list = NOTICES.filter(n => {
      const okSearch = !q || (n.title + ' ' + (n.summary || '')).toLowerCase().includes(q);
      const okDate = dateInRange(n.date, $('dateFrom').value, $('dateTo').value);
      return okSearch && okDate;
    });
    // 고정 우선, 그 외 최신순(데이터가 이미 최신순)
    list = [...list].sort((a, b) => (b.pinned - a.pinned));

    if (!list.length) {
      $('noticeList').innerHTML = `<div class="empty-state">조건에 맞는 공지사항이 없습니다.</div>`;
      renderPager('noticePager', 0, 1, () => {});
      return;
    }

    const pages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (curPage > pages) curPage = pages;
    const pageItems = list.slice((curPage - 1) * PAGE_SIZE, curPage * PAGE_SIZE);

    $('noticeList').innerHTML = pageItems.map(n => `
        <div class="notice-item${n.pinned ? ' pinned' : ''}" onclick="location.href='notice-detail.html?id=${n.id}'">
          <div class="notice-title">
            ${n.pinned ? PIN_SVG : ''}
            <span class="t-text">${esc(n.title)}</span>
            ${n.isNew ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <div class="nm-cell c-author">${esc(n.author)}</div>
          <div class="nm-cell c-date">${n.date}</div>
        </div>`).join('');

    renderPager('noticePager', list.length, curPage, p => {
      curPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // 검색
  $('searchInput').addEventListener('input', e => { curSearch = e.target.value; curPage = 1; render(); });
  function setQuickRange(kind) {
    if (kind === 'all') { $('dateFrom').value = ''; $('dateTo').value = ''; }
    else {
      const to = maxDateOf(NOTICES);
      $('dateTo').value = to;
      $('dateFrom').value = quickRangeFrom(to, kind);
    }
    document.querySelectorAll('.date-quick').forEach(b => b.classList.toggle('on', b.dataset.q === kind));
    setDateLabel(DATE_LABELS[kind]);
    curPage = 1; render();
  }

  // 초기 — 기본 기간: 최근 1개월
  setQuickRange('month');
</script>
</body>
</html>
