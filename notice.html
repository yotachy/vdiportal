<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 공지사항</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 공지 리스트 */
  .notice-item { display: grid; grid-template-columns: 88px 1fr auto; gap: 18px; align-items: center;
    padding: 16px 22px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  .notice-item:last-child { border-bottom: none; }
  .notice-item:hover { background: var(--surface-2); }
  .notice-item.pinned { background: linear-gradient(90deg, var(--kb-yellow-soft), rgba(255,246,220,0.35)); }
  .notice-item.pinned:hover { background: var(--kb-yellow-soft); }

  .ntag { display: block; text-align: center; font-size: 12px; font-weight: 800; padding: 4px 0; border-radius: 6px; letter-spacing: 0.01em; }
  .ntag-important { background: var(--danger-soft); color: var(--danger); border: 1px solid #F3C4BF; }
  .ntag-normal { background: var(--bg-subtle); color: var(--text-secondary); border: 1px solid var(--border-strong); }

  .notice-main { min-width: 0; }
  .notice-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px; min-width: 0; }
  .notice-title .t-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notice-pin { width: 15px; height: 15px; color: var(--kb-yellow-dark); flex-shrink: 0; }
  .new-badge { flex-shrink: 0; font-size: 10px; font-weight: 800; color: var(--danger); background: var(--danger-soft);
    border-radius: 5px; padding: 1px 6px; letter-spacing: 0.03em; }

  .notice-meta { display: flex; align-items: center; gap: 16px; font-size: 12.5px; color: var(--text-tertiary);
    white-space: nowrap; font-variant-numeric: tabular-nums; }
  .notice-meta .nm { display: flex; align-items: center; gap: 5px; }
  .notice-meta svg { width: 13px; height: 13px; }

  .empty-state { text-align: center; padding: 56px 16px; color: var(--text-tertiary); font-size: 14px; }

  @media (max-width: 820px) {
    .notice-item { grid-template-columns: 76px 1fr; gap: 12px; }
    .notice-meta { grid-column: 2; justify-content: flex-start; gap: 12px; }
    .notice-meta .nm-author { display: none; }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header" data-header></header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" data-sidebar="notice"></aside>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-secondary);font-weight:600">공지사항</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">공지사항</h1>
        <p class="page-desc">VDI 운영 관련 점검·업데이트·보안 공지를 확인합니다. 항목을 클릭하면 상세 내용을 볼 수 있습니다.</p>
      </div>
    </div>

    <!-- 필터바 -->
    <div class="filter-bar reveal" style="animation-delay:.1s">
      <div class="filter-seg" id="filterSeg">
        <button class="fsb on" data-filter="all">전체</button>
        <button class="fsb" data-filter="important">중요</button>
        <button class="fsb" data-filter="normal">일반</button>
      </div>
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="제목 검색">
      </div>
    </div>

    <!-- 공지 리스트 -->
    <div class="fc reveal" style="animation-delay:.14s">
      <div id="noticeList"></div>
    </div>

  </main>
</div>

<script src="common.js"></script>
<script>
  // ===== 데이터 (최신순) =====
  // cat: important(중요) · normal(일반)
  const NOTICES = [
    { id: 1, cat: 'important', pinned: true,  isNew: true,  title: '[정기점검] 06.01(일) 02:00~05:00 VDI 정기 점검 안내', author: 'VDI 운영팀', date: '2026.05.29', views: 1284 },
    { id: 2, cat: 'important', pinned: true,  isNew: true,  title: '[보안] 랜섬웨어 주의보 — 출처 불명 메일 첨부파일 실행 금지', author: '정보보안부', date: '2026.05.28', views: 2317 },
    { id: 3, cat: 'normal',    pinned: false, isNew: true,  title: 'Citrix Workspace v23.11 배포 안내 (자동 업데이트)', author: 'VDI 운영팀', date: '2026.05.26', views: 903 },
    { id: 4, cat: 'normal',    pinned: false, isNew: false, title: 'VDI 사용자 매뉴얼 v2.0 배포 안내', author: 'IT기획파트', date: '2026.05.20', views: 1042 },
    { id: 5, cat: 'normal',    pinned: false, isNew: false, title: '가상PC Windows 5월 정기 보안 패치 적용 안내', author: 'VDI 운영팀', date: '2026.05.14', views: 658 },
    { id: 6, cat: 'important', pinned: false, isNew: false, title: '05.11(일) 네트워크 장비 교체 작업 안내 (접속 일시 중단)', author: '인프라팀', date: '2026.05.08', views: 591 },
    { id: 7, cat: 'normal',    pinned: false, isNew: false, title: 'PC가상화 프로그램 설치 파일 안내', author: 'VDI 운영팀', date: '2026.04.22', views: 712 },
    { id: 8, cat: 'normal',    pinned: false, isNew: false, title: '신규 공용 VDI(부서 공용형) 도입 안내', author: 'IT기획파트', date: '2026.04.15', views: 834 },
    { id: 9, cat: 'important', pinned: false, isNew: false, title: '[복구완료] 일부 사용자 접속 지연 현상 정상화 안내', author: 'VDI 운영팀', date: '2026.04.10', views: 1576 }
  ];

  const CAT = {
    important: { cls: 'ntag-important', txt: '중요' },
    normal:    { cls: 'ntag-normal',    txt: '일반' }
  };

  const $ = id => document.getElementById(id);
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let curFilter = 'all', curSearch = '';

  const PIN_SVG = '<svg class="notice-pin" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M16 3l5 5-3 1-3 3-1 5-2-2-3 3-1-1 3-3-2-2 5-1 3-3 1-3z"/></svg>';
  const EYE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const USER_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

  function render() {
    const q = curSearch.trim().toLowerCase();
    let list = NOTICES.filter(n => {
      const okFilter = curFilter === 'all' || n.cat === curFilter;
      const okSearch = !q || n.title.toLowerCase().includes(q);
      return okFilter && okSearch;
    });
    // 고정 우선, 그 외 최신순(데이터가 이미 최신순)
    list = [...list].sort((a, b) => (b.pinned - a.pinned));

    if (!list.length) {
      $('noticeList').innerHTML = `<div class="empty-state">조건에 맞는 공지사항이 없습니다.</div>`;
      return;
    }

    $('noticeList').innerHTML = list.map(n => {
      const c = CAT[n.cat];
      return `
        <div class="notice-item${n.pinned ? ' pinned' : ''}" onclick="location.href='notice-detail.html?id=${n.id}'">
          <span class="ntag ${c.cls}">${c.txt}</span>
          <div class="notice-main">
            <div class="notice-title">
              ${n.pinned ? PIN_SVG : ''}
              <span class="t-text">${esc(n.title)}</span>
              ${n.isNew ? '<span class="new-badge">NEW</span>' : ''}
            </div>
          </div>
          <div class="notice-meta">
            <span class="nm nm-author">${USER_SVG}${n.author}</span>
            <span class="nm">${n.date}</span>
            <span class="nm">${EYE_SVG}${n.views.toLocaleString()}</span>
          </div>
        </div>`;
    }).join('');
  }

  // 필터 / 검색
  document.querySelectorAll('#filterSeg .fsb').forEach(btn => {
    btn.addEventListener('click', () => {
      curFilter = btn.dataset.filter;
      document.querySelectorAll('#filterSeg .fsb').forEach(b => b.classList.toggle('on', b === btn));
      render();
    });
  });
  $('searchInput').addEventListener('input', e => { curSearch = e.target.value; render(); });

  render();
</script>
</body>
</html>
