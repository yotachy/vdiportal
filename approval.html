<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 결재 현황</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 요약 스탯 바(.stat-*)는 common.css 공통 — 결재 4열 */
  .stat-strip { grid-template-columns: repeat(4, 1fr); }

  /* 구분 — 카테고리 텍스트 (색 없이, incident 유형값과 동일 폰트) */
  .rtag { display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.01em; white-space: nowrap; }

  .col-content { color: var(--text-secondary); font-size: 13.5px; letter-spacing: -0.01em; }

  /* ===== 상태 pill ===== */
  .spill { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 100px; font-size: 12.5px; font-weight: 800; white-space: nowrap; }
  .spill-progress { background: var(--warning-soft); color: var(--warn-text); }
  .spill-apply { background: var(--info-soft); color: var(--info); }
  .spill-done { background: transparent; padding: 5px 0; color: var(--text-tertiary); font-weight: 700; }
  .spill-reject { background: transparent; padding: 5px 0; color: var(--text-tertiary); font-weight: 700; }

  .data-table tbody tr { cursor: pointer; }
  .col-no { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; white-space: nowrap; }
  .col-date { color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .col-vdi { font-variant-numeric: tabular-nums; font-weight: 600; }
  /* 정렬 — 내용(유연 컬럼) 좌측, 나머지 고정 컬럼 가운데 (notice와 동일 정책) */
  .data-table th, .data-table td { text-align: center; }
  .data-table th:nth-child(5), .data-table td:nth-child(5) { text-align: left; }
  /* 빈 상태(.empty-state)는 common.css 공통 */

  @media (max-width: 760px) { .stat-strip { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="top-header" data-header></header>

<div class="layout">

  <aside class="sidebar" data-sidebar="approval"></aside>

  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>신청 · 결재</span>
      <span class="breadcrumb-sep">›</span>
      <span class="bc-cur">결재 현황</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">결재 현황</h1>
        <p class="page-desc">제출한 신청의 결재 진행 상태를 확인합니다. 항목을 클릭하면 상세 내역을 볼 수 있습니다.</p>
      </div>
      <div class="page-header-right"></div>
    </div>

    <!-- 요약 스탯 (관리자 권한 전용 — 관리자 권한 ON 시 노출) -->
    <div class="stat-strip" id="statStrip">
      <div class="stat-chip" data-stat="all">
        <div class="stat-ico all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <div><div class="stat-num" id="cAll">0</div><div class="stat-lbl">전체 신청</div></div>
      </div>
      <div class="stat-chip" data-stat="progress">
        <div class="stat-ico warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="stat-num" id="cProgress">0</div><div class="stat-lbl">승인 중</div></div>
      </div>
      <div class="stat-chip" data-stat="done">
        <div class="stat-ico ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div><div class="stat-num" id="cDone">0</div><div class="stat-lbl">완료</div></div>
      </div>
      <div class="stat-chip" data-stat="reject">
        <div class="stat-ico bad"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        <div><div class="stat-num" id="cReject">0</div><div class="stat-lbl">반려</div></div>
      </div>
    </div>

    <div class="filter-bar reveal" style="animation-delay:.14s">
      <div class="search-hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="신청번호 · 구분 · VDI명으로 검색">
      </div>
      <div class="filter-chips">
        <div class="filter-seg" id="filterSeg">
          <button class="fsb on" data-filter="all">전체</button>
          <button class="fsb" data-filter="progress">승인중</button>
          <button class="fsb" data-filter="done">완료</button>
          <button class="fsb" data-filter="reject">반려</button>
        </div>
        <div class="date-drop" id="dateDrop">
          <button type="button" class="date-drop-btn" onclick="toggleDatePop(event)">
            <svg class="cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="dateDropLabel">최근 1개월</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="date-pop">
            <button type="button" class="date-quick" data-q="all" onclick="setQuickRange('all')">전체 기간 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick" data-q="week" onclick="setQuickRange('week')">최근 1주일 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick on" data-q="month" onclick="setQuickRange('month')">최근 1개월 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button type="button" class="date-quick" data-q="month3" onclick="setQuickRange('month3')">최근 3개월 <svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button>
            <input type="hidden" id="dateFrom">
            <input type="hidden" id="dateTo">
          </div>
        </div>
      </div>
    </div>

    <div class="fc reveal" style="animation-delay:.18s">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:178px">신청번호</th>
            <th style="width:92px">신청일</th>
            <th style="width:112px">구분</th>
            <th style="width:170px">대상 VDI</th>
            <th>내용</th>
            <th style="width:128px">상태</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager" id="apprPager"></div>

  </main>
</div>

<script src="common.js"></script>
<script>
  // ===== 데이터 (portal.html과 정합) =====
  // status: progress(승인 중) · done(완료) · reject(반려) — 3단계
  // 내용(목록)은 구분별 정형 파라미터로 content(r)가 자동 조합 — 수행사 구현 기준
  //   신규 → type(유형)  ·  연장 → period(기간)  ·  증설 → item·from·to(자원 변경)  ·  잠금해제 → cause(잠금 사유)
  const ROWS = [
    { no: 'REQ-2026-0422-008', date: '2026.04.22', kind: '증설', vdi: 'jschoi0223-main',   item: '메모리', from: '8GB', to: '16GB',  status: 'progress' },
    { no: 'REQ-2026-0421-012', date: '2026.04.21', kind: '잠금해제', vdi: 'jschoi0223-prj', cause: '장기 미사용 잠금',                status: 'progress' },
    { no: 'REQ-2026-0410-005', date: '2026.04.10', kind: '신규', vdi: 'jschoi0223-nomain', type: '고정',                              status: 'progress' },
    { no: 'REQ-2026-0405-011', date: '2026.04.05', kind: '연장', vdi: 'jschoi0223-main',   period: '3개월',                           status: 'done' },
    { no: 'REQ-2026-0315-004', date: '2026.03.15', kind: '신규', vdi: 'jschoi0223-nomain', type: '고정',                              status: 'done' },
    { no: 'REQ-2026-0302-009', date: '2026.03.02', kind: '연장', vdi: 'jschoi0223-main',   period: '3개월',                           status: 'done' },
    { no: 'REQ-2026-0228-006', date: '2026.02.28', kind: '증설', vdi: 'jschoi0223-nomain', item: 'CPU', from: '2 Core', to: '8 Core', status: 'reject' },
    { no: 'REQ-2026-0120-002', date: '2026.01.20', kind: '연장', vdi: 'jschoi0223-nomain', period: '3개월',                           status: 'done' },
    { no: 'REQ-2026-0318-007', date: '2026.03.18', kind: '신규', vdi: 'jschoi0223-main',   type: '고정',                              status: 'progress' },
    { no: 'REQ-2026-0210-003', date: '2026.02.10', kind: '증설', vdi: 'jschoi0223-main',   item: '디스크', from: '80GB', to: '160GB', status: 'done' },
    { no: 'REQ-2026-0115-001', date: '2026.01.15', kind: '신규', vdi: 'jschoi0223-main',   type: '고정',                              status: 'done' },
    { no: 'REQ-2025-1220-014', date: '2025.12.20', kind: '연장', vdi: 'jschoi0223-nomain', period: '12개월',                          status: 'done' },
    { no: 'REQ-2025-1128-010', date: '2025.11.28', kind: '증설', vdi: 'jschoi0223-nomain', item: 'CPU', from: '2 Core', to: '4 Core', status: 'reject' }
  ];

  const KIND = { '신규': 'add', '연장': 'extend', '증설': 'expand', '잠금해제': 'unlock' };
  // 목록 '내용' — 구분별 정형 패턴: "{구분 라벨} · {파라미터}"
  const KIND_TEXT = { '신규': '신규 신청', '연장': '사용 연장', '증설': '자원 증설', '잠금해제': '잠금 해제' };
  function content(r) {
    if (r.kind === '신규') return `${KIND_TEXT['신규']} · ${r.type}형`;
    if (r.kind === '연장') return `${KIND_TEXT['연장']} · ${r.period}`;
    if (r.kind === '증설') return `${KIND_TEXT['증설']} · ${r.item} ${r.from}→${r.to}`;
    if (r.kind === '잠금해제') return `${KIND_TEXT['잠금해제']} · ${r.cause}`;
    return '';
  }
  const PILL = {
    progress: { cls: 'spill-progress', dot: 'sdot-warning', txt: '승인 중' },
    apply:    { cls: 'spill-apply',    dot: 'sdot-info',    txt: '적용 중' },
    done:     { cls: 'spill-done',     dot: 'sdot-success', txt: '완료' },
    reject:   { cls: 'spill-reject',   dot: 'sdot-danger',  txt: '반려' }
  };
  // 필터/집계 시 apply(적용 중)는 '진행 중' 그룹으로 묶음
  const group = s => (s === 'apply' ? 'progress' : s);

  const $ = id => document.getElementById(id);
  let curFilter = 'all', curSearch = '', curPage = 1;

  function updateStats() {
    $('cAll').textContent = ROWS.length;
    $('cProgress').textContent = ROWS.filter(r => group(r.status) === 'progress').length;
    $('cDone').textContent = ROWS.filter(r => r.status === 'done').length;
    $('cReject').textContent = ROWS.filter(r => r.status === 'reject').length;
  }

  function render() {
    const q = curSearch.trim().toLowerCase();
    const list = ROWS.filter(r => {
      const okFilter = curFilter === 'all' || group(r.status) === curFilter;
      const okSearch = !q || (r.no + ' ' + r.kind + ' ' + r.vdi + ' ' + content(r)).toLowerCase().includes(q);
      const okDate = dateInRange(r.date, $('dateFrom').value, $('dateTo').value);
      return okFilter && okSearch && okDate;
    }).sort((a, b) => b.date.localeCompare(a.date));   // 신청일 내림차순(최신순)

    if (!list.length) {
      $('tbody').innerHTML = `<tr class="empty-row"><td colspan="6"><div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        조건에 맞는 신청 내역이 없습니다.</div></td></tr>`;
      renderPager('apprPager', 0, 1, () => {});
      return;
    }

    const pages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (curPage > pages) curPage = pages;
    const pageItems = list.slice((curPage - 1) * PAGE_SIZE, curPage * PAGE_SIZE);

    $('tbody').innerHTML = pageItems.map(r => {
      const p = PILL[r.status];
      return `
        <tr onclick="location.href='approval-detail.html?no=${r.no}'">
          <td class="col-no">${r.no}</td>
          <td class="col-date">${r.date.slice(5)}</td>
          <td><span class="rtag rtag-${KIND[r.kind]}">${r.kind}</span></td>
          <td class="col-vdi">${r.vdi}</td>
          <td class="col-content">${content(r)}</td>
          <td><span class="spill ${p.cls}"><span class="sdot ${p.dot}" style="margin:0"></span>${p.txt}</span></td>
        </tr>`;
    }).join('');

    renderPager('apprPager', list.length, curPage, p => {
      curPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  document.querySelectorAll('#filterSeg .fsb').forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter));
  });
  // 스탯 칩 → 필터 연동
  document.querySelectorAll('.stat-chip').forEach(chip => {
    chip.addEventListener('click', () => setFilter(chip.dataset.stat));
  });

  function setFilter(f) {
    curFilter = f;
    curPage = 1;
    document.querySelectorAll('#filterSeg .fsb').forEach(b => b.classList.toggle('on', b.dataset.filter === f));
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.toggle('on', c.dataset.stat === f));
    render();
  }

  $('searchInput').addEventListener('input', e => { curSearch = e.target.value; curPage = 1; render(); });
  function setQuickRange(kind) {
    if (kind === 'all') { $('dateFrom').value = ''; $('dateTo').value = ''; }
    else {
      const to = maxDateOf(ROWS);
      $('dateTo').value = to;
      $('dateFrom').value = quickRangeFrom(to, kind);
    }
    document.querySelectorAll('.date-quick').forEach(b => b.classList.toggle('on', b.dataset.q === kind));
    setDateLabel(DATE_LABELS[kind]);
    curPage = 1; render();
  }

  // 초기 — 기본 기간: 최근 1개월
  updateStats();
  setQuickRange('month');
</script>
</body>
</html>
