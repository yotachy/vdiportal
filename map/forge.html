<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>스쿱포지 · Scoop Forge</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --gold:#e8b463;--bg:#0b0f14;--panel:#121822;--ink:#e7ecf5;--eth:#8a92b2;
    --bull:#46c28e;--bear:#e06a6a;--line:#222b39;
    /* board engine tokens (ported from map.html) */
    --surface:#141a22;--raised:#1b232d;--raised2:#27313e;
    --edge:#566472;--muted:#8b98a6;--faint:#5c6875;--gold-dim:#5e4d2c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,system-ui,sans-serif;letter-spacing:-0.01em}
  .forge-top{display:flex;align-items:center;gap:14px;height:54px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{font-weight:800;letter-spacing:-0.02em}.brand em{color:var(--gold);font-style:normal}
  .forge-split{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 54px)}
  .board-pane{position:relative;overflow:hidden;border-right:1px solid var(--line);display:flex;flex-direction:column}
  .chart-pane{position:relative;overflow:hidden;display:flex;flex-direction:column}
  .run-btn{background:var(--gold);color:#1a1206;border:0;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer}

  /* ════════════════════════════════════════════════════
     BOARD ENGINE STYLES  (ported + scoped with b- prefix)
     NOTE: no will-change:transform on .b-world (zoom blur)
     ════════════════════════════════════════════════════ */
  .b-stage{
    position:relative;flex:1;min-height:0;overflow:hidden;cursor:grab;
    background:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0) 0 0/26px 26px,
               radial-gradient(120% 120% at 30% 0%,#141c28,#0b0f14)}
  .b-stage.panning{cursor:grabbing}
  .b-stage.selmode{cursor:crosshair}
  .b-world{position:absolute;left:0;top:0;transform-origin:0 0}
  /* edge SVG: 20000×20000 centered on -10000,-10000 so world(0,0) maps to SVG(10000,10000) */
  .b-edges{position:absolute;left:-10000px;top:-10000px;width:20000px;height:20000px;overflow:visible;pointer-events:none}
  .b-edges .b-ew{fill:none;stroke:var(--edge);stroke-width:2.4}
  .b-edges .b-ew.sel{stroke:var(--gold);stroke-width:3}
  .b-edges .b-eh{fill:none;stroke:transparent;stroke-width:16;pointer-events:stroke;cursor:pointer}
  .b-edges path.b-tmp{fill:none;stroke:var(--gold);stroke-width:2;stroke-dasharray:5 4}

  /* nodes */
  .b-node{position:absolute;width:200px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;box-shadow:0 10px 26px -16px #000;cursor:grab;transition:border-color .12s,box-shadow .12s}
  .b-node.b-mini{width:140px}
  .b-node:hover{border-color:#3a4452}
  .b-node.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,180,99,.22),0 12px 28px -14px #000}
  .b-node.b-linktarget{border-color:var(--bull);box-shadow:0 0 0 3px rgba(70,194,142,.25)}
  .b-n-in{position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--edge)}
  .b-n-body{padding:10px 12px}
  .b-mini .b-n-body{padding:7px 10px}
  .b-n-title{font-size:13px;font-weight:700;outline:none;border-radius:5px;padding:2px 3px;margin:-2px -3px;line-height:1.4;min-height:18px;white-space:pre-wrap;overflow-wrap:break-word;cursor:inherit;color:var(--ink)}
  .b-n-title:empty::before{content:"제목";color:var(--faint)}
  .b-n-title:focus{cursor:text}
  .b-mini .b-n-title{font-size:12px}
  .b-n-type{display:inline-block;margin-top:4px;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--gold);background:rgba(232,180,99,.1);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 6px;text-transform:uppercase}
  /* ports */
  .b-port{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--raised);border:2px solid var(--gold-dim);cursor:crosshair;z-index:5;opacity:0;transition:opacity .12s}
  .b-node:hover .b-port,.b-node.selected .b-port,.b-node.b-linkhover .b-port{opacity:1}
  .b-port:hover,.b-port.snaptgt{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px rgba(232,180,99,.75);opacity:1;transform:scale(1.25)}
  .b-port-top.snaptgt,.b-port-bottom.snaptgt{transform:translateX(-50%) scale(1.25)}
  .b-port-left.snaptgt,.b-port-right.snaptgt{transform:translateY(-50%) scale(1.25)}
  .b-port-top{top:-7px;left:50%;transform:translateX(-50%)}
  .b-port-bottom{bottom:-7px;left:50%;transform:translateX(-50%)}
  .b-port-left{left:-7px;top:50%;transform:translateY(-50%)}
  .b-port-right{right:-7px;top:50%;transform:translateY(-50%)}
  /* edge + node HUDs */
  .b-ehud,.b-nhud{position:absolute;left:0;top:0;pointer-events:none}
  .b-ehandle{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--gold);border:2px solid #11161d;transform:translate(-50%,-50%);cursor:grab;z-index:7;pointer-events:auto;box-shadow:0 2px 6px #000a}
  .b-ehandle:hover{transform:translate(-50%,-50%) scale(1.2)}
  .b-hbar{position:absolute;display:flex;gap:2px;background:#0e1218f2;border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:0 8px 22px #000b;pointer-events:auto;backdrop-filter:blur(5px);z-index:8}
  .b-ebar{transform:translate(-50%,-135%)}
  .b-nbar{transform:translate(-50%,calc(-100% - 8px))}
  .b-hbtn{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px;padding:4px 5px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:9px;font-weight:600;line-height:1;font-family:inherit}
  .b-hbtn svg{width:14px;height:14px}
  .b-hbtn:hover{background:var(--raised2);color:var(--ink)}
  .b-hbtn.danger:hover{color:var(--bear)}
  /* marquee + snap guides */
  .b-marquee{position:absolute;display:none;border:1.5px solid var(--gold);background:rgba(232,180,99,.08);border-radius:3px;z-index:8;pointer-events:none}
  .b-snap-guide{position:absolute;display:none;z-index:6;pointer-events:none}
  #bSnapV{width:0;border-left:1px dashed var(--gold)}
  #bSnapH{height:0;border-top:1px dashed var(--gold)}
  /* zoom controls */
  .b-zoomctl{position:absolute;left:12px;bottom:12px;display:flex;flex-direction:column;gap:5px;z-index:10}
  .b-zoomctl button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#161b22e0;backdrop-filter:blur(4px);color:var(--ink);font-size:15px;cursor:pointer;display:grid;place-items:center;font-family:inherit}
  .b-zoomctl button:hover{background:var(--raised2)}
  .b-zlabel{font-size:10px;color:var(--muted);text-align:center;background:#161b22cc;border:1px solid var(--line);border-radius:6px;padding:3px}
  /* thumbnail */
  .b-n-thumb{margin:-2px -2px 6px;border-radius:8px 8px 0 0;overflow:hidden;background:var(--bg);max-height:84px}
  .b-n-thumb img{display:block;width:100%;height:auto;max-height:84px;object-fit:cover}
  /* weight importance badge */
  .b-n-wt{position:absolute;top:-8px;right:-8px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
    background:var(--gold);color:#1a1206;font-size:10px;font-weight:700;line-height:18px;text-align:center;z-index:4}
  /* drag cursor override */
  body.b-ndrag,body.b-ndrag *{cursor:grabbing!important}
  /* toast (positioned in left half) */
  .b-toast{position:fixed;bottom:18px;left:25%;transform:translateX(-50%);background:#1d2530;border:1px solid var(--gold-dim);color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;z-index:99;box-shadow:0 10px 26px -8px #000;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
  .b-toast.on{opacity:1}

  /* ════════════════════════════════════════════════════
     CHART PANE  (PHASE-FOLD render port from chart.html)
     ════════════════════════════════════════════════════ */
  .fc-wrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;padding:10px;gap:8px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .fc-panel{background:linear-gradient(180deg,var(--panel),#0e1218);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;flex-shrink:0}
  .fc-phead{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;
    border-bottom:1px solid var(--line)}
  .fc-t{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--eth)}
  .fc-t b{color:var(--ink)}
  .fc-meta{font-family:ui-monospace,monospace;font-size:10px;color:#5a6478}
  .fc-pbody{padding:8px 10px}
  .fc-cv{display:block;width:100%;border-radius:6px}
  .fc-folds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 10px}

  /* ══ verdict badge (top of chart-pane) ══ */
  .verdict-badge{
    display:none;flex-shrink:0;align-items:center;gap:8px;
    padding:6px 14px;border-bottom:1px solid var(--line);
    background:rgba(11,15,20,.92);
    font-family:ui-monospace,monospace;font-size:11px;color:var(--eth);
  }
  .verdict-badge.active{display:flex}
  .verdict-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* ══ export button ══ */
  .export-btn{
    margin-left:auto;background:transparent;color:var(--eth);
    border:1px solid var(--line);border-radius:8px;padding:8px 16px;
    font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;
  }
  .export-btn:hover{background:var(--raised2);color:var(--ink)}

  /* theme banner */
  .forge-theme{flex:0 0 96px;display:flex;gap:12px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel);flex-shrink:0}
  .forge-theme .th-img{flex:0 0 200px;height:80px;border-radius:8px;overflow:hidden;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--eth);font-size:11px;text-align:center;line-height:1.4}
  .forge-theme .th-img img{width:100%;height:100%;object-fit:contain}
  .forge-theme .th-title{flex:1;font-size:18px;font-weight:700;color:var(--ink);outline:none;min-height:24px}
  .forge-theme .th-title:empty::before{content:"주제 제목…";color:var(--eth)}

  /* block palette (floats over board-pane) */
  .forge-palette{
    position:absolute;left:12px;top:108px;z-index:10;
    display:flex;flex-direction:column;gap:4px;
    background:#0e1218ee;border:1px solid var(--line);
    border-radius:12px;padding:8px 7px;
    box-shadow:0 8px 22px -8px #000c;
    backdrop-filter:blur(6px);
  }
  .forge-palette .pal-label{
    font-size:9px;font-weight:700;letter-spacing:.06em;
    color:var(--eth);text-transform:uppercase;
    padding:0 3px 3px;
  }
  .forge-palette .pal-btn{
    display:block;width:100%;
    padding:6px 11px;border:1px solid var(--line);
    border-radius:8px;background:var(--surface);
    color:var(--ink);font-size:11px;font-weight:600;
    font-family:inherit;cursor:pointer;text-align:left;
    white-space:nowrap;transition:background .1s,border-color .1s;
  }
  .forge-palette .pal-btn:hover{background:var(--raised2);border-color:#3a4452}
  .forge-palette .pal-btn.pal-free{color:var(--eth);border-style:dashed}

  /* ── 파라미터 편집기 패널 ── */
  .forge-params{position:absolute;right:12px;top:108px;z-index:6;width:230px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:12px;font-size:12px;color:var(--ink);box-shadow:0 6px 20px #0008}
  .forge-params h4{margin:0 0 8px;font-size:12px;color:var(--gold);font-weight:700}
  .forge-params .pp-row{display:flex;align-items:center;gap:8px;margin:6px 0}
  .forge-params .pp-row label{flex:0 0 78px;color:var(--eth)}
  .forge-params input[type=number],.forge-params textarea{flex:1;background:var(--bg);border:1px solid var(--line);
    border-radius:6px;color:var(--ink);padding:4px 6px;font:inherit}
  .forge-params textarea{min-height:48px;resize:vertical}
  .forge-params input[type=range]{flex:1}
  .forge-params .pp-conv-val{flex:0 0 34px;text-align:right;color:var(--gold)}

  /* ── 썸네일 라이브러리 패널 ── */
  .forge-lib{position:absolute;left:52px;bottom:12px;z-index:9;width:150px;max-height:42%;overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px}
  .forge-lib h4{margin:0 0 6px;font-size:11px;color:var(--eth);cursor:pointer;user-select:none}
  .forge-lib h4:hover{color:var(--ink)}
  .forge-lib .lib-add{font-size:11px;color:var(--gold);cursor:pointer;padding:4px;border:1px dashed var(--line);
    border-radius:6px;text-align:center;margin-bottom:6px}
  .forge-lib .lib-add:hover{border-color:var(--gold)}
  .forge-lib .lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .forge-lib .lib-it img{width:100%;height:46px;object-fit:cover;border-radius:6px;cursor:grab;border:1px solid var(--line)}
  .forge-lib .lib-it img:hover{border-color:var(--gold)}
  .forge-lib.collapsed .lib-grid,.forge-lib.collapsed .lib-add,.forge-lib.collapsed h4 span{display:none}
</style>
</head>
<body>
  <header class="forge-top">
    <div class="brand">Scoop<em>Forge</em> <span style="color:var(--eth);font-weight:500">by MoneyScoop</span></div>
    <button class="export-btn" id="exportBtn" onclick="exportStrategy()">내보내기</button>
    <button class="run-btn" id="runBtn">▷ 실행</button>
  </header>
  <div class="forge-split">
    <section class="board-pane" id="boardPane">
      <!-- Board DOM injected by boardInit() on DOMContentLoaded -->
    </section>
    <section class="chart-pane" id="chartPane">
      <div id="verdictBadge" class="verdict-badge"></div>
      <div class="fc-wrap">
        <div class="fc-panel">
          <div class="fc-phead">
            <span class="fc-t"><b>가격 차트</b> · 예측·시그널</span>
            <span class="fc-meta" id="fcMeta">–</span>
          </div>
          <div class="fc-pbody">
            <canvas id="fcMain" class="fc-cv"></canvas>
          </div>
        </div>
        <div class="fc-panel">
          <div class="fc-phead">
            <span class="fc-t"><b>PDM 스펙트럼</b> · 주기별 정합도</span>
            <span class="fc-meta">y = 100·(1−θ)</span>
          </div>
          <div class="fc-pbody">
            <canvas id="fcPdm" class="fc-cv"></canvas>
          </div>
        </div>
        <div class="fc-panel">
          <div class="fc-phead">
            <span class="fc-t"><b>위상 폴딩</b> · 구간 포개기</span>
            <span class="fc-meta">traces tighten when locked</span>
          </div>
          <div class="fc-folds">
            <canvas id="fcFoldA" class="fc-cv"></canvas>
            <canvas id="fcFoldB" class="fc-cv"></canvas>
            <canvas id="fcFoldC" class="fc-cv"></canvas>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="b-toast" id="bToast"></div>

  <script src="forge-core.js"></script>
  <script>
  /* ════════════════════════════════════════════════════════════════
     BOARD ENGINE  — lightweight port of Scoop Board (map/map.html)
     Omitted: thumbnails, server-save, undo/redo, groups, icons,
              multi-canvas, copy/paste, auto-layout, A* routing.
     Kept: pan/zoom, node render (block+free kinds), edge render
           (ortho path), port-drag connect, selection, minimal HUDs.
     Forge semantics: boardState / boardToGraph / fireBoardChange.
     ════════════════════════════════════════════════════════════════ */

  /* ── uid ─────────────────────────────────────────────────────── */
  let _uidc = 0;
  function uid(p) {
    return (p || "id") + "_" + (++_uidc) + "_" + Math.random().toString(36).slice(2, 5);
  }

  /* ── DOM refs (set by boardInit) ─────────────────────────────── */
  let bStage = null, bWorld = null;

  /* ── Core state ──────────────────────────────────────────────── */
  let boardState = { nodes: [], edges: [] };
  let view = { tx: 30, ty: 20, scale: 1 };
  let sel = [];           // selected node id[]
  let selEdge = null;     // selected edge id | null
  let drag = null;
  let spaceDown = false;
  let justDragged = false;

  const W_NODE = 200;   // default node width (block kind)
  const EWIDTHS = { 1: 1.6, 2: 2.4, 3: 3.8 };

  /* ── Block definitions ───────────────────────────────────────── */
  const BLOCK_DEFS = [
    { type: "price",     label: "가격",        kind: "block" },
    { type: "ma",        label: "이동평균",    kind: "block", params: { len: 10 } },
    { type: "phasefold", label: "위상폴딩",    kind: "block", params: { pmin: 16, pmax: 128 } },
    { type: "combine",   label: "가중결합",    kind: "block" },
    { type: "predict",   label: "예측·시그널", kind: "block" },
    { type: "free",      label: "메모",        kind: "free" }
  ];

  /* helpers */
  const bN = id => boardState.nodes.find(n => n.id === id);
  const bE = id => boardState.edges.find(e => e.id === id);
  const DIR = { right: [1, 0], left: [-1, 0], top: [0, -1], bottom: [0, 1] };
  const esc = s => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  /* ── Change notification ─────────────────────────────────────── */
  let _boardChangeCb = null;
  function onBoardChange(cb) { _boardChangeCb = cb; }
  function fireBoardChange() { if (_boardChangeCb) _boardChangeCb(); }

  /* ── boardToGraph ────────────────────────────────────────────── */
  function boardToGraph() {
    return {
      nodes: boardState.nodes.map(n => ({
        id: n.id,
        kind: n.kind || "free",
        blockType: n.blockType || null,
        params: n.params || {},
        conviction: n.conviction || 0,
        weight: (n.weight != null ? n.weight : 50)
      })),
      edges: boardState.edges.map(e => ({ from: e.from, to: e.to }))
    };
  }

  /* ── worldPt ─────────────────────────────────────────────────── */
  function worldPt(cx, cy) {
    const r = bStage.getBoundingClientRect();
    return {
      x: (cx - r.left - view.tx) / view.scale,
      y: (cy - r.top  - view.ty) / view.scale
    };
  }

  /* ── Edge geometry ───────────────────────────────────────────── */
  function anchor(n, side) {
    const w = n._w || W_NODE, h = n._h || 70;
    switch (side) {
      case "left":   return { x: n.x,       y: n.y + h / 2 };
      case "top":    return { x: n.x + w/2,  y: n.y         };
      case "bottom": return { x: n.x + w/2,  y: n.y + h     };
      default:       return { x: n.x + w,    y: n.y + h / 2 };
    }
  }
  function nearestSide(n, pt) {
    const w = n._w || W_NODE, h = n._h || 70;
    const dx = (pt.x - (n.x + w/2)) / w, dy = (pt.y - (n.y + h/2)) / h;
    return Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "bottom" : "top");
  }
  function centerOf(n) { return { x: n.x + (n._w || W_NODE)/2, y: n.y + (n._h || 70)/2 }; }
  function sidesOf(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return { fs: "right", ts: "left" };
    let fs = e.fromSide, ts = e.toSide;
    const fA = (!fs || fs === "auto"), tA = (!ts || ts === "auto");
    if (fA && tA) { fs = nearestSide(a, centerOf(b)); ts = nearestSide(b, centerOf(a)); }
    else if (fA) { fs = nearestSide(a, anchor(b, ts)); }
    else if (tA) { ts = nearestSide(b, anchor(a, fs)); }
    return { fs, ts };
  }
  function cleanPts(pts) {
    const out = [pts[0]];
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i], b = out[out.length - 1];
      if (Math.abs(p[0]-b[0]) < 0.5 && Math.abs(p[1]-b[1]) < 0.5) continue;
      if (out.length >= 2) {
        const a = out[out.length - 2];
        const hR = Math.abs(a[1]-b[1]) < 0.5 && Math.abs(b[1]-p[1]) < 0.5;
        const vR = Math.abs(a[0]-b[0]) < 0.5 && Math.abs(b[0]-p[0]) < 0.5;
        if (hR || vR) { out[out.length - 1] = p; continue; }
      }
      out.push(p);
    }
    return out;
  }
  function orthoPath(A, B, fs, ts) {
    const hz = s => s === "left" || s === "right";
    const fH = hz(fs), tH = hz(ts), d1 = DIR[fs], d2 = DIR[ts];
    const dist = Math.hypot(B.x-A.x, B.y-A.y), S = Math.max(11, Math.min(26, dist * 0.42));
    const A1 = [A.x + d1[0]*S, A.y + d1[1]*S], B1 = [B.x + d2[0]*S, B.y + d2[1]*S];
    let mids;
    if (fH && tH)        { const mx = (A1[0]+B1[0])/2; mids = [[mx, A1[1]], [mx, B1[1]]]; }
    else if (!fH && !tH) { const my = (A1[1]+B1[1])/2; mids = [[A1[0], my], [B1[0], my]]; }
    else if (fH && !tH)  { mids = [[B1[0], A1[1]]]; }
    else                  { mids = [[A1[0], B1[1]]]; }
    return cleanPts([[A.x, A.y], A1, ...mids, B1, [B.x, B.y]]);
  }
  function polyPath(pts) {
    if (pts.length < 2) return "";
    if (pts.length === 2) return `M${pts[0][0]},${pts[0][1]} L${pts[1][0]},${pts[1][1]}`;
    let d = `M${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length - 1; i++) {
      const a = pts[i-1], b = pts[i], c = pts[i+1];
      const l1 = Math.hypot(b[0]-a[0], b[1]-a[1]) || 1, l2 = Math.hypot(c[0]-b[0], c[1]-b[1]) || 1;
      const r = Math.min(8, l1/2, l2/2);
      const p1 = [b[0]-(b[0]-a[0])/l1*r, b[1]-(b[1]-a[1])/l1*r];
      const p2 = [b[0]+(c[0]-b[0])/l2*r, b[1]+(c[1]-b[1])/l2*r];
      d += ` L${p1[0]},${p1[1]} Q${b[0]},${b[1]} ${p2[0]},${p2[1]}`;
    }
    return d + ` L${pts[pts.length-1][0]},${pts[pts.length-1][1]}`;
  }
  function edgeGeo(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return null;
    const s = sidesOf(e), A = anchor(a, s.fs), B = anchor(b, s.ts);
    let d;
    if (e.route === "curve") {
      const dd = Math.hypot(B.x-A.x, B.y-A.y), k = Math.min(120, Math.max(38, dd*0.4));
      const d1 = DIR[s.fs], d2 = DIR[s.ts];
      d = `M${A.x},${A.y} C${A.x+d1[0]*k},${A.y+d1[1]*k} ${B.x+d2[0]*k},${B.y+d2[1]*k} ${B.x},${B.y}`;
    } else {
      d = polyPath(cleanPts(orthoPath(A, B, s.fs, s.ts)));
    }
    return { A, B, fs: s.fs, ts: s.ts, d };
  }
  function nodeAt(pt) {
    let r = null;
    boardState.nodes.forEach(n => {
      const w = n._w || W_NODE, h = n._h || 70;
      if (pt.x >= n.x && pt.x <= n.x + w && pt.y >= n.y && pt.y <= n.y + h) r = n;
    });
    return r;
  }

  /* ── Image core ─────────────────────────────────────────────── */
  const IMAGES = {};
  const LIBRARY = [];
  function imgSrc(id){ return IMAGES[id] || ""; }
  function putImg(id, src){ IMAGES[id] = src; }

  /* ── 주제 배너 ───────────────────────────────────────────────── */
  let themeState = { imgId: null, title: "" };

  function renderTheme() {
    const el = document.getElementById("themeBar"); if (!el) return;
    const img = themeState.imgId
      ? `<img src="${imgSrc(themeState.imgId)}" alt="">`
      : "주제 이미지<br>붙여넣기(Ctrl+V)";
    el.querySelector(".th-img").innerHTML = img;
    const t = el.querySelector(".th-title");
    if (document.activeElement !== t) t.textContent = themeState.title || "";
  }

  function setThemeImg(imgId) { themeState.imgId = imgId; renderTheme(); fireBoardChange(); }
  function downscaleImage(src, cb){
    const img = new Image();
    img.onload = () => { let w=img.width,h=img.height; const md=1000, sc=Math.min(1,md/Math.max(w,h));
      w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      let q=0.82,out=c.toDataURL("image/jpeg",q);
      while(out.length>120000&&q>0.4){ q-=0.1; out=c.toDataURL("image/jpeg",q); } cb(out); };
    img.onerror = () => { if(src.length<120000) cb(src); else bToast("이미지를 불러올 수 없어요"); };
    img.src = src;
  }
  function setThumb(id, t){ const n=bN(id); if(n){ n.thumb=t; renderBoard(); fireBoardChange(); } }

  /* ── renderLib ────────────────────────────────────────────────── */
  function renderLib() {
    const grid = document.getElementById("libGrid");
    if (!grid) return;
    grid.innerHTML = LIBRARY.length
      ? LIBRARY.map(it =>
          `<div class="lib-it" draggable="true" data-img="${it.id}">` +
          `<img src="${esc(imgSrc(it.id))}" alt="${esc(it.label || "")}" title="${esc(it.label || "")}">` +
          `</div>`
        ).join("")
      : `<div style="grid-column:1/-1;font-size:11px;color:var(--eth)">이미지를 추가하거나<br>노드에 파일을 드롭</div>`;
  }

  /* ── Node HTML ───────────────────────────────────────────────── */
  function weightScale(w) {
    const x = (w != null ? w : 50);
    return x <= 50 ? 0.8 + 0.2 * (x / 50) : 1.0 + 0.4 * ((x - 50) / 50); // 0→0.8, 50→1.0, 100→1.4
  }

  function nodeHTML(n) {
    const ports = [
      `<div class="b-port b-port-top" data-act="port" data-side="top"></div>`,
      `<div class="b-port b-port-right" data-act="port" data-side="right"></div>`,
      `<div class="b-port b-port-bottom" data-act="port" data-side="bottom"></div>`,
      `<div class="b-port b-port-left" data-act="port" data-side="left"></div>`
    ].join("");
    const inDot = `<div class="b-n-in"></div>`;
    const isBlock = n.kind === "block";
    const badge = (isBlock && n.blockType)
      ? `<div class="b-n-type">${esc(n.blockType)}</div>` : "";
    const thumb = n.thumb
      ? `<div class="b-n-thumb"><img src="${imgSrc(n.thumb.imgId)}" alt=""></div>` : "";
    const cls = "b-node" + (isBlock ? "" : " b-mini");
    const wt = (n.weight != null ? n.weight : 50), sf = weightScale(wt);
    const baseW = isBlock ? W_NODE : 140;
    const cardW = Math.round(baseW * sf);
    const glow = wt > 55
      ? `box-shadow:0 0 ${Math.round((wt - 55) * 0.5)}px rgba(232,180,99,${((wt - 55) / 45 * 0.6).toFixed(2)});`
      : "";
    const wbadge = `<div class="b-n-wt" title="중요도">${wt}</div>`;
    return `<div class="${cls}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px;width:${cardW}px;font-size:${(13 * sf).toFixed(1)}px;${glow}">
  ${inDot}
  ${wbadge}${thumb}<div class="b-n-body">
    <div class="b-n-title" contenteditable="true" data-field="title">${esc(n.title || "")}</div>
    ${badge}
  </div>
  ${ports}
</div>`;
  }

  /* ── bq: node element by id ──────────────────────────────────── */
  const bq = id => bWorld ? bWorld.querySelector(`.b-node[data-id="${id}"]`) : null;

  /* ── renderBoard ─────────────────────────────────────────────── */
  function renderBoard() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node").forEach(el => el.remove());
    bWorld.insertAdjacentHTML("beforeend", boardState.nodes.map(nodeHTML).join(""));
    measure();
    paintEdges();
    applySel();
    applyView();
  }

  /* ── measure ─────────────────────────────────────────────────── */
  function measure() {
    boardState.nodes.forEach(n => {
      const el = bq(n.id);
      n._h = el ? el.offsetHeight : 70;
      n._w = el ? el.offsetWidth  : W_NODE;
    });
  }

  /* ── paintEdges ──────────────────────────────────────────────── */
  function paintEdges() {
    if (!bWorld) return;
    const edgeG = document.getElementById("bEdgeG");
    if (!edgeG) return;
    edgeG.innerHTML = boardState.edges.map(e => {
      const g = edgeGeo(e);
      if (!g) return "";
      const sw = EWIDTHS[e.width || 2];
      const sel_ = selEdge === e.id ? " sel" : "";
      return `<path class="b-ew${sel_}" style="stroke-width:${sw}" marker-start="url(#b-dot)" marker-end="url(#b-arw)" d="${g.d}"/>
<path class="b-eh" data-edge="${e.id}" d="${g.d}"/>`;
    }).join("");
    drawEhud();
    drawNhud();
  }

  /* ── applyView ───────────────────────────────────────────────── */
  function applyView() {
    if (!bWorld) return;
    bWorld.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
    const zl = document.getElementById("bZlabel");
    if (zl) zl.textContent = Math.round(view.scale * 100) + "%";
  }

  /* ── applySel ────────────────────────────────────────────────── */
  function applySel() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node").forEach(el => {
      el.classList.toggle("selected", sel.includes(el.dataset.id));
    });
    renderParams();
  }

  /* ── 파라미터 편집기 패널 ──────────────────────────────────────── */
  function numRow(key, label, val) {
    return `<div class="pp-row"><label>${esc(label)}</label>
      <input type="number" step="1" data-pkey="${key}" value="${val}"></div>`;
  }
  function renderParams() {
    const panel = document.getElementById("paramPanel"); if (!panel) return;
    if (sel.length !== 1) { panel.hidden = true; return; }
    const n = bN(sel[0]); if (!n) { panel.hidden = true; return; }
    panel.hidden = false;
    const rows = [];
    if (n.blockType === "ma") rows.push(numRow("len", "이동평균 길이", (n.params && n.params.len) ?? 10));
    if (n.blockType === "phasefold") {
      rows.push(numRow("pmin", "주기 최소", (n.params && n.params.pmin) ?? 16));
      rows.push(numRow("pmax", "주기 최대", (n.params && n.params.pmax) ?? 128));
    }
    if (n.blockType === "combine") {
      boardState.edges.filter(e => e.to === n.id).forEach(e => {
        const src = bN(e.from);
        const w = (n.params && n.params.weights && n.params.weights[e.from]) ?? 1;
        rows.push(`<div class="pp-row"><label>${esc((src && src.title) || e.from)}</label>
          <input type="number" step="0.1" data-wkey="${e.from}" value="${w}"></div>`);
      });
    }
    const conv = n.conviction ?? 0;
    const wt = (n.weight != null) ? n.weight : 50;
    panel.innerHTML = `<h4>${esc(n.title || "노드")} · 파라미터</h4>${rows.join("")}
      <div class="pp-row"><label>중요도</label>
        <input type="range" id="ppWeight" min="0" max="100" step="1" value="${wt}">
        <span class="pp-conv-val" id="ppWeightVal">${wt}</span></div>
      <div class="pp-row"><label>확신</label>
        <input type="range" id="ppConv" min="-100" max="100" step="1" value="${conv}">
        <span class="pp-conv-val" id="ppConvVal">${conv}</span></div>
      <div class="pp-row" style="flex-direction:column;align-items:stretch">
        <label style="flex:none;margin-bottom:4px">서술 메모</label>
        <textarea id="ppNote" placeholder="분석 근거·기준 (계산엔 미반영)">${esc(n.note || "")}</textarea></div>`;
  }

  function selectOnly(id)   { sel = [id]; applySel(); }
  function toggleSel(id)    { const i = sel.indexOf(id); if (i >= 0) sel.splice(i, 1); else sel.push(id); applySel(); }
  function clearSel()       { sel = []; applySel(); }
  function setSel(ids)      { sel = ids; applySel(); }
  function selectEdge(id)   { selEdge = id; sel = []; applySel(); paintEdges(); }
  function deselectAll() {
    if (!sel.length && !selEdge) return;
    sel = []; selEdge = null; applySel(); paintEdges();
  }

  /* ── CRUD ────────────────────────────────────────────────────── */
  function makeNode(x, y, title, kind, blockType, params) {
    const n = {
      id: uid("n"), x, y,
      title: title || "노드",
      kind: kind || "free",
      blockType: blockType || null,
      params: params || {}
    };
    boardState.nodes.push(n);
    return n;
  }
  function addEdge(from, fromSide, to, toSide) {
    if (from === to) return;
    if (boardState.edges.some(e => e.from === from && e.to === to)) return;
    boardState.edges.push({
      id: uid("e"),
      from, fromSide: fromSide || "right",
      to,   toSide:   toSide   || "left"
    });
    fireBoardChange();
  }
  function delEdge(id) {
    boardState.edges = boardState.edges.filter(e => e.id !== id);
    if (selEdge === id) selEdge = null;
    paintEdges();
    fireBoardChange();
  }
  function delNodes(ids) {
    const s = new Set(ids);
    boardState.nodes = boardState.nodes.filter(n => !s.has(n.id));
    boardState.edges = boardState.edges.filter(e => !s.has(e.from) && !s.has(e.to));
    sel = sel.filter(i => !s.has(i));
    renderBoard();
    fireBoardChange();
  }
  /* ── addBlock: insert a typed block at canvas center ─────────── */
  function addBlock(type) {
    const d = BLOCK_DEFS.find(b => b.type === type) || {};
    const r = bStage.getBoundingClientRect();
    const c = worldPt(r.left + r.width / 2, r.top + r.height / 2);
    const halfW = d.kind === "free" ? 70 : W_NODE / 2;
    const n = {
      id: uid("n"),
      x: c.x - halfW,
      y: c.y - 35,
      title: d.label || "노드",
      kind: d.kind || "free",
      blockType: d.kind === "block" ? type : null,
      params: d.params ? { ...d.params } : {}
    };
    boardState.nodes.push(n);
    renderBoard();
    selectOnly(n.id);
    fireBoardChange();
  }

  /* ── 4-point magnet / link-hover ─────────────────────────────── */
  function portSnap(n, pt) {
    let best = null, bd = 1e9;
    ["top", "right", "bottom", "left"].forEach(s => {
      const a = anchor(n, s), d = Math.hypot(a.x-pt.x, a.y-pt.y);
      if (d < bd) { bd = d; best = { side: s, x: a.x, y: a.y }; }
    });
    const c = centerOf(n), w = n._w || W_NODE, h = n._h || 70;
    if (Math.hypot(pt.x-c.x, pt.y-c.y) < Math.min(w, h) * 0.30) {
      const s = nearestSide(n, pt), a = anchor(n, s);
      return { side: "auto", x: a.x, y: a.y };
    }
    return best;
  }
  function snapAt(pt, exclude) {
    const over = nodeAt(pt);
    if (!over || over.id === exclude) return null;
    const s = portSnap(over, pt);
    return { node: over.id, side: s.side, x: s.x, y: s.y };
  }
  function clearLinkHi() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node.b-linktarget,.b-node.b-linkhover")
          .forEach(n => n.classList.remove("b-linktarget", "b-linkhover"));
    bWorld.querySelectorAll(".b-port.snaptgt")
          .forEach(p => p.classList.remove("snaptgt"));
  }
  function hi(pt, exclude) {
    clearLinkHi();
    const snap = snapAt(pt, exclude);
    if (snap) {
      const el = bq(snap.node);
      if (el) {
        el.classList.add("b-linktarget", "b-linkhover");
        if (snap.side !== "auto") {
          const pe = el.querySelector(`.b-port-${snap.side}`);
          if (pe) pe.classList.add("snaptgt");
        }
      }
    }
    return snap;
  }

  /* ── HUDs ────────────────────────────────────────────────────── */
  const _ico_trash = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4.5h6V7M6.5 7l1 13h9l1-13"/></svg>`;
  const _ico_swap  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h13l-3.5-3.5M18 15H5l3.5 3.5"/></svg>`;

  function drawEhud() {
    const hud = document.getElementById("bEhud");
    if (!hud) return;
    if (!selEdge) { hud.innerHTML = ""; return; }
    const e = bE(selEdge), g = e && edgeGeo(e);
    if (!g) { hud.innerHTML = ""; return; }
    const mx = (g.A.x + g.B.x) / 2, my = (g.A.y + g.B.y) / 2;
    hud.innerHTML =
      `<div class="b-ehandle" data-end="from" style="left:${g.A.x}px;top:${g.A.y}px"></div>
<div class="b-ehandle" data-end="to" style="left:${g.B.x}px;top:${g.B.y}px"></div>
<div class="b-hbar b-ebar" style="left:${mx}px;top:${my}px">
  <button class="b-hbtn danger" data-edel="1" title="연결선 삭제">${_ico_trash}<span>삭제</span></button>
  <button class="b-hbtn" data-erev="1" title="방향 반전">${_ico_swap}<span>방향</span></button>
</div>`;
  }

  function drawNhud() {
    const hud = document.getElementById("bNhud");
    if (!hud) return;
    if (drag || sel.length !== 1) { hud.innerHTML = ""; return; }
    const n = bN(sel[0]);
    if (!n) { hud.innerHTML = ""; return; }
    const cx = n.x + (n._w || W_NODE) / 2;
    hud.innerHTML =
      `<div class="b-hbar b-nbar" style="left:${cx}px;top:${n.y}px">
  <button class="b-hbtn danger" data-nact="del" title="노드 삭제">${_ico_trash}<span>삭제</span></button>
</div>`;
  }

  /* ── Pointer handlers ────────────────────────────────────────── */
  function nodePointerDown(id, e) {
    const t = e.target;
    const port = t.closest("[data-act=\"port\"]");
    if (port) return startLink(id, port.dataset.side || "right", e);
    if (t.closest("[data-act]")) return;
    const ed = t.closest(".b-n-title");
    if (ed && document.activeElement === ed) return;
    drag = { type: "nodePending", id, sx: e.clientX, sy: e.clientY };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startPan(e, canClear) {
    drag = { type: "pan", sx: e.clientX, sy: e.clientY, otx: view.tx, oty: view.ty,
             canClear: !!canClear, moved: false };
    bStage.classList.add("panning");
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startLink(id, side, e) {
    e.preventDefault(); e.stopPropagation();
    selEdge = null; paintEdges();
    drag = { type: "link", from: id, fromSide: side, sx: e.clientX, sy: e.clientY, moved: false };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startEndpoint(end, e) {
    e.preventDefault(); e.stopPropagation();
    drag = { type: "endpoint", end, edge: selEdge, sx: e.clientX, sy: e.clientY, moved: false };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startMarquee(e) {
    drag = { type: "marquee", sx: e.clientX, sy: e.clientY, add: e.shiftKey, moved: false };
    const m = document.getElementById("bMarquee");
    if (m) { m.style.display = "block"; posMarquee(e.clientX, e.clientY); }
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function posMarquee(cx, cy) {
    const r = bStage.getBoundingClientRect();
    const x = Math.min(drag.sx, cx) - r.left, y = Math.min(drag.sy, cy) - r.top;
    const w = Math.abs(cx - drag.sx), h = Math.abs(cy - drag.sy);
    const m = document.getElementById("bMarquee");
    if (m) { m.style.left = x+"px"; m.style.top = y+"px"; m.style.width = w+"px"; m.style.height = h+"px"; }
  }

  function onMove(e) {
    if (!drag) return;
    if (drag.type === "pan") {
      drag.moved = true;
      view.tx = drag.otx + (e.clientX - drag.sx);
      view.ty = drag.oty + (e.clientY - drag.sy);
      applyView(); return;
    }
    if (drag.type === "nodePending") {
      if (Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 4) return;
      drag.type = "node"; justDragged = true;
      document.body.style.userSelect = "none";
      document.body.classList.add("b-ndrag");
      if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
      if (!sel.includes(drag.id)) selectOnly(drag.id);
      drag.origins = sel.map(id => { const n = bN(id); return { id, ox: n.x, oy: n.y }; });
    }
    if (drag.type === "node") {
      const dx = (e.clientX - drag.sx) / view.scale, dy = (e.clientY - drag.sy) / view.scale;
      drag.origins.forEach(o => {
        const n = bN(o.id); n.x = o.ox + dx; n.y = o.oy + dy;
        const el = bq(o.id); if (el) { el.style.left = n.x+"px"; el.style.top = n.y+"px"; }
      });
      paintEdges(); return;
    }
    if (drag.type === "link") {
      if (!drag.moved && Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 6) return;
      drag.moved = true;
      const a = bN(drag.from), A = anchor(a, drag.fromSide);
      const p = worldPt(e.clientX, e.clientY), d1 = DIR[drag.fromSide], k = 70;
      const snap = hi(p, drag.from), end = snap || p;
      const tmp = document.getElementById("bTmp");
      if (tmp) tmp.setAttribute("d",
        `M${A.x},${A.y} C${A.x+d1[0]*k},${A.y+d1[1]*k} ${end.x},${end.y} ${end.x},${end.y}`);
      return;
    }
    if (drag.type === "endpoint") {
      const ed = bE(drag.edge); if (!ed) return;
      if (!drag.moved && Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 6) return;
      drag.moved = true;
      const s = sidesOf(ed);
      const fixed = drag.end === "from" ? anchor(bN(ed.to), s.ts) : anchor(bN(ed.from), s.fs);
      const p = worldPt(e.clientX, e.clientY), excl = drag.end === "from" ? ed.to : ed.from;
      const snap = hi(p, excl), end = snap || p;
      const tmp = document.getElementById("bTmp");
      if (tmp) tmp.setAttribute("d",
        `M${fixed.x},${fixed.y} C${(fixed.x+end.x)/2},${fixed.y} ${(fixed.x+end.x)/2},${end.y} ${end.x},${end.y}`);
      return;
    }
    if (drag.type === "marquee") { drag.moved = true; posMarquee(e.clientX, e.clientY); }
  }

  function onUp(e) {
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
    const d = drag; drag = null;
    document.body.style.userSelect = "";
    bStage.classList.remove("panning");
    document.body.classList.remove("b-ndrag");
    const sv = document.getElementById("bSnapV"), sh = document.getElementById("bSnapH");
    if (sv) sv.style.display = "none";
    if (sh) sh.style.display = "none";
    const tmp = document.getElementById("bTmp");
    if (tmp) tmp.setAttribute("d", "");
    clearLinkHi();
    if (!d) return;
    if (d.type === "pan") { if (d.canClear && !d.moved) deselectAll(); return; }
    if (d.type === "nodePending") {
      if (e.shiftKey) toggleSel(d.id); else selectOnly(d.id);
      selEdge = null; paintEdges(); return;
    }
    if (d.type === "node") {
      setTimeout(() => justDragged = false, 30);
      measure(); paintEdges(); fireBoardChange(); return;
    }
    if (d.type === "link") {
      if (!d.moved) return;
      const p = worldPt(e.clientX, e.clientY), snap = snapAt(p, d.from);
      if (snap) {
        addEdge(d.from, d.fromSide, snap.node, snap.side);
        paintEdges(); bToast("연결됨");
      } else {
        const nn = makeNode(p.x - W_NODE/2, p.y - 35, "노드", "free");
        addEdge(d.from, d.fromSide, nn.id, "auto");
        renderBoard(); selectOnly(nn.id); bToast("노드 생성·연결");
      }
      fireBoardChange(); return;
    }
    if (d.type === "endpoint") {
      const ed = bE(d.edge); if (!ed || !d.moved) return;
      const p = worldPt(e.clientX, e.clientY), other = d.end === "from" ? ed.to : ed.from;
      const snap = snapAt(p, other);
      if (snap) {
        if (d.end === "from") { ed.from = snap.node; ed.fromSide = snap.side; }
        else                  { ed.to   = snap.node; ed.toSide   = snap.side; }
        bToast("끝점 이동");
      }
      paintEdges(); fireBoardChange(); return;
    }
    if (d.type === "marquee") {
      const m = document.getElementById("bMarquee");
      if (m) m.style.display = "none";
      if (!d.moved) { if (!e.shiftKey) deselectAll(); return; }
      const a = worldPt(Math.min(d.sx, e.clientX), Math.min(d.sy, e.clientY));
      const b = worldPt(Math.max(d.sx, e.clientX), Math.max(d.sy, e.clientY));
      const hit = boardState.nodes
        .filter(n => n.x < b.x && n.x + (n._w||W_NODE) > a.x && n.y < b.y && n.y + (n._h||70) > a.y)
        .map(n => n.id);
      selEdge = null; setSel(d.add ? [...new Set([...sel, ...hit])] : hit); paintEdges();
    }
  }

  /* ── Zoom / fit ──────────────────────────────────────────────── */
  function zoomBy(f) {
    const r = bStage.getBoundingClientRect(), cx = r.width/2, cy = r.height/2;
    const wx = (cx - view.tx) / view.scale, wy = (cy - view.ty) / view.scale;
    view.scale = Math.min(2.4, Math.max(0.3, view.scale * f));
    view.tx = cx - wx * view.scale; view.ty = cy - wy * view.scale;
    applyView();
  }
  function fitView() {
    if (!boardState.nodes.length) return;
    measure();
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    boardState.nodes.forEach(n => {
      mnx = Math.min(mnx, n.x); mny = Math.min(mny, n.y);
      mxx = Math.max(mxx, n.x + (n._w||W_NODE)); mxy = Math.max(mxy, n.y + (n._h||70));
    });
    const r = bStage.getBoundingClientRect(), pad = 50;
    const s = Math.min(2.4, Math.max(0.3,
      Math.min((r.width-pad*2) / (mxx-mnx), (r.height-pad*2) / (mxy-mny))));
    view.scale = s;
    view.tx = pad - mnx*s + (r.width-pad*2  - (mxx-mnx)*s) / 2;
    view.ty = pad - mny*s + (r.height-pad*2 - (mxy-mny)*s) / 2;
    applyView();
  }

  /* ── Toast ───────────────────────────────────────────────────── */
  let _btt;
  function bToast(m) {
    const el = document.getElementById("bToast");
    if (!el) return;
    el.textContent = m; el.classList.add("on");
    clearTimeout(_btt); _btt = setTimeout(() => el.classList.remove("on"), 1400);
  }

      startPan(e, true);
    });

    bStage.addEventListener("wheel", e => {
      e.preventDefault();
      const r = bStage.getBoundingClientRect();
      const cx = e.clientX - r.left, cy = e.clientY - r.top;
      const wx = (cx - view.tx) / view.scale, wy = (cy - view.ty) / view.scale;
      const ns = Math.min(2.4, Math.max(0.3, view.scale * (1 - e.deltaY * 0.0014)));
      view.scale = ns; view.tx = cx - wx*ns; view.ty = cy - wy*ns;
      applyView();
    }, { passive: false });

    bStage.addEventListener("dblclick", e => {
      if (e.target.closest(".b-node")) return;

    /* 주제 배너 제목 저장 */
    pane.querySelector(".th-title").addEventListener("focusout", e => {
      themeState.title = e.target.textContent.trim();
      fireBoardChange();
    });

    /* keyboard */
    window.addEventListener("keydown", e => {
      const ae = document.activeElement;
      const typing = !!(ae && (ae.isContentEditable || ae.tagName === "INPUT" || ae.tagName === "TEXTAREA"));
      if (e.code === "Space") { spaceDown = true; if (!typing) e.preventDefault(); return; }
