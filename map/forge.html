  /* ── Pointer handlers ────────────────────────────────────────── */
  function nodePointerDown(id, e) {
    const t = e.target;
    const port = t.closest("[data-act=\"port\"]");
    if (port) return startLink(id, port.dataset.side || "right", e);
    if (t.closest("[data-act]")) return;
    const ed = t.closest(".b-n-title");
    if (ed && document.activeElement === ed) return;
    drag = { type: "nodePending", id, sx: e.clientX, sy: e.clientY };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startPan(e, canClear) {
    drag = { type: "pan", sx: e.clientX, sy: e.clientY, otx: view.tx, oty: view.ty,
             canClear: !!canClear, moved: false };
    bStage.classList.add("panning");
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startLink(id, side, e) {
    e.preventDefault(); e.stopPropagation();
    selEdge = null; paintEdges();
    drag = { type: "link", from: id, fromSide: side, sx: e.clientX, sy: e.clientY, moved: false };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startEndpoint(end, e) {
    e.preventDefault(); e.stopPropagation();
    drag = { type: "endpoint", end, edge: selEdge, sx: e.clientX, sy: e.clientY, moved: false };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function startMarquee(e) {
    drag = { type: "marquee", sx: e.clientX, sy: e.clientY, add: e.shiftKey, moved: false };
    const m = document.getElementById("bMarquee");
    if (m) { m.style.display = "block"; posMarquee(e.clientX, e.clientY); }
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }
  function posMarquee(cx, cy) {
    const r = bStage.getBoundingClientRect();
    const x = Math.min(drag.sx, cx) - r.left, y = Math.min(drag.sy, cy) - r.top;
    const w = Math.abs(cx - drag.sx), h = Math.abs(cy - drag.sy);
    const m = document.getElementById("bMarquee");
    if (m) { m.style.left = x+"px"; m.style.top = y+"px"; m.style.width = w+"px"; m.style.height = h+"px"; }
  }

  function onMove(e) {
    if (!drag) return;
    if (drag.type === "pan") {
      drag.moved = true;
      view.tx = drag.otx + (e.clientX - drag.sx);
      view.ty = drag.oty + (e.clientY - drag.sy);
      applyView(); return;
    }
    if (drag.type === "nodePending") {
      if (Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 4) return;
      drag.type = "node"; justDragged = true;
      document.body.style.userSelect = "none";
      document.body.classList.add("b-ndrag");
      if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
      if (!sel.includes(drag.id)) selectOnly(drag.id);
      drag.origins = sel.map(id => { const n = bN(id); return { id, ox: n.x, oy: n.y }; });
    }
    if (drag.type === "node") {
      const dx = (e.clientX - drag.sx) / view.scale, dy = (e.clientY - drag.sy) / view.scale;
      drag.origins.forEach(o => {
        const n = bN(o.id); n.x = o.ox + dx; n.y = o.oy + dy;
        const el = bq(o.id); if (el) { el.style.left = n.x+"px"; el.style.top = n.y+"px"; }
      });
      paintEdges(); return;
    }
    if (drag.type === "link") {
      if (!drag.moved && Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 6) return;
      drag.moved = true;
      const a = bN(drag.from), A = anchor(a, drag.fromSide);
      const p = worldPt(e.clientX, e.clientY), d1 = DIR[drag.fromSide], k = 70;
      const snap = hi(p, drag.from), end = snap || p;
      const tmp = document.getElementById("bTmp");
      if (tmp) tmp.setAttribute("d",
        `M${A.x},${A.y} C${A.x+d1[0]*k},${A.y+d1[1]*k} ${end.x},${end.y} ${end.x},${end.y}`);
      return;
    }
    if (drag.type === "endpoint") {
      const ed = bE(drag.edge); if (!ed) return;
      if (!drag.moved && Math.hypot(e.clientX - drag.sx, e.clientY - drag.sy) < 6) return;
      drag.moved = true;
      const s = sidesOf(ed);
      const fixed = drag.end === "from" ? anchor(bN(ed.to), s.ts) : anchor(bN(ed.from), s.fs);
      const p = worldPt(e.clientX, e.clientY), excl = drag.end === "from" ? ed.to : ed.from;
      const snap = hi(p, excl), end = snap || p;
      const tmp = document.getElementById("bTmp");
      if (tmp) tmp.setAttribute("d",
        `M${fixed.x},${fixed.y} C${(fixed.x+end.x)/2},${fixed.y} ${(fixed.x+end.x)/2},${end.y} ${end.x},${end.y}`);
      return;
    }
    if (drag.type === "marquee") { drag.moved = true; posMarquee(e.clientX, e.clientY); }
  }

  function onUp(e) {
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
    const d = drag; drag = null;
    document.body.style.userSelect = "";
    bStage.classList.remove("panning");
    document.body.classList.remove("b-ndrag");
    const sv = document.getElementById("bSnapV"), sh = document.getElementById("bSnapH");
    if (sv) sv.style.display = "none";
    if (sh) sh.style.display = "none";
    const tmp = document.getElementById("bTmp");
    if (tmp) tmp.setAttribute("d", "");
    clearLinkHi();
    if (!d) return;
    if (d.type === "pan") { if (d.canClear && !d.moved) deselectAll(); return; }
    if (d.type === "nodePending") {
      if (e.shiftKey) toggleSel(d.id); else selectOnly(d.id);
      selEdge = null; paintEdges(); return;
    }
    if (d.type === "node") {
      setTimeout(() => justDragged = false, 30);
      measure(); paintEdges(); fireBoardChange(); return;
    }
    if (d.type === "link") {
      if (!d.moved) return;
      const p = worldPt(e.clientX, e.clientY), snap = snapAt(p, d.from);
      if (snap) {
        addEdge(d.from, d.fromSide, snap.node, snap.side);
        paintEdges(); bToast("연결됨");
      } else {
        const nn = makeNode(p.x - W_NODE/2, p.y - 35, "노드", "free");
        addEdge(d.from, d.fromSide, nn.id, "auto");
        renderBoard(); selectOnly(nn.id); bToast("노드 생성·연결");
      }
      fireBoardChange(); return;
    }
    if (d.type === "endpoint") {
      const ed = bE(d.edge); if (!ed || !d.moved) return;
      const p = worldPt(e.clientX, e.clientY), other = d.end === "from" ? ed.to : ed.from;
      const snap = snapAt(p, other);
      if (snap) {
        if (d.end === "from") { ed.from = snap.node; ed.fromSide = snap.side; }
        else                  { ed.to   = snap.node; ed.toSide   = snap.side; }
        bToast("끝점 이동");
      }
      paintEdges(); fireBoardChange(); return;
    }
    if (d.type === "marquee") {
      const m = document.getElementById("bMarquee");
      if (m) m.style.display = "none";
      if (!d.moved) { if (!e.shiftKey) deselectAll(); return; }
      const a = worldPt(Math.min(d.sx, e.clientX), Math.min(d.sy, e.clientY));
      const b = worldPt(Math.max(d.sx, e.clientX), Math.max(d.sy, e.clientY));
      const hit = boardState.nodes
        .filter(n => n.x < b.x && n.x + (n._w||W_NODE) > a.x && n.y < b.y && n.y + (n._h||70) > a.y)
        .map(n => n.id);
      selEdge = null; setSel(d.add ? [...new Set([...sel, ...hit])] : hit); paintEdges();
    }
  }

  /* ── Zoom / fit ──────────────────────────────────────────────── */
  function zoomBy(f) {
    const r = bStage.getBoundingClientRect(), cx = r.width/2, cy = r.height/2;
    const wx = (cx - view.tx) / view.scale, wy = (cy - view.ty) / view.scale;
    view.scale = Math.min(2.4, Math.max(0.3, view.scale * f));
    view.tx = cx - wx * view.scale; view.ty = cy - wy * view.scale;
    applyView();
  }
  function fitView() {
    if (!boardState.nodes.length) return;
    measure();
    let mnx = 1e9, mny = 1e9, mxx = -1e9, mxy = -1e9;
    boardState.nodes.forEach(n => {
      mnx = Math.min(mnx, n.x); mny = Math.min(mny, n.y);
      mxx = Math.max(mxx, n.x + (n._w||W_NODE)); mxy = Math.max(mxy, n.y + (n._h||70));
    });
    const r = bStage.getBoundingClientRect(), pad = 50;
    const s = Math.min(2.4, Math.max(0.3,
      Math.min((r.width-pad*2) / (mxx-mnx), (r.height-pad*2) / (mxy-mny))));
    view.scale = s;
    view.tx = pad - mnx*s + (r.width-pad*2  - (mxx-mnx)*s) / 2;
    view.ty = pad - mny*s + (r.height-pad*2 - (mxy-mny)*s) / 2;
    applyView();
  }

  /* ── Toast ───────────────────────────────────────────────────── */
  let _btt;
  function bToast(m) {
    const el = document.getElementById("bToast");
    if (!el) return;
    el.textContent = m; el.classList.add("on");
    clearTimeout(_btt); _btt = setTimeout(() => el.classList.remove("on"), 1400);
  }

  /* ── Board DOM init ──────────────────────────────────────────── */
  function boardInit() {
    const pane = document.getElementById("boardPane");
    pane.innerHTML = `<div class="b-stage" id="bStage">
  <div class="b-world" id="bWorld">
    <svg class="b-edges" id="bEdges">
      <defs>
        <marker id="b-arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path>
        </marker>
        <marker id="b-dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <circle cx="5" cy="5" r="3.5" fill="context-stroke"></circle>
        </marker>
      </defs>
      <g id="bEdgeG" transform="translate(10000,10000)"></g>
      <path class="b-tmp" id="bTmp" transform="translate(10000,10000)" d=""></path>
    </svg>
    <div class="b-ehud" id="bEhud"></div>
    <div class="b-nhud" id="bNhud"></div>
    <div class="b-snap-guide" id="bSnapV"></div>
    <div class="b-snap-guide" id="bSnapH"></div>
  </div>
  <div class="b-marquee" id="bMarquee"></div>
  <div class="b-zoomctl">
    <button onclick="zoomBy(1.2)" title="확대">＋</button>
    <div class="b-zlabel" id="bZlabel">100%</div>
    <button onclick="zoomBy(.83)" title="축소">−</button>
  </div>
</div>`;

    bStage = document.getElementById("bStage");
    bWorld = document.getElementById("bWorld");

    /* stage pointer/wheel/dblclick */
    bStage.addEventListener("pointerdown", e => {
      if (e.target.closest(".b-hbar,.b-hbtn")) return;
      if (e.button === 1 || (spaceDown && e.button === 0)) { startPan(e); return; }
      if (e.button !== 0) return;
      const eh = e.target.closest(".b-ehandle");
      if (eh) { startEndpoint(eh.dataset.end, e); return; }
      const edge = e.target.closest("[data-edge]");
      if (edge) { selectEdge(edge.dataset.edge); return; }
      const nodeEl = e.target.closest(".b-node");
      if (nodeEl) { nodePointerDown(nodeEl.dataset.id, e); return; }
      if (e.ctrlKey || e.metaKey) { startMarquee(e); return; }
      startPan(e, true);
    });

    bStage.addEventListener("wheel", e => {
      e.preventDefault();
      const r = bStage.getBoundingClientRect();
      const cx = e.clientX - r.left, cy = e.clientY - r.top;
      const wx = (cx - view.tx) / view.scale, wy = (cy - view.ty) / view.scale;
      const ns = Math.min(2.4, Math.max(0.3, view.scale * (1 - e.deltaY * 0.0014)));
      view.scale = ns; view.tx = cx - wx*ns; view.ty = cy - wy*ns;
      applyView();
    }, { passive: false });

    bStage.addEventListener("dblclick", e => {
      if (e.target.closest(".b-node")) return;
      const p = worldPt(e.clientX, e.clientY);
      const n = makeNode(p.x - W_NODE/2, p.y - 35, "노드", "free");
      renderBoard(); selectOnly(n.id); fireBoardChange();
    });

    /* world click delegation */
    bWorld.addEventListener("click", e => {
      if (e.target.closest("[data-edel]")) { if (selEdge) delEdge(selEdge); return; }
      if (e.target.closest("[data-erev]")) {
        if (selEdge) {
          const ed = bE(selEdge);
          [ed.from, ed.to] = [ed.to, ed.from];
          [ed.fromSide, ed.toSide] = [ed.toSide, ed.fromSide];
          paintEdges(); fireBoardChange();
        }
        return;
      }
      const na = e.target.closest("[data-nact]");
      if (na && na.dataset.nact === "del" && sel.length === 1) { delNodes([sel[0]]); return; }
    });

    /* single-click → select/move first; dblclick → edit */
    bWorld.addEventListener("mousedown", e => {
      const ed = e.target.closest(".b-n-title");
      if (ed && document.activeElement !== ed) e.preventDefault();
    });
    bWorld.addEventListener("dblclick", e => {
      const ed = e.target.closest(".b-n-title");
      if (!ed) return;
      e.stopPropagation();
      ed.focus();
      const rng = document.caretRangeFromPoint && document.caretRangeFromPoint(e.clientX, e.clientY);
      if (rng) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(rng); }
    });

    /* save title edits back to state */
    bWorld.addEventListener("focusout", e => {
      const f = e.target.dataset && e.target.dataset.field;
      if (!f) return;
      const nodeEl = e.target.closest(".b-node");
      if (!nodeEl) return;
      const n = bN(nodeEl.dataset.id);
      if (n) n[f] = e.target.innerText.replace(/ /g, " ").trim();
      fireBoardChange();
    });

    /* keyboard */
    window.addEventListener("keydown", e => {
      const ae = document.activeElement;
      const typing = !!(ae && (ae.isContentEditable || ae.tagName === "INPUT" || ae.tagName === "TEXTAREA"));
      if (e.code === "Space") { spaceDown = true; if (!typing) e.preventDefault(); return; }
      if (e.key === "Escape") { deselectAll(); return; }
      if (typing) return;
      if (e.key === "Delete" || e.key === "Backspace") {
        if (selEdge) delEdge(selEdge);
        else if (sel.length) delNodes([...sel]);
        return;
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === "a" || e.key === "A")) {
        e.preventDefault();
        sel = boardState.nodes.map(n => n.id); selEdge = null; applySel(); paintEdges();
      }
    });
    window.addEventListener("keyup", e => { if (e.code === "Space") spaceDown = false; });

    /* floating block palette */
    const _pal = document.createElement("div");
    _pal.className = "forge-palette";
    _pal.innerHTML = `<div class="pal-label">블록 추가</div>` +
      BLOCK_DEFS.filter(d => d.kind === "block").map(d =>
        `<button class="pal-btn" onclick="addBlock('${d.type}')">${d.label}</button>`
      ).join("") +
      `<button class="pal-btn pal-free" onclick="addBlock('free')">메모</button>`;
    pane.appendChild(_pal);

    /* 숨김 file input (라이브러리 추가용 / 노드 이미지용) */
    const _fi = document.createElement("input");
    _fi.type = "file"; _fi.id = "libFile"; _fi.accept = "image/*"; _fi.hidden = true;
    document.body.appendChild(_fi);
    const _nfi = document.createElement("input");
    _nfi.type = "file"; _nfi.id = "neImgFile"; _nfi.accept = "image/*"; _nfi.hidden = true;
    document.body.appendChild(_nfi);
  }

  /* ── Default strategy seed ───────────────────────────────────── */
  /* price → {ma, phasefold} → combine → predict  +  free memo    */
  function seedDefaultStrategy() {
    boardState.nodes = [];
    boardState.edges = [];
    /* addEdge calls fireBoardChange; _boardChangeCb is null here — no-op */
    const price     = makeNode(60,  110, "가격",        "block", "price",     {});
    const ma        = makeNode(310,  40, "이동평균",    "block", "ma",        { len: 10 });
    const phasefold = makeNode(310, 200, "위상폴딩",    "block", "phasefold", { pmin: 16, pmax: 128 });
    const combine   = makeNode(560, 120, "가중결합",    "block", "combine",   {});
    const predict   = makeNode(810, 120, "예측·시그널", "block", "predict",   {});
    const memo      = makeNode(60,  290, "포지 메모",   "free",  null,        {});
    addEdge(price.id,     "right",  ma.id,        "left");
    addEdge(price.id,     "bottom", phasefold.id, "left");
    addEdge(ma.id,        "right",  combine.id,   "left");
    addEdge(phasefold.id, "right",  combine.id,   "left");
    addEdge(combine.id,   "right",  predict.id,   "left");
  }

  /* ── Sample Forge seed ──────────────────────────────────────── */
  function buildSampleForge() {
    const g = ForgeCore.sampleGraph();
    // 깊은 복사(공유 객체 변형 방지) + 렌더 캐시 필드 없음
    boardState.nodes = g.nodes.map(n => JSON.parse(JSON.stringify(n)));
    boardState.edges = g.edges.map(e => ({ id: uid("e"), ...e }));
    themeState.imgId = g.themeImgId || null;
    const s = g.vision.series;
    _visionData = { price: s, n: s.length };
    _visionBias = ForgeCore.visionBiasFrom(g.vision.bias);
    _visionNote = g.vision.note || "";
    _visionWaves = g.vision.waves || [];
  }

  /* ════════════════════════════════════════════════════════════════
     CHART PANE — PHASE-FOLD render (ported from chart.html)
     Globals: fcFit(cv,h), renderChart(result,data)
     Canvases: #fcMain · #fcPdm · #fcFoldA · #fcFoldB · #fcFoldC

  let _fcLastResult = null, _fcLastData = null, fcRAF = null;

  const FC_ACC  = "#34e6dc";   /* teal accent (chart.html --acc) */

  const FC_GOLD = "#e8b463";   /* forge gold (candle / price) */
  const FC_ETH  = "#8a92b2";   /* signal line */
  const FC_BULL = "#46c28e";   /* bull candle */
  const FC_BEAR = "#e06a6a";   /* bear candle */
  const FC_DIM  = "#5A6478";   /* axis labels */
  const FC_GRID = "#1b2334";   /* grid lines */

  /* ── fcFit: DPR-correct canvas sizing (port of chart.html fit()) ── */
  function fcFit(cv, h) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const w = cv.clientWidth;
    cv.width  = Math.round(w * dpr);
    cv.height = Math.round(h * dpr);
    const c = cv.getContext("2d");
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return c;
  }
  /* fcFit과 동일하나 크기 변동 없으면 백버퍼 재할당 생략(재생 프레임마다 호출용 — 호출부가 clearRect 직접 수행). */
  function fcFitKeep(cv, h) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const W = Math.round(cv.clientWidth * dpr), H = Math.round(h * dpr);
    if (cv.width !== W || cv.height !== H) { cv.width = W; cv.height = H; }
    const c = cv.getContext("2d");
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return c;
  }

  /* ── fcSizeMain: main chart auto-height from clientWidth ── */
  function fcSizeMain(cv) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const cw  = cv.clientWidth || 300;
    const ch  = Math.round(cw * 0.54);
    cv.width  = Math.round(cw * dpr);
    cv.height = Math.round(ch * dpr);
    const c = cv.getContext("2d");
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { c, cw, ch };
  }

  /* ── fcDrawMain: candles + signal strip + prediction cone ── */
  function fcDrawMain(candles, signal, predPath, predLo, predHi, futW, predAnchor) {
    const cv = document.getElementById("fcMain");
    if (!cv) return;
    const { c, cw, ch } = fcSizeMain(cv);
    const n = candles.length;
    if (!n) return;

    /* price range: candles + prediction */
    let pmin = Infinity, pmax = -Infinity;
    candles.forEach(cd => { if (cd.l < pmin) pmin = cd.l; if (cd.h > pmax) pmax = cd.h; });
    if (predHi.length) predHi.forEach(v => { if (v > pmax) pmax = v; });
    if (predLo.length) predLo.forEach(v => { if (v < pmin) pmin = v; });
    const pspan = (pmax - pmin) || 1;
    const padTop = 6, padBot = 4;

    /* layout: upper candle region + lower signal strip */
    const SIG_FRAC = signal.length ? 0.18 : 0;
    const candleBase = ch * (1 - SIG_FRAC);

    const toY  = v => padTop + (pmax - v) / pspan * (candleBase - padTop - padBot);
    const totalBars = n + futW;
    const barW = cw / totalBars;
    const toX  = i => (i + 0.5) * barW;
    const predStartX = n * barW;

    c.clearRect(0, 0, cw, ch);

    /* horizontal grid */
    const gridStep = Math.pow(10, Math.floor(Math.log10(pspan / 4)));
    const gridStart = Math.ceil(pmin / gridStep) * gridStep;
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
    for (let v = gridStart; v < pmax; v += gridStep) {
      const y = toY(v);
      if (y < padTop || y > candleBase - padBot) continue;
      c.beginPath(); c.moveTo(0, y); c.lineTo(predStartX, y); c.stroke();
      c.fillText(v.toFixed(0), 2, y - 2);
    }

    /* prediction zone background + seam */
    c.fillStyle = "rgba(52,230,220,.04)";
    c.fillRect(predStartX, 0, cw - predStartX, candleBase);
    c.strokeStyle = "rgba(52,230,220,.5)"; c.lineWidth = 1.5;
    c.setLineDash([3, 3]);
    c.beginPath(); c.moveTo(predStartX, 0); c.lineTo(predStartX, candleBase);
    c.stroke(); c.setLineDash([]);
    c.fillStyle = "rgba(52,230,220,.85)"; c.font = "10px ui-monospace,monospace";
    c.fillText("지금", predStartX - 28, candleBase - 7);
    c.fillText("예측 →", predStartX + 6, 13);

    /* prediction cone */
    if (predPath.length) {
      const anchorV = (predAnchor != null) ? predAnchor : candles[n - 1].c;
      const anchorY = toY(anchorV);
      /* filled band lo–hi (seam에서 시작) */
      c.beginPath();
      c.moveTo(predStartX, anchorY);
      for (let k = 0; k < predPath.length; k++) c.lineTo(toX(n + k), toY(predHi[k]));
      for (let k = predPath.length - 1; k >= 0; k--) c.lineTo(toX(n + k), toY(predLo[k]));
      c.lineTo(predStartX, anchorY);
      c.closePath();
      c.fillStyle = "rgba(232,180,99,.14)";
      c.fill();
      /* path line (seam에서 시작) */
      c.strokeStyle = FC_GOLD; c.lineWidth = 1.8; c.setLineDash([5, 4]);
      c.beginPath();
      c.moveTo(predStartX, anchorY);
      for (let k = 0; k < predPath.length; k++) c.lineTo(toX(n + k), toY(predPath[k]));
      c.stroke(); c.setLineDash([]);
      /* seam dot at last real close */
      c.fillStyle = FC_GOLD; c.beginPath();
      c.arc(predStartX, anchorY, 3, 0, Math.PI * 2); c.fill();
    }

    /* candles */
    const bodyMinH = 1;
    const bw = Math.max(1, barW * 0.72);
    candles.forEach((cd, i) => {
      const x = toX(i);
      const isUp = cd.c >= cd.o;
      const col = isUp ? FC_BULL : FC_BEAR;
      /* wick */
      c.strokeStyle = col; c.lineWidth = Math.max(0.7, bw * 0.15);
      c.beginPath(); c.moveTo(x, toY(cd.h)); c.lineTo(x, toY(cd.l)); c.stroke();
      /* body */
      const top = toY(Math.max(cd.o, cd.c)), bot = toY(Math.min(cd.o, cd.c));
      c.fillStyle = col;
      c.fillRect(x - bw / 2, top, bw, Math.max(bodyMinH, bot - top));
    });

    /* signal strip */
    if (signal.length && SIG_FRAC > 0) {
      const sy0 = candleBase;
      const sH   = ch - sy0;
      /* strip bg */
      c.fillStyle = "rgba(11,15,20,.7)";
      c.fillRect(0, sy0, predStartX, sH);
      /* separator */
      c.strokeStyle = "#222b39"; c.lineWidth = 1;
      c.beginPath(); c.moveTo(0, sy0); c.lineTo(predStartX, sy0); c.stroke();
      /* zero line */
      const midY = sy0 + sH / 2;
      c.strokeStyle = "#2a3346"; c.setLineDash([2, 3]);
      c.beginPath(); c.moveTo(0, midY); c.lineTo(predStartX, midY); c.stroke();
      c.setLineDash([]);
      /* signal curve */
      const amp = sH / 2 - 2;
      c.strokeStyle = FC_ETH; c.lineWidth = 1.3;
      c.beginPath(); let sf = true;
      for (let i = 0; i < Math.min(signal.length, n); i++) {
        const sx = toX(i), sy = midY - (signal[i] / 100) * amp;
        if (sf) { c.moveTo(sx, sy); sf = false; } else c.lineTo(sx, sy);
      }
      c.stroke();
      /* signal label */
      c.fillStyle = FC_ETH; c.font = "9px ui-monospace,monospace";
      c.fillText("시그널", 3, sy0 + 11);
    }
  }

  /* ── fcDrawPdm: PDM spectrum (port of chart.html drawScore()) ── */
  function fcDrawPdm(curve, bestP) {
    const cv = document.getElementById("fcPdm");
    if (!cv) return;
    const ch = 140, c = fcFit(cv, ch);
    const cw = cv.clientWidth || 300;
    c.clearRect(0, 0, cw, ch);

    if (!curve || !curve.length) {
      c.fillStyle = FC_DIM; c.font = "11px ui-monospace,monospace";
      c.fillText("PDM 데이터 없음 — 그래프에 위상폴딩 블록을 추가하세요", 10, 20);
      return;
    }

    const SP   = curve.map(d => d.P);
    const Pmin = SP[0], Pmax = SP[SP.length - 1];
    /* convert theta → commonality % (1-theta)*100, like chart.html */
    const comm = curve.map(d => isNaN(d.theta) ? null : 100 * (1 - d.theta));
    let Ymax = 0;
    comm.forEach(v => { if (v != null && v > Ymax) Ymax = v; });
    Ymax = Math.max(Ymax + 6, 35);
    const Ymin = -5;

    const sX = p => 44 + (p - Pmin) / (Pmax - Pmin) * (cw - 58);
    const sY = v => 14 + (1 - (v - Ymin) / (Ymax - Ymin)) * (ch - 40);

    /* grid + y-axis labels */
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
    for (let v = 0; v <= Math.ceil(Ymax / 10) * 10; v += 10) {
      const y = sY(v);
      c.beginPath(); c.moveTo(44, y); c.lineTo(cw - 14, y); c.stroke();
      c.fillText(v + "%", 4, y + 3);
    }
    /* x-axis ticks */
    const pRange = Pmax - Pmin, pStep = Math.ceil(pRange / 5 / 5) * 5 || 10;
    for (let p = Math.ceil(Pmin / pStep) * pStep; p <= Pmax; p += pStep) {
      const x = sX(p);
      c.strokeStyle = "#161d2b"; c.beginPath(); c.moveTo(x, 14); c.lineTo(x, ch - 26); c.stroke();
      c.fillStyle = FC_DIM; c.fillText(p.toFixed(0), x - 8, ch - 12);
    }
    c.fillStyle = FC_DIM; c.fillText("주기 →", cw - 46, ch - 2);

    /* zero baseline */
    const y0 = sY(0);
    c.strokeStyle = "#2a3346"; c.setLineDash([2, 3]);
    c.beginPath(); c.moveTo(44, y0); c.lineTo(cw - 14, y0); c.stroke();
    c.setLineDash([]);

    /* commonality curve */
    c.strokeStyle = FC_ACC; c.lineWidth = 2.2;
    c.beginPath(); let st = false;
    for (let i = 0; i < SP.length; i++) {
      const v = comm[i];
      if (v == null) { st = false; continue; }
      const x = sX(SP[i]), y = sY(v);
      if (!st) { c.moveTo(x, y); st = true; } else c.lineTo(x, y);
    }
    c.stroke();

    /* best P* dot + vertical line */
    const bestIdx = curve.reduce((bi, d, i) =>
      Math.abs(d.P - bestP) < Math.abs(curve[bi].P - bestP) ? i : bi, 0);
    const bestComm = comm[bestIdx];
    if (bestComm != null) {
      const xo = sX(bestP), yo = sY(bestComm);
      c.fillStyle = FC_ACC; c.shadowColor = FC_ACC; c.shadowBlur = 10;
      c.beginPath(); c.arc(xo, yo, 4.5, 0, Math.PI * 2); c.fill(); c.shadowBlur = 0;
    }
    /* current-P vertical marker (white, like chart.html) */
    const xc = sX(bestP);
    c.strokeStyle = "#fff"; c.lineWidth = 1.5; c.shadowColor = "#fff"; c.shadowBlur = 8;
    c.beginPath(); c.moveTo(xc, 12); c.lineTo(xc, ch - 26); c.stroke(); c.shadowBlur = 0;
    c.fillStyle = "#fff"; c.font = "9px ui-monospace,monospace";
    c.fillText(bestP.toFixed(0) + " 주기", Math.min(xc + 4, cw - 52), 22);
  }

  /* ── fcDrawFold: phase-fold trace (port of chart.html drawFold()) ── */
  /* seriesArr: number[], color: hex, P: period, PHI: phase offset, ACC: accent */
  function fcDrawFold(cv, seriesArr, label, color, P, PHI) {
    if (!cv) return;
    const ch = 100, c = fcFit(cv, ch);
    const cw = cv.clientWidth || 180;
    c.clearRect(0, 0, cw, ch);

    if (!seriesArr || !seriesArr.length || !P) {
      c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
      c.fillText("데이터 없음", 8, 18);
      return;
    }

    const n = seriesArr.length;
    const padT = 22, padB = 10, padL = 6, padR = 6;
    const gh = ch - padT - padB, gw = cw - padL - padR;

    /* range */
    let mn = Infinity, mx = -Infinity;
    seriesArr.forEach(v => { if (v < mn) mn = v; if (v > mx) mx = v; });
    const span = (mx - mn) || 1;
    /* high value at canvas top (standard finance) */
    const yOf = v => padT + (mx - v) / span * gh;
    const xOf = ph => padL + ph * gw;

    /* frame */
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.strokeRect(padL, padT, gw, gh);
    /* quarter phase grid */
    c.strokeStyle = "#161d2b";
    for (let q = 1; q < 4; q++) {
      const x = padL + gw * q / 4;
      c.beginPath(); c.moveTo(x, padT); c.lineTo(x, padT + gh); c.stroke();
    }

    /* overlay each cycle: later cycles are brighter (port of chart.html) */
    const nseg = Math.ceil(n / P);
    for (let s = 0; s < nseg; s++) {
      const alpha = 0.30 + 0.5 * (s / Math.max(1, nseg - 1));
      const hex = Math.round(alpha * 120 + 40).toString(16).padStart(2, "0");
      c.strokeStyle = color + hex;
      c.lineWidth = 1.3;
      c.beginPath(); let started = false;
      const startI = Math.ceil(PHI + s * P), endI = Math.min(n - 1, Math.floor(PHI + (s + 1) * P));
      for (let i = Math.max(0, startI); i <= endI; i++) {
        const ph = (i - (PHI + s * P)) / P;
        const x = xOf(ph), y = yOf(seriesArr[i]);
        if (!started) { c.moveTo(x, y); started = true; } else c.lineTo(x, y);
      }
      c.stroke();
    }

    /* binned mean ± sd envelope (live, port of chart.html drawFold) */
    const NB = 64;
    const sum = new Float64Array(NB), cnt = new Int32Array(NB), sq = new Float64Array(NB);
    for (let i = 0; i < n; i++) {
      let ph = ((((i - PHI) % P) + P) % P) / P;
      let b = Math.floor(ph * NB); if (b >= NB) b = NB - 1;
      sum[b] += seriesArr[i]; cnt[b]++; sq[b] += seriesArr[i] * seriesArr[i];
    }
    /* band fill */
    const topPts = [], botPts = [];
    for (let b = 0; b < NB; b++) {
      if (cnt[b] > 0) {
        const m = sum[b] / cnt[b];
        const sd = Math.sqrt(Math.max(0, sq[b] / cnt[b] - m * m));
        topPts.push([(b + .5) / NB, m - sd]);
        botPts.push([(b + .5) / NB, m + sd]);
      }
    }
    if (topPts.length > 1) {
      c.beginPath();
      c.moveTo(xOf(topPts[0][0]), yOf(topPts[0][1]));
      for (const p of topPts) c.lineTo(xOf(p[0]), yOf(p[1]));
      for (let i = botPts.length - 1; i >= 0; i--) c.lineTo(xOf(botPts[i][0]), yOf(botPts[i][1]));
      c.closePath(); c.fillStyle = FC_ACC + "14"; c.fill();
    }
    /* mean line */
    c.strokeStyle = FC_ACC; c.lineWidth = 2;
    c.beginPath(); let drawn = false;
    for (let b = 0; b < NB; b++) {
      if (cnt[b] > 0) {
        const m = sum[b] / cnt[b];
        const x = xOf((b + .5) / NB), y = yOf(m);
        if (!drawn) { c.moveTo(x, y); drawn = true; } else c.lineTo(x, y);
      }
    }
    c.stroke();

    /* axis labels */
    c.fillStyle = color; c.font = "9px ui-monospace,monospace";
    c.fillText(label, padL + 1, padT - 8);
    c.fillStyle = FC_DIM;
    c.fillText("φ=0", padL, ch - 1);
    c.fillText("1", cw - padR - 5, ch - 1);
  }

  /* 이미지 가격 보정(드래그식): cal = {ay,by(기준선 y비율 0..1), nx(현재선 x비율), ap,bp(기준선 가격), np(현재가)} */
  const fmtNum = v => Math.round(v).toLocaleString();
  function ensureCal(n) {
    const c = n.cal || (n.cal = {});
    if (c.ay == null) c.ay = 0.22; if (c.by == null) c.by = 0.78; if (c.nx == null) c.nx = 0.82;
    if (!("ap" in c)) c.ap = null; if (!("bp" in c)) c.bp = null; if (!("np" in c)) c.np = null;
    return c;
  }
  function calComplete(c) {
    return c && isFinite(c.ap) && isFinite(c.bp) && c.ap !== c.bp && isFinite(c.np)
      && c.ay != null && c.by != null && c.nx != null;
  }
  /* 히어로용: 완성된 보정만 반환 */
  function priceCal() {
    const p = boardState.nodes.find(n => n.blockType === "price");
    return calComplete(p && p.cal) ? p.cal : null;
  }
  /* 표시 이미지 사각형(object-fit:contain letterbox). 이미지 로드 전엔 전체 박스로 폴백(가이드 즉시 표시). */
  function coneGeo(cv, imgEl) {
    const box = cv && cv.parentElement; if (!box) return null;
    const W = box.clientWidth, H = box.clientHeight; if (!W || !H) return null;
    const nw = (imgEl && imgEl.naturalWidth) || 0, nh = (imgEl && imgEl.naturalHeight) || 0;
    if (!nw || !nh) return { W, H, dw: W, dh: H, ox: 0, oy: 0, est: true };   // 임시(이미지 미로드)
    const sc = Math.min(W / nw, H / nh), dw = nw * sc, dh = nh * sc;
    return { W, H, dw, dh, ox: (W - dw) / 2, oy: (H - dh) / 2 };
  }
  /* cv 크기를 부모 박스에 맞춤(dpr) — 항상 호출. img 미로드면 false */
  function sizeOverlay(cv) {
    const box = cv && cv.parentElement; const W = box ? box.clientWidth : 0, H = box ? box.clientHeight : 0;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    if (W && H) { cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr); cv.style.width = W + "px"; cv.style.height = H + "px"; }
    const c = cv.getContext("2d"); if (c) { c.setTransform(dpr, 0, 0, dpr, 0, 0); c.clearRect(0, 0, W, H); }
    return { c, W, H };
  }
  /* 보정 콘 렌더. interactive=true면 기준선/현재선 + 그립(편집기 미리보기). 미완성이면 가이드만. */
  function drawCalCone(cv, imgEl, pred, cal, interactive) {
    if (!cv) return false;
    const { c, W, H } = sizeOverlay(cv);
    if (!c) return false;
    const g = coneGeo(cv, imgEl);
    if (!g) return false;   // 박스 0크기 → 재시도
    cv._cg = g;
    const { dw, dh, ox, oy } = g;
    const aY = oy + cal.ay * dh, bY = oy + cal.by * dh, nowX = ox + cal.nx * dw;
    const complete = calComplete(cal);
    const yOf = p => aY + (p - cal.ap) * (bY - aY) / (cal.bp - cal.ap);
    c.font = "10px ui-monospace,monospace"; c.lineWidth = 1;
    if (interactive) {
      /* A·B 기준선(파랑) */
      [[aY, "A", cal.ap], [bY, "B", cal.bp]].forEach(([y, nm, pr]) => {
        c.strokeStyle = "rgba(124,200,255,.55)"; c.setLineDash([4, 3]);
        c.beginPath(); c.moveTo(ox, y); c.lineTo(ox + dw, y); c.stroke(); c.setLineDash([]);
        c.fillStyle = "rgba(150,205,245,.95)"; c.textAlign = "left";
        c.fillText(nm + "선 " + (isFinite(pr) ? fmtNum(pr) : "가격?"), ox + 5, y - 4);
        c.fillStyle = "#7cc8ff"; c.beginPath(); c.arc(ox + dw - 9, y, 4.5, 0, 7); c.fill();
      });
      /* 현재선(세로, 골드) */
      c.strokeStyle = "rgba(232,180,99,.6)"; c.setLineDash([4, 3]);
      c.beginPath(); c.moveTo(nowX, oy); c.lineTo(nowX, oy + dh); c.stroke(); c.setLineDash([]);
      c.fillStyle = "rgba(232,180,99,.95)"; c.textAlign = "left"; c.fillText("현재선", nowX + 3, oy + 11);
      c.fillStyle = FC_GOLD; c.beginPath(); c.arc(nowX, oy + 20, 4.5, 0, 7); c.fill();
    }
    if (!complete) { return interactive; }   // 미완성: 편집기는 가이드만, 히어로는 false(안내)
    /* 예측 콘(현재선에서 시작, 이미지 가격축으로) */
    const path = (pred && pred.path) || [], lo = (pred && pred.lo) || [], hi = (pred && pred.hi) || [];
    const a = (pred && pred.anchor != null) ? pred.anchor : (path[0] || 0);
    const up = v => cal.np * (1 + (a ? (v - a) / a : 0));
    const x0 = nowX, x1 = ox + dw * 0.99;
    const xOf = k => x0 + (path.length > 1 ? k / (path.length - 1) : 0) * (x1 - x0);
    const ynow = yOf(cal.np);
    c.strokeStyle = "rgba(232,180,99,.55)"; c.setLineDash([4, 3]); c.lineWidth = 1;
    c.beginPath(); c.moveTo(ox, ynow); c.lineTo(x1, ynow); c.stroke(); c.setLineDash([]);
    if (path.length) {
      c.beginPath(); c.moveTo(x0, ynow);
      for (let k = 0; k < path.length; k++) c.lineTo(xOf(k), yOf(up(hi[k])));
      for (let k = path.length - 1; k >= 0; k--) c.lineTo(xOf(k), yOf(up(lo[k])));
      c.closePath(); c.fillStyle = "rgba(232,180,99,.17)"; c.fill();
      c.strokeStyle = FC_GOLD; c.lineWidth = 1.8; c.setLineDash([5, 4]);
      c.beginPath(); c.moveTo(x0, ynow);
      for (let k = 0; k < path.length; k++) c.lineTo(xOf(k), yOf(up(path[k])));
      c.stroke(); c.setLineDash([]);
      const endP = up(path[path.length - 1]);
      c.fillStyle = FC_ETH; c.textAlign = "right";
      c.fillText(fmtNum(endP), x1 - 2, Math.max(10, Math.min(H - 3, yOf(endP) - 5))); c.textAlign = "left";
    }
    c.fillStyle = FC_GOLD; c.beginPath(); c.arc(x0, ynow, 3.5, 0, 7); c.fill();

  function _tfUnit(tf) { return /월/.test(tf) ? "개월" : /주/.test(tf) ? "주" : /일/.test(tf) ? "일" : "봉"; }
  /* 예측 콘 + 시간축을 주어진 사각형(ox,oy,dw,dh)에 그림. fs=해상도 스케일(확대 모달용). 공용. */
  function _drawCone(c, ox, oy, dw, dh, Hclip, pred, coords, series, fs) {
    fs = fs || 1;

    const lg = coords.log !== false;
    const tf = p => lg ? Math.log(Math.max(1e-9, p)) : p;
    const y1 = oy + (p1.yf != null ? p1.yf : 0.15) * dh, y2 = oy + (p2.yf != null ? p2.yf : 0.85) * dh;
    const t1 = tf(p1.price), t2 = tf(p2.price);
    const yOf = p => y1 + (tf(p) - t1) * (y2 - y1) / ((t2 - t1) || 1);
    const nowX = ox + (coords.nowXf != null ? coords.nowXf : 0.6) * dw;
    const rightX = ox + (coords.rightXf != null ? coords.rightXf : 0.98) * dw;

    const anchorP = (pred && pred.anchor != null) ? pred.anchor : (series && series.length ? series[series.length - 1] : null);
    if (anchorP == null) return false;
    const xOf = k => nowX + (path.length > 1 ? k / (path.length - 1) : 0) * (rightX - nowX);
    const anchorY = yOf(anchorP);

  /* ── 예측 시점별 표(3·6·12·24 등) ── */

  /* ── 분석 요청 버튼 + 작업큐 폴링 ───────────────────────────────── */
  let _pollT = null, _pollN = 0;
  function _setReqStat(txt, cls) {
    const el = document.getElementById("reqStat");
    if (el) { el.textContent = txt || ""; el.className = "req-stat" + (cls ? " " + cls : ""); el.title = txt ? "클릭해 닫기/취소" : ""; el.style.cursor = txt ? "pointer" : ""; }
    const b = document.getElementById("reqBtn"); if (b) b.disabled = !!cls && cls !== "err";
  }
  function cancelReq() { _stopPoll(); _setReqStat("", ""); }   // 상태 클릭 → 대기 취소
  async function requestAnalysis() {
    if (!VISION_ENABLED) { bToast("비전 분석은 준비 중입니다 (곧 제공)"); return; }
    if (!SERVER_OK) { bToast("서버 연결이 필요합니다(분석 요청)"); return; }
    const aimg = heroImgId();                // 분석 대상 = 가격 노드 이미지
    if (!aimg) { bToast("가격 노드에 차트 이미지를 먼저 추가하세요"); return; }
    if (_pollT) { bToast("이미 분석 요청 중입니다"); return; }
    _pollT = 1;                              // sentinel: 가드 즉시 닫음(await 중 더블클릭 방지)
    _setReqStat("분석 대기 중…", "pending");  // 버튼 비활성
    runForge();
    const r = await apiPost({ op: "enqueue", docId: activeId, imgId: aimg, board: boardToGraph() });
    if (!r || !r.ok || !r.job) { _stopPoll(); _setReqStat("", ""); bToast("분석 요청 실패"); return; }
    _startPoll(r.job.id);
  }
  function _startPoll(jobId) {
    _pollN = 0;
    clearTimeout(_pollT);
    const tick = async () => {
      _pollN++;
      if (_pollN > 16) { _stopPoll(); _setReqStat("판독 워커 대기 — 자동 처리 미설정(클릭해 닫기)", "err"); return; }
      const r = await apiGet("?jobs&docId=" + encodeURIComponent(activeId));
      const job = r && r.jobs && r.jobs.find(j => j.id === jobId);
      if (!job) { _pollT = setTimeout(tick, 2500); return; }
      if (job.status === "pending") { _setReqStat("분석 대기 중…", "pending"); _pollT = setTimeout(tick, 2500); return; }
      if (job.status === "working") { _setReqStat("분석 중…", "working"); _pollT = setTimeout(tick, 2500); return; }
      if (job.status === "done") { _stopPoll(); _setReqStat("", ""); applyVision(job.result || {}, job.id); return; }
      if (job.status === "error") { _stopPoll(); _setReqStat("분석 실패: " + (job.error || "알 수 없음"), "err"); return; }
      _pollT = setTimeout(tick, 2500);
    };
    _pollT = setTimeout(tick, 2500);
  }
  function _stopPoll() { clearTimeout(_pollT); _pollT = null; const b = document.getElementById("reqBtn"); if (b) b.disabled = false; }

  /* ════════════════════════════════════════════════════════════════
     SIGNATURE OVERLAY — 합의 필드 + 예측 콘 + 살아있는 그래프 맥동
     Two pointer-events:none canvases:
       #boardOverlay (over .board-pane) — pulses flowing along the very
         edges drawn on the board (left→right toward the predict block)
         + subtle node-border glow.
       #fcOverlay (over #fcMain) — consensus/interference band (signal
         coherence → gold glow) + prediction cone (gradient extrusion).
     A pulse reaching the predict node "jumps" to the chart and flashes
     the consensus band once.
     Coordinate reuse:
       board: worldX*view.scale + view.tx (bStage is inset:0).
       edges: same sidesOf/anchor/orthoPath/cleanPts as paintEdges().
       chart: fcMap() reproduces fcDrawMain()'s toX/toY/predStartX with
         cw=fcMain.clientWidth, ch=fcMain.clientHeight (==cw*0.54).
     Respects prefers-reduced-motion (single static frame, no rAF) and
     pauses on document.hidden.
     ════════════════════════════════════════════════════════════════ */

  let boardOverlay = null, bovCtx = null, _bovW = 0, _bovH = 0;
  let fcOverlay = null, fcovCtx = null, _fcovW = 0, _fcovH = 0;
  let _ovResult = null, _ovGraph = null;
  let _flash = 0;                 // consensus-band flash level (0..1), decays
  const _edgePhase = {};          // per-edge lead-dot phase (arrival detection)
  const _rmq = window.matchMedia("(prefers-reduced-motion: reduce)");
  const prefersReducedMotion = () => _rmq.matches;

  /* ── small helpers ───────────────────────────────────────────── */
  const _clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
  const _ah = a => Math.round(_clamp01(a) * 255).toString(16).padStart(2, "0");
  function _lerpHex(h1, h2, t) {
    const c1 = parseInt(h1.slice(1), 16), c2 = parseInt(h2.slice(1), 16);
    const r = Math.round(((c1 >> 16) & 255) + (((c2 >> 16) & 255) - ((c1 >> 16) & 255)) * t);
    const g = Math.round(((c1 >> 8) & 255) + (((c2 >> 8) & 255) - ((c1 >> 8) & 255)) * t);
    const b = Math.round((c1 & 255) + ((c2 & 255) - (c1 & 255)) * t);
    return "#" + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
  }
  function _rr(ctx, x, y, w, h, r) {
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function _glowDot(ctx, x, y, r, col, a) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, col + _ah(a));
    g.addColorStop(0.45, col + _ah(a * 0.6));
    g.addColorStop(1, col + "00");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = "source-over";
  }
  function _pointAt(pts, frac) {
    frac = _clamp01(frac);
    const seg = []; let tot = 0;
    for (let i = 1; i < pts.length; i++) {
      const d = Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
      seg.push(d); tot += d;
    }
    if (tot <= 0) return { x: pts[0][0], y: pts[0][1] };
    let target = frac * tot, acc = 0;
    for (let i = 1; i < pts.length; i++) {
      if (acc + seg[i - 1] >= target) {
        const u = seg[i - 1] ? (target - acc) / seg[i - 1] : 0;
        return { x: pts[i - 1][0] + (pts[i][0] - pts[i - 1][0]) * u,
                 y: pts[i - 1][1] + (pts[i][1] - pts[i - 1][1]) * u };
      }
      acc += seg[i - 1];
    }
    const L = pts[pts.length - 1]; return { x: L[0], y: L[1] };
  }

  /* ── edge polyline in WORLD coords (mirrors edgeGeo's geometry) ─ */
  function edgeWorldPolyline(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return null;
    const s = sidesOf(e), A = anchor(a, s.fs), B = anchor(b, s.ts);
    if (e.route === "curve") {
      const dd = Math.hypot(B.x - A.x, B.y - A.y), k = Math.min(120, Math.max(38, dd * 0.4));
      const d1 = DIR[s.fs], d2 = DIR[s.ts];
      const P0 = A, P1 = { x: A.x + d1[0] * k, y: A.y + d1[1] * k },
            P2 = { x: B.x + d2[0] * k, y: B.y + d2[1] * k }, P3 = B, N = 24, out = [];
      for (let i = 0; i <= N; i++) {
        const t = i / N, u = 1 - t;
        out.push([
          u * u * u * P0.x + 3 * u * u * t * P1.x + 3 * u * t * t * P2.x + t * t * t * P3.x,
          u * u * u * P0.y + 3 * u * u * t * P1.y + 3 * u * t * t * P2.y + t * t * t * P3.y
        ]);
      }
      return out;
    }
    return cleanPts(orthoPath(A, B, s.fs, s.ts));
  }
  // NOTE: relies on cleanPts/orthoPath returning [x,y] pair arrays (NOT {x,y} objects) — keep in sync if those helpers are refactored.
  const _toScreen = p => [p[0] * view.scale + view.tx, p[1] * view.scale + view.ty];

  /* ── chart coordinate map (faithful port of fcDrawMain math) ──── */
  function fcMap(candles, pred, signal, cw, ch) {
    const n = candles.length;
    let pmin = Infinity, pmax = -Infinity;
    candles.forEach(cd => { if (cd.l < pmin) pmin = cd.l; if (cd.h > pmax) pmax = cd.h; });
    (pred.hi || []).forEach(v => { if (v > pmax) pmax = v; });
    (pred.lo || []).forEach(v => { if (v < pmin) pmin = v; });
    const pspan = (pmax - pmin) || 1, padTop = 6, padBot = 4;
    const SIG_FRAC = signal.length ? 0.18 : 0;
    const candleBase = ch * (1 - SIG_FRAC);
    const toY = v => padTop + (pmax - v) / pspan * (candleBase - padTop - padBot);
    const futW = pred.futW || 0, totalBars = n + futW, barW = cw / Math.max(1, totalBars);
    const toX = i => (i + 0.5) * barW;
    return { n, futW, toX, toY, predStartX: n * barW, candleBase, barW, cw, ch };
  }

  /* ── overlay canvas lifecycle ─────────────────────────────────── */
  function ensureOverlays() {
    /* Attach boardOverlay to bStage (not boardPane) so its coordinate system
       aligns with _toScreen (view.tx/ty are relative to the stage area). */
    const stage = bStage || document.getElementById("bStage");
    if (stage && !boardOverlay) {
      boardOverlay = document.createElement("canvas");
      boardOverlay.id = "boardOverlay";
      boardOverlay.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:6";
      stage.appendChild(boardOverlay);
    }
    /* #fcMain 제거됨(R2) — fcOverlay 생성 블록을 안전하게 스킵. R5에서 히어로 이미지 위로 부활 예정. */
    const main = document.getElementById("fcMain");
    if (main && !fcOverlay) {
      const body = main.parentNode;          // .fc-pbody of the main panel
      body.style.position = "relative";
      fcOverlay = document.createElement("canvas");
      fcOverlay.id = "fcOverlay";
      fcOverlay.style.cssText = "position:absolute;pointer-events:none;z-index:2";
      body.appendChild(fcOverlay);
    }
  }
  function _sizeCanvas(cv, w, h) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const pw = Math.round(w * dpr), ph = Math.round(h * dpr);
    const c = cv.getContext("2d");
    // Guard: only reset pixel buffer when CSS size or DPR actually changed.
    // Setting cv.width/cv.height clears the canvas AND resets 2D context state,
    // causing a blank-frame flicker every renderOverlay call (debounced ~180ms).
    if (cv._lastW !== pw || cv._lastH !== ph || cv._lastDpr !== dpr) {
      cv.style.width = w + "px"; cv.style.height = h + "px";
      cv.width = pw; cv.height = ph;
      cv._lastW = pw; cv._lastH = ph; cv._lastDpr = dpr;
      c.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    return c;
  }
  function layoutOverlays() {
    ensureOverlays();
    /* Use bStage dimensions — boardOverlay is now inside bStage */
    const stage = bStage || document.getElementById("bStage");
    if (boardOverlay && stage) {
      _bovW = stage.clientWidth; _bovH = stage.clientHeight;
      bovCtx = _sizeCanvas(boardOverlay, _bovW, _bovH);
    }
    const main = document.getElementById("fcMain");
    if (fcOverlay && main) {
      fcOverlay.style.left = main.offsetLeft + "px";
      fcOverlay.style.top  = main.offsetTop + "px";
      _fcovW = main.clientWidth; _fcovH = main.clientHeight;
      fcovCtx = _sizeCanvas(fcOverlay, _fcovW, _fcovH);
    }
  }

  /* ── consensus coherence from recent signal dispersion ────────── */
  function _coherence(result) {
    const sig = result.signal || [];
    const recent = sig.slice(-24);
    if (recent.length < 4) return { coh: 0.5, mag: 0 };
    const m = recent.reduce((s, v) => s + v, 0) / recent.length;
    let v = 0; recent.forEach(x => v += (x - m) * (x - m));
    const sd = Math.sqrt(v / recent.length);
    return {
      coh: _clamp01(1 - sd / 45),                       // low dispersion → high coherence
      mag: _clamp01(Math.abs(m) / 60)                   // conviction magnitude
    };
  }

  /* ── drawConsensus: interference / consensus band (clears chart) ─ */
  function drawConsensus(result) {
    const ctx = fcovCtx; if (!ctx) return;
    ctx.clearRect(0, 0, _fcovW, _fcovH);
    const candles = data.candle || []; if (!candles.length) return;
    const pred = result.prediction || { path: [], lo: [], hi: [], futW: 0 };
    const sig = result.signal || [];
    const M = fcMap(candles, pred, sig, _fcovW, _fcovH);
    const { coh } = _coherence(result);
    const reg = (result.verdict && result.verdict.regime) || "neutral";
    /* divergent → cool grey, convergent → gold; regime tints the gold end */
    const goldEnd = reg === "bull" ? "#ecc06a" : reg === "bear" ? "#e2a85e" : "#e8b463";
    const col = _lerpHex("#6b7686", goldEnd, coh);
    const cx = M.predStartX, top = 2, bot = M.candleBase, halfW = Math.max(20, M.barW * 6);
    const aBand = 0.05 + 0.28 * coh + 0.45 * _flash;

    /* luminous consensus column at the "now" seam (where signals arrive) */
    const g = ctx.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
    g.addColorStop(0, col + "00");
    g.addColorStop(0.5, col + _ah(aBand));
    g.addColorStop(1, col + "00");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = g;
    ctx.fillRect(cx - halfW, top, halfW * 2, bot - top);
    ctx.globalCompositeOperation = "source-over";

    /* seam line, glow scales with coherence + flash */
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.6 + 1.2 * _flash;
    ctx.shadowColor = col;
    ctx.shadowBlur = 5 + 16 * coh + 24 * _flash;
    ctx.beginPath(); ctx.moveTo(cx, top); ctx.lineTo(cx, bot); ctx.stroke();
    ctx.shadowBlur = 0;

    /* consensus % pill (top of prediction zone) */
    const pct = Math.round(coh * 100), txt = "합의 " + pct + "%";
    ctx.font = "bold 10px ui-monospace,monospace";
    const tw = ctx.measureText(txt).width, px = cx + 7, py = 4, pw = tw + 12, ph = 16;
    ctx.fillStyle = "rgba(11,15,20,.72)";
    _rr(ctx, px, py, pw, ph, 8); ctx.fill();
    ctx.fillStyle = col;
    ctx.fillText(txt, px + 6, py + 11.5);
  }

  /* ── drawCone: prediction cone (gradient extrusion, over band) ── */
  function drawCone(result) {
    const ctx = fcovCtx; if (!ctx) return;
    const candles = data.candle || [];
    const pred = result.prediction;
    if (!candles.length || !pred || !pred.path.length) return;
    const sig = result.signal || [];
    const M = fcMap(candles, pred, sig, _fcovW, _fcovH);
    const reg = (result.verdict && result.verdict.regime) || "neutral";
    const dirCol = reg === "bull" ? "#46c28e" : reg === "bear" ? "#e06a6a" : "#e8b463";
    const np = pred.path.length;

    /* filled cone lo–hi, gold fading left→right (seam에서 시작) */
    const aV = (pred.anchor != null) ? pred.anchor : candles[candles.length - 1].c;
    const aY = M.toY(aV);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(M.predStartX, aY);
    for (let k = 0; k < np; k++) ctx.lineTo(M.toX(M.n + k), M.toY(pred.hi[k]));
    for (let k = np - 1; k >= 0; k--) ctx.lineTo(M.toX(M.n + k), M.toY(pred.lo[k]));
    ctx.lineTo(M.predStartX, aY);
    ctx.closePath();
    const grad = ctx.createLinearGradient(M.predStartX, 0, M.toX(M.n + np - 1), 0);
    grad.addColorStop(0, "#e8b463" + _ah(0.34 + 0.25 * _flash));
    grad.addColorStop(1, "#e8b463" + _ah(0.03));
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = grad; ctx.fill();
    ctx.globalCompositeOperation = "source-over";

    /* glowing centerline path (regime-coloured, seam에서 시작) */
    ctx.strokeStyle = dirCol;
    ctx.lineWidth = 1.8;
    ctx.shadowColor = dirCol;
    ctx.shadowBlur = 7 + 12 * _flash;
    ctx.beginPath();
    ctx.moveTo(M.predStartX, aY);
    for (let k = 0; k < np; k++) ctx.lineTo(M.toX(M.n + k), M.toY(pred.path[k]));
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    /* leading glow at the cone tip */
    _glowDot(ctx, M.toX(M.n + np - 1), M.toY(pred.path[np - 1]), 9 + 6 * _flash, dirCol, 0.9);
  }

  /* ── drawTrendFib: price regression line + fib retracement levels ── */
  function drawTrendFib(result, graph) {
    const ctx = fcovCtx; if (!ctx) return;
    const candles = data.candle || []; if (!candles.length) return;
    const pred = result.prediction || { path: [], lo: [], hi: [], futW: 0 };
    const sig = result.signal || [];
    const M = fcMap(candles, pred, sig, _fcovW, _fcovH);
    const n = M.n; if (!n) return;

    const nodes = (graph && graph.nodes) ? graph.nodes : [];
    const trendNode = nodes.find(nd => nd.blockType === "trend");
    const fibNode   = nodes.find(nd => nd.blockType === "fib");
    if (!trendNode && !fibNode) return;

    const closes = candles.map(cd => cd.c);

    /* ── trend: linear-regression line across full historical region ── */
    if (trendNode) {
      /* ordinary least squares: y = slope * i + intercept */
      let sx = 0, sy = 0, sxy = 0, sx2 = 0;
      for (let i = 0; i < n; i++) {
        sx += i; sy += closes[i]; sxy += i * closes[i]; sx2 += i * i;
      }
      const denom = n * sx2 - sx * sx;
      if (denom !== 0) {
        const slope = (n * sxy - sx * sy) / denom;
        const intercept = (sy - slope * sx) / n;
        ctx.save();
        ctx.strokeStyle = FC_ETH;           /* eth (#8a92b2) dashed, per design token */
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 4]);
        ctx.globalAlpha = 0.82;
        ctx.beginPath();
        ctx.moveTo(M.toX(0), M.toY(intercept));
        ctx.lineTo(M.toX(n - 1), M.toY(intercept + slope * (n - 1)));
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    /* ── fib: Fibonacci retracement from recent len-bar candle high/low ── */
    if (fibNode) {
      const len = Math.max(2, Number((fibNode.params && fibNode.params.len) || 120));
      const start = Math.max(0, n - len);
      let hi = -Infinity, lo = Infinity;
      for (let i = start; i < n; i++) {
        if (candles[i].h > hi) hi = candles[i].h;
        if (candles[i].l < lo) lo = candles[i].l;
      }
      const range = hi - lo;
      if (range > 0) {
        /* 6 standard retracement ratios: 0 = range low, 1 = range high */
        const FIB_LEVELS = [
          { r: 0,     lbl: "0" },
          { r: 0.236, lbl: "0.236" },
          { r: 0.382, lbl: "0.382" },
          { r: 0.5,   lbl: "0.5" },
          { r: 0.618, lbl: "0.618" },
          { r: 1,     lbl: "1" }
        ];
        const x0 = M.toX(0), x1 = M.predStartX;
        ctx.save();
        ctx.font = "9px ui-monospace,monospace";
        FIB_LEVELS.forEach(({ r, lbl }) => {
          const price = lo + r * range;
          const y = M.toY(price);
          /* dashed gold translucent line */
          ctx.globalAlpha = 0.48;
          ctx.strokeStyle = FC_GOLD;
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 4]);
          ctx.beginPath();
          ctx.moveTo(x0, y); ctx.lineTo(x1, y);
          ctx.stroke();
          ctx.setLineDash([]);
          /* label at right edge of historical region */
          ctx.globalAlpha = 0.8;
          ctx.fillStyle = FC_GOLD;
          ctx.fillText(lbl, x1 - 40, y - 2);
        });
        ctx.restore();
      }
    }
  }

  /* ── drawPulse: living-graph signals flowing along board edges ── */
  function drawPulse(t, isStatic) {
    const ctx = bovCtx; if (!ctx || !_ovResult) return;
    ctx.clearRect(0, 0, _bovW, _bovH);
    const sig = _ovResult.signal || [];
    let mag = 0;
    if (sig.length) {
      const r = sig.slice(-12);
      mag = _clamp01(r.reduce((s, v) => s + Math.abs(v), 0) / r.length / 70);
    }
    const speed = 0.26 + 0.55 * mag;           // cycles/sec, faster when signal strong
    const ND = 3;
    const dotR = (7 + 6 * mag) * Math.max(0.6, Math.min(1.6, view.scale));

    /* node-border glow (block nodes) */
    boardState.nodes.forEach(n => {
      if (n.kind !== "block") return;
      const x = n.x * view.scale + view.tx, y = n.y * view.scale + view.ty;
      const w = (n._w || W_NODE) * view.scale, h = (n._h || 70) * view.scale;
      const isPredict = n.blockType === "predict";
      const pulse = 0.5 + 0.5 * Math.sin(t * 2.2 + (n.x + n.y) * 0.01);
      const wf = 0.6 + 0.8 * ((n.weight != null ? n.weight : 50) / 100);
      const a = _clamp01((0.10 + 0.16 * pulse + (isPredict ? _flash * 0.55 : 0)) * wf);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = a;
      ctx.strokeStyle = "#e8b463";
      ctx.lineWidth = 1.8;
      ctx.shadowColor = "#e8b463";
      ctx.shadowBlur = (8 + 12 * pulse + (isPredict ? _flash * 26 : 0)) * wf;
      _rr(ctx, x, y, w, h, 12 * view.scale);
      ctx.stroke();
      ctx.restore();
    });

    /* flowing dots along each edge (from → to) */
    boardState.edges.forEach(e => {
      const wpts = edgeWorldPolyline(e);
      if (!wpts || wpts.length < 2) return;
      const spts = wpts.map(_toScreen);

      /* weight factor from source node (brightness + speed scale) */
      const fromNode = bN(e.from);
      const ewf = 0.6 + 0.8 * ((fromNode && fromNode.weight != null ? fromNode.weight : 50) / 100);

      /* energized wire underglow */
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = "#e8b463";
      ctx.globalAlpha = (0.05 + 0.13 * mag) * ewf;
      ctx.lineWidth = 2.2;
      ctx.shadowColor = "#e8b463"; ctx.shadowBlur = 6;
      ctx.beginPath();
      spts.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
      ctx.stroke();
      ctx.restore();

      const eSpeed = speed * ewf;
      const lead = isStatic ? 0.5 : (t * eSpeed) % 1;
      for (let k = 0; k < ND; k++) {
        const phase = isStatic ? (k + 1) / (ND + 1) : (lead + k / ND) % 1;
        const pos = _pointAt(spts, phase);
        const fade = 0.55 + 0.45 * Math.sin(phase * Math.PI);   // brightest mid-wire
        _glowDot(ctx, pos.x, pos.y, dotR, "#f0c878", _clamp01((0.5 + 0.5 * mag) * fade * ewf));
      }

      /* arrival → flash the chart consensus band */
      if (!isStatic) {
        const prev = _edgePhase[e.id];
        _edgePhase[e.id] = lead;
        if (prev != null && lead < prev) {
          const to = bN(e.to);
          if (to && to.blockType === "predict") _flash = 1;
        }
      }
    });
  }

  /* ── animation loop ───────────────────────────────────────────── */
  let _raf = null, _t0 = 0, _lastNow = 0;
  function startPulse() {
    stopPulse();
    if (prefersReducedMotion()) { drawStaticFrame(); return; }
    _t0 = performance.now(); _lastNow = _t0;
    const loop = now => {
      const dt = Math.min(0.05, (now - _lastNow) / 1000); _lastNow = now;
      _flash = Math.max(0, _flash - dt * 2.2);
      if (_ovResult) { /* drawConsensus/drawCone — R2 비활성(R5에서 이미지 위로 부활) */ drawTrendFib(_ovResult, _ovGraph); drawPulse((now - _t0) / 1000); }
      _raf = requestAnimationFrame(loop);
    };
    _raf = requestAnimationFrame(loop);
  }
  function stopPulse() { if (_raf) { cancelAnimationFrame(_raf); _raf = null; } }
  function drawStaticFrame() {
    _flash = 0;
    if (_ovResult) { /* drawConsensus/drawCone — R2 비활성(R5에서 이미지 위로 부활) */ drawTrendFib(_ovResult, _ovGraph); drawPulse(0, true); }
  }

  /* ── renderOverlay: entry hook called by runForge ─────────────── */
  function renderOverlay(result, graph) {
    _ovResult = result; _ovGraph = graph;
    // Prune stale _edgePhase entries so deleted edges don't accumulate forever.
    // Only runs here (debounced ~180ms), NOT inside the rAF loop, so in-flight
    // phase for surviving edges is preserved and no visible phase jump occurs.
    const _currentEdgeIds = new Set(boardState.edges.map(e => e.id));
    Object.keys(_edgePhase).forEach(k => { if (!_currentEdgeIds.has(k)) delete _edgePhase[k]; });
    layoutOverlays();
    if (prefersReducedMotion()) { stopPulse(); drawStaticFrame(); }
    else startPulse();
  }

  /* reduced-motion / visibility / resize guards */
  _rmq.addEventListener("change", () => { if (_ovResult) renderOverlay(_ovResult, _ovGraph); });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopPulse();
    else if (_ovResult && !prefersReducedMotion()) startPulse();
  });
  let _ovRz = null;
  window.addEventListener("resize", () => {
    clearTimeout(_ovRz);
    _ovRz = setTimeout(() => { if (_ovResult) renderOverlay(_ovResult, _ovGraph); }, 90);
  });

  /* ── Boot ────────────────────────────────────────────────────── */
  document.addEventListener("DOMContentLoaded", () => {
    boardInit();
    renderTheme();

    /* 파라미터 패널 입력 이벤트 위임 (boardInit 후 #paramPanel 존재 보장) */
    const panel = document.getElementById("paramPanel");
    if (panel) {
      panel.addEventListener("input", ev => {
        if (sel.length !== 1) return; const n = bN(sel[0]); if (!n) return;
        const t = ev.target;
        if (t.dataset.tkr) {
          n.params = n.params || {};
          if (t.dataset.tkr === "symbol") n.params.symbol = t.value;
          else { const v = Number(t.value); n.params.price = (t.value !== "" && isFinite(v)) ? v : null; }
          const el = bWorld && bWorld.querySelector(`.b-node[data-id="${n.id}"] .b-tkr`);
          if (el) { const sy = el.querySelector(".b-tkr-sym"), px = el.querySelector(".b-tkr-px"); if (sy) sy.textContent = n.params.symbol || "종목?"; if (px) px.textContent = isFinite(n.params.price) ? "$" + fmtNum(n.params.price) : "현재가 미입력"; }
        } else if (t.dataset.pkey) {
          n.params = n.params || {}; n.params[t.dataset.pkey] = Math.round(Number(t.value) || 0);
        } else if (t.dataset.wkey) {
          n.params = n.params || {}; n.params.weights = n.params.weights || {};
          n.params.weights[t.dataset.wkey] = Number(t.value) || 0;
        } else if (t.id === "ppWeight") {
          n.weight = Number(t.value);
          const v = document.getElementById("ppWeightVal"); if (v) v.textContent = n.weight;
          applyNodeWeightVisual(n);
        } else if (t.id === "ppConv") {
          n.conviction = Number(t.value) || 0;
          const v = document.getElementById("ppConvVal"); if (v) v.textContent = n.conviction;
        } else if (t.id === "ppNote") {
          n.note = t.value;
        } else if (t.id === "neTitle") {
          n.title = t.value;
          const tEl = bWorld && bWorld.querySelector(`.b-node[data-id="${n.id}"] .b-n-title`);
          if (tEl && tEl.textContent !== t.value) tEl.textContent = t.value;
        } else if (t.dataset.calp) {
          ensureCal(n);
          const raw = String(t.value).trim(), v = raw === "" ? null : Number(raw);
          n.cal[t.dataset.calp] = (v == null || !isFinite(v)) ? null : v;
          refreshEditorCone();            // 편집기 미리보기 즉시 갱신
        } else if (t.id === "neSeries") {
          let arr = parseSeries(t.value);
          if (arr.length > 2000) arr = arr.slice(-2000);   // 저장 크기·속도 한도(최근 2000봉)
          if (arr.length >= 20) n.series = arr; else delete n.series;
          const stat = document.getElementById("neSeriesStat");
          if (stat) stat.textContent = arr.length >= 20 ? (arr.length + "개 적용됨 — 연속 차트(과거+예측) ON")
            : arr.length ? (arr.length + "개 — 20개 이상 필요") : "데이터 없음 — 데모로 표시 중";
        }
        fireBoardChange();
      });

      /* 노드 이미지: 클릭(파일선택) / 제거 / 드래그&드롭 */
      function neNode() { return sel.length === 1 ? bN(sel[0]) : null; }
      function neApplyFile(f, node) {
        const r = new FileReader();
        r.onload = () => downscaleImage(r.result, out => {
          const id = uid("img"); putImg(id, out);
          const label = f.name.replace(/\.[^.]+$/, "");
          LIBRARY.push({ id, label }); saveMeta(); renderLib();
          setThumb(node.id, { imgId: id, label }); bToast("이미지 적용됨");
        });
        r.readAsDataURL(f);
      }
      panel.addEventListener("click", ev => {
        const node = neNode(); if (!node) return;
        if (ev.target.closest("#neImgDel")) { setThumb(node.id, null); return; }
        if (ev.target.closest("#neDelNode")) { delNodes([node.id]); return; }
        if (ev.target.closest("#neSeriesEx")) {            // 예시 데이터 원클릭 → 적용 + 차트
          node.series = sampleCloseSeries(); markDirty(); runForge(); deselectAll();
          bToast("예시 데이터 적용 — 실데이터 차트"); return;
        }
        if (ev.target.closest("#neSeriesApply")) {         // 붙여넣은 데이터 적용 + 차트
          const ta = document.getElementById("neSeries");
          let arr = ta ? parseSeries(ta.value) : [];
          if (arr.length > 2000) arr = arr.slice(-2000);
          if (arr.length >= 20) { node.series = arr; markDirty(); runForge(); deselectAll(); bToast(arr.length + "개 적용 — 연속 차트"); }
          else { delete node.series; bToast("종가 20개 이상 필요 (현재 " + arr.length + "개)"); }
          return;
        }
        const hasImg = node.thumb && node.thumb.imgId;
        if (ev.target.closest("#neImgPick") || (ev.target.closest("#neImg") && !hasImg)) {
          const fi = document.getElementById("neImgFile"); if (fi) fi.click();
        }
      });
      panel.addEventListener("dragover", ev => {
        if (!ev.target.closest("#neImg")) return;
        ev.preventDefault(); ev.dataTransfer.dropEffect = "copy";
        const z = document.getElementById("neImg"); if (z) z.classList.add("drop");
      });
      panel.addEventListener("dragleave", ev => {
        const z = document.getElementById("neImg");
        if (z && !z.contains(ev.relatedTarget)) z.classList.remove("drop");
      });
      panel.addEventListener("drop", ev => {
        const z = ev.target.closest("#neImg"); if (!z) return;
        ev.preventDefault(); z.classList.remove("drop");
        const node = neNode(); if (!node) return;
        const imgId = ev.dataTransfer.getData("text/forge-img");
        if (imgId) {
          const it = LIBRARY.find(l => l.id === imgId);
          setThumb(node.id, { imgId, label: it ? it.label : "" }); bToast("이미지 적용됨"); return;
        }
        const files = ev.dataTransfer.files;
        if (files && files.length) {
          const f = Array.from(files).find(fl => fl.type.startsWith("image/"));
          if (f) neApplyFile(f, node);
        }
      });
      const neFi = document.getElementById("neImgFile");
      if (neFi) neFi.addEventListener("change", e => {
        const f = e.target.files[0]; const node = neNode();
        if (f && node) neApplyFile(f, node);
        e.target.value = "";
      });
    }

    /* ── 라이브러리 이벤트 ── */
    document.getElementById("libFile").addEventListener("change", e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => downscaleImage(r.result, out => {
        const id = uid("img");
        putImg(id, out);
        LIBRARY.push({ id, label: f.name.replace(/\.[^.]+$/, "") });
        saveMeta();
        renderLib();
        bToast("썸네일 추가됨");
      });
      r.readAsDataURL(f); e.target.value = "";
    });

    /* lib thumbnail dragstart — delegation on #forgeSide (libSec 재생성에도 안전) */
    document.getElementById("forgeSide").addEventListener("dragstart", e => {
      const it = e.target.closest(".lib-it[data-img]");
      if (!it) return;
      e.dataTransfer.setData("text/forge-img", it.dataset.img);
      e.dataTransfer.effectAllowed = "copy";
    });

    /* board stage drag-over + drop — no existing handler; adding fresh */
    bStage.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    });
    bStage.addEventListener("drop", e => {
      e.preventDefault();
      const pt = worldPt(e.clientX, e.clientY);
      const n = nodeAt(pt);

      /* (a) library thumbnail drag → node */
      const imgId = e.dataTransfer.getData("text/forge-img");
      if (imgId) {
        if (!n) { bToast("노드 위에 드롭하세요"); return; }
        const it = LIBRARY.find(l => l.id === imgId);
        setThumb(n.id, { imgId, label: it ? it.label : "" });
        bToast("썸네일 적용됨");
        return;
      }

      /* (b) OS image file drop → node */
      const files = e.dataTransfer.files;
      if (files && files.length) {
        const f = Array.from(files).find(fl => fl.type.startsWith("image/"));
        if (!f) return;
        if (!n) { bToast("노드 위에 파일을 드롭하세요"); return; }
        const r = new FileReader();
        r.onload = () => downscaleImage(r.result, out => {
          const id = uid("img");
          putImg(id, out);
          const label = f.name.replace(/\.[^.]+$/, "");
          LIBRARY.push({ id, label });
          saveMeta();
          setThumb(n.id, { imgId: id, label });
          markDirty();
          renderLib();
          bToast("썸네일 적용됨");
        });
        r.readAsDataURL(f);
      }
    });

    /* ── Ctrl+V 이미지 붙여넣기 라우팅 ── */
    document.addEventListener("paste", ev => {
      const items = ev.clipboardData && ev.clipboardData.items;
      if (!items) return;
      let imgItem = null;
      for (const it of items) { if (it.type && it.type.indexOf("image") === 0) { imgItem = it; break; } }
      if (!imgItem) return;               // 이미지 없으면 일반(텍스트) 붙여넣기 그대로 둠
      ev.preventDefault();
      const file = imgItem.getAsFile(); if (!file) return;
      const r = new FileReader();
      r.onload = () => downscaleImage(r.result, out => {
        const id = uid("img"); putImg(id, out); LIBRARY.push({ id, label: "붙여넣기" }); saveMeta(); renderLib();
        if (sel.length === 1 && bN(sel[0])) { setThumb(sel[0], { imgId: id, label: "붙여넣기" }); markDirty(); bToast("노드 이미지 적용"); }
        else { setThemeImg(id); bToast("주제 이미지 적용"); }
      });
      r.readAsDataURL(file);
    });

    renderLib();

    /* ── 사이드바 이벤트 위임 ── */
    document.getElementById("forgeSide").addEventListener("click", e => {
      if (e.target.id === "libAddBtn") { document.getElementById("libFile").click(); return; }
      const libDel = e.target.closest("[data-libdel]");
      if (libDel) { delLibImg(libDel.dataset.libdel); return; }
      if (e.target.id === "sampleDocBtn") { newSampleDoc(); return; }
      if (e.target.id === "newDocBtn") { newDoc(); return; }
      const renBtn = e.target.closest("[data-docren]");
      if (renBtn) {
        const id = renBtn.dataset.docren;
        const d = DOCS.find(x => x.id === id); if (!d) return;
        const title = prompt("문서 이름", d.title || "");
        if (title !== null && title.trim()) renameDoc(id, title.trim());
        return;
      }
      const delBtn = e.target.closest("[data-docdel]");
      if (delBtn) { deleteDoc(delBtn.dataset.docdel); return; }
      const row = e.target.closest(".doc-row[data-doc]");
      if (row) { switchDoc(row.dataset.doc); }
    });

    onBoardChange(() => { if (_playing) stopPlay(); markEngineDirty(); markDirty(); });   // 엔진은 수동(버튼) — 변경됨 표시만
    /* 실행 버튼 제거됨 — runForge는 편집 시 자동 호출(markDirty/onBoardChange) */
    boot();
  });
  </script>
</body>
