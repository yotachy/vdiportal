  /* ── Default strategy seed ───────────────────────────────────── */
  /* price → {ma, phasefold} → combine → predict  +  free memo    */
  function seedDefaultStrategy() {
    boardState.nodes = [];
    boardState.edges = [];
    /* addEdge calls fireBoardChange; _boardChangeCb is null here — no-op */
    const price     = makeNode(60,  110, "가격",        "block", "price",     {});
    const ma        = makeNode(310,  40, "이동평균",    "block", "ma",        { len: 10 });
    const phasefold = makeNode(310, 200, "위상폴딩",    "block", "phasefold", { pmin: 16, pmax: 128 });
    const combine   = makeNode(560, 120, "가중결합",    "block", "combine",   {});
    const predict   = makeNode(810, 120, "예측·시그널", "block", "predict",   {});
    const memo      = makeNode(60,  290, "전략 메모",   "free",  null,        {});
    addEdge(price.id,     "right",  ma.id,        "left");
    addEdge(price.id,     "bottom", phasefold.id, "left");
    addEdge(ma.id,        "right",  combine.id,   "left");
    addEdge(phasefold.id, "right",  combine.id,   "left");
    addEdge(combine.id,   "right",  predict.id,   "left");
  }

  /* ════════════════════════════════════════════════════════════════
     CHART PANE — PHASE-FOLD render (ported from chart.html)
     Globals: fcFit(cv,h), renderChart(result,data)
     Canvases: #fcMain · #fcPdm · #fcFoldA · #fcFoldB · #fcFoldC
     ════════════════════════════════════════════════════════════════ */

  let _fcLastResult = null, _fcLastData = null, fcRAF = null;

  /* palette constants (matching chart.html closely) */
  const FC_ACC  = "#34e6dc";   /* teal accent (chart.html --acc) */
  const FC_ORA  = "#E6A23C";   /* orange oscillator */
  const FC_BLU  = "#5B8FF9";   /* blue oscillator */
  const FC_GOLD = "#e8b463";   /* forge gold (candle / price) */
  const FC_ETH  = "#8a92b2";   /* signal line */
  const FC_BULL = "#46c28e";   /* bull candle */
  const FC_BEAR = "#e06a6a";   /* bear candle */
  const FC_DIM  = "#5A6478";   /* axis labels */
  const FC_GRID = "#1b2334";   /* grid lines */

  /* ── fcFit: DPR-correct canvas sizing (port of chart.html fit()) ── */
  function fcFit(cv, h) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const w = cv.clientWidth;
    cv.width  = Math.round(w * dpr);
    cv.height = Math.round(h * dpr);
    const c = cv.getContext("2d");
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return c;
  }

  /* ── fcSizeMain: main chart auto-height from clientWidth ── */
  function fcSizeMain(cv) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const cw  = cv.clientWidth || 300;
    const ch  = Math.round(cw * 0.54);
    cv.width  = Math.round(cw * dpr);
    cv.height = Math.round(ch * dpr);
    const c = cv.getContext("2d");
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { c, cw, ch };
  }

  /* ── fcDrawMain: candles + signal strip + prediction cone ── */
  function fcDrawMain(candles, signal, predPath, predLo, predHi, futW) {
    const cv = document.getElementById("fcMain");
    if (!cv) return;
    const { c, cw, ch } = fcSizeMain(cv);
    const n = candles.length;
    if (!n) return;

    /* price range: candles + prediction */
    let pmin = Infinity, pmax = -Infinity;
    candles.forEach(cd => { if (cd.l < pmin) pmin = cd.l; if (cd.h > pmax) pmax = cd.h; });
    if (predHi.length) predHi.forEach(v => { if (v > pmax) pmax = v; });
    if (predLo.length) predLo.forEach(v => { if (v < pmin) pmin = v; });
    const pspan = (pmax - pmin) || 1;
    const padTop = 6, padBot = 4;

    /* layout: upper candle region + lower signal strip */
    const SIG_FRAC = signal.length ? 0.18 : 0;
    const candleBase = ch * (1 - SIG_FRAC);

    const toY  = v => padTop + (pmax - v) / pspan * (candleBase - padTop - padBot);
    const totalBars = n + futW;
    const barW = cw / totalBars;
    const toX  = i => (i + 0.5) * barW;
    const predStartX = n * barW;

    c.clearRect(0, 0, cw, ch);

    /* horizontal grid */
    const gridStep = Math.pow(10, Math.floor(Math.log10(pspan / 4)));
    const gridStart = Math.ceil(pmin / gridStep) * gridStep;
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
    for (let v = gridStart; v < pmax; v += gridStep) {
      const y = toY(v);
      if (y < padTop || y > candleBase - padBot) continue;
      c.beginPath(); c.moveTo(0, y); c.lineTo(predStartX, y); c.stroke();
      c.fillText(v.toFixed(0), 2, y - 2);
    }

    /* prediction zone background + seam */
    c.fillStyle = "rgba(52,230,220,.04)";
    c.fillRect(predStartX, 0, cw - predStartX, candleBase);
    c.strokeStyle = "rgba(52,230,220,.5)"; c.lineWidth = 1.5;
    c.setLineDash([3, 3]);
    c.beginPath(); c.moveTo(predStartX, 0); c.lineTo(predStartX, candleBase);
    c.stroke(); c.setLineDash([]);
    c.fillStyle = "rgba(52,230,220,.85)"; c.font = "10px ui-monospace,monospace";
    c.fillText("지금", predStartX - 28, candleBase - 7);
    c.fillText("예측 →", predStartX + 6, 13);

    /* prediction cone */
    if (predPath.length) {
      /* filled band lo–hi */
      c.beginPath();
      c.moveTo(toX(n), toY(predHi[0]));
      for (let k = 0; k < predPath.length; k++) c.lineTo(toX(n + k), toY(predHi[k]));
      for (let k = predPath.length - 1; k >= 0; k--) c.lineTo(toX(n + k), toY(predLo[k]));
      c.closePath();
      c.fillStyle = "rgba(232,180,99,.14)";
      c.fill();
      /* path line */
      c.strokeStyle = FC_GOLD; c.lineWidth = 1.8; c.setLineDash([5, 4]);
      c.beginPath(); let pf = true;
      for (let k = 0; k < predPath.length; k++) {
        const px = toX(n + k), py = toY(predPath[k]);
        if (pf) { c.moveTo(px, py); pf = false; } else c.lineTo(px, py);
      }
      c.stroke(); c.setLineDash([]);
      /* seam dot at last real close */
      const lastClose = candles[n - 1].c;
      c.fillStyle = FC_GOLD; c.beginPath();
      c.arc(predStartX, toY(lastClose), 3, 0, Math.PI * 2); c.fill();
    }

    /* candles */
    const bodyMinH = 1;
    const bw = Math.max(1, barW * 0.72);
    candles.forEach((cd, i) => {
      const x = toX(i);
      const isUp = cd.c >= cd.o;
      const col = isUp ? FC_BULL : FC_BEAR;
      /* wick */
      c.strokeStyle = col; c.lineWidth = Math.max(0.7, bw * 0.15);
      c.beginPath(); c.moveTo(x, toY(cd.h)); c.lineTo(x, toY(cd.l)); c.stroke();
      /* body */
      const top = toY(Math.max(cd.o, cd.c)), bot = toY(Math.min(cd.o, cd.c));
      c.fillStyle = col;
      c.fillRect(x - bw / 2, top, bw, Math.max(bodyMinH, bot - top));
    });

    /* signal strip */
    if (signal.length && SIG_FRAC > 0) {
      const sy0 = candleBase;
      const sH   = ch - sy0;
      /* strip bg */
      c.fillStyle = "rgba(11,15,20,.7)";
      c.fillRect(0, sy0, predStartX, sH);
      /* separator */
      c.strokeStyle = "#222b39"; c.lineWidth = 1;
      c.beginPath(); c.moveTo(0, sy0); c.lineTo(predStartX, sy0); c.stroke();
      /* zero line */
      const midY = sy0 + sH / 2;
      c.strokeStyle = "#2a3346"; c.setLineDash([2, 3]);
      c.beginPath(); c.moveTo(0, midY); c.lineTo(predStartX, midY); c.stroke();
      c.setLineDash([]);
      /* signal curve */
      const amp = sH / 2 - 2;
      c.strokeStyle = FC_ETH; c.lineWidth = 1.3;
      c.beginPath(); let sf = true;
      for (let i = 0; i < Math.min(signal.length, n); i++) {
        const sx = toX(i), sy = midY - (signal[i] / 100) * amp;
        if (sf) { c.moveTo(sx, sy); sf = false; } else c.lineTo(sx, sy);
      }
      c.stroke();
      /* signal label */
      c.fillStyle = FC_ETH; c.font = "9px ui-monospace,monospace";
      c.fillText("시그널", 3, sy0 + 11);
    }
  }

  /* ── fcDrawPdm: PDM spectrum (port of chart.html drawScore()) ── */
  function fcDrawPdm(curve, bestP) {
    const cv = document.getElementById("fcPdm");
    if (!cv) return;
    const ch = 140, c = fcFit(cv, ch);
    const cw = cv.clientWidth || 300;
    c.clearRect(0, 0, cw, ch);

    if (!curve || !curve.length) {
      c.fillStyle = FC_DIM; c.font = "11px ui-monospace,monospace";
      c.fillText("PDM 데이터 없음 — 그래프에 위상폴딩 블록을 추가하세요", 10, 20);
      return;
    }

    const SP   = curve.map(d => d.P);
    const Pmin = SP[0], Pmax = SP[SP.length - 1];
    /* convert theta → commonality % (1-theta)*100, like chart.html */
    const comm = curve.map(d => isNaN(d.theta) ? null : 100 * (1 - d.theta));
    let Ymax = 0;
    comm.forEach(v => { if (v != null && v > Ymax) Ymax = v; });
    Ymax = Math.max(Ymax + 6, 35);
    const Ymin = -5;

    const sX = p => 44 + (p - Pmin) / (Pmax - Pmin) * (cw - 58);
    const sY = v => 14 + (1 - (v - Ymin) / (Ymax - Ymin)) * (ch - 40);

    /* grid + y-axis labels */
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
    for (let v = 0; v <= Math.ceil(Ymax / 10) * 10; v += 10) {
      const y = sY(v);
      c.beginPath(); c.moveTo(44, y); c.lineTo(cw - 14, y); c.stroke();
      c.fillText(v + "%", 4, y + 3);
    }
    /* x-axis ticks */
    const pRange = Pmax - Pmin, pStep = Math.ceil(pRange / 5 / 5) * 5 || 10;
    for (let p = Math.ceil(Pmin / pStep) * pStep; p <= Pmax; p += pStep) {
      const x = sX(p);
      c.strokeStyle = "#161d2b"; c.beginPath(); c.moveTo(x, 14); c.lineTo(x, ch - 26); c.stroke();
      c.fillStyle = FC_DIM; c.fillText(p.toFixed(0), x - 8, ch - 12);
    }
    c.fillStyle = FC_DIM; c.fillText("주기 →", cw - 46, ch - 2);

    /* zero baseline */
    const y0 = sY(0);
    c.strokeStyle = "#2a3346"; c.setLineDash([2, 3]);
    c.beginPath(); c.moveTo(44, y0); c.lineTo(cw - 14, y0); c.stroke();
    c.setLineDash([]);

    /* commonality curve */
    c.strokeStyle = FC_ACC; c.lineWidth = 2.2;
    c.beginPath(); let st = false;
    for (let i = 0; i < SP.length; i++) {
      const v = comm[i];
      if (v == null) { st = false; continue; }
      const x = sX(SP[i]), y = sY(v);
      if (!st) { c.moveTo(x, y); st = true; } else c.lineTo(x, y);
    }
    c.stroke();

    /* best P* dot + vertical line */
    const bestIdx = curve.reduce((bi, d, i) =>
      Math.abs(d.P - bestP) < Math.abs(curve[bi].P - bestP) ? i : bi, 0);
    const bestComm = comm[bestIdx];
    if (bestComm != null) {
      const xo = sX(bestP), yo = sY(bestComm);
      c.fillStyle = FC_ACC; c.shadowColor = FC_ACC; c.shadowBlur = 10;
      c.beginPath(); c.arc(xo, yo, 4.5, 0, Math.PI * 2); c.fill(); c.shadowBlur = 0;
    }
    /* current-P vertical marker (white, like chart.html) */
    const xc = sX(bestP);
    c.strokeStyle = "#fff"; c.lineWidth = 1.5; c.shadowColor = "#fff"; c.shadowBlur = 8;
    c.beginPath(); c.moveTo(xc, 12); c.lineTo(xc, ch - 26); c.stroke(); c.shadowBlur = 0;
    c.fillStyle = "#fff"; c.font = "9px ui-monospace,monospace";
    c.fillText(bestP.toFixed(0) + " 주기", Math.min(xc + 4, cw - 52), 22);
  }

  /* ── fcDrawFold: phase-fold trace (port of chart.html drawFold()) ── */
  /* seriesArr: number[], color: hex, P: period, PHI: phase offset, ACC: accent */
  function fcDrawFold(cv, seriesArr, label, color, P, PHI) {
    if (!cv) return;
    const ch = 100, c = fcFit(cv, ch);
    const cw = cv.clientWidth || 180;
    c.clearRect(0, 0, cw, ch);

    if (!seriesArr || !seriesArr.length || !P) {
      c.fillStyle = FC_DIM; c.font = "9px ui-monospace,monospace";
      c.fillText("데이터 없음", 8, 18);
      return;
    }

    const n = seriesArr.length;
    const padT = 22, padB = 10, padL = 6, padR = 6;
    const gh = ch - padT - padB, gw = cw - padL - padR;

    /* range */
    let mn = Infinity, mx = -Infinity;
    seriesArr.forEach(v => { if (v < mn) mn = v; if (v > mx) mx = v; });
    const span = (mx - mn) || 1;
    /* high value at canvas top (standard finance) */
    const yOf = v => padT + (mx - v) / span * gh;
    const xOf = ph => padL + ph * gw;

    /* frame */
    c.strokeStyle = FC_GRID; c.lineWidth = 1;
    c.strokeRect(padL, padT, gw, gh);
    /* quarter phase grid */
    c.strokeStyle = "#161d2b";
    for (let q = 1; q < 4; q++) {
      const x = padL + gw * q / 4;
      c.beginPath(); c.moveTo(x, padT); c.lineTo(x, padT + gh); c.stroke();
    }

    /* overlay each cycle: later cycles are brighter (port of chart.html) */
    const nseg = Math.ceil(n / P);
    for (let s = 0; s < nseg; s++) {
      const alpha = 0.30 + 0.5 * (s / Math.max(1, nseg - 1));
      const hex = Math.round(alpha * 120 + 40).toString(16).padStart(2, "0");
      c.strokeStyle = color + hex;
      c.lineWidth = 1.3;
      c.beginPath(); let started = false;
      const startI = Math.ceil(PHI + s * P), endI = Math.min(n - 1, Math.floor(PHI + (s + 1) * P));
      for (let i = Math.max(0, startI); i <= endI; i++) {
        const ph = (i - (PHI + s * P)) / P;
        const x = xOf(ph), y = yOf(seriesArr[i]);
        if (!started) { c.moveTo(x, y); started = true; } else c.lineTo(x, y);
      }
      c.stroke();
    }

    /* binned mean ± sd envelope (live, port of chart.html drawFold) */
    const NB = 64;
    const sum = new Float64Array(NB), cnt = new Int32Array(NB), sq = new Float64Array(NB);
    for (let i = 0; i < n; i++) {
      let ph = ((((i - PHI) % P) + P) % P) / P;
      let b = Math.floor(ph * NB); if (b >= NB) b = NB - 1;
      sum[b] += seriesArr[i]; cnt[b]++; sq[b] += seriesArr[i] * seriesArr[i];
    }
    /* band fill */
    const topPts = [], botPts = [];
    for (let b = 0; b < NB; b++) {
      if (cnt[b] > 0) {
        const m = sum[b] / cnt[b];
        const sd = Math.sqrt(Math.max(0, sq[b] / cnt[b] - m * m));
        topPts.push([(b + .5) / NB, m - sd]);
        botPts.push([(b + .5) / NB, m + sd]);
      }
    }
    if (topPts.length > 1) {
      c.beginPath();
      c.moveTo(xOf(topPts[0][0]), yOf(topPts[0][1]));
      for (const p of topPts) c.lineTo(xOf(p[0]), yOf(p[1]));
      for (let i = botPts.length - 1; i >= 0; i--) c.lineTo(xOf(botPts[i][0]), yOf(botPts[i][1]));
      c.closePath(); c.fillStyle = FC_ACC + "14"; c.fill();
    }
    /* mean line */
    c.strokeStyle = FC_ACC; c.lineWidth = 2;
    c.beginPath(); let drawn = false;
    for (let b = 0; b < NB; b++) {
      if (cnt[b] > 0) {
        const m = sum[b] / cnt[b];
        const x = xOf((b + .5) / NB), y = yOf(m);
        if (!drawn) { c.moveTo(x, y); drawn = true; } else c.lineTo(x, y);
      }
    }
    c.stroke();

    /* axis labels */
    c.fillStyle = color; c.font = "9px ui-monospace,monospace";
    c.fillText(label, padL + 1, padT - 8);
    c.fillStyle = FC_DIM;
    c.fillText("φ=0", padL, ch - 1);
    c.fillText("1", cw - padR - 5, ch - 1);
  }

  /* ── renderChart: top-level, consumes ForgeCore output ── */
  function renderChart(result, data) {
    if (!result || !data) return;
    _fcLastResult = result; _fcLastData = data;

    const candles  = data.candle  || [];
    const orangeArr = data.orange || [];
    const blueArr   = data.blue   || [];
    /* candle close for fold */
    const closeArr  = candles.length ? candles.map(cd => cd.c) : (data.price || []);

    /* phasefold meta: first block with best period */
    const metaVals = Object.values(result.meta || {});
    const fmeta    = metaVals.find(m => m && m.best != null) || null;
    const bestP    = fmeta ? fmeta.best : 64;
    const pdmCurve = fmeta ? fmeta.curve : [];

    const pred = result.prediction || { path: [], lo: [], hi: [], futW: 0 };

    /* update meta chip */
    const fcMetaEl = document.getElementById("fcMeta");
    if (fcMetaEl) {
      const thetaTxt = fmeta && Number.isFinite(fmeta.theta) ? fmeta.theta.toFixed(3) : "—";
      fcMetaEl.textContent = fmeta
        ? "P*≈" + bestP.toFixed(1) + " · θ=" + thetaTxt
        : "위상폴딩 블록 없음";
    }

    /* draw all panels */
    fcDrawMain(candles, result.signal || [], pred.path, pred.lo, pred.hi, pred.futW || 0);
    fcDrawPdm(pdmCurve, bestP);
    if (!fmeta) {
      ["fcFoldA", "fcFoldB", "fcFoldC"].forEach(id => {
        const cv = document.getElementById(id);
        if (!cv) return;
        const ch = 100, c = fcFit(cv, ch);
        const cw = cv.clientWidth || 180;
        c.clearRect(0, 0, cw, ch);
        c.fillStyle = FC_DIM; c.font = "11px ui-monospace,monospace";
        c.textAlign = "center";
        c.fillText("위상폴딩 블록 없음", cw / 2, ch / 2);
        c.textAlign = "left";
      });
    } else {
      fcDrawFold(document.getElementById("fcFoldA"), orangeArr,  "주황 osc", FC_ORA,  bestP, 0);
      fcDrawFold(document.getElementById("fcFoldB"), blueArr,    "파랑 osc", FC_BLU,  bestP, 0);
      fcDrawFold(document.getElementById("fcFoldC"), closeArr,   "가격 close", FC_GOLD, bestP, 0);
    }
  }

  /* resize: re-render with stored last result/data */
  window.addEventListener("resize", () => {
    if (!_fcLastResult || !_fcLastData) return;
    if (fcRAF) cancelAnimationFrame(fcRAF);
    fcRAF = requestAnimationFrame(() => renderChart(_fcLastResult, _fcLastData));
  });

  /* ── renderVerdict: regime badge at top of chart pane ────────── */
  function renderVerdict(verdict) {
    const el = document.getElementById("verdictBadge");
    if (!el || !verdict) return;
    const REGIME_LABEL = { bull: "상승", bear: "하락", neutral: "중립" };
    const REGIME_COL   = { bull: "#46c28e", bear: "#e06a6a", neutral: "#8a92b2" };
    const regime = verdict.regime || "neutral";
    const col    = REGIME_COL[regime] || "#8a92b2";
    const label  = REGIME_LABEL[regime] || "중립";
    const score  = (typeof verdict.score === "number" && isFinite(verdict.score))
      ? verdict.score.toFixed(1) : "—";
    const fmt = v => (typeof v === "number" && isFinite(v)) ? v.toFixed(2) : "—";
    el.className = "verdict-badge active";
    el.innerHTML =
      `<span class="verdict-dot" style="background:${col};box-shadow:0 0 6px ${col}88"></span>` +
      `<span>국면: <b style="color:${col}">${label}</b>` +
      ` &nbsp;·&nbsp; 시그널 ${score}` +
      ` &nbsp;·&nbsp; 목표가 ${fmt(verdict.target)}` +
      ` &nbsp;·&nbsp; 무효화 ${fmt(verdict.invalidation)}</span>`;
  }

  /* ── exportStrategy: download strategy as JSON blob ──────────── */
  function exportStrategy() {
    // collect image ids referenced by nodes and theme
    const usedIds = new Set();
    boardState.nodes.forEach(n => { if (n.thumb && n.thumb.imgId) usedIds.add(n.thumb.imgId); });
    if (themeState.imgId) usedIds.add(themeState.imgId);
    const images = {};
    usedIds.forEach(id => { if (IMAGES[id]) images[id] = IMAGES[id]; });

    const payload = {
      version: ForgeCore.version,
      theme: { ...themeState },
      nodes: boardState.nodes.map(n => {
        const out = { id: n.id, kind: n.kind, title: n.title, x: n.x, y: n.y };
        if (n.blockType) out.blockType = n.blockType;
        if (n.params && Object.keys(n.params).length) out.params = { ...n.params };
        if (n.conviction) out.conviction = n.conviction;
        if (n.weight != null && n.weight !== 50) out.weight = n.weight;
        if (n.note) out.note = n.note;
        if (n.thumb) out.thumb = { ...n.thumb };
        return out;
      }),
      edges: boardState.edges.map(e => ({
        id: e.id, from: e.from, to: e.to,
        fromSide: e.fromSide, toSide: e.toSide
      })),
      library: LIBRARY.filter(it => usedIds.has(it.id)),
      images
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "scoopforge-strategy.json";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    bToast("전략 내보내기 완료");
  }

  /* ── Forge data + runForge ───────────────────────────────────── */
  let data = ForgeCore.makeDemoSeries({ n: 480, seed: 1, period: 64 });
  let lastResult = null;
  let _t = null;

  function runForge() {
    try {
      const g = boardToGraph();
      lastResult = ForgeCore.run(g, data, { futW: 120 });
      renderChart(lastResult, data);
      if (window.renderOverlay) renderOverlay(lastResult, g);
      if (lastResult && lastResult.verdict) renderVerdict(lastResult.verdict);
    } catch (e) {
      console.warn("run", e);
      if (typeof bToast === "function") bToast(/cycle/.test(String(e && e.message)) ? "그래프 오류: 순환 연결" : "그래프 오류: 계산 실패");
    }
  }

  /* ════════════════════════════════════════════════════════════════
     SIGNATURE OVERLAY — 합의 필드 + 예측 콘 + 살아있는 그래프 맥동
     Two pointer-events:none canvases:
       #boardOverlay (over .board-pane) — pulses flowing along the very
         edges drawn on the board (left→right toward the predict block)
         + subtle node-border glow.
       #fcOverlay (over #fcMain) — consensus/interference band (signal
         coherence → gold glow) + prediction cone (gradient extrusion).
     A pulse reaching the predict node "jumps" to the chart and flashes
     the consensus band once.
     Coordinate reuse:
       board: worldX*view.scale + view.tx (bStage is inset:0).
       edges: same sidesOf/anchor/orthoPath/cleanPts as paintEdges().
       chart: fcMap() reproduces fcDrawMain()'s toX/toY/predStartX with
         cw=fcMain.clientWidth, ch=fcMain.clientHeight (==cw*0.54).
     Respects prefers-reduced-motion (single static frame, no rAF) and
     pauses on document.hidden.
     ════════════════════════════════════════════════════════════════ */

  let boardOverlay = null, bovCtx = null, _bovW = 0, _bovH = 0;
  let fcOverlay = null, fcovCtx = null, _fcovW = 0, _fcovH = 0;
  let _ovResult = null, _ovGraph = null;
  let _flash = 0;                 // consensus-band flash level (0..1), decays
  const _edgePhase = {};          // per-edge lead-dot phase (arrival detection)
  const _rmq = window.matchMedia("(prefers-reduced-motion: reduce)");
  const prefersReducedMotion = () => _rmq.matches;

  /* ── small helpers ───────────────────────────────────────────── */
  const _clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
  const _ah = a => Math.round(_clamp01(a) * 255).toString(16).padStart(2, "0");
  function _lerpHex(h1, h2, t) {
    const c1 = parseInt(h1.slice(1), 16), c2 = parseInt(h2.slice(1), 16);
    const r = Math.round(((c1 >> 16) & 255) + (((c2 >> 16) & 255) - ((c1 >> 16) & 255)) * t);
    const g = Math.round(((c1 >> 8) & 255) + (((c2 >> 8) & 255) - ((c1 >> 8) & 255)) * t);
    const b = Math.round((c1 & 255) + ((c2 & 255) - (c1 & 255)) * t);
    return "#" + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
  }
  function _rr(ctx, x, y, w, h, r) {
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function _glowDot(ctx, x, y, r, col, a) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, col + _ah(a));
    g.addColorStop(0.45, col + _ah(a * 0.6));
    g.addColorStop(1, col + "00");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = "source-over";
  }
  function _pointAt(pts, frac) {
    frac = _clamp01(frac);
    const seg = []; let tot = 0;
    for (let i = 1; i < pts.length; i++) {
      const d = Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
      seg.push(d); tot += d;
    }
    if (tot <= 0) return { x: pts[0][0], y: pts[0][1] };
    let target = frac * tot, acc = 0;
    for (let i = 1; i < pts.length; i++) {
      if (acc + seg[i - 1] >= target) {
        const u = seg[i - 1] ? (target - acc) / seg[i - 1] : 0;
        return { x: pts[i - 1][0] + (pts[i][0] - pts[i - 1][0]) * u,
                 y: pts[i - 1][1] + (pts[i][1] - pts[i - 1][1]) * u };
      }
      acc += seg[i - 1];
    }
    const L = pts[pts.length - 1]; return { x: L[0], y: L[1] };
  }

  /* ── edge polyline in WORLD coords (mirrors edgeGeo's geometry) ─ */
  function edgeWorldPolyline(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return null;
    const s = sidesOf(e), A = anchor(a, s.fs), B = anchor(b, s.ts);
    if (e.route === "curve") {
      const dd = Math.hypot(B.x - A.x, B.y - A.y), k = Math.min(120, Math.max(38, dd * 0.4));
      const d1 = DIR[s.fs], d2 = DIR[s.ts];
      const P0 = A, P1 = { x: A.x + d1[0] * k, y: A.y + d1[1] * k },
            P2 = { x: B.x + d2[0] * k, y: B.y + d2[1] * k }, P3 = B, N = 24, out = [];
      for (let i = 0; i <= N; i++) {
        const t = i / N, u = 1 - t;
        out.push([
          u * u * u * P0.x + 3 * u * u * t * P1.x + 3 * u * t * t * P2.x + t * t * t * P3.x,
          u * u * u * P0.y + 3 * u * u * t * P1.y + 3 * u * t * t * P2.y + t * t * t * P3.y
        ]);
      }
      return out;
    }
    return cleanPts(orthoPath(A, B, s.fs, s.ts));
  }
  // NOTE: relies on cleanPts/orthoPath returning [x,y] pair arrays (NOT {x,y} objects) — keep in sync if those helpers are refactored.
  const _toScreen = p => [p[0] * view.scale + view.tx, p[1] * view.scale + view.ty];

  /* ── chart coordinate map (faithful port of fcDrawMain math) ──── */
  function fcMap(candles, pred, signal, cw, ch) {
    const n = candles.length;
    let pmin = Infinity, pmax = -Infinity;
    candles.forEach(cd => { if (cd.l < pmin) pmin = cd.l; if (cd.h > pmax) pmax = cd.h; });
    (pred.hi || []).forEach(v => { if (v > pmax) pmax = v; });
    (pred.lo || []).forEach(v => { if (v < pmin) pmin = v; });
    const pspan = (pmax - pmin) || 1, padTop = 6, padBot = 4;
    const SIG_FRAC = signal.length ? 0.18 : 0;
    const candleBase = ch * (1 - SIG_FRAC);
    const toY = v => padTop + (pmax - v) / pspan * (candleBase - padTop - padBot);
    const futW = pred.futW || 0, totalBars = n + futW, barW = cw / Math.max(1, totalBars);
    const toX = i => (i + 0.5) * barW;
    return { n, futW, toX, toY, predStartX: n * barW, candleBase, barW, cw, ch };
  }

  /* ── overlay canvas lifecycle ─────────────────────────────────── */
  function ensureOverlays() {
    /* Attach boardOverlay to bStage (not boardPane) so its coordinate system
       aligns with _toScreen (view.tx/ty are relative to the stage area, not
       the full board-pane which now includes the 96px theme banner). */
    const stage = bStage || document.getElementById("bStage");
    if (stage && !boardOverlay) {
      boardOverlay = document.createElement("canvas");
      boardOverlay.id = "boardOverlay";
      boardOverlay.style.cssText = "position:absolute;inset:0;pointer-events:none;z-index:6";
      stage.appendChild(boardOverlay);
    }
    const main = document.getElementById("fcMain");
    if (main && !fcOverlay) {
      const body = main.parentNode;          // .fc-pbody of the main panel
      body.style.position = "relative";
      fcOverlay = document.createElement("canvas");
      fcOverlay.id = "fcOverlay";
      fcOverlay.style.cssText = "position:absolute;pointer-events:none;z-index:2";
      body.appendChild(fcOverlay);
    }
  }
  function _sizeCanvas(cv, w, h) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const pw = Math.round(w * dpr), ph = Math.round(h * dpr);
    const c = cv.getContext("2d");
    // Guard: only reset pixel buffer when CSS size or DPR actually changed.
    // Setting cv.width/cv.height clears the canvas AND resets 2D context state,
    // causing a blank-frame flicker every renderOverlay call (debounced ~180ms).
    if (cv._lastW !== pw || cv._lastH !== ph || cv._lastDpr !== dpr) {
      cv.style.width = w + "px"; cv.style.height = h + "px";
      cv.width = pw; cv.height = ph;
      cv._lastW = pw; cv._lastH = ph; cv._lastDpr = dpr;
      c.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    return c;
  }
  function layoutOverlays() {
    ensureOverlays();
    /* Use bStage dimensions — boardOverlay is now inside bStage */
    const stage = bStage || document.getElementById("bStage");
    if (boardOverlay && stage) {
      _bovW = stage.clientWidth; _bovH = stage.clientHeight;
      bovCtx = _sizeCanvas(boardOverlay, _bovW, _bovH);
    }
    const main = document.getElementById("fcMain");
    if (fcOverlay && main) {
      fcOverlay.style.left = main.offsetLeft + "px";
      fcOverlay.style.top  = main.offsetTop + "px";
      _fcovW = main.clientWidth; _fcovH = main.clientHeight;
      fcovCtx = _sizeCanvas(fcOverlay, _fcovW, _fcovH);
    }
  }

  /* ── consensus coherence from recent signal dispersion ────────── */
  function _coherence(result) {
    const sig = result.signal || [];
    const recent = sig.slice(-24);
    if (recent.length < 4) return { coh: 0.5, mag: 0 };
    const m = recent.reduce((s, v) => s + v, 0) / recent.length;
    let v = 0; recent.forEach(x => v += (x - m) * (x - m));
    const sd = Math.sqrt(v / recent.length);
    return {
      coh: _clamp01(1 - sd / 45),                       // low dispersion → high coherence
      mag: _clamp01(Math.abs(m) / 60)                   // conviction magnitude
    };
  }

  /* ── drawConsensus: interference / consensus band (clears chart) ─ */
  function drawConsensus(result) {
    const ctx = fcovCtx; if (!ctx) return;
    ctx.clearRect(0, 0, _fcovW, _fcovH);
    const candles = data.candle || []; if (!candles.length) return;
    const pred = result.prediction || { path: [], lo: [], hi: [], futW: 0 };
    const sig = result.signal || [];
    const M = fcMap(candles, pred, sig, _fcovW, _fcovH);
    const { coh } = _coherence(result);
    const reg = (result.verdict && result.verdict.regime) || "neutral";
    /* divergent → cool grey, convergent → gold; regime tints the gold end */
    const goldEnd = reg === "bull" ? "#ecc06a" : reg === "bear" ? "#e2a85e" : "#e8b463";
    const col = _lerpHex("#6b7686", goldEnd, coh);
    const cx = M.predStartX, top = 2, bot = M.candleBase, halfW = Math.max(20, M.barW * 6);
    const aBand = 0.05 + 0.28 * coh + 0.45 * _flash;

    /* luminous consensus column at the "now" seam (where signals arrive) */
    const g = ctx.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
    g.addColorStop(0, col + "00");
    g.addColorStop(0.5, col + _ah(aBand));
    g.addColorStop(1, col + "00");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = g;
    ctx.fillRect(cx - halfW, top, halfW * 2, bot - top);
    ctx.globalCompositeOperation = "source-over";

    /* seam line, glow scales with coherence + flash */
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.6 + 1.2 * _flash;
    ctx.shadowColor = col;
    ctx.shadowBlur = 5 + 16 * coh + 24 * _flash;
    ctx.beginPath(); ctx.moveTo(cx, top); ctx.lineTo(cx, bot); ctx.stroke();
    ctx.shadowBlur = 0;

    /* consensus % pill (top of prediction zone) */
    const pct = Math.round(coh * 100), txt = "합의 " + pct + "%";
    ctx.font = "bold 10px ui-monospace,monospace";
    const tw = ctx.measureText(txt).width, px = cx + 7, py = 4, pw = tw + 12, ph = 16;
    ctx.fillStyle = "rgba(11,15,20,.72)";
    _rr(ctx, px, py, pw, ph, 8); ctx.fill();
    ctx.fillStyle = col;
    ctx.fillText(txt, px + 6, py + 11.5);
  }

  /* ── drawCone: prediction cone (gradient extrusion, over band) ── */
  function drawCone(result) {
    const ctx = fcovCtx; if (!ctx) return;
    const candles = data.candle || [];
    const pred = result.prediction;
    if (!candles.length || !pred || !pred.path.length) return;
    const sig = result.signal || [];
    const M = fcMap(candles, pred, sig, _fcovW, _fcovH);
    const reg = (result.verdict && result.verdict.regime) || "neutral";
    const dirCol = reg === "bull" ? "#46c28e" : reg === "bear" ? "#e06a6a" : "#e8b463";
    const np = pred.path.length;

    /* filled cone lo–hi, gold fading left→right */
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(M.toX(M.n), M.toY(pred.hi[0]));
    for (let k = 0; k < np; k++) ctx.lineTo(M.toX(M.n + k), M.toY(pred.hi[k]));
    for (let k = np - 1; k >= 0; k--) ctx.lineTo(M.toX(M.n + k), M.toY(pred.lo[k]));
    ctx.closePath();
    const grad = ctx.createLinearGradient(M.predStartX, 0, M.toX(M.n + np - 1), 0);
    grad.addColorStop(0, "#e8b463" + _ah(0.34 + 0.25 * _flash));
    grad.addColorStop(1, "#e8b463" + _ah(0.03));
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = grad; ctx.fill();
    ctx.globalCompositeOperation = "source-over";

    /* glowing centerline path (regime-coloured) */
    ctx.strokeStyle = dirCol;
    ctx.lineWidth = 1.8;
    ctx.shadowColor = dirCol;
    ctx.shadowBlur = 7 + 12 * _flash;
    ctx.beginPath();
    for (let k = 0; k < np; k++) {
      const x = M.toX(M.n + k), y = M.toY(pred.path[k]);
      k ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    /* leading glow at the cone tip */
    _glowDot(ctx, M.toX(M.n + np - 1), M.toY(pred.path[np - 1]), 9 + 6 * _flash, dirCol, 0.9);
  }

  /* ── drawPulse: living-graph signals flowing along board edges ── */
  function drawPulse(t, isStatic) {
    const ctx = bovCtx; if (!ctx || !_ovResult) return;
    ctx.clearRect(0, 0, _bovW, _bovH);
    const sig = _ovResult.signal || [];
    let mag = 0;
    if (sig.length) {
      const r = sig.slice(-12);
      mag = _clamp01(r.reduce((s, v) => s + Math.abs(v), 0) / r.length / 70);
    }
    const speed = 0.26 + 0.55 * mag;           // cycles/sec, faster when signal strong
    const ND = 3;
    const dotR = (7 + 6 * mag) * Math.max(0.6, Math.min(1.6, view.scale));

    /* node-border glow (block nodes) */
    boardState.nodes.forEach(n => {
      if (n.kind !== "block") return;
      const x = n.x * view.scale + view.tx, y = n.y * view.scale + view.ty;
      const w = (n._w || W_NODE) * view.scale, h = (n._h || 70) * view.scale;
      const isPredict = n.blockType === "predict";
      const pulse = 0.5 + 0.5 * Math.sin(t * 2.2 + (n.x + n.y) * 0.01);
      const wf = 0.6 + 0.8 * ((n.weight != null ? n.weight : 50) / 100);
      const a = _clamp01((0.10 + 0.16 * pulse + (isPredict ? _flash * 0.55 : 0)) * wf);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = a;
      ctx.strokeStyle = "#e8b463";
      ctx.lineWidth = 1.8;
      ctx.shadowColor = "#e8b463";
      ctx.shadowBlur = (8 + 12 * pulse + (isPredict ? _flash * 26 : 0)) * wf;
      _rr(ctx, x, y, w, h, 12 * view.scale);
      ctx.stroke();
      ctx.restore();
    });

    /* flowing dots along each edge (from → to) */
    boardState.edges.forEach(e => {
      const wpts = edgeWorldPolyline(e);
      if (!wpts || wpts.length < 2) return;
      const spts = wpts.map(_toScreen);

      /* weight factor from source node (brightness + speed scale) */
      const fromNode = bN(e.from);
      const ewf = 0.6 + 0.8 * ((fromNode && fromNode.weight != null ? fromNode.weight : 50) / 100);

      /* energized wire underglow */
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.strokeStyle = "#e8b463";
      ctx.globalAlpha = (0.05 + 0.13 * mag) * ewf;
      ctx.lineWidth = 2.2;
      ctx.shadowColor = "#e8b463"; ctx.shadowBlur = 6;
      ctx.beginPath();
      spts.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
      ctx.stroke();
      ctx.restore();

      const eSpeed = speed * ewf;
      const lead = isStatic ? 0.5 : (t * eSpeed) % 1;
      for (let k = 0; k < ND; k++) {
        const phase = isStatic ? (k + 1) / (ND + 1) : (lead + k / ND) % 1;
        const pos = _pointAt(spts, phase);
        const fade = 0.55 + 0.45 * Math.sin(phase * Math.PI);   // brightest mid-wire
        _glowDot(ctx, pos.x, pos.y, dotR, "#f0c878", _clamp01((0.5 + 0.5 * mag) * fade * ewf));
      }

      /* arrival → flash the chart consensus band */
      if (!isStatic) {
        const prev = _edgePhase[e.id];
        _edgePhase[e.id] = lead;
        if (prev != null && lead < prev) {
          const to = bN(e.to);
          if (to && to.blockType === "predict") _flash = 1;
        }
      }
    });
  }

  /* ── animation loop ───────────────────────────────────────────── */
  let _raf = null, _t0 = 0, _lastNow = 0;
  function startPulse() {
    stopPulse();
    if (prefersReducedMotion()) { drawStaticFrame(); return; }
    _t0 = performance.now(); _lastNow = _t0;
    const loop = now => {
      const dt = Math.min(0.05, (now - _lastNow) / 1000); _lastNow = now;
      _flash = Math.max(0, _flash - dt * 2.2);
      if (_ovResult) { drawConsensus(_ovResult); drawCone(_ovResult); drawPulse((now - _t0) / 1000); }
      _raf = requestAnimationFrame(loop);
    };
    _raf = requestAnimationFrame(loop);
  }
  function stopPulse() { if (_raf) { cancelAnimationFrame(_raf); _raf = null; } }
  function drawStaticFrame() {
    _flash = 0;
    if (_ovResult) { drawConsensus(_ovResult); drawCone(_ovResult); drawPulse(0, true); }
  }

  /* ── renderOverlay: entry hook called by runForge ─────────────── */
  function renderOverlay(result, graph) {
    _ovResult = result; _ovGraph = graph;
    // Prune stale _edgePhase entries so deleted edges don't accumulate forever.
    // Only runs here (debounced ~180ms), NOT inside the rAF loop, so in-flight
    // phase for surviving edges is preserved and no visible phase jump occurs.
    const _currentEdgeIds = new Set(boardState.edges.map(e => e.id));
    Object.keys(_edgePhase).forEach(k => { if (!_currentEdgeIds.has(k)) delete _edgePhase[k]; });
    layoutOverlays();
    if (prefersReducedMotion()) { stopPulse(); drawStaticFrame(); }
    else startPulse();
  }

  /* reduced-motion / visibility / resize guards */
  _rmq.addEventListener("change", () => { if (_ovResult) renderOverlay(_ovResult, _ovGraph); });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopPulse();
    else if (_ovResult && !prefersReducedMotion()) startPulse();
  });
  let _ovRz = null;
  window.addEventListener("resize", () => {
    clearTimeout(_ovRz);
    _ovRz = setTimeout(() => { if (_ovResult) renderOverlay(_ovResult, _ovGraph); }, 90);
  });

  /* ── Boot ────────────────────────────────────────────────────── */
  document.addEventListener("DOMContentLoaded", () => {
    boardInit();
    renderTheme();

    /* 파라미터 패널 입력 이벤트 위임 (boardInit 후 #paramPanel 존재 보장) */
    const panel = document.getElementById("paramPanel");
    if (panel) {
      panel.addEventListener("input", ev => {
        if (sel.length !== 1) return; const n = bN(sel[0]); if (!n) return;
        const t = ev.target;
        if (t.dataset.pkey) {
          n.params = n.params || {}; n.params[t.dataset.pkey] = Math.round(Number(t.value) || 0);
        } else if (t.dataset.wkey) {
          n.params = n.params || {}; n.params.weights = n.params.weights || {};
          n.params.weights[t.dataset.wkey] = Number(t.value) || 0;
        } else if (t.id === "ppWeight") {
          n.weight = Number(t.value);
          const v = document.getElementById("ppWeightVal"); if (v) v.textContent = n.weight;
        } else if (t.id === "ppConv") {
          n.conviction = Number(t.value) || 0;
          const v = document.getElementById("ppConvVal"); if (v) v.textContent = n.conviction;
        } else if (t.id === "ppNote") {
          n.note = t.value;
        }
        fireBoardChange();
      });
    }

    /* ── 라이브러리 패널 이벤트 ── */
    document.getElementById("libHead").addEventListener("click", () => {
      document.getElementById("libPanel").classList.toggle("collapsed");
    });
    document.getElementById("libAddBtn").addEventListener("click", () => {
      document.getElementById("libFile").click();
    });
    document.getElementById("libFile").addEventListener("change", e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => downscaleImage(r.result, out => {
        const id = uid("img");
        putImg(id, out);
        LIBRARY.push({ id, label: f.name.replace(/\.[^.]+$/, "") });
        renderLib();
        bToast("썸네일 추가됨");
      });
      r.readAsDataURL(f); e.target.value = "";
    });

    /* lib thumbnail dragstart — delegation on #libPanel */
    document.getElementById("libPanel").addEventListener("dragstart", e => {
      const it = e.target.closest(".lib-it[data-img]");
      if (!it) return;
      e.dataTransfer.setData("text/forge-img", it.dataset.img);
      e.dataTransfer.effectAllowed = "copy";
    });

    /* board stage drag-over + drop — no existing handler; adding fresh */
    bStage.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    });
    bStage.addEventListener("drop", e => {
      e.preventDefault();
      const pt = worldPt(e.clientX, e.clientY);
      const n = nodeAt(pt);

      /* (a) library thumbnail drag → node */
      const imgId = e.dataTransfer.getData("text/forge-img");
      if (imgId) {
        if (!n) { bToast("노드 위에 드롭하세요"); return; }
        const it = LIBRARY.find(l => l.id === imgId);
        setThumb(n.id, { imgId, label: it ? it.label : "" });
        bToast("썸네일 적용됨");
        return;
      }

      /* (b) OS image file drop → node */
      const files = e.dataTransfer.files;
      if (files && files.length) {
        const f = Array.from(files).find(fl => fl.type.startsWith("image/"));
        if (!f) return;
        if (!n) { bToast("노드 위에 파일을 드롭하세요"); return; }
        const r = new FileReader();
        r.onload = () => downscaleImage(r.result, out => {
          const id = uid("img");
          putImg(id, out);
          const label = f.name.replace(/\.[^.]+$/, "");
          LIBRARY.push({ id, label });
          setThumb(n.id, { imgId: id, label });
          renderLib();
          bToast("썸네일 적용됨");
        });
        r.readAsDataURL(f);
      }
    });

    /* ── Ctrl+V 이미지 붙여넣기 라우팅 ── */
    document.addEventListener("paste", ev => {
      const items = ev.clipboardData && ev.clipboardData.items;
      if (!items) return;
      let imgItem = null;
      for (const it of items) { if (it.type && it.type.indexOf("image") === 0) { imgItem = it; break; } }
      if (!imgItem) return;               // 이미지 없으면 일반(텍스트) 붙여넣기 그대로 둠
      ev.preventDefault();
      const file = imgItem.getAsFile(); if (!file) return;
      const r = new FileReader();
      r.onload = () => downscaleImage(r.result, out => {
        const id = uid("img"); putImg(id, out); LIBRARY.push({ id, label: "붙여넣기" }); renderLib();
        if (sel.length === 1 && bN(sel[0])) { setThumb(sel[0], { imgId: id, label: "붙여넣기" }); bToast("노드 이미지 적용"); }
        else { setThemeImg(id); bToast("주제 이미지 적용"); }
      });
      r.readAsDataURL(file);
    });

    renderLib();

    onBoardChange(() => { clearTimeout(_t); _t = setTimeout(runForge, 180); });
    document.getElementById("runBtn").addEventListener("click", runForge);
    requestAnimationFrame(runForge);
  });
  </script>
</body>
