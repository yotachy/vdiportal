<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>스쿱포지 · Scoop Forge</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
  :root{
    --gold:#e8b463;--bg:#0b0f14;--panel:#121822;--ink:#e7ecf5;--eth:#8a92b2;
    --bull:#46c28e;--bear:#e06a6a;--line:#222b39;
    /* board engine tokens (ported from map.html) */
    --surface:#141a22;--raised:#1b232d;--raised2:#27313e;
    --edge:#566472;--muted:#8b98a6;--faint:#5c6875;--gold-dim:#5e4d2c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,system-ui,sans-serif;letter-spacing:-0.01em}
  .forge-top{display:flex;align-items:center;gap:14px;height:54px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{font-weight:800;letter-spacing:-0.02em}.brand em{color:var(--gold);font-style:normal}
  .forge-split{display:flex;flex:1;min-width:0}
  .board-pane{position:relative;flex:1 1 auto;min-width:280px;overflow:hidden;display:flex;flex-direction:column}
  .chart-pane{position:relative;flex:0 0 50%;min-width:0;overflow:hidden;display:flex;flex-direction:column;container-type:inline-size}
  /* 좌우 크기조절 거터 */
  .forge-gutter{flex:0 0 7px;background:var(--line);cursor:col-resize;position:relative;z-index:6;transition:background .12s}
  .forge-gutter::before{content:"";position:absolute;left:-4px;right:-4px;top:0;bottom:0}
  .forge-gutter::after{content:"";position:absolute;left:2px;top:50%;width:3px;height:34px;transform:translateY(-50%);border-radius:2px;background:#3a4452;transition:background .12s}
  .forge-gutter:hover,.forge-gutter.dragging{background:var(--gold-dim)}
  .forge-gutter:hover::after,.forge-gutter.dragging::after{background:var(--gold)}
  .run-btn{background:var(--gold);color:#1a1206;border:0;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer}
  .run-btn.needs-run{animation:engPulse 1.3s ease-in-out infinite}
  @keyframes engPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,180,99,.55)}50%{box-shadow:0 0 0 5px rgba(232,180,99,0)}}

  /* ════════════════════════════════════════════════════
     BOARD ENGINE STYLES  (ported + scoped with b- prefix)
     NOTE: no will-change:transform on .b-world (zoom blur)
     ════════════════════════════════════════════════════ */
  .b-stage{
    position:relative;flex:1;min-height:0;overflow:hidden;cursor:grab;
    background:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0) 0 0/26px 26px,
               radial-gradient(120% 120% at 30% 0%,#141c28,#0b0f14)}
  .b-stage.panning{cursor:grabbing}
  .b-stage.selmode{cursor:crosshair}
  .b-world{position:absolute;left:0;top:0;transform-origin:0 0}
  /* edge SVG: 20000×20000 centered on -10000,-10000 so world(0,0) maps to SVG(10000,10000) */
  .b-edges{position:absolute;left:-10000px;top:-10000px;width:20000px;height:20000px;overflow:visible;pointer-events:none}
  .b-edges .b-ew{fill:none;stroke:var(--edge);stroke-width:2.4}
  .b-edges .b-ew.sel{stroke:var(--gold);stroke-width:3}
  .b-edges .b-eh{fill:none;stroke:transparent;stroke-width:16;pointer-events:stroke;cursor:pointer}
  .b-edges path.b-tmp{fill:none;stroke:var(--gold);stroke-width:2;stroke-dasharray:5 4}

  /* nodes */
  .b-node{position:absolute;width:200px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;box-shadow:0 10px 26px -16px #000;cursor:grab;transition:border-color .12s,box-shadow .12s}
  .b-node.b-mini{width:140px}
  .b-node:hover{border-color:#3a4452}
  .b-node.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,180,99,.22),0 12px 28px -14px #000}
  .b-node.b-linktarget{border-color:var(--bull);box-shadow:0 0 0 3px rgba(70,194,142,.25)}
  .b-n-in{position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--edge)}
  .b-n-body{padding:10px 12px}
  .b-mini .b-n-body{padding:7px 10px}
  .b-n-title{font-size:13px;font-weight:700;outline:none;border-radius:5px;padding:2px 3px;margin:-2px -3px;line-height:1.4;min-height:18px;white-space:pre-wrap;overflow-wrap:break-word;cursor:inherit;color:var(--ink)}
  .b-n-title:empty::before{content:"제목";color:var(--faint)}
  .b-n-title:focus{cursor:text}
  .b-mini .b-n-title{font-size:12px}
  .b-n-type{display:inline-flex;align-items:center;gap:5px;margin-top:4px;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--gold);background:rgba(232,180,99,.1);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 6px;text-transform:uppercase}
  .b-tier-tag{font-size:9.5px;font-weight:800;padding:0 4px;border-radius:3px;letter-spacing:0;text-transform:none;color:#0b0f14}
  /* 3단계 tier: 원본(파랑)·지표(회청)·결합(보라)·포지(골드) */
  .b-node.b-tier-tkr{border-left:3px solid var(--gold)}
  .b-n-type.b-t-tkr{color:var(--gold);background:rgba(232,180,99,.12);border-color:var(--gold-dim)} .b-t-tkr .b-tier-tag{background:var(--gold)}
  .b-tkr{display:flex;align-items:baseline;gap:8px;margin-top:5px;padding:5px 8px;border-radius:6px;background:rgba(232,180,99,.08);border:1px solid var(--gold-dim)}
  .b-tkr-sym{font-weight:800;font-size:15px;letter-spacing:.02em;color:var(--gold)}
  .b-tkr-px{font-family:ui-monospace,monospace;font-size:13px;font-weight:700;color:var(--ink)}
  .b-node.b-tier-src{border-left:3px solid #5b8def}
  .b-node.b-tier-ind{border-left:3px solid #8a92b2}
  .b-node.b-tier-mix{border-left:3px solid #c47ae0}
  .b-node.b-tier-pos{border-left:3px solid var(--gold);background:linear-gradient(180deg,rgba(232,180,99,.10),var(--surface))}
  .b-n-type.b-t-src{color:#9db8f0;background:rgba(91,141,239,.12);border-color:rgba(91,141,239,.5)} .b-t-src .b-tier-tag{background:#5b8def}
  .b-n-type.b-t-ind{color:#aeb6cf;background:rgba(138,146,178,.12);border-color:rgba(138,146,178,.45)} .b-t-ind .b-tier-tag{background:#8a92b2}
  .b-n-type.b-t-mix{color:#d3a6e8;background:rgba(196,122,224,.12);border-color:rgba(196,122,224,.5)} .b-t-mix .b-tier-tag{background:#c47ae0}
  .b-n-type.b-t-pos{color:var(--gold);background:rgba(232,180,99,.12);border-color:var(--gold-dim)} .b-t-pos .b-tier-tag{background:var(--gold)}
  /* ports */
  .b-port{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--raised);border:2px solid var(--gold-dim);cursor:crosshair;z-index:5;opacity:0;transition:opacity .12s}
  .b-node:hover .b-port,.b-node.selected .b-port,.b-node.b-linkhover .b-port{opacity:1}
  .b-port:hover,.b-port.snaptgt{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px rgba(232,180,99,.75);opacity:1;transform:scale(1.25)}
  .b-port-top.snaptgt,.b-port-bottom.snaptgt{transform:translateX(-50%) scale(1.25)}
  .b-port-left.snaptgt,.b-port-right.snaptgt{transform:translateY(-50%) scale(1.25)}
  .b-port-top{top:-7px;left:50%;transform:translateX(-50%)}
  .b-port-bottom{bottom:-7px;left:50%;transform:translateX(-50%)}
  .b-port-left{left:-7px;top:50%;transform:translateY(-50%)}
  .b-port-right{right:-7px;top:50%;transform:translateY(-50%)}
  /* edge + node HUDs */
  .b-ehud,.b-nhud{position:absolute;left:0;top:0;pointer-events:none}
  .b-ehandle{position:absolute;width:13px;height:13px;border-radius:50%;background:var(--gold);border:2px solid #11161d;transform:translate(-50%,-50%);cursor:grab;z-index:7;pointer-events:auto;box-shadow:0 2px 6px #000a}
  .b-ehandle:hover{transform:translate(-50%,-50%) scale(1.2)}
  .b-hbar{position:absolute;display:flex;gap:2px;background:#0e1218f2;border:1px solid var(--line);border-radius:10px;padding:4px;box-shadow:0 8px 22px #000b;pointer-events:auto;backdrop-filter:blur(5px);z-index:8}
  .b-ebar{transform:translate(-50%,-135%)}
  .b-nbar{transform:translate(-50%,calc(-100% - 8px))}
  .b-hbtn{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px;padding:4px 5px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:9px;font-weight:600;line-height:1;font-family:inherit}
  .b-hbtn svg{width:14px;height:14px}
  .b-hbtn:hover{background:var(--raised2);color:var(--ink)}
  .b-hbtn.danger:hover{color:var(--bear)}
  /* marquee + snap guides */
  .b-marquee{position:absolute;display:none;border:1.5px solid var(--gold);background:rgba(232,180,99,.08);border-radius:3px;z-index:8;pointer-events:none}
  .b-snap-guide{position:absolute;display:none;z-index:6;pointer-events:none}
  #bSnapV{width:0;border-left:1px dashed var(--gold)}
  #bSnapH{height:0;border-top:1px dashed var(--gold)}
  /* zoom controls */
  .b-zoomctl{position:absolute;left:12px;bottom:12px;display:flex;flex-direction:column;gap:5px;z-index:10}
  .b-zoomctl button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#161b22e0;backdrop-filter:blur(4px);color:var(--ink);font-size:15px;cursor:pointer;display:grid;place-items:center;font-family:inherit}
  .b-zoomctl button:hover{background:var(--raised2)}
  .b-zlabel{font-size:10px;color:var(--muted);text-align:center;background:#161b22cc;border:1px solid var(--line);border-radius:6px;padding:3px}
  /* thumbnail */
  .b-n-thumb{margin:-2px -2px 6px;border-radius:8px 8px 0 0;overflow:hidden;background:var(--bg);max-height:84px}
  .b-n-thumb img{display:block;width:100%;height:auto;max-height:84px;object-fit:cover}
  /* weight importance badge */
  .b-n-wt{position:absolute;top:-8px;right:-8px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
    background:var(--gold);color:#1a1206;font-size:10px;font-weight:700;line-height:18px;text-align:center;z-index:4}
  .b-n-scan{margin-top:4px;font-size:10px;color:var(--eth);font-family:ui-monospace,monospace}
  /* drag cursor override */
  body.b-ndrag,body.b-ndrag *{cursor:grabbing!important}
  /* toast (positioned in left half) */
  .b-toast{position:fixed;bottom:18px;left:25%;transform:translateX(-50%);background:#1d2530;border:1px solid var(--gold-dim);color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;z-index:99;box-shadow:0 10px 26px -8px #000;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
  .b-toast.on{opacity:1}

  /* save badge */
  .save-badge{font-size:11px;font-family:ui-monospace,monospace;border-radius:6px;padding:3px 9px;font-weight:600;white-space:nowrap}
  .save-badge.saved{color:var(--bull);background:rgba(70,194,142,.1);border:1px solid rgba(70,194,142,.25)}
  .save-badge.saving{color:var(--eth);background:rgba(138,146,178,.1);border:1px solid rgba(138,146,178,.25)}
  .save-badge.offline{color:var(--bear);background:rgba(224,106,106,.1);border:1px solid rgba(224,106,106,.25)}

  /* ════════════════════════════════════════════════════
     CHART PANE  (PHASE-FOLD render port from chart.html)
     ════════════════════════════════════════════════════ */
  .fc-wrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;padding:10px;gap:8px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .fc-panel{background:linear-gradient(180deg,var(--panel),#0e1218);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;flex-shrink:0}
  .fc-phead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;
    border-bottom:1px solid var(--line)}
  .fc-head-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden}
  .fc-head-left .fc-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fc-head-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .fc-t{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--eth)}
  .fc-t b{color:var(--ink)}
  .fc-meta{font-family:ui-monospace,monospace;font-size:10px;color:#5a6478;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fc-pbody{padding:8px 10px}
  .fc-cv{display:block;width:100%;border-radius:6px}
  .fc-folds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 10px}

  /* ══ verdict badge (top of chart-pane) ══ */
  .verdict-badge{
    display:none;flex-shrink:0;align-items:center;gap:8px;
    padding:6px 14px;border-bottom:1px solid var(--line);
    background:rgba(11,15,20,.92);
    font-family:ui-monospace,monospace;font-size:11px;color:var(--eth);
  }
  .verdict-badge.active{display:flex}
  .verdict-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .verdict-tag{font-size:9.5px;font-weight:800;letter-spacing:.02em;color:#0b0f14;background:var(--gold);border-radius:4px;padding:1px 6px;flex-shrink:0}

  /* ══ export button ══ */
  .export-btn{
    margin-left:auto;background:transparent;color:var(--eth);
    border:1px solid var(--line);border-radius:8px;padding:8px 16px;
    font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;
  }
  .export-btn:hover{background:var(--raised2);color:var(--ink)}

  /* ══ header groups + buttons ══ */
  .brand-by{color:var(--eth);font-weight:500;font-size:13px}
  .h-group{display:flex;align-items:center;gap:8px}
  .h-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .tool-btn{background:transparent;color:var(--eth);border:1px solid var(--line);border-radius:8px;
    padding:7px 13px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap;
    transition:background .12s,color .12s,border-color .12s}
  .tool-btn:hover{background:var(--raised2);color:var(--ink);border-color:#3a4452}
  .tool-btn:disabled{cursor:not-allowed}
  .tool-btn.req-soon{display:inline-flex;align-items:center;gap:7px;color:var(--faint);border-style:dashed;border-color:var(--line);opacity:.7}
  .tool-btn.req-soon:hover{background:transparent;color:var(--faint);border-color:var(--line)}
  .soon-tag{font-size:9px;font-weight:700;letter-spacing:.02em;color:var(--gold);background:rgba(232,180,99,.12);
    border:1px solid var(--gold-dim);border-radius:5px;padding:1px 5px;line-height:1.4}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--surface)}
  .seg-btn{background:transparent;color:var(--eth);border:0;border-right:1px solid var(--line);
    padding:7px 12px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap;
    transition:background .12s,color .12s}
  .seg-btn:last-child{border-right:0}
  .seg-btn:hover{background:var(--raised2);color:var(--ink)}
  .seg-btn:active{color:var(--gold)}
  .h-sep{width:1px;align-self:stretch;margin:6px 2px;background:var(--line)}

  /* hero panel (대표 이미지) — 확정 높이(차트 모드 캔버스 height:100% 붕괴·overflow:hidden 클리핑 방지) */
  .fc-panel-hero{flex:0 0 auto;min-height:0}
  .fc-hero{display:flex;gap:6px;height:var(--hero-h,440px);position:relative;overflow:hidden}
  .fc-vgutter{height:9px;margin:2px 0;border-radius:5px;cursor:row-resize;flex:0 0 auto;
    background:linear-gradient(180deg,transparent,rgba(138,146,178,.18),transparent);transition:background .12s}
  .fc-vgutter:hover,.fc-vgutter.dragging{background:linear-gradient(180deg,transparent,rgba(232,180,99,.4),transparent)}
  .fc-vgutter::after{content:"";display:block;width:34px;height:3px;margin:3px auto;border-radius:2px;background:rgba(138,146,178,.5)}
  .fc-vgutter:hover::after,.fc-vgutter.dragging::after{background:var(--gold)}
  .fc-hero #fcHeroImg,.fc-hero #fcMainChart,.fc-hero #fcEvidence{transition:transform .5s cubic-bezier(.4,0,.2,1)}
  .fc-evidence{position:absolute;inset:0;pointer-events:none;z-index:2}
  body.evhide .fc-evidence{display:none}
  .ev-toggle{background:transparent;border:1px solid var(--line);color:var(--eth);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:-.01em}
  .ev-toggle.on{border-color:var(--gold);color:var(--gold);background:rgba(232,180,99,.1)}
  /* 데이터 소스 배지(이미지뷰=비전 시계열 자동 감지 안내) */
  .fc-src{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:11px;letter-spacing:-.01em;white-space:nowrap;cursor:default}
  .fc-src-info{color:#9db8f0;background:rgba(91,141,239,.13);border:1px solid rgba(91,141,239,.4)}
  .fc-src-vision{color:#7ed0c0;background:rgba(63,182,192,.13);border:1px solid rgba(63,182,192,.42)}
  .fc-src-warn{color:var(--gold);background:rgba(232,180,99,.13);border:1px solid var(--gold-dim)}
  .fc-hero-img{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .fc-hero-img img{width:100%;height:100%;object-fit:contain}
  /* 예측 콘 오버레이(이미지 가격축 위) — 히어로/편집기 공용 */
  .fc-cone-ov{position:absolute;inset:0;pointer-events:none;z-index:2}
  .fc-cone-vline{position:absolute;width:1px;background:rgba(232,180,99,.55);pointer-events:none;z-index:3;display:none}
  .fc-cone-tip{position:absolute;z-index:4;display:none;pointer-events:none;background:rgba(11,15,20,.95);border:1px solid rgba(232,180,99,.42);border-radius:7px;padding:5px 9px;font-family:ui-monospace,monospace;font-size:11px;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .fc-cone-tip .ct-t{color:var(--gold);font-weight:700;margin-right:7px}
  .fc-cone-tip .ct-v{color:#fff;font-weight:700;margin-right:7px}
  .fc-cone-tip .ct-chg{font-weight:700;margin-right:7px}
  .fc-cone-tip .ct-band{color:var(--eth);font-size:10px}
  .fc-hero .fc-hero-ph{color:var(--eth);font-size:12px;text-align:center;padding:0 14px;line-height:1.5}
  #fcFuture{flex:0 0 200px;height:100%;min-width:0;align-self:stretch}
  #fcMainChart{flex:1;height:100%;min-width:0;display:none}

  /* 결과 영역 반응형: 폭이 좁아지면 패널을 세로로 적층 */
  @container (max-width:440px){
    .fc-folds{grid-template-columns:1fr}
  }
  @container (max-width:380px){
    .fc-hero{flex-direction:column;height:auto}
    .fc-hero-img{min-height:150px}
    #fcMainChart{flex:none;height:240px;width:100%}
    #fcFuture{flex:0 0 140px;width:100%;height:140px}
    .fc-phead{flex-direction:column;align-items:flex-start;gap:2px}
    .fc-pbody,.fc-folds{padding:8px}
  }

  /* block palette (floats over board-pane) */
  .forge-palette{
    position:absolute;left:12px;top:108px;z-index:10;
    display:flex;flex-direction:column;gap:4px;
    background:#0e1218ee;border:1px solid var(--line);
    border-radius:12px;padding:8px 7px;
    box-shadow:0 8px 22px -8px #000c;
    backdrop-filter:blur(6px);
  }
  .forge-palette .pal-label{
    font-size:9px;font-weight:700;letter-spacing:.06em;
    color:var(--eth);text-transform:uppercase;
    padding:0 3px 3px;
  }
  .forge-palette .pal-btn{
    display:block;width:100%;
    padding:6px 11px;border:1px solid var(--line);
    border-radius:8px;background:var(--surface);
    color:var(--ink);font-size:11px;font-weight:600;
    font-family:inherit;cursor:pointer;text-align:left;
    white-space:nowrap;transition:background .1s,border-color .1s;
  }
  .forge-palette .pal-btn:hover{background:var(--raised2);border-color:#3a4452}
  .forge-palette .pal-btn.pal-free{color:var(--eth);border-style:dashed}

  /* ── 노드 편집기 (우측 패널) ── */
  .node-editor{flex:1;min-height:0;overflow-y:auto;display:none;flex-direction:column;gap:11px;padding:13px 15px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .chart-pane.editing .fc-wrap{display:none}
  .chart-pane.editing .verdict-badge{display:none!important}
  .chart-pane.editing .node-editor{display:flex}
  .ne-head{display:flex;align-items:center;gap:8px}
  .ne-type{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--gold);background:rgba(232,180,99,.1);
    border:1px solid var(--gold-dim);border-radius:4px;padding:3px 7px;text-transform:uppercase;white-space:nowrap}
  .ne-title{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:7px;color:var(--ink);
    padding:7px 9px;font:inherit;font-size:14px;font-weight:700}
  .ne-title:focus{outline:none;border-color:var(--gold)}
  .ne-img{position:relative;width:100%;height:200px;border:1px solid var(--line);border-radius:9px;overflow:hidden;
    background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:default;transition:border-color .12s,box-shadow .12s}
  .ne-img.empty{cursor:pointer}
  .ne-img.empty:hover{border-color:#3a4452}
  .ne-img.drop{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,180,99,.25)}
  .ne-img img{width:100%;height:100%;object-fit:contain;pointer-events:none}
  .ne-img .ne-ph{color:var(--eth);font-size:12px;text-align:center;padding:0 16px;line-height:1.6}
  .ne-img .ne-ph b{color:var(--ink)}
  .ne-img-del{position:absolute;top:7px;right:7px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    border:0;border-radius:7px;background:rgba(11,15,20,.66);color:#fff;font-size:14px;line-height:1;cursor:pointer;
    opacity:.62;transition:opacity .12s,background .12s;z-index:4}
  .ne-img:hover .ne-img-del{opacity:1}
  .ne-img-del:hover{background:var(--bear)}
  .ne-imgbar{display:flex;gap:6px}
  .ne-imgbar .tool-btn{padding:6px 11px;font-size:12px}
  .ne-foot{margin-top:4px;padding-top:11px;border-top:1px solid var(--line)}
  .ne-del-node{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line);
    color:var(--eth);border-radius:7px;padding:7px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.12s}
  .ne-del-node svg{width:14px;height:14px}
  .ne-del-node:hover{border-color:var(--bear);color:var(--bear);background:rgba(224,106,106,.08)}
  .ne-sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--eth);margin:3px 0 -3px}
  .ne-hint{font-weight:500;letter-spacing:0;text-transform:none;color:var(--faint);margin-left:6px}
  .node-editor .pp-row{display:flex;align-items:center;gap:8px;margin:0}
  .node-editor .pp-row label{flex:0 0 92px;color:var(--eth);font-size:12px}
  .node-editor input[type=number],.node-editor textarea{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);
    border-radius:6px;color:var(--ink);padding:6px 8px;font:inherit;font-size:12px}
  .node-editor textarea{min-height:64px;resize:vertical}
  .node-editor input[type=range]{flex:1}
  .node-editor .pp-conv-val{flex:0 0 34px;text-align:right;color:var(--gold);font-size:12px}

  /* ── 사이드바 이미지 라이브러리 ── */
  .forge-side .lib-grid{display:flex;flex-direction:column;gap:6px;padding:4px 0 2px;max-height:300px;
    overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .forge-side .lib-it{position:relative;flex:0 0 auto}
  .forge-side .lib-it img{width:100%;height:70px;object-fit:cover;border-radius:6px;cursor:grab;border:1px solid var(--line)}
  .forge-side .lib-it:hover img{border-color:var(--gold)}
  .forge-side .lib-del{position:absolute;top:2px;right:2px;width:16px;height:16px;padding:0;border:0;border-radius:5px;
    background:rgba(11,15,20,.72);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center}
  .forge-side .lib-it:hover .lib-del{display:flex}
  .forge-side .lib-del:hover{background:var(--bear,#e06a6a)}

  /* ════════════════════════════════════════════════════
     SIDEBAR  (Task 3)
     ════════════════════════════════════════════════════ */
  .forge-shell{display:flex;height:calc(100vh - 54px)}
  .forge-side{flex:0 0 168px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .forge-side.collapsed{flex-basis:0;border:0}
  .forge-side .side-sec{padding:10px;border-bottom:1px solid var(--line)}
  .forge-side .side-h{font-size:11px;color:var(--eth);margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
  .forge-side .side-actions{display:flex;gap:6px;margin:0 0 8px}
  .forge-side .side-actions .side-btn{flex:1;text-align:center;padding:5px 4px}
  .forge-side .doc-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink)}
  .forge-side .doc-row.active{background:var(--raised2);color:var(--gold)}
  .forge-side .doc-row:hover{background:var(--raised2)}
  .side-btn{background:transparent;border:1px solid var(--line);color:var(--eth);border-radius:6px;font-size:11px;padding:2px 8px;cursor:pointer}
  .side-btn:hover{color:var(--ink);border-color:var(--eth)}

  /* ── 포지 분석 재생 ── */
  .analyze-prog{font-size:11px;color:var(--eth)}
  .req-stat{font-size:12px;color:var(--eth);letter-spacing:-0.01em;min-width:0}
  .req-stat.working{color:var(--gold)}
  .req-stat.err{color:var(--bear,#e06a6a)}
  .req-stat.pending{color:var(--eth);opacity:.75}
  .analyze-btn{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .analyze-btn:hover{background:rgba(232,180,99,.12)}
  @keyframes nodePulse{0%,100%{box-shadow:0 0 0 2px var(--gold),0 0 16px rgba(232,180,99,.45)}50%{box-shadow:0 0 0 3px var(--gold),0 0 30px rgba(232,180,99,.85)}}
  .b-node.analyzing{border-color:var(--gold);border-radius:12px;animation:nodePulse 1.05s ease-in-out infinite}
  .b-node.analyzed{border-color:var(--gold-dim);box-shadow:0 0 0 1.5px rgba(232,180,99,.38)}
  .b-node.analyzed::after{content:"✓";position:absolute;top:-8px;left:-8px;width:18px;height:18px;border-radius:50%;
    background:var(--gold);color:#1a1206;font-size:11px;font-weight:800;line-height:18px;text-align:center;z-index:4}
  /* 분석 중 엣지 흐름(마칭 앤츠) — 재생할 때만 #bEdges.flow */
  #bEdges.flow .b-ew{stroke:var(--gold);stroke-dasharray:7 7;animation:bedgeFlow .5s linear infinite}
  @keyframes bedgeFlow{to{stroke-dashoffset:-14}}
  /* 은하 배치: 네트워크 노드 느낌 — tier별 글로우 + 부유 + 희미한 연결선 */
  @keyframes floatNode{0%,100%{transform:translate(0,0)}25%{transform:translate(4px,-6px)}50%{transform:translate(-3px,-10px)}75%{transform:translate(-5px,-4px)}}
  body.galaxy .b-node{animation:floatNode var(--fdur,6s) ease-in-out infinite;animation-delay:var(--fdl,0s);border-radius:16px}
  body.galaxy .b-node.b-tier-src{box-shadow:0 0 0 2px rgba(91,141,239,.6),0 0 24px rgba(91,141,239,.28),0 6px 20px -8px #000}
  body.galaxy .b-node.b-tier-ind{box-shadow:0 0 0 1.5px rgba(138,146,178,.55),0 0 18px rgba(138,146,178,.2),0 6px 20px -8px #000}
  body.galaxy .b-node.b-tier-mix{box-shadow:0 0 0 2px rgba(196,122,224,.6),0 0 22px rgba(196,122,224,.28),0 6px 20px -8px #000}
  body.galaxy .b-node.b-center,body.galaxy .b-node.b-tier-pos{animation:none;box-shadow:0 0 0 2px var(--gold),0 0 50px rgba(232,180,99,.45),0 6px 22px -8px #000}
  body.galaxy .b-node:hover,body.galaxy .b-node.selected,body.galaxy .b-node.b-mini{animation:none}
  body.galaxy #bEdges .b-ew{stroke-opacity:.4;stroke-dasharray:2 5}

  /* ── 포지 분석 재생 HUD (결과 영역 상단 오버레이) ── */
  .play-hud{position:absolute;left:0;right:0;top:0;z-index:9;display:none;align-items:center;gap:12px;
    padding:9px 14px;background:linear-gradient(180deg,rgba(14,18,24,.97),rgba(14,18,24,.88));
    border-bottom:1px solid var(--gold-dim);backdrop-filter:blur(6px);
    transform:translateY(-100%);transition:transform .28s ease}
  .play-hud.on{display:flex;transform:translateY(0)}
  .play-hud .ph-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:var(--eth);box-shadow:0 0 8px currentColor}
  .play-hud .ph-node{display:flex;flex-direction:column;gap:1px;min-width:0}
  .play-hud .ph-title{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
  .play-hud .ph-type{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--eth)}
  .play-hud .ph-type b{text-transform:none;letter-spacing:0}
  .play-hud .ph-memo{font-size:11px;color:var(--gold);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em;margin-top:1px}
  .play-hud .ph-sig{margin-left:auto;display:flex;align-items:baseline;gap:7px;font-family:ui-monospace,monospace;white-space:nowrap}
  .play-hud .ph-sig b{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
  .play-hud .ph-delta{font-size:11px;font-weight:700}
  .play-hud .ph-delta.up{color:var(--bull)}.play-hud .ph-delta.down{color:var(--bear)}.play-hud .ph-delta.flat{color:var(--eth)}
  .play-hud .ph-prog{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .play-hud .ph-knt{font-family:ui-monospace,monospace;font-size:10px;color:var(--eth)}
  .play-hud .ph-bar{display:flex;gap:3px}
  .play-hud .ph-seg{width:9px;height:5px;border-radius:2px;background:var(--raised2);transition:background .2s}
  .play-hud .ph-seg.done{background:var(--gold)}
  .play-hud .ph-seg.cur{background:var(--gold);box-shadow:0 0 7px rgba(232,180,99,.8)}

  .fc-radar{width:100%;height:280px;display:block}
  /* ── 노드별 분석 패널 ── */
  .na-list{display:flex;flex-direction:column;gap:6px}
  .na-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;
    background:linear-gradient(180deg,rgba(255,255,255,.012),transparent)}
  .na-type{flex:0 0 auto;min-width:60px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--gold);background:rgba(232,180,99,.1);border:1px solid var(--gold-dim);border-radius:5px;padding:3px 7px;text-align:center}
  .na-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .na-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
  .na-read{font-size:11px;color:var(--eth);font-family:ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .na-stance{flex:0 0 auto;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .na-dir{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px}
  .na-dir.bull{color:var(--bull);background:rgba(70,194,142,.12)}
  .na-dir.bear{color:var(--bear);background:rgba(224,106,106,.12)}
  .na-dir.neutral{color:var(--eth);background:rgba(138,146,178,.1)}
  .na-wt{font-size:10px;color:var(--faint);font-family:ui-monospace,monospace}
  .na-empty{font-size:12px;color:var(--eth);padding:10px 2px;text-align:center}

  /* ── 분석 해설 패널 ── */
  .nr-list{display:flex;flex-direction:column;gap:0}
  .nr-step{display:flex;flex-wrap:wrap;gap:6px 10px;padding:7px 2px;border-bottom:1px solid var(--line);font-size:12.5px;line-height:1.5;align-items:baseline}
  .nr-memo{flex-basis:100%;margin-left:28px;color:var(--gold);font-style:italic;font-size:11.5px;line-height:1.45}
  .nr-step:last-of-type{border-bottom:0}
  .nr-num{flex:0 0 18px;width:18px;height:18px;border-radius:50%;background:rgba(232,180,99,.14);border:1px solid var(--gold-dim);
    color:var(--gold);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace}
  .nr-step b{color:var(--ink);font-weight:700}
  .nr-step .nr-read{color:var(--eth);flex:1;min-width:0}
  .nr-main{flex:1;min-width:0}
  .nr-head{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
  .nr-facts{margin:0;padding:0 0 0 2px;list-style:none}
  .nr-facts li{position:relative;padding-left:12px;color:var(--eth);font-size:12px;line-height:1.55}
  .nr-facts li::before{content:"·";position:absolute;left:2px;color:var(--gold);font-weight:800}
  .nr-up{color:var(--bull);font-weight:700}.nr-dn{color:var(--bear);font-weight:700}.nr-fl{color:var(--eth)}
  .nr-concl{margin-top:9px;padding:11px 12px;border-radius:9px;background:rgba(232,180,99,.07);border:1px solid var(--gold-dim);
    font-size:12.5px;line-height:1.65;color:var(--ink)}
  .nr-concl b{color:var(--gold)}

  /* ── 예측 시점별 표 ── */
  .hz-list{display:flex;flex-direction:column}
  .hz-row{display:flex;align-items:baseline;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line);font-family:ui-monospace,monospace}
  .hz-row:last-child{border-bottom:0}
  .hz-row.hz-head{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;padding-bottom:5px}
  .hz-t{flex:0 0 70px;font-weight:700;color:var(--gold);font-size:13px}
  .hz-v{flex:0 0 76px;font-weight:700;color:var(--ink);font-size:13.5px}
  .hz-chg{flex:0 0 62px;font-weight:700;font-size:12.5px}
  .hz-chg.hz-up{color:var(--bull)}.hz-chg.hz-dn{color:var(--bear)}.hz-chg.hz-fl{color:var(--eth)}
  .hz-band{flex:1;color:var(--eth);font-size:11px;text-align:right}
  .hz-head .hz-t,.hz-head .hz-v,.hz-head .hz-chg,.hz-head .hz-band{color:var(--faint);font-weight:600}

  /* ── 차트 확대 모달 ── */
  .fc-expand{background:transparent;border:1px solid var(--line);color:var(--eth);border-radius:6px;width:24px;height:22px;
    cursor:pointer;font-size:13px;line-height:1;margin-left:8px;flex:0 0 auto}
  .fc-expand:hover{color:var(--gold);border-color:var(--gold-dim)}
  .fc-zoom{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:rgba(8,11,16,.97)}
  .fc-zoom.on{display:flex}
  .fc-zoom-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--line);
    color:var(--eth);font-size:12px;font-family:ui-monospace,monospace}
  .fc-zoom-actions{display:flex;gap:8px}
  .fc-zoom-stage{flex:1;overflow:hidden;position:relative;cursor:grab;touch-action:none}
  .fc-zoom-stage.drag{cursor:grabbing}
  #fcZoomCv{position:absolute;left:0;top:0;transform-origin:0 0;image-rendering:auto}
</style>
</head>
<body>
  <header class="forge-top">
    <div class="brand">Scoop<em>Forge</em> <span class="brand-by">by MoneyScoop</span></div>
    <span style="font-size:10px;color:var(--gold);font-family:ui-monospace,monospace;font-weight:700;letter-spacing:.05em">build b0629x</span>
    <span class="save-badge saved" id="saveBadge">● 저장됨</span>
    <span class="h-sep"></span>
    <div class="h-group">
      <div class="seg" role="group" aria-label="노드 정렬">
        <button class="seg-btn" id="alignVBtn" onclick="autoLayout('v')" title="세로 정렬">⬍ 세로</button>
        <button class="seg-btn" id="alignHBtn" onclick="autoLayout('h')" title="가로 정렬">⬌ 가로</button>
        <button class="seg-btn" id="galaxyBtn" onclick="toggleGalaxy()" title="은하 배치 — 포지를 중심에 두고 지표가 둘러싸 부유">✦ 은하</button>
      </div>
      <button class="tool-btn" id="exportBtn" onclick="exportStrategy()" title="전략 내보내기">↧ 내보내기</button>
    </div>
    <div class="h-actions">
      <span id="analyzeProg" class="analyze-prog"></span>
      <span id="reqStat" class="req-stat" onclick="cancelReq()"></span>
      <button class="tool-btn" id="reqBtn" onclick="requestAnalysis()" title="웹분석 — 이미지를 비전으로 판독해 시계열 데이터 생성(워커 · 필요할 때만)">☁ 웹분석</button>
      <span class="h-sep"></span>
      <button class="run-btn" id="analyzeBtn" onclick="runEngine()" title="엔진분석 — 노드 그래프로 시계열을 계산해 포지결과(예측·시그널) 산출. 변경 시 이 버튼을 눌러 갱신">▷ 엔진분석</button>
      <button class="tool-btn" id="playBtn" onclick="playAnalysis()" title="시연 — 엔진분석이 어떻게 도출됐는지 노드별 과정을 애니메이션으로 보기">▶ 시연</button>
    </div>
  </header>
  <div class="forge-shell">
  <aside class="forge-side" id="forgeSide"></aside>
  <div class="forge-split">
    <section class="board-pane" id="boardPane">
      <!-- Board DOM injected by boardInit() on DOMContentLoaded -->
    </section>
    <div class="forge-gutter" id="forgeGutter" title="드래그하여 좌우 크기 조절 · 더블클릭 초기화"></div>
    <section class="chart-pane" id="chartPane">
      <div id="playHud" class="play-hud" aria-hidden="true"></div>
      <div id="verdictBadge" class="verdict-badge"></div>
      <div class="fc-wrap">
        <div class="fc-panel fc-panel-hero">
          <div class="fc-phead">
            <div class="fc-head-left">
              <span class="fc-t"><b>가격 차트</b></span>
              <span class="fc-meta" id="fcMeta">–</span>
            </div>
            <div class="fc-head-actions">
              <span class="fc-src" id="fcSrcBadge" style="display:none"></span>
              <button class="ev-toggle" id="viewToggle" style="display:none" onclick="cycleHeroView()">📈 차트뷰</button>
              <button class="ev-toggle on" id="evToggle" title="노드별 근거 작도(추세선·피보·파동 등) 표시/숨김" onclick="toggleEvidence()">◈ 근거</button>
              <button class="fc-expand" id="fcExpand" title="확대(휠로 줌)" aria-label="확대">⛶</button>
            </div>
          </div>
          <div class="fc-pbody">
            <div class="fc-hero">
              <div class="fc-hero-img" id="fcHeroImg"><span class="fc-hero-ph">라이브러리에서 대표 이미지를 드래그하세요</span></div>
              <canvas id="fcFuture" class="fc-cv"></canvas>
              <canvas id="fcMainChart" class="fc-cv"></canvas>
              <canvas id="fcEvidence" class="fc-evidence"></canvas>
              <div class="fc-cone-vline" id="fcMainVline"></div>
              <div class="fc-cone-tip" id="fcMainTip"></div>
            </div>
          </div>
        </div>
        <div class="fc-vgutter" id="fcVGutter" title="드래그하여 차트 높이 조절 · 더블클릭 초기화"></div>
        <div class="fc-panel" id="fcHzPanel">
          <div class="fc-phead">
            <span class="fc-t"><b>예측 시점별</b> · 현재가 대비</span>
            <span class="fc-meta" id="fcHzMeta">–</span>
          </div>
          <div class="fc-pbody"><div id="fcHorizons" class="hz-list"><div class="na-empty">분석 후 시점별 예측가가 표시됩니다</div></div></div>
        </div>

  <script>
  /* ════════════════════════════════════════════════════════════════
     BOARD ENGINE  — lightweight port of Scoop Board (map/map.html)
     Omitted: thumbnails, server-save, undo/redo, groups, icons,
              multi-canvas, copy/paste, auto-layout, A* routing.
     Kept: pan/zoom, node render (block+free kinds), edge render

     ════════════════════════════════════════════════════════════════ */

  /* ── uid ─────────────────────────────────────────────────────── */
  let _uidc = 0;
  function uid(p) {
    return (p || "id") + "_" + (++_uidc) + "_" + Math.random().toString(36).slice(2, 5);
  }
  function strCmp(a, b) { return String(a) < String(b) ? -1 : String(a) > String(b) ? 1 : 0; }

  /* ── DOM refs (set by boardInit) ─────────────────────────────── */
  let bStage = null, bWorld = null;

  let spaceDown = false;
  let justDragged = false;

  /* ── Server layer globals ──────────────────────────────────────── */
  const FORGE_API = "forge-api.php";
  const VISION_ENABLED = true;    // 비전 분석 ON — '☁ 분석 요청'으로 가격 노드 이미지를 분석(워커=/forge-analyze).
  console.log("[forge] build b0629x");
  let SERVER_OK = true, DOCS = [], META = { library: [], activeId: null }, activeId = null;
  async function apiGet(qs) {
    try { const r = await fetch(FORGE_API + (qs || ""), { cache: "no-store" });
      if (!r.ok) throw 0; SERVER_OK = true; return await r.json(); }
    catch (e) { SERVER_OK = false; setSaveState("offline"); return undefined; }
  }
  async function apiPost(body) {
    try { const r = await fetch(FORGE_API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (!r.ok) throw 0; SERVER_OK = true; return await r.json(); }
    catch (e) { SERVER_OK = false; setSaveState("offline"); return undefined; }
  }
  function setSaveState(s) {
    const el = document.getElementById("saveBadge"); if (!el) return;
    el.textContent = s === "saving" ? "● 저장 중…" : s === "offline" ? "● 오프라인" : "● 저장됨";
    el.className = "save-badge " + s;

  const EWIDTHS = { 1: 1.6, 2: 2.4, 3: 3.8 };

  /* ── Block definitions ───────────────────────────────────────── */
  const BLOCK_DEFS = [
    { type: "ticker",    label: "티커",        kind: "block", params: { symbol: "", price: null } },
    { type: "price",     label: "가격",        kind: "block" },
    { type: "ma",        label: "이동평균",    kind: "block", params: { len: 10 } },
    { type: "phasefold", label: "파동 스캔",    kind: "block", params: { pmin: 16, pmax: 128 } },
    { type: "combine",   label: "가중결합",    kind: "block" },
    { type: "trend",     label: "추세선",      kind: "block", params: { len: 40 } },
    { type: "rsi",       label: "RSI",         kind: "block", params: { period: 14 } },
    { type: "fib",       label: "피보나치",    kind: "block", params: { len: 120 } },
    { type: "elliott",   label: "엘리어트",    kind: "block", params: { swing: 3 } },

    { type: "predict",   label: "예측·시그널", kind: "block" },

  ];

  /* helpers */
  const bN = id => boardState.nodes.find(n => n.id === id);
  const bE = id => boardState.edges.find(e => e.id === id);
  const DIR = { right: [1, 0], left: [-1, 0], top: [0, -1], bottom: [0, 1] };
  const esc = s => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  /* ── autoLayout helpers ──────────────────────────────────────── */
  function parentsOf(id) {
    return boardState.edges.filter(e => e.to === id).map(e => e.from);
  }
  function autoLayout(dir) {
    if (!boardState.nodes.length) return;
    measure();
    const layer = {}, vis = {};
    const lay = id => {
      if (layer[id] != null) return layer[id];
      if (vis[id]) return 0;
      vis[id] = 1;
      const ps = parentsOf(id);
      let m = 0;
      if (ps.length) m = Math.max(...ps.map(p => lay(p) + 1));
      layer[id] = m; vis[id] = 0; return m;
    };
    boardState.nodes.forEach(n => lay(n.id));
    const byL = {};
    boardState.nodes.forEach(n => { (byL[layer[n.id]] = byL[layer[n.id]] || []).push(n); });
    const layers = Object.keys(byL).map(Number).sort((a, b) => a - b);
    const PAD = 40;
    /* 형태 기준 매핑: '세로'(v)=레이어를 가로로 펼치고 형제는 세로로 쌓아 길쭉(tall),
       '가로'(h)=레이어를 세로로 쌓고 형제는 가로로 펼쳐 넓적(wide). */
    if (dir === "v") {
      layers.forEach(L => { const col = byL[L].slice().sort((a, b) => a.y - b.y); let cy = PAD; const x = PAD + L * 330; col.forEach(n => { n.x = x; n.y = cy; cy += (n._h || 90) + 38; }); });
      boardState.edges.forEach(e => { e.fromSide = "right"; e.toSide = "left"; });
    } else {
      let cy = PAD; layers.forEach(L => { const row = byL[L].slice().sort((a, b) => a.x - b.x); let cx = PAD, mh = 0; row.forEach(n => { n.x = cx; n.y = cy; cx += (n._w || W_NODE) + 50; mh = Math.max(mh, n._h || 90); }); cy += mh + 56; });
      boardState.edges.forEach(e => { e.fromSide = "bottom"; e.toSide = "top"; });
    }
    renderBoard(); fitView(); markDirty();
    bToast(dir === "h" ? "가로 정렬" : "세로 정렬");
  }
  /* 은하 배치: '포지'(predict)를 중심에 두고 지표 노드들이 둘러싸 떠다니는 형태.
     동시 분석 모델의 시각화 — 주변 지표가 중심 포지로 종합된다. */
  function galaxyLayout() {
    if (!boardState.nodes.length) return;
    measure();
    const center = boardState.nodes.find(n => n.blockType === "predict")
      || boardState.nodes.find(n => n.blockType === "combine")
      || boardState.nodes.find(n => n.kind === "block");
    if (!center) return;
    const cx = 760, cy = 460;
    center.x = cx - (center._w || W_NODE) / 2; center.y = cy - (center._h || 90) / 2;
    const combine = boardState.nodes.find(n => n.blockType === "combine" && n !== center);
    const ring = boardState.nodes.filter(n => n.kind === "block" && n !== center && n !== combine);
    const R = Math.max(320, ring.length * 64 + 150);
    ring.forEach((n, i) => {
      const ang = -Math.PI / 2 + (i / Math.max(1, ring.length)) * Math.PI * 2;
      n.x = cx + Math.cos(ang) * R - (n._w || W_NODE) / 2;
      n.y = cy + Math.sin(ang) * R * 0.74 - (n._h || 90) / 2;   // 살짝 납작한 은하 타원
    });
    if (combine) { combine.x = cx - (combine._w || W_NODE) / 2; combine.y = cy - (combine._h || 90) - 150; }
    boardState.edges.forEach(e => { e.fromSide = "auto"; e.toSide = "auto"; });
    document.body.classList.add("galaxy");
    renderBoard(); fitView(); markDirty();
    bToast("은하 배치 · 포지 중심 · 지표가 둘러싸 부유");
  }
  function toggleGalaxy() {
    if (document.body.classList.contains("galaxy")) { document.body.classList.remove("galaxy"); bToast("은하 배치 해제"); }
    else galaxyLayout();
  }

  /* ── Change notification ─────────────────────────────────────── */
  let _boardChangeCb = null;
  function onBoardChange(cb) { _boardChangeCb = cb; }
  function fireBoardChange() { if (_boardChangeCb) _boardChangeCb(); }

  /* ── boardToGraph ────────────────────────────────────────────── */
  function boardToGraph() {
    return {
      nodes: boardState.nodes.map(n => ({
        id: n.id,
        kind: n.kind || "free",
        blockType: n.blockType || null,
        params: n.params || {},
        conviction: n.conviction || 0,
        weight: (n.weight != null ? n.weight : 50)
      })),
      edges: boardState.edges.map(e => ({ from: e.from, to: e.to }))
    };
  }

  /* ── worldPt ─────────────────────────────────────────────────── */
  function worldPt(cx, cy) {
    const r = bStage.getBoundingClientRect();
    return {
      x: (cx - r.left - view.tx) / view.scale,
      y: (cy - r.top  - view.ty) / view.scale
    };
  }

  /* ── Edge geometry ───────────────────────────────────────────── */
  function anchor(n, side) {
    const w = n._w || W_NODE, h = n._h || 70;
    switch (side) {
      case "left":   return { x: n.x,       y: n.y + h / 2 };
      case "top":    return { x: n.x + w/2,  y: n.y         };
      case "bottom": return { x: n.x + w/2,  y: n.y + h     };
      default:       return { x: n.x + w,    y: n.y + h / 2 };
    }
  }
  function nearestSide(n, pt) {
    const w = n._w || W_NODE, h = n._h || 70;
    const dx = (pt.x - (n.x + w/2)) / w, dy = (pt.y - (n.y + h/2)) / h;
    return Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "bottom" : "top");
  }
  function centerOf(n) { return { x: n.x + (n._w || W_NODE)/2, y: n.y + (n._h || 70)/2 }; }
  function sidesOf(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return { fs: "right", ts: "left" };
    let fs = e.fromSide, ts = e.toSide;
    const fA = (!fs || fs === "auto"), tA = (!ts || ts === "auto");
    if (fA && tA) { fs = nearestSide(a, centerOf(b)); ts = nearestSide(b, centerOf(a)); }
    else if (fA) { fs = nearestSide(a, anchor(b, ts)); }
    else if (tA) { ts = nearestSide(b, anchor(a, fs)); }
    return { fs, ts };
  }
  function cleanPts(pts) {
    const out = [pts[0]];
    for (let i = 1; i < pts.length; i++) {
      const p = pts[i], b = out[out.length - 1];
      if (Math.abs(p[0]-b[0]) < 0.5 && Math.abs(p[1]-b[1]) < 0.5) continue;
      if (out.length >= 2) {
        const a = out[out.length - 2];
        const hR = Math.abs(a[1]-b[1]) < 0.5 && Math.abs(b[1]-p[1]) < 0.5;
        const vR = Math.abs(a[0]-b[0]) < 0.5 && Math.abs(b[0]-p[0]) < 0.5;
        if (hR || vR) { out[out.length - 1] = p; continue; }
      }
      out.push(p);
    }
    return out;
  }
  function orthoPath(A, B, fs, ts) {
    const hz = s => s === "left" || s === "right";
    const fH = hz(fs), tH = hz(ts), d1 = DIR[fs], d2 = DIR[ts];
    const dist = Math.hypot(B.x-A.x, B.y-A.y), S = Math.max(11, Math.min(26, dist * 0.42));
    const A1 = [A.x + d1[0]*S, A.y + d1[1]*S], B1 = [B.x + d2[0]*S, B.y + d2[1]*S];
    let mids;
    if (fH && tH)        { const mx = (A1[0]+B1[0])/2; mids = [[mx, A1[1]], [mx, B1[1]]]; }
    else if (!fH && !tH) { const my = (A1[1]+B1[1])/2; mids = [[A1[0], my], [B1[0], my]]; }
    else if (fH && !tH)  { mids = [[B1[0], A1[1]]]; }
    else                  { mids = [[A1[0], B1[1]]]; }
    return cleanPts([[A.x, A.y], A1, ...mids, B1, [B.x, B.y]]);
  }
  function polyPath(pts) {
    if (pts.length < 2) return "";
    if (pts.length === 2) return `M${pts[0][0]},${pts[0][1]} L${pts[1][0]},${pts[1][1]}`;
    let d = `M${pts[0][0]},${pts[0][1]}`;
    for (let i = 1; i < pts.length - 1; i++) {
      const a = pts[i-1], b = pts[i], c = pts[i+1];
      const l1 = Math.hypot(b[0]-a[0], b[1]-a[1]) || 1, l2 = Math.hypot(c[0]-b[0], c[1]-b[1]) || 1;
      const r = Math.min(8, l1/2, l2/2);
      const p1 = [b[0]-(b[0]-a[0])/l1*r, b[1]-(b[1]-a[1])/l1*r];
      const p2 = [b[0]+(c[0]-b[0])/l2*r, b[1]+(c[1]-b[1])/l2*r];
      d += ` L${p1[0]},${p1[1]} Q${b[0]},${b[1]} ${p2[0]},${p2[1]}`;
    }
    return d + ` L${pts[pts.length-1][0]},${pts[pts.length-1][1]}`;
  }
  function edgeGeo(e) {
    const a = bN(e.from), b = bN(e.to);
    if (!a || !b) return null;
    const s = sidesOf(e), A = anchor(a, s.fs), B = anchor(b, s.ts);
    let d;
    if (e.route === "curve") {
      const dd = Math.hypot(B.x-A.x, B.y-A.y), k = Math.min(120, Math.max(38, dd*0.4));
      const d1 = DIR[s.fs], d2 = DIR[s.ts];
      d = `M${A.x},${A.y} C${A.x+d1[0]*k},${A.y+d1[1]*k} ${B.x+d2[0]*k},${B.y+d2[1]*k} ${B.x},${B.y}`;
    } else {
      d = polyPath(cleanPts(orthoPath(A, B, s.fs, s.ts)));
    }
    return { A, B, fs: s.fs, ts: s.ts, d };
  }
  function nodeAt(pt) {
    let r = null;
    boardState.nodes.forEach(n => {
      const w = n._w || W_NODE, h = n._h || 70;
      if (pt.x >= n.x && pt.x <= n.x + w && pt.y >= n.y && pt.y <= n.y + h) r = n;
    });
    return r;
  }

  /* SAMPLE-IMAGES END */
  const LIBRARY = [];
  function imgSrc(id){ return IMAGES[id] || ""; }
  function putImg(id, src) { IMAGES[id] = src; if (SERVER_OK) apiPost({ op: "putimg", id, src }); }

  /* ── 주제 배너 ───────────────────────────────────────────────── */
  let themeState = { imgId: null, title: "" };

  /* 대표(주제) 이미지 = 가격 노드 이미지 우선, 없으면 문서 주제 이미지 */
  function heroImgId() {
    const price = boardState.nodes.find(n => n.blockType === "price" && n.thumb && n.thumb.imgId);
    return price ? price.thumb.imgId : (themeState.imgId || null);
  }
  function renderHero() {
    const el = document.getElementById("fcHeroImg"); if (!el) return;
    const id = heroImgId();
    el.innerHTML = (id
      ? `<img src="${imgSrc(id)}" alt="">`
      : `<span class="fc-hero-ph">가격 노드에 차트 이미지를 추가하세요<br>(노드 선택 후 클릭 · 드래그 · Ctrl+V)</span>`)
      + `<canvas id="fcCone" class="fc-cone-ov"></canvas>`
      + `<div class="fc-cone-vline" id="fcConeVline"></div><div class="fc-cone-tip" id="fcConeTip"></div>`;
  }
  function renderTheme() { renderHero(); if (hasRealSeries() && lastResult) renderChart(lastResult, currentData()); }

  function setThemeImg(imgId) { themeState.imgId = imgId; renderTheme(); markDirty(); }
  function downscaleImage(src, cb){
    const img = new Image();
    img.onload = () => { let w=img.width,h=img.height; const md=1000, sc=Math.min(1,md/Math.max(w,h));
      w=Math.max(1,Math.round(w*sc)); h=Math.max(1,Math.round(h*sc));
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      let q=0.82,out=c.toDataURL("image/jpeg",q);
      while(out.length>120000&&q>0.4){ q-=0.1; out=c.toDataURL("image/jpeg",q); } cb(out); };
    img.onerror = () => { if(src.length<120000) cb(src); else bToast("이미지를 불러올 수 없어요"); };
    img.src = src;
  }
  function setThumb(id, t){ const n=bN(id); if(n){ n.thumb=t; renderBoard(); fireBoardChange(); } }

  /* ── renderLib ────────────────────────────────────────────────── */
  function renderLib() {
    const el = document.getElementById("libSec"); if (!el) return;
    el.innerHTML =
      `<div class="side-h"><span>이미지 라이브러리</span><button class="side-btn" id="libAddBtn">＋ 추가</button></div>` +
      `<div class="lib-grid">` +
      (LIBRARY.length
        ? LIBRARY.map(it =>
            `<div class="lib-it" draggable="true" data-img="${esc(it.id)}">` +
            `<img src="${esc(imgSrc(it.id))}" alt="${esc(it.label || "")}" title="${esc(it.label || "")}">` +
            `<button class="lib-del" data-libdel="${esc(it.id)}" title="라이브러리에서 삭제" aria-label="삭제">✕</button>` +
            `</div>`
          ).join("")
        : `<div style="font-size:11px;color:var(--eth);padding:2px 0">이미지를 추가하거나 Ctrl+V로 붙여넣기</div>`) +
      `</div>`;
  }
  /* 라이브러리(팔레트)에서 이미지 제거 — 노드/대표이미지는 그대로 유지(graceful) */
  function delLibImg(id) {
    const i = LIBRARY.findIndex(it => it.id === id); if (i < 0) return;
    let used = 0;
    boardState.nodes.forEach(n => { if (n.thumb && n.thumb.imgId === id) used++; });
    if (themeState.imgId === id) used++;
    const msg = used
      ? `이 이미지를 라이브러리에서 삭제할까요?\n사용 중인 노드/대표이미지 ${used}곳은 그대로 유지됩니다.`
      : "이 이미지를 라이브러리에서 삭제할까요?";
    if (!confirm(msg)) return;
    LIBRARY.splice(i, 1);
    saveMeta();
    renderLib();
    bToast("라이브러리에서 삭제됨");
  }

  /* ── Server save layer ───────────────────────────────────────── */
  function activeDoc() { return DOCS.find(d => d.id === activeId) || null; }
  function serializeActive() {
    const dc = activeDoc(); if (!dc) return null;
    dc.nodes = boardState.nodes.map(n => { const o = {}; for (const k in n) { if (k[0] !== "_") o[k] = n[k]; } return o; });
    dc.edges = boardState.edges.map(e => { const o = {}; for (const k in e) { if (k[0] !== "_") o[k] = e[k]; } return o; });
    dc.themeImgId = themeState.imgId; dc.title = themeState.title || dc.title;
    /* 실제 분석 시계열만 저장. 비전 비활성 동안엔 null로 정리(누수된 샘플 시계열 자동 제거). */
    dc.vision = visionLive()
      ? { series: _visionData.price, bias: dc.vision && dc.vision.bias || null, note: _visionNote, waves: _visionWaves,
          coords: _visionCoords, timeframe: _visionTF, futBars: _visionFut, jobId: (dc.vision && dc.vision.jobId) || null }
      : null;
    dc.view = { tx: view.tx, ty: view.ty, scale: view.scale };
    dc.updated = new Date().toISOString();
    return dc;
  }
  async function writeBackActive() {
    const dc = serializeActive(); if (!dc) return;
    if (!SERVER_OK) return;
    setSaveState("saving");
    const r = await apiPost({ op: "upsert", document: dc });
    setSaveState(r && r.ok ? "saved" : "offline");
  }
  let _saveT = null;
  function markDirty() { if (!SERVER_OK) return; clearTimeout(_saveT); _saveT = setTimeout(writeBackActive, 800); }
  async function saveMeta() { if (!SERVER_OK) return; await apiPost({ op: "meta", meta: { library: LIBRARY, activeId } }); }
  async function loadDoc(id) {
    clearTimeout(_saveT);
    const dc = DOCS.find(d => d.id === id); if (!dc) return;
    _stopPoll(); _setReqStat("", "");  // 기존 폴 즉시 정리
    activeId = id; META.activeId = id;
    boardState.nodes = dc.nodes || []; boardState.edges = dc.edges || [];
    themeState.imgId = dc.themeImgId || null; themeState.title = dc.title || "";
    const vz = dc.vision;
    if (vz && Array.isArray(vz.series) && vz.series.length >= 2) {
      _visionData = { price: vz.series, n: vz.series.length };
      _visionBias = vz.bias ? ForgeCore.visionBiasFrom(vz.bias) : 0;
      _visionNote = vz.note || ""; _visionWaves = vz.waves || []; _visionCoords = vz.coords || null;
      _visionTF = vz.timeframe || null; _visionFut = vz.futBars || 0;
    } else {
      _visionData = null; _visionBias = 0; _visionNote = ""; _visionWaves = []; _visionCoords = null; _visionTF = null; _visionFut = 0;
    }
    if (dc.view) { view.tx = dc.view.tx; view.ty = dc.view.ty; view.scale = dc.view.scale; }
    sel = []; selEdge = null;
    renderBoard(); renderTheme(); if (window.renderSidebar) renderSidebar(); runForge();
    // 새 문서의 진행 중 잡 복원 (비전 분석 활성 시에만)
    if (VISION_ENABLED && SERVER_OK && activeId) {
      const jr = await apiGet("?jobs&docId=" + encodeURIComponent(activeId));
      const jobs = (jr && jr.jobs) || [];
      const live = jobs.filter(j => j.status === "pending" || j.status === "working").sort((a, b) => strCmp(b.created, a.created))[0];
      if (live) { _setReqStat(live.status === "working" ? "분석 중…" : "분석 대기 중…", live.status); _startPoll(live.id); }
      else {   // 폴링 중 아니어도 최신 완료 분석(잡 id 다르면)이 있으면 반영
        const done = jobs.filter(j => j.status === "done" && j.result && Array.isArray(j.result.series))
          .sort((a, b) => strCmp(b.finished || b.created, a.finished || a.created))[0];
        const dv = dc.vision;
        if (done && done.id !== (dv && dv.jobId)) applyVision(done.result, done.id);
      }
    }
  }
  async function loadImages() { const m = await apiGet("?images=1"); if (m && typeof m === "object") Object.assign(IMAGES, m); }
  async function boot() {
    const doc = await apiGet("");
    await loadImages();
    if (doc && doc.documents && doc.documents.length) {
      DOCS = doc.documents; META = doc.meta || { library: [], activeId: null };
      LIBRARY.length = 0; (META.library || []).forEach(it => LIBRARY.push(it));
      await loadDoc(META.activeId && DOCS.some(d => d.id === META.activeId) ? META.activeId : DOCS[0].id);
    } else {
      // 첫 부팅/빈 데이터 → BTC/USD 샘플 포지 시드
      buildSampleForge();
      autoLayout("v");
      const dc = { id: uid("doc"), title: "BTC/USD 분석 (샘플)", themeImgId: themeState.imgId || null,
        nodes: boardState.nodes, edges: boardState.edges,
        vision: _visionData ? { series: _visionData.price, bias: ForgeCore.sampleGraph().vision.bias, note: _visionNote, waves: _visionWaves } : null,
        view: { tx: view.tx, ty: view.ty, scale: view.scale }, updated: new Date().toISOString() };
      DOCS = [dc]; activeId = dc.id; META = { library: [], activeId: dc.id };
      if (window.renderSidebar) renderSidebar(); runForge();
      if (SERVER_OK) writeBackActive();
    }
    // poll restore는 loadDoc이 처리 (boot else 분기는 신규 문서 → 잡 없음)
    setSaveState(SERVER_OK ? "saved" : "offline");
  }

  /* ── 사이드바 + 문서 CRUD (Task 3) ─────────────────────────────── */
  function renderSidebar() {
    const el = document.getElementById("forgeSide"); if (!el) return;
    const docs = DOCS.map(d =>
      `<div class="doc-row${d.id === activeId ? " active" : ""}" data-doc="${d.id}">
         <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.title || "제목 없음")}</span>
         <button class="side-btn" data-docren="${d.id}">✎</button>
         <button class="side-btn" data-docdel="${d.id}">✕</button>
       </div>`).join("");
    el.innerHTML =
      `<div class="side-sec"><div class="side-h"><span>포지</span></div>
         <div class="side-actions"><button class="side-btn" id="sampleDocBtn">＋ 샘플</button><button class="side-btn" id="newDocBtn">＋ 새 포지</button></div>${docs}</div>
       <div class="side-sec" id="libSec"></div>`;
    if (window.renderLib) renderLib();   // 라이브러리 섹션(Task 4)
  }
  function switchDoc(id) { if (id === activeId) return; writeBackActive(); loadDoc(id); saveMeta(); }
  function newDoc() {
    writeBackActive();
    const dc = { id: uid("doc"), title: "New Forge", themeImgId: null, nodes: [], edges: [],
      view: { tx: 30, ty: 20, scale: 1 }, updated: new Date().toISOString() };
    DOCS.push(dc); loadDoc(dc.id); seedDefaultStrategy(); autoLayout("v"); writeBackActive(); saveMeta();
  }
  function newSampleDoc() {
    writeBackActive();
    const dc = { id: uid("doc"), title: "BTC/USD 분석 (샘플)", themeImgId: null, nodes: [], edges: [],
      view: { tx: 30, ty: 20, scale: 1 }, updated: new Date().toISOString() };
    DOCS.push(dc); loadDoc(dc.id); buildSampleForge(); autoLayout("v");
    const ad = activeDoc();
    if (ad && _visionData) ad.vision = { series: _visionData.price, bias: ForgeCore.sampleGraph().vision.bias, note: _visionNote, waves: _visionWaves };
    runForge();
    writeBackActive(); saveMeta();
    if (window.renderSidebar) renderSidebar();
    bToast("BTC/USD 샘플 포지를 추가했어요");
  }
  function renameDoc(id, title) {
    const d = DOCS.find(x => x.id === id); if (!d) return; d.title = title;
    if (id === activeId) {
      themeState.title = title; renderTheme();
      writeBackActive();
    } else {
      d.updated = new Date().toISOString();
      if (SERVER_OK) apiPost({ op: "upsert", document: d });
    }
    renderSidebar();
  }
  function deleteDoc(id) {
    if (DOCS.length <= 1) { bToast("최소 1개 포지는 필요해요"); return; }
    DOCS = DOCS.filter(d => d.id !== id);
    if (SERVER_OK) apiPost({ op: "delete", id });
    if (id === activeId) loadDoc(DOCS[0].id);
    renderSidebar(); saveMeta();
  }

  /* ── Node HTML ───────────────────────────────────────────────── */
  function weightScale(w) {
    const x = (w != null ? w : 50);
    return x <= 50 ? 0.8 + 0.2 * (x / 50) : 1.0 + 0.4 * ((x - 50) / 50); // 0→0.8, 50→1.0, 100→1.4
  }

  function nodeHTML(n) {
    const ports = [
      `<div class="b-port b-port-top" data-act="port" data-side="top"></div>`,
      `<div class="b-port b-port-right" data-act="port" data-side="right"></div>`,
      `<div class="b-port b-port-bottom" data-act="port" data-side="bottom"></div>`,
      `<div class="b-port b-port-left" data-act="port" data-side="left"></div>`
    ].join("");
    const inDot = `<div class="b-n-in"></div>`;
    const isBlock = n.kind === "block";
    /* tier: 티커(입력) · 원본(price) → 중간(지표/결합) → 포지(predict) */
    const tier = n.blockType === "ticker" ? ["tkr", "티커"]
      : n.blockType === "price" ? ["src", "원본"]
        : n.blockType === "predict" ? ["pos", "포지"]
          : n.blockType === "combine" ? ["mix", "결합"]
            : isBlock ? ["ind", "지표"] : ["", ""];
    const badge = (isBlock && n.blockType)
      ? `<div class="b-n-type b-t-${tier[0]}"><span class="b-tier-tag">${tier[1]}</span>${esc(n.blockType)}</div>` : "";
    const tkrBody = n.blockType === "ticker"
      ? `<div class="b-tkr"><span class="b-tkr-sym">${esc((n.params && n.params.symbol) || "종목?")}</span><span class="b-tkr-px">${(n.params && isFinite(n.params.price)) ? "$" + fmtNum(n.params.price) : "현재가 미입력"}</span></div>` : "";
    const thumb = n.thumb
      ? `<div class="b-n-thumb"><img src="${imgSrc(n.thumb.imgId)}" alt=""></div>` : "";
    const cls = "b-node" + (isBlock ? "" : " b-mini") + (n.blockType === "predict" ? " b-center" : "") + (tier[0] ? " b-tier-" + tier[0] : "");
    const _seed = [...(n.id || "")].reduce((a, c) => a + c.charCodeAt(0), 0);
    const _fl = `--fdl:${((_seed % 40) / 10).toFixed(1)}s;--fdur:${(5 + (_seed % 28) / 10).toFixed(1)}s;`;
    const wt = (n.weight != null ? n.weight : 50), sf = weightScale(wt);
    const baseW = isBlock ? W_NODE : 140;
    const cardW = Math.round(baseW * sf);
    const glow = wt > 55
      ? `box-shadow:0 0 ${Math.round((wt - 55) * 0.5)}px rgba(232,180,99,${((wt - 55) / 45 * 0.6).toFixed(2)});`
      : "";
    const wbadge = wt !== 50 ? `<div class="b-n-wt" title="중요도">${wt}</div>` : "";
    return `<div class="${cls}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px;width:${cardW}px;font-size:${(13 * sf).toFixed(1)}px;${glow}${_fl}">
  ${inDot}
  ${wbadge}${thumb}<div class="b-n-body">
    <div class="b-n-title" contenteditable="true" data-field="title">${esc(n.title || "")}</div>
    ${tkrBody}${badge}
  </div>
  ${ports}
</div>`;
  }

  /* ── bq: node element by id ──────────────────────────────────── */
  const bq = id => bWorld ? bWorld.querySelector(`.b-node[data-id="${id}"]`) : null;

  /* ── applyNodeWeightVisual: live weight update without panel rebuild ── */
  function applyNodeWeightVisual(n) {
    if (!n) return;
    const el = bq(n.id);
    if (!el) return;
    const wt = n.weight != null ? n.weight : 50;
    const sf = weightScale(wt);
    const isBlock = n.kind === "block";
    const baseW = isBlock ? W_NODE : 140;
    el.style.width    = Math.round(baseW * sf) + "px";
    el.style.fontSize = (13 * sf).toFixed(1) + "px";
    if (wt > 55) {
      el.style.boxShadow = `0 0 ${Math.round((wt - 55) * 0.5)}px rgba(232,180,99,${((wt - 55) / 45 * 0.6).toFixed(2)})`;
    } else {
      el.style.boxShadow = "";
    }
    /* update importance badge: show only when weight !== 50 */
    let badge = el.querySelector(".b-n-wt");
    if (wt !== 50) {
      if (!badge) {
        badge = document.createElement("div");
        badge.className = "b-n-wt";
        badge.title = "중요도";
        el.insertBefore(badge, el.firstChild);
      }
      badge.textContent = wt;
    } else {
      if (badge) badge.remove();
    }
    measure();
    paintEdges();
  }

  /* ── renderBoard ─────────────────────────────────────────────── */
  function renderBoard() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node").forEach(el => el.remove());
    bWorld.insertAdjacentHTML("beforeend", boardState.nodes.map(nodeHTML).join(""));
    measure();
    paintEdges();
    applySel();
    applyView();
  }

  /* ── measure ─────────────────────────────────────────────────── */
  function measure() {
    boardState.nodes.forEach(n => {
      const el = bq(n.id);
      n._h = el ? el.offsetHeight : 70;
      n._w = el ? el.offsetWidth  : W_NODE;
    });
  }

  /* ── paintEdges ──────────────────────────────────────────────── */
  function paintEdges() {
    if (!bWorld) return;
    const edgeG = document.getElementById("bEdgeG");
    if (!edgeG) return;
    edgeG.innerHTML = boardState.edges.map(e => {
      const g = edgeGeo(e);
      if (!g) return "";
      const sw = EWIDTHS[e.width || 2];
      const sel_ = selEdge === e.id ? " sel" : "";
      return `<path class="b-ew${sel_}" style="stroke-width:${sw}" marker-start="url(#b-dot)" marker-end="url(#b-arw)" d="${g.d}"/>
<path class="b-eh" data-edge="${e.id}" d="${g.d}"/>`;
    }).join("");
    drawEhud();
    drawNhud();
  }

  /* ── applyView ───────────────────────────────────────────────── */
  function applyView() {
    if (!bWorld) return;
    bWorld.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
    const zl = document.getElementById("bZlabel");
    if (zl) zl.textContent = Math.round(view.scale * 100) + "%";
  }

  /* ── applySel ────────────────────────────────────────────────── */
  function applySel() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node").forEach(el => {
      el.classList.toggle("selected", sel.includes(el.dataset.id));
    });
    renderParams();
  }

  /* ── 파라미터 편집기 패널 ──────────────────────────────────────── */
  function numRow(key, label, val) {
    return `<div class="pp-row"><label>${esc(label)}</label>
      <input type="number" step="1" data-pkey="${key}" value="${val}"></div>`;
  }
  function neTypeLabel(n) {
    if (n.kind === "free") return "메모";
    const d = BLOCK_DEFS.find(b => b.type === n.blockType);
    return d ? d.label : (n.blockType || "노드");
  }
  /* 노드 선택 시 우측 패널을 편집기로 전환, 미선택 시 결과 차트로 복귀 */
  function renderParams() {
    const panel = document.getElementById("paramPanel");
    const pane = document.getElementById("chartPane");
    if (!panel || !pane) return;
    const n = (sel.length === 1) ? bN(sel[0]) : null;
    if (!n) {
      const wasEditing = pane.classList.contains("editing");
      pane.classList.remove("editing");
      panel.innerHTML = "";
      if (wasEditing) redrawCharts();   // 차트 다시 보일 때 캔버스 재맞춤
      return;
    }
    pane.classList.add("editing");
    const rows = [];
    if (n.blockType === "ma") rows.push(numRow("len", "이동평균 길이", (n.params && n.params.len) ?? 10));
    if (n.blockType === "phasefold") {
      rows.push(numRow("pmin", "스캔 범위 최소", (n.params && n.params.pmin) ?? 16));
      rows.push(numRow("pmax", "스캔 범위 최대", (n.params && n.params.pmax) ?? 128));
    }
    if (n.blockType === "elliott") rows.push(numRow("swing", "스윙 민감도(%)", (n.params && n.params.swing) ?? 3));
    if (n.blockType === "trend") rows.push(numRow("len", "추세 기간", (n.params && n.params.len) ?? 40));
    if (n.blockType === "rsi") rows.push(numRow("period", "RSI 기간", (n.params && n.params.period) ?? 14));
    if (n.blockType === "fib") rows.push(numRow("len", "피보 구간", (n.params && n.params.len) ?? 120));
    if (n.blockType === "ticker") {
      rows.push(`<div class="pp-row"><label>티커 심볼</label><input type="text" data-tkr="symbol" value="${esc((n.params && n.params.symbol) || "")}" placeholder="예: TSLA"></div>`);
      rows.push(`<div class="pp-row"><label>현재가</label><input type="number" step="any" data-tkr="price" value="${(n.params && isFinite(n.params.price)) ? n.params.price : ""}" placeholder="예: 379.71"></div>`);
    }
    // volume: 수치 param 없음(확신/중요도/메모/이미지만)
    if (n.blockType === "combine") {
      boardState.edges.filter(e => e.to === n.id).forEach(e => {
        const src = bN(e.from);
        const w = (n.params && n.params.weights && n.params.weights[e.from]) ?? 1;
        rows.push(`<div class="pp-row"><label>${esc((src && src.title) || e.from)}</label>
          <input type="number" step="0.1" data-wkey="${e.from}" value="${w}"></div>`);
      });
    }
    const conv = n.conviction ?? 0;
    const wt = (n.weight != null) ? n.weight : 50;
    const hasImg = n.thumb && n.thumb.imgId;
    const isPrice = n.blockType === "price";
    const cal0 = n.cal || {};
    const imgInner = hasImg
      ? `<img src="${esc(imgSrc(n.thumb.imgId))}" alt="">
         <button class="ne-img-del" id="neImgDel" type="button" title="이미지 제거" aria-label="이미지 제거">✕</button>
         ${isPrice ? `<canvas id="neConeOv" class="fc-cone-ov"></canvas>` : ""}`
      : `<span class="ne-ph">이미지 없음<br>클릭 · 드래그 · <b>Ctrl+V</b> 로 추가</span>`;
    const paramSec = rows.length ? `<div class="ne-sec">파라미터</div>${rows.join("")}` : "";
    const series = (Array.isArray(n.series) && n.series.length) ? n.series : null;
    const dataSec = isPrice
      ? `<div class="ne-sec">가격 데이터 <span class="ne-hint">종가 붙여넣기 → 실제 분석·예측 (한 줄 한 봉, OHLC/CSV 자동인식)</span></div>
         <div class="pp-row" style="flex-direction:column;align-items:stretch">
           <textarea id="neSeries" placeholder="종가 붙여넣기 (20개+)&#10;412.5&#10;418.0&#10;420.3&#10;...">${esc(series ? series.join("\n") : "")}</textarea></div>
         <div class="ne-imgbar">
           <button class="tool-btn" type="button" id="neSeriesEx">예시 데이터로 보기</button>
           <button class="tool-btn" type="button" id="neSeriesApply">적용하고 차트 보기</button>
         </div>
         <div class="na-empty" id="neSeriesStat" style="text-align:left;padding:3px 2px 0">${series ? ("✓ " + series.length + "개 적용됨 — 배경 클릭 시 연속 차트") : "데이터 없음 — 데모로 표시 중"}</div>`
      : "";
    /* 보정(이미지 축)은 실데이터가 없을 때만(실데이터면 연속 차트가 흐름을 보여줌) */
    const calSec = (isPrice && !series)
      ? `<div class="ne-sec">이미지 가격 보정 <span class="ne-hint">데이터가 없을 때만 — A·B선을 격자에, 현재선을 최근봉에 끌어다 맞추고 가격 입력</span></div>
         <div class="pp-row"><label>A선 가격</label><input type="number" step="any" data-calp="ap" value="${cal0.ap ?? ""}" placeholder="위쪽 기준선의 가격"></div>
         <div class="pp-row"><label>B선 가격</label><input type="number" step="any" data-calp="bp" value="${cal0.bp ?? ""}" placeholder="아래쪽 기준선의 가격"></div>
         <div class="pp-row"><label>현재가</label><input type="number" step="any" data-calp="np" value="${cal0.np ?? ""}" placeholder="최근 종가(현재선)"></div>`
      : "";
    panel.innerHTML =
      `<div class="ne-head"><span class="ne-type">${esc(neTypeLabel(n))}</span>
         <input class="ne-title" id="neTitle" value="${esc(n.title || "")}" placeholder="노드 제목"></div>
       <div class="ne-img${hasImg ? "" : " empty"}" id="neImg" title="${hasImg ? "드래그 · Ctrl+V로 교체" : "클릭 · 드래그 · Ctrl+V로 이미지 추가"}">${imgInner}</div>
       <div class="ne-imgbar">
         <button class="tool-btn" type="button" id="neImgPick">${hasImg ? "이미지 교체" : "이미지 추가"}</button>
       </div>
       ${dataSec}
       ${paramSec}
       ${calSec}
       <div class="ne-sec">가중치</div>
       <div class="pp-row"><label>중요도</label>
         <input type="range" id="ppWeight" min="0" max="100" step="1" value="${wt}">
         <span class="pp-conv-val" id="ppWeightVal">${wt}</span></div>
       <div class="pp-row"><label>확신</label>
         <input type="range" id="ppConv" min="-100" max="100" step="1" value="${conv}">
         <span class="pp-conv-val" id="ppConvVal">${conv}</span></div>
       <div class="ne-sec">서술 메모</div>
       <div class="pp-row" style="flex-direction:column;align-items:stretch">
         <textarea id="ppNote" placeholder="분석 근거·기준 (계산엔 미반영)">${esc(n.note || "")}</textarea></div>
       <div class="ne-foot"><button class="ne-del-node" id="neDelNode" type="button">${_ico_trash}<span>노드 삭제</span></button></div>`;
    if (isPrice) refreshEditorCone();
  }
  /* 편집기 이미지 미리보기 위 보정 콘 + 드래그 핸들(가격 노드 선택 시 즉시 피드백) */
  function refreshEditorCone() {
    const ov = document.getElementById("neConeOv"); if (!ov) return;
    const neImg = document.getElementById("neImg");
    const im = neImg && neImg.querySelector("img");
    const n = (sel.length === 1) ? bN(sel[0]) : null;
    if (!im || !n || n.blockType !== "price") { const cc = ov.getContext("2d"); if (cc) cc.clearRect(0, 0, ov.width, ov.height); return; }
    const cal = ensureCal(n);
    bindConeDrag(ov, n);
    const box = ov.parentElement;
    const drawFn = () => drawCalCone(ov, ov.parentElement && ov.parentElement.querySelector("img"), lastResult && lastResult.prediction, cal, true);
    coneRetry(drawFn, im);
    /* 박스가 레이아웃을 얻는 순간 확실히 재그리기 */
    if (window.ResizeObserver && box && !ov._ro) {
      ov._ro = new ResizeObserver(() => drawFn());
      ov._ro.observe(box);
    }
  }
  /* 이미지 디코드/레이아웃 타이밍에 강한 콘 그리기: 즉시 + onload + 다음 프레임 */
  function coneRetry(drawFn, img) {
    drawFn();                                              // 폴백 박스로라도 즉시 표시
    if (img) { img.addEventListener("load", drawFn, { once: true }); if (img.decode) img.decode().then(drawFn).catch(() => {}); }
    requestAnimationFrame(drawFn);                         // 레이아웃 반영 후 정밀 재그리기
  }

  function selectOnly(id)   { sel = [id]; applySel(); }
  function toggleSel(id)    { const i = sel.indexOf(id); if (i >= 0) sel.splice(i, 1); else sel.push(id); applySel(); }
  function clearSel()       { sel = []; applySel(); }
  function setSel(ids)      { sel = ids; applySel(); }
  function selectEdge(id)   { selEdge = id; sel = []; applySel(); paintEdges(); }
  function deselectAll() {
    if (!sel.length && !selEdge) return;
    sel = []; selEdge = null; applySel(); paintEdges();
  }

  /* ── CRUD ────────────────────────────────────────────────────── */
  function makeNode(x, y, title, kind, blockType, params) {
    const n = {
      id: uid("n"), x, y,
      title: title || "노드",
      kind: kind || "free",
      blockType: blockType || null,
      params: params || {}
    };
    boardState.nodes.push(n);
    return n;
  }
  function addEdge(from, fromSide, to, toSide) {
    if (from === to) return;
    if (boardState.edges.some(e => e.from === from && e.to === to)) return;
    boardState.edges.push({
      id: uid("e"),
      from, fromSide: fromSide || "right",
      to,   toSide:   toSide   || "left"
    });
    fireBoardChange();
  }
  function delEdge(id) {
    boardState.edges = boardState.edges.filter(e => e.id !== id);
    if (selEdge === id) selEdge = null;
    paintEdges();
    fireBoardChange();
  }
  function delNodes(ids) {
    const s = new Set(ids);
    boardState.nodes = boardState.nodes.filter(n => !s.has(n.id));
    boardState.edges = boardState.edges.filter(e => !s.has(e.from) && !s.has(e.to));
    sel = sel.filter(i => !s.has(i));
    renderBoard();
    fireBoardChange();
  }
  /* ── addBlock: insert a typed block at canvas center ─────────── */
  function addBlock(type) {
    const d = BLOCK_DEFS.find(b => b.type === type) || {};
    const r = bStage.getBoundingClientRect();
    const c = worldPt(r.left + r.width / 2, r.top + r.height / 2);
    const halfW = d.kind === "free" ? 70 : W_NODE / 2;
    const n = {
      id: uid("n"),
      x: c.x - halfW,
      y: c.y - 35,
      title: d.label || "노드",
      kind: d.kind || "free",
      blockType: d.kind === "block" ? type : null,
      params: d.params ? { ...d.params } : {}
    };
    boardState.nodes.push(n);
    renderBoard();
    selectOnly(n.id);
    fireBoardChange();
  }

  /* ── 4-point magnet / link-hover ─────────────────────────────── */
  function portSnap(n, pt) {
    let best = null, bd = 1e9;
    ["top", "right", "bottom", "left"].forEach(s => {
      const a = anchor(n, s), d = Math.hypot(a.x-pt.x, a.y-pt.y);
      if (d < bd) { bd = d; best = { side: s, x: a.x, y: a.y }; }
    });
    const c = centerOf(n), w = n._w || W_NODE, h = n._h || 70;
    if (Math.hypot(pt.x-c.x, pt.y-c.y) < Math.min(w, h) * 0.30) {
      const s = nearestSide(n, pt), a = anchor(n, s);
      return { side: "auto", x: a.x, y: a.y };
    }
    return best;
  }
  function snapAt(pt, exclude) {
    const over = nodeAt(pt);
    if (!over || over.id === exclude) return null;
    const s = portSnap(over, pt);
    return { node: over.id, side: s.side, x: s.x, y: s.y };
  }
  function clearLinkHi() {
    if (!bWorld) return;
    bWorld.querySelectorAll(".b-node.b-linktarget,.b-node.b-linkhover")
          .forEach(n => n.classList.remove("b-linktarget", "b-linkhover"));
    bWorld.querySelectorAll(".b-port.snaptgt")
          .forEach(p => p.classList.remove("snaptgt"));
  }
  function hi(pt, exclude) {
    clearLinkHi();
    const snap = snapAt(pt, exclude);
    if (snap) {
      const el = bq(snap.node);
      if (el) {
        el.classList.add("b-linktarget", "b-linkhover");
        if (snap.side !== "auto") {
          const pe = el.querySelector(`.b-port-${snap.side}`);
          if (pe) pe.classList.add("snaptgt");
        }
      }
    }
    return snap;
  }

  /* ── HUDs ────────────────────────────────────────────────────── */
  const _ico_trash = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4.5h6V7M6.5 7l1 13h9l1-13"/></svg>`;
  const _ico_swap  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9h13l-3.5-3.5M18 15H5l3.5 3.5"/></svg>`;

  function drawEhud() {
    const hud = document.getElementById("bEhud");
    if (!hud) return;
    if (!selEdge) { hud.innerHTML = ""; return; }
    const e = bE(selEdge), g = e && edgeGeo(e);
    if (!g) { hud.innerHTML = ""; return; }
    const mx = (g.A.x + g.B.x) / 2, my = (g.A.y + g.B.y) / 2;
    hud.innerHTML =
      `<div class="b-ehandle" data-end="from" style="left:${g.A.x}px;top:${g.A.y}px"></div>
<div class="b-ehandle" data-end="to" style="left:${g.B.x}px;top:${g.B.y}px"></div>
<div class="b-hbar b-ebar" style="left:${mx}px;top:${my}px">

  <button class="b-hbtn" data-erev="1" title="방향 반전">${_ico_swap}<span>방향</span></button>
</div>`;

  function drawNhud() {
    const hud = document.getElementById("bNhud");
    if (!hud) return;
    if (drag || sel.length !== 1) { hud.innerHTML = ""; return; }
    const n = bN(sel[0]);
    if (!n) { hud.innerHTML = ""; return; }
    const cx = n.x + (n._w || W_NODE) / 2;
    hud.innerHTML =
      `<div class="b-hbar b-nbar" style="left:${cx}px;top:${n.y}px">
  <button class="b-hbtn danger" data-nact="del" title="노드 삭제">${_ico_trash}<span>삭제</span></button>
</div>`;
