<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스쿱보드 · Scoop Board by MoneyScoop — 노드 다이어그램 빌더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#0b0f14; --surface:#141a22; --raised:#1b232d; --raised2:#27313e;
    --line:#232d38; --line2:#1b2430;
    --gold:#e8b463; --gold-deep:#cf9a4e; --gold-dim:#5e4d2c;
    --txt:#e6edf3; --muted:#8b98a6; --faint:#5c6875;
    --ok:#46c28e; --red:#e06a6a; --edge:#566472; --eth:#8a92b2;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);font-family:"Pretendard",system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;display:flex;flex-direction:column;height:100vh;overflow:hidden}

  header{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#141a22,#0e131a);flex:none;z-index:20}
  .brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:inherit;border-radius:9px;padding:3px 6px 3px 4px;cursor:pointer;transition:background .15s}
  .brand:hover{background:#ffffff0a}
  .brand:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1d2532,#141a22);border:1px solid var(--line);display:grid;place-items:center;color:var(--gold);box-shadow:0 2px 0 #0007;flex:none}
  .brand-mark svg{width:21px;height:21px}
  .brand-txt{display:flex;flex-direction:column;line-height:1.18;min-width:0}
  .brand-txt b{font-size:14.5px;font-weight:800;letter-spacing:-.02em}
  .brand-txt .em{color:var(--gold)}
  .brand-txt small{font-size:10.5px;color:var(--muted);font-weight:600}
  .tools{margin-left:auto;display:flex;align-items:center;gap:7px}
  .btn{font-family:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--raised);color:var(--txt);border-radius:8px;padding:7px 12px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn:hover{background:var(--raised2);border-color:#3a4452}
  .btn.gold{background:var(--gold);color:#1a1206;border-color:var(--gold)}.btn.gold:hover{background:#f1c87f}
  .btn.ghost{background:transparent}
  .btn.ico{padding:7px 9px;font-size:15px;line-height:1}
  .btn:disabled{opacity:.35;cursor:default;pointer-events:none}
  .seg{display:flex;background:var(--raised);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{font-family:inherit;font-size:12.5px;font-weight:600;border:0;background:transparent;color:var(--muted);padding:7px 13px;cursor:pointer}
  .seg button.on{background:var(--gold);color:#1a1206}

  .app{flex:1;display:grid;grid-template-columns:226px 1fr;min-height:0;transition:grid-template-columns .22s cubic-bezier(.4,0,.2,1)}
  .app.collapsed{grid-template-columns:44px 1fr}
  body.view .app{grid-template-columns:226px 1fr}
  body.view .app.collapsed{grid-template-columns:44px 1fr}
  /* 캔버스 좌측 플로팅 도구 팔레트 */
  .toolrail{position:absolute;left:14px;top:14px;z-index:20;width:166px;border:1px solid var(--line);background:rgba(12,17,24,.92);backdrop-filter:blur(7px);border-radius:13px;box-shadow:0 10px 30px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:11px;padding:11px 10px}
  body.view .toolrail{display:none}
  .tr-group{display:flex;flex-direction:column;gap:5px;min-height:0}
  .tr-gh{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--faint);padding:0 3px 1px}
  .trbtn{display:flex;align-items:center;gap:9px;width:100%;height:33px;padding:0 9px;border-radius:9px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer;transition:.13s;text-align:left}
  .trbtn:hover{background:var(--raised2);color:var(--txt);border-color:#3a4452}
  .trbtn.on{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .tr-ico{width:17px;text-align:center;font-size:14px;flex:none}
  .tr-name{flex:1;font-size:12px;letter-spacing:-0.01em;white-space:nowrap}
  .icon-pal{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;align-content:start}
  .ipal-btn{width:100%;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:#c2cad6;cursor:grab;display:grid;place-items:center}
  .ipal-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
  .ipal-btn svg{width:19px;height:19px}
  /* 노드 배경색 팝오버 */
  .nhud{position:absolute;left:0;top:0;pointer-events:none}
  .nbar{position:absolute;flex-direction:column;gap:5px;transform:translateY(calc(-100% - 9px))}
  .nbar-row{display:flex;gap:2px}
  .nbar-sw{display:flex;gap:4px;justify-content:center;padding:1px 2px 0}
  .nsw{width:17px;height:17px;border-radius:5px;border:1.5px solid #2a323d;cursor:pointer;padding:0;transition:transform .1s}
  .nsw:hover{transform:scale(1.15)}
  .nsw.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,180,99,.3)}
  .nsw.def{background:var(--surface);position:relative;overflow:hidden}
  .nsw.def::after{content:"";position:absolute;left:1px;top:7px;width:13px;height:1.5px;background:var(--red);transform:rotate(-45deg);transform-origin:center}

  .side{border-right:1px solid var(--line);background:#10151c;display:flex;flex-direction:column;min-height:0;position:relative}
  .side-toggle{position:absolute;top:10px;right:9px;width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer;font-size:12px;z-index:3;display:grid;place-items:center}
  .side-toggle:hover{color:var(--txt)}
  .app.collapsed .side-toggle{right:50%;transform:translateX(50%)}
  .side-h{padding:15px 15px 9px}
  .side-h .t{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;font-weight:700}.side-h .t b{color:var(--gold)}
  .side-h p{margin:7px 36px 0 0;font-size:11px;color:var(--faint);line-height:1.5}
  .lib{flex:1;overflow-y:auto;padding:6px 13px 16px;display:flex;flex-direction:column;gap:10px}
  .lib-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:grab;transition:.16s;position:relative}
  .lib-item:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .lib-item img{width:100%;display:block;pointer-events:none}
  .lib-item .cap{display:flex;align-items:center;gap:6px;padding:7px 9px;font-size:11px;color:#c2cad6}
  .lib-item .cap .gr{margin-left:auto;color:var(--faint);font-size:13px}
  .lib-item .del{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:6px;background:#0d1117cc;border:1px solid var(--line);color:var(--muted);display:none;place-items:center;font-size:11px;cursor:pointer}
  .lib-item:hover .del{display:grid}
  .lib-add{border:1.5px dashed var(--line);border-radius:10px;padding:13px;text-align:center;font-size:12px;color:var(--muted);cursor:pointer}
  .lib-add:hover{border-color:var(--gold-dim);color:var(--gold)}
  .collapse-rail{display:none}
  .app.collapsed .side-scroll{display:none}
  .app.collapsed .collapse-rail{display:flex;writing-mode:vertical-rl;align-items:center;gap:8px;margin:46px auto 0;color:var(--faint);font-family:var(--mono);font-size:11px;letter-spacing:.16em;cursor:pointer;text-transform:uppercase}
  .side-scroll{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
  .cv-head{display:flex;align-items:center;gap:8px;padding:15px 15px 9px}
  .cv-h-t{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;font-weight:700;flex:1}
  .cv-add{font-family:inherit;font-size:11px;font-weight:600;border:1px solid var(--line);background:var(--raised);color:var(--gold);border-radius:7px;padding:5px 8px;cursor:pointer;white-space:nowrap}
  .cv-add:hover{background:var(--raised2);border-color:var(--gold-dim)}
  .cv-list{display:flex;flex-direction:column;gap:3px;padding:0 9px 8px}
  .cv-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent}
  .cv-item:hover{background:var(--surface)}
  .cv-item.on{background:var(--surface);border-color:var(--gold-dim)}
  .cv-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .cv-item.on .cv-dot{background:var(--gold);box-shadow:0 0 7px rgba(232,180,99,.6)}
  .cv-name{flex:1;font-size:12.5px;color:#c2cad6;outline:none;border-radius:5px;padding:1px 3px;margin:-1px -3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .cv-item.on .cv-name{color:var(--txt);font-weight:600}
  .cv-name[contenteditable="true"]{background:#0d1117;color:#fff;text-overflow:clip;cursor:text}
  .cv-ren,.cv-del{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer;font-size:11px;display:none;place-items:center;flex:none}
  .cv-item:hover .cv-ren,.cv-item:hover .cv-del{display:grid}
  .cv-ren:hover{color:var(--gold);border-color:var(--gold-dim)} .cv-del:hover{color:var(--red);border-color:var(--red)}
  .lib-acc{border-top:1px solid var(--line);margin-top:auto}
  .lib-acc>summary{list-style:none;cursor:pointer;padding:11px 15px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:7px}
  .lib-acc>summary::-webkit-details-marker{display:none}
  .lib-acc>summary::before{content:"▸";color:var(--gold-dim);transition:transform .15s}
  .lib-acc[open]>summary::before{transform:rotate(90deg)}
  .lib-acc>summary:hover{color:var(--txt)}

  .stage{position:relative;overflow:hidden;cursor:grab;
    background:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0) 0 0/26px 26px,radial-gradient(120% 120% at 30% 0%,#141c28,#0b0f14)}
  .bgpop{position:absolute;z-index:40;display:none;flex-wrap:wrap;gap:6px;width:150px;background:var(--raised);border:1px solid var(--line);border-radius:11px;padding:9px;box-shadow:0 12px 30px #000a}
  .bgpop.open{display:flex}
  .bgsw{width:27px;height:27px;border-radius:7px;border:1.5px solid var(--line);cursor:pointer;padding:0;transition:transform .1s}
  .bgsw:hover{transform:scale(1.1)}
  .bgsw.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,180,99,.32)}
  .bgsw.def{background:radial-gradient(120% 120% at 30% 0%,#141c28,#0b0f14);position:relative;overflow:hidden}
  .bgsw.def::after{content:"기본";position:absolute;inset:0;display:grid;place-items:center;font-size:8px;color:var(--muted)}
  .stage.panning{cursor:grabbing}
  .stage.space{cursor:grab}
  .stage.selmode{cursor:crosshair}
  .world{position:absolute;left:0;top:0;transform-origin:0 0}
  .edges{position:absolute;left:-10000px;top:-10000px;width:20000px;height:20000px;overflow:visible;pointer-events:none}
  .edges .ew{fill:none;stroke:var(--edge);stroke-width:2}
  .edges .ew.sel{stroke:var(--gold);stroke-width:3}
  .edges .eh{fill:none;stroke:transparent;stroke-width:16;pointer-events:stroke;cursor:pointer}
  .edges path.tmp{fill:none;stroke:var(--gold);stroke-width:2;stroke-dasharray:5 4}

  /* group box */
  .group{position:absolute;border:1.5px dashed var(--gold-dim);border-radius:14px;background:rgba(232,180,99,.04);pointer-events:none}
  .group-label{position:absolute;top:-11px;left:14px;font-size:11.5px;font-weight:700;color:var(--gold);background:#0e1116;padding:1px 8px;border-radius:6px;border:1px solid var(--gold-dim);pointer-events:auto;outline:none;font-family:var(--mono)}
  .group-del{position:absolute;top:-12px;right:10px;width:20px;height:20px;border-radius:6px;background:#0e1116;border:1px solid var(--gold-dim);color:var(--gold);cursor:pointer;font-size:11px;display:grid;place-items:center;pointer-events:auto}
  .group-del:hover{color:var(--red);border-color:var(--red)}

  .node{position:absolute;width:246px;background:var(--surface);border:1.5px solid var(--line);border-radius:13px;box-shadow:0 12px 30px -18px #000;cursor:grab;transition:border-color .12s,box-shadow .12s}
  .node.mini{width:150px}
  .node.mini .n-body{padding:8px 11px}
  .node.mini .n-title{font-size:12.5px;min-height:16px}
  .node.icon{width:auto;min-width:88px;max-width:140px;text-align:center;padding:12px 12px 10px;display:flex;flex-direction:column;align-items:center;gap:7px}
  .node.icon .n-icon{width:40px;height:40px;color:var(--gold)}
  .node.icon .n-icon svg{width:40px;height:40px}
  .node.icon .n-title{font-size:12.5px;font-weight:600;min-height:16px}
  .node:hover{border-color:#3a4452}
  .node.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,180,99,.22),0 14px 32px -16px #000}
  .node.dragover{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,180,99,.18)}
  .node.linktarget{border-color:var(--ok);box-shadow:0 0 0 3px rgba(61,214,140,.25)}
  .n-in{position:absolute;left:-7px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--edge)}
  .n-del{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer;font-size:11px;display:none;place-items:center;z-index:4}
  .node:hover .n-del,.node.selected .n-del{display:grid}
  .n-del:hover{color:var(--red);border-color:var(--red)}
  .n-add{position:absolute;top:16px;right:-9px;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:var(--raised);color:var(--muted);cursor:pointer;font-size:14px;display:none;place-items:center;z-index:4}
  .node:hover .n-add,.node.selected .n-add{display:grid}
  .n-add:hover{color:var(--gold);border-color:var(--gold-dim)}
  .n-del:hover{color:var(--red);border-color:var(--red)}
  .n-body{padding:12px 13px 12px}
  .n-title{font-size:14px;font-weight:700;outline:none;border-radius:6px;padding:2px 4px;margin:-2px -4px;line-height:1.4;min-height:20px;cursor:text}
  .n-title:empty::before{content:"제목";color:var(--faint)}
  .n-desc{font-size:12px;color:#b9c1cd;line-height:1.55;outline:none;border-radius:6px;padding:3px 4px;margin:6px -4px 0;min-height:16px;cursor:text}
  .n-desc:empty::before{content:"설명";color:var(--faint)}
  .n-thumb{margin-top:10px;position:relative;border:1px solid var(--line);border-radius:9px;overflow:hidden;line-height:0;background:#0d1117}
  .n-thumb img{width:100%;height:92px;object-fit:cover;object-position:top center;display:block;cursor:zoom-in}
  .n-thumb .zh{position:absolute;right:6px;bottom:6px;width:21px;height:21px;border-radius:6px;background:#0d1117cc;border:1px solid var(--line);color:#cfd6df;display:grid;place-items:center;font-size:11px;pointer-events:none}
  .n-thumb .rmth{position:absolute;top:6px;right:6px;width:21px;height:21px;border-radius:6px;background:#0d1117cc;border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;font-size:11px;cursor:pointer}
  .n-thumb .rmth:hover{color:var(--red);border-color:var(--red)}
  .n-thumb .cap{position:absolute;left:7px;bottom:7px;font-size:10px;font-family:var(--mono);color:#dfe4ea;background:#0d1117c0;padding:3px 6px;border-radius:5px;line-height:1}
  .n-drop{margin-top:9px;border:1.5px dashed var(--line);border-radius:9px;padding:9px;text-align:center;font-size:11px;color:var(--faint)}
  .port{position:absolute;width:15px;height:15px;border-radius:50%;background:var(--raised);border:2px solid var(--gold-dim);cursor:crosshair;z-index:5;opacity:0;transition:opacity .12s}
  .node:hover .port,.node.selected .port,.node.linkhover .port{opacity:1}
  .node.linkhover .port{border-color:var(--gold);opacity:.85}
  .port:hover,.port.snaptarget{border-color:var(--gold);background:var(--gold);box-shadow:0 0 10px rgba(232,180,99,.75);opacity:1;transform:scale(1.25)}
  .port.top.snaptarget,.port.bottom.snaptarget{transform:translateX(-50%) scale(1.25)}
  .port.left.snaptarget,.port.right.snaptarget{transform:translateY(-50%) scale(1.25)}
  .port.top{top:-8px;left:50%;transform:translateX(-50%)}
  .port.bottom{bottom:-8px;left:50%;transform:translateX(-50%)}
  .port.left{left:-8px;top:50%;transform:translateY(-50%)}
  .port.right{right:-8px;top:50%;transform:translateY(-50%)}
  /* edge select handles */
  .elabels{position:absolute;left:0;top:0;pointer-events:none}
  .elabel{position:absolute;transform:translate(-50%,-50%);background:#11161deb;border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--txt);white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis;cursor:text;pointer-events:auto;z-index:6;outline:none}
  .elabel.sel{border-color:var(--gold);color:var(--gold)}
  .elabel:focus{border-color:var(--gold);background:#0e1218;overflow:visible}
  .elabel:empty::before{content:"라벨";color:var(--faint)}
  body.view .elabel{cursor:default}
  .ehud{position:absolute;left:0;top:0;pointer-events:none}
  .ehandle{position:absolute;width:15px;height:15px;border-radius:50%;background:var(--gold);border:2px solid #11161d;transform:translate(-50%,-50%);cursor:grab;z-index:7;pointer-events:auto;box-shadow:0 2px 8px #000a}
  .ehandle:hover{transform:translate(-50%,-50%) scale(1.2)}
  /* 라벨형 미니 툴바 (엣지·노드 공용) */
  .hbar{position:absolute;display:flex;gap:2px;background:#0e1218f2;border:1px solid var(--line);border-radius:11px;padding:4px;box-shadow:0 10px 26px #000b;pointer-events:auto;backdrop-filter:blur(5px);z-index:8}
  .ebar{transform:translate(-50%,-138%)}
  .hbtn{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:42px;padding:5px 6px;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;font-size:9.5px;font-weight:600;line-height:1;letter-spacing:-.01em}
  .hbtn svg{width:16px;height:16px}
  .hbtn:hover{background:var(--raised2);color:var(--txt)}
  .hbtn.on{color:var(--gold)}
  .hbtn.danger:hover{color:var(--red)}
  .abar{transform:translate(-50%,calc(-100% - 10px));align-items:center}
  .hbtn2{display:grid;place-items:center;width:30px;height:30px;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer}
  .hbtn2 svg{width:18px;height:18px}
  .hbtn2:hover{background:var(--raised2);color:var(--gold)}
  .vsep{width:1px;align-self:stretch;background:var(--line);margin:4px 3px}
  .menupop{position:absolute;z-index:40;display:none;flex-direction:column;gap:1px;background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:6px;box-shadow:0 12px 30px #000a;min-width:158px}
  .menupop.open{display:flex}
  .menupop button{display:flex;align-items:center;gap:9px;padding:8px 10px;border:none;background:transparent;color:var(--txt);border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;text-align:left;font-family:inherit}
  .menupop button:hover{background:var(--raised2)}
  .menupop button svg{width:16px;height:16px;color:var(--muted);flex:none}
  .menupop small{color:var(--faint);font-weight:400;margin-left:auto}

  body.view .edit-only{display:none!important}
  body.view .node{cursor:default}body.view .n-title,body.view .n-desc{cursor:default}

  .marquee{position:absolute;display:none;border:1.5px solid var(--gold);background:rgba(232,180,99,.1);border-radius:4px;z-index:8;pointer-events:none}
  .snap-guide{position:absolute;display:none;z-index:6;pointer-events:none}
  #snapV{width:0;border-left:1px dashed var(--gold)}
  #snapH{height:0;border-top:1px dashed var(--gold)}

  .zoomctl{position:absolute;left:16px;bottom:16px;display:flex;flex-direction:column;gap:6px;z-index:10}
  .zoomctl button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#161b22e0;backdrop-filter:blur(4px);color:var(--txt);font-size:16px;cursor:pointer;display:grid;place-items:center}
  .zoomctl button:hover{background:var(--raised2)}
  .zlabel{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:center;background:#161b22cc;border:1px solid var(--line);border-radius:7px;padding:4px}
  .hint{position:absolute;right:16px;bottom:16px;font-size:11px;color:var(--faint);font-family:var(--mono);background:#161b22e0;border:1px solid var(--line);border-radius:9px;padding:8px 11px;z-index:10;line-height:1.65;max-width:340px}
  .hint b{color:var(--gold);font-weight:700}
  .hint-row{display:flex;gap:7px;align-items:baseline}
  .hint-row+.hint-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
  .hint-h{flex:none;align-self:flex-start;background:var(--gold);color:#1a1206;border-radius:4px;padding:1px 5px;font-size:9.5px;font-weight:700;letter-spacing:.02em;margin-top:1px}
  .hint-b{flex:1}

  .lb{position:fixed;inset:0;background:#070a0ee6;backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:90;padding:32px;cursor:zoom-out}
  .lb.on{display:flex}.lb img{max-width:1150px;width:100%;border-radius:12px;border:1px solid var(--line);box-shadow:0 40px 90px -30px #000}
  .lb .x{position:fixed;top:18px;right:22px;color:var(--muted);font-size:26px;cursor:pointer}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1d2530;border:1px solid var(--gold-dim);color:#fff;padding:10px 19px;border-radius:99px;font-size:13px;z-index:99;box-shadow:0 12px 30px -10px #000;opacity:0;transition:.25s;pointer-events:none}
  .toast.on{opacity:1}
  .savestat{font-size:11px;color:var(--faint);margin-right:4px;font-family:var(--mono);transition:color .2s;white-space:nowrap}
  .savestat.saved{color:var(--ok)} .savestat.saving{color:var(--gold)} .savestat.offline{color:var(--red)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
</style>

function sidesOf(e){const a=N(e.from),b=N(e.to);if(!a||!b)return{fs:'right',ts:'left'};
  let fs=e.fromSide,ts=e.toSide;const fA=(!fs||fs==='auto'),tA=(!ts||ts==='auto');
  if(fA&&tA){fs=nearestSide(a,centerOf(b));ts=nearestSide(b,centerOf(a))}

  else if(tA){ts=nearestSide(b,anchor(a,fs))}

function cleanPts(pts){const out=[pts[0]];for(let i=1;i<pts.length;i++){const p=pts[i],b=out[out.length-1];
    if(Math.abs(p[0]-b[0])<0.5&&Math.abs(p[1]-b[1])<0.5)continue;              // 중복점 제거
    if(out.length>=2){const a=out[out.length-2];
      const hRun=Math.abs(a[1]-b[1])<0.5&&Math.abs(b[1]-p[1])<0.5,vRun=Math.abs(a[0]-b[0])<0.5&&Math.abs(b[0]-p[0])<0.5;

function edgePath(a,b){const x1=a.x+a._w,y1=a.y+a._h/2,x2=b.x,y2=b.y+(b._h||90)/2,dx=Math.max(45,Math.abs(x2-x1)/2);
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`}
function paint(){
  document.getElementById('edgeG').innerHTML=state.edges.map(e=>{const g=edgeGeo(e);if(!g)return'';
    const dash=e.style==='dashed'?'stroke-dasharray:7 5;':'';
    const sw=`stroke-width:${EWIDTHS[e.width||2]}`;
    const mk=(e.arrow!==false)?'marker-start="url(#dot)" marker-end="url(#arw)"':'';
    return `<path class="ew ${selEdge===e.id?'sel':''}" style="${dash}${sw}" ${mk} d="${g.d}"/><path class="eh" data-edge="${e.id}" d="${g.d}"/>`}).join('');
  drawLabels();
  layoutGroups(); drawEhud(); drawNhud();
}
function drawLabels(){
  document.getElementById('elabels').innerHTML=state.edges.filter(e=>e.label!=null).map(e=>{const g=edgeGeo(e);if(!g)return'';
    const mx=(g.A.x+g.B.x)/2,my=(g.A.y+g.B.y)/2;
    return `<div class="elabel ${selEdge===e.id?'sel':''}" data-elabel="${e.id}" contenteditable="${ce()}" style="left:${mx}px;top:${my}px">${esc(e.label)}</div>`}).join('');
}
function drawEhud(){
  const hud=document.getElementById('ehud');
  if(mode!=='edit'||!selEdge){hud.innerHTML='';return}
  const e=E(selEdge),g=e&&edgeGeo(e);if(!g){hud.innerHTML='';return}
  const mx=(g.A.x+g.B.x)/2,my=(g.A.y+g.B.y)/2;
  const dash=e.style==='dashed',arr=e.arrow!==false,w=e.width||2,ortho=e.route!=='curve',hasLabel=e.label!=null;
  hud.innerHTML=`<div class="ehandle" data-end="from" style="left:${g.A.x}px;top:${g.A.y}px"></div>
    <div class="ehandle" data-end="to" style="left:${g.B.x}px;top:${g.B.y}px"></div>
    <div class="hbar ebar" style="left:${mx}px;top:${my}px">
      <button class="hbtn danger" data-edel="1" title="연결선 삭제">${ICO.trash}<span>삭제</span></button>
      <button class="hbtn" data-erev="1" title="시작/끝 방향 바꾸기">${ICO.swap}<span>방향</span></button>
      <button class="hbtn ${dash?'on':''}" data-eline="1" title="실선/점선">${ICO.dash}<span>${dash?'점선':'실선'}</span></button>
      <button class="hbtn ${arr?'on':''}" data-earrow="1" title="화살표 머리">${ICO.arrow}<span>화살표</span></button>
      <button class="hbtn" data-ewidth="1" title="선 굵기 (1·2·3단계)">${ICO.width}<span>굵기 ${w}</span></button>
      <button class="hbtn ${ortho?'on':''}" data-eroute="1" title="곡선/직각 라우팅">${ortho?ICO.route:ICO.curve}<span>${ortho?'직각':'곡선'}</span></button>
      <button class="hbtn ${hasLabel?'on':''}" data-elabeladd="1" title="연결선 라벨 추가·편집">${ICO.tag}<span>라벨</span></button>
    </div>`;
}
function drawNhud(){
  const hud=document.getElementById('nhud');
  if(mode!=='edit'||drag){hud.innerHTML='';return}
  if(sel.length>=2){
    const ns=sel.map(N).filter(Boolean);if(ns.length<2){hud.innerHTML='';return}
    let a=1e9,b=1e9,c=-1e9;ns.forEach(n=>{a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x+(n._w||W_NODE))});
    const A=(k,t)=>`<button class="hbtn2" data-align="${k}" title="${t}">${ALI[k]}</button>`;
    hud.innerHTML=`<div class="hbar abar" style="left:${(a+c)/2}px;top:${b}px">
      ${A('left','왼쪽 정렬')}${A('cx','가로 가운데')}${A('right','오른쪽 정렬')}
      <div class="vsep"></div>${A('top','위 정렬')}${A('cy','세로 가운데')}${A('bottom','아래 정렬')}
      <div class="vsep"></div>${A('dh','가로 등간격')}${A('dv','세로 등간격')}</div>`;
    return;
  }
  if(sel.length!==1){hud.innerHTML='';return}
  const n=N(sel[0]);if(!n){hud.innerHTML='';return}
  const sw=NODE_COLORS.map(c=>`<button class="nsw ${c?'':'def'} ${(n.bg||null)===c?'on':''}" data-bg="${c||''}" style="${c?`background:${c}`:''}" title="${c||'기본'}"></button>`).join('');
  hud.innerHTML=`<div class="hbar nbar" style="left:${n.x}px;top:${n.y}px">
    <div class="nbar-row">
      <button class="hbtn" data-nact="parent" title="상위(부모) 노드 추가">${ICO.parent}<span>상위</span></button>
      <button class="hbtn" data-nact="child" title="하위(자식) 노드 추가">${ICO.child}<span>하위</span></button>
      <button class="hbtn danger" data-nact="del" title="노드 삭제">${ICO.trash}<span>삭제</span></button>
    </div>
    <div class="nbar-sw">${sw}</div>
  </div>`;
}
function alignSel(mode){
  const ns=sel.map(N).filter(Boolean);if(ns.length<2)return;
  const w=n=>n._w||W_NODE,h=n=>n._h||90;
  const minx=Math.min(...ns.map(n=>n.x)),maxr=Math.max(...ns.map(n=>n.x+w(n)));
  const miny=Math.min(...ns.map(n=>n.y)),maxb=Math.max(...ns.map(n=>n.y+h(n)));
  if(mode==='left')ns.forEach(n=>n.x=minx);
  else if(mode==='right')ns.forEach(n=>n.x=maxr-w(n));
  else if(mode==='cx'){const cc=(minx+maxr)/2;ns.forEach(n=>n.x=cc-w(n)/2)}
  else if(mode==='top')ns.forEach(n=>n.y=miny);
  else if(mode==='bottom')ns.forEach(n=>n.y=maxb-h(n));
  else if(mode==='cy'){const cc=(miny+maxb)/2;ns.forEach(n=>n.y=cc-h(n)/2)}
  else if(mode==='dh'){const s=[...ns].sort((p,q)=>p.x-q.x);const span=(s[s.length-1].x+w(s[s.length-1]))-s[0].x;const tot=s.reduce((a,n)=>a+w(n),0);const gap=(span-tot)/(s.length-1);let cur=s[0].x;s.forEach(n=>{n.x=cur;cur+=w(n)+gap})}
  else if(mode==='dv'){const s=[...ns].sort((p,q)=>p.y-q.y);const span=(s[s.length-1].y+h(s[s.length-1]))-s[0].y;const tot=s.reduce((a,n)=>a+h(n),0);const gap=(span-tot)/(s.length-1);let cur=s[0].y;s.forEach(n=>{n.y=cur;cur+=h(n)+gap})}
  render();markDirty();toast('정렬 적용')
}
function layoutGroups(){
  (state.groups||[]).slice().forEach(g=>{
    const ns=g.nodes.map(N).filter(Boolean);
    const el=document.querySelector(`.group[data-gid="${g.id}"]`);
    if(ns.length<1){if(el)el.remove();return}
    let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
    ns.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x+n._w);maxy=Math.max(maxy,n.y+(n._h||90))});
    const p=18;if(el){el.style.left=(minx-p)+'px';el.style.top=(miny-p)+'px';el.style.width=(maxx-minx+p*2)+'px';el.style.height=(maxy-miny+p*2)+'px'}
  });
}
function applyView(){world.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;document.getElementById('zlabel').textContent=Math.round(view.scale*100)+'%'}
function applySel(){document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',sel.includes(el.dataset.id)))}

/* ---------- selection ---------- */
function selectOnly(id){sel=[id];applySel()}
function toggleSel(id){const i=sel.indexOf(id);if(i>=0)sel.splice(i,1);else sel.push(id);applySel()}
function clearSel(){sel=[];applySel()}
function setSel(ids){sel=ids;applySel()}

/* ---------- coordinate ---------- */
function worldPt(cx,cy){const r=stage.getBoundingClientRect();return{x:(cx-r.left-view.tx)/view.scale,y:(cy-r.top-view.ty)/view.scale}}

/* ---------- canvas store ---------- */
function writeBackActive(){
  const c=canvases.find(x=>x.id===activeId);if(!c)return null;
  c.nodes=state.nodes;c.edges=state.edges;c.groups=state.groups||[];c.view=view;c.bg=canvasBg;c.updated=stamp();return c;
}
function applyCanvasBg(bg){const dots='radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0) 0 0/26px 26px';stage.style.background=bg?`${dots},${bg}`:''}
function setCanvasBg(bg){canvasBg=bg||null;applyCanvasBg(canvasBg);renderBgPop();markDirty()}
function renderBgPop(){const el=document.getElementById('bgPop');if(!el)return;el.innerHTML=CANVAS_BGS.map(c=>`<button class="bgsw ${c?'':'def'} ${(canvasBg||null)===c?'on':''}" style="${c?`background:${c}`:''}" title="${c||'기본'}" onclick="setCanvasBg('${c||''}')"></button>`).join('')}
function toggleBgPop(e){if(e)e.stopPropagation();const el=document.getElementById('bgPop'),b=document.getElementById('bgBtn');renderBgPop();const open=el.classList.toggle('open');if(open&&b){const r=b.getBoundingClientRect();el.style.top=(r.bottom+6)+'px';el.style.right=(window.innerWidth-r.right)+'px'}}
document.addEventListener('click',e=>{const bp=document.getElementById('bgPop');if(bp&&bp.classList.contains('open')&&!e.target.closest('#bgPop,#bgBtn'))bp.classList.remove('open');const xp=document.getElementById('exPop');if(xp&&xp.classList.contains('open')&&!e.target.closest('#exPop,#exBtn'))xp.classList.remove('open')});
function loadCanvas(id){
  const c=canvases.find(x=>x.id===id);if(!c)return;
  activeId=id;
  state={nodes:c.nodes||[],edges:c.edges||[],groups:c.groups||[]};
  state.edges.forEach(e=>{if(!e.fromSide)e.fromSide='right';if(!e.toSide)e.toSide='left';if(!e.style)e.style='solid';if(e.arrow===undefined)e.arrow=true});
  view=c.view&&typeof c.view.scale==='number'?c.view:{tx:30,ty:20,scale:1};
  canvasBg=c.bg||null;applyCanvasBg(canvasBg);
  sel=[];selEdge=null;
  resetHistory();
  renderLib();render();setTimeout(fitView,30);
}
/* ---------- 되돌리기/다시실행 (서버 유무 무관, 캔버스별로 초기화) ---------- */
function snapState(){const clean=a=>(a||[]).map(o=>{const r={};for(const k in o)if(k[0]!=='_')r[k]=o[k];return r});return JSON.stringify({nodes:clean(state.nodes),edges:state.edges,groups:state.groups||[]})}
function resetHistory(){undoStack=[];redoStack=[];histBase=snapState();updateUndoBtns()}
function recordHistory(){const cur=snapState();if(cur===histBase)return;undoStack.push(histBase);if(undoStack.length>80)undoStack.shift();redoStack=[];histBase=cur;updateUndoBtns()}
function applySnap(s){const d=JSON.parse(s);state={nodes:d.nodes,edges:d.edges,groups:d.groups||[]};sel=[];selEdge=null;render()}
function undo(){if(!undoStack.length){toast('되돌릴 작업 없음');return}redoStack.push(histBase);const prev=undoStack.pop();histBase=prev;histSuspend=true;applySnap(prev);markDirty();histSuspend=false;updateUndoBtns();toast('되돌리기')}
function redo(){if(!redoStack.length){toast('다시 실행할 작업 없음');return}undoStack.push(histBase);const nx=redoStack.pop();histBase=nx;histSuspend=true;applySnap(nx);markDirty();histSuspend=false;updateUndoBtns();toast('다시 실행')}
function updateUndoBtns(){const u=document.getElementById('undoBtn'),r=document.getElementById('redoBtn');if(u)u.disabled=!undoStack.length;if(r)r.disabled=!redoStack.length}
function markDirty(){
  if(!histSuspend)recordHistory();
  if(!SERVER_OK)return;
  const c=writeBackActive();if(!c)return;
  setSaveState('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{try{await apiPost({op:'upsert',canvas:c});setSaveState('saved')}catch(e){setSaveState('offline')}},800);
}
function saveMeta(){if(!SERVER_OK)return;clearTimeout(metaTimer);metaTimer=setTimeout(async()=>{try{await apiPost({op:'meta',meta:{library:LIBRARY.map(l=>({id:l.id,label:l.label})),activeId,toolbar:TOOLBAR}})}catch(e){}},800)}
function refreshSidebar(){if(typeof renderSidebar==='function')renderSidebar()}
function switchCanvas(id){
  if(id===activeId)return;
  writeBackActive();
  loadCanvas(id);
  refreshSidebar();
  saveMeta();
}
function newCanvas(){
  writeBackActive();
  const n={id:uid('n'),x:80,y:80,title:'시작',desc:'',thumb:null};
  const c={id:uid('c'),title:'새 캔버스',nodes:[n],edges:[],groups:[],view:{tx:30,ty:20,scale:1},updated:stamp()};
  canvases.push(c);activeId=c.id;
  loadCanvas(c.id);refreshSidebar();
  if(SERVER_OK){apiPost({op:'upsert',canvas:c}).then(()=>setSaveState('saved')).catch(()=>setSaveState('offline'));saveMeta()}
  toast('캔버스 추가');
}
function renameCanvas(id,title){
  const c=canvases.find(x=>x.id===id);if(!c)return;
  c.title=(title||'').trim()||'제목없음';c.updated=stamp();
  refreshSidebar();
  if(SERVER_OK)apiPost({op:'upsert',canvas:c}).then(()=>setSaveState('saved')).catch(()=>setSaveState('offline'));
}
function deleteCanvas(id){
  if(canvases.length<=1){toast('마지막 캔버스는 삭제할 수 없어요');return}
  if(!confirm('이 캔버스를 삭제할까요?'))return;
  const wasActive=(id===activeId);
  canvases=canvases.filter(c=>c.id!==id);
  if(wasActive){activeId=canvases[0].id;loadCanvas(activeId)}
  refreshSidebar();
  if(SERVER_OK){apiPost({op:'delete',id}).then(()=>setSaveState('saved')).catch(()=>setSaveState('offline'));saveMeta()}
  toast('캔버스 삭제');
}

/* ---------- node ops ---------- */
function makeNode(x,y,title,type,iconId){const n={id:uid('n'),x,y,title:title||'새 단계',desc:'',thumb:null,type:type||'full'};if(iconId)n.iconId=iconId;state.nodes.push(n);return n}

function addEdge(from,fromSide,to,toSide){if(from===to)return;if(state.edges.some(e=>e.from===from&&e.to===to))return;state.edges.push({id:uid('e'),from,fromSide:fromSide||'right',to,toSide:toSide||'left',style:TOOLBAR.edgeStyle,arrow:TOOLBAR.edgeArrow});markDirty()}
function delEdge(id){state.edges=state.edges.filter(e=>e.id!==id);if(selEdge===id)selEdge=null;paint();markDirty()}
function selectEdge(id){selEdge=id;sel=[];applySel();paint()}

function delNodes(ids){const s=new Set(ids);state.nodes=state.nodes.filter(n=>!s.has(n.id));state.edges=state.edges.filter(e=>!s.has(e.from)&&!s.has(e.to));(state.groups||[]).forEach(g=>g.nodes=g.nodes.filter(i=>!s.has(i)));state.groups=(state.groups||[]).filter(g=>g.nodes.length>0);sel=sel.filter(i=>!s.has(i));render();markDirty()}
function setThumb(id,t){const n=N(id);if(n)n.thumb=t;render();markDirty()}
const parentsOf=id=>state.edges.filter(e=>e.to===id).map(e=>e.from);

function addMiniCenter(){const r=stage.getBoundingClientRect();const p=worldPt(r.left+r.width/2,r.top+r.height/2);const nn=makeNode(p.x-75,p.y-20,'',"mini");render();selectOnly(nn.id);markDirty()}
function makeGroup(){if(sel.length<2)return;state.groups=state.groups||[];state.groups.push({id:uid('g'),nodes:[...sel],title:'그룹'});render();markDirty();toast('그룹 생성')}

/* ---------- stage pointer ---------- */
stage.addEventListener('pointerdown',e=>{
  if(e.target.closest('.group-label,.group-del,.hbar,.hbtn,.hbtn2,.nsw,.elabel'))return;
  if(e.button===1||(spaceDown&&e.button===0)){startPan(e);return}
  if(e.button!==0)return;
  if(mode==='edit'){
    const eh=e.target.closest('.ehandle');if(eh){startEndpoint(eh.dataset.end,e);return}
    const edge=e.target.closest('[data-edge]');if(edge){selectEdge(edge.dataset.edge);return}
    const nodeEl=e.target.closest('.node');if(nodeEl){nodePointerDown(nodeEl.dataset.id,e);return}
    if(e.ctrlKey||e.metaKey||TOOLBAR.selectMode){startMarquee(e);return}
    startPan(e,true);return;
  }
  if(!e.target.closest('.node'))startPan(e);
});
function nodePointerDown(id,e){
  const t=e.target;
  const port=t.closest('[data-act="port"]');
  if(port)return startLink(id,port.dataset.side||'right',e);
  if(t.closest('[data-act]'))return;
  const ed=t.closest('.n-title,.n-desc');
  if(ed&&document.activeElement===ed)return;
  drag={type:'nodePending',id,sx:e.clientX,sy:e.clientY,t};
  window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp);
}
function startPan(e,canClear){drag={type:'pan',sx:e.clientX,sy:e.clientY,otx:view.tx,oty:view.ty,canClear:!!canClear,moved:false};stage.classList.add('panning');window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp)}
function startLink(id,side,e){e.preventDefault();e.stopPropagation();selEdge=null;paint();drag={type:'link',from:id,fromSide:side,sx:e.clientX,sy:e.clientY,moved:false};window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp)}
function startEndpoint(end,e){e.preventDefault();e.stopPropagation();drag={type:'endpoint',end,edge:selEdge,sx:e.clientX,sy:e.clientY,moved:false};window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp)}
function startMarquee(e){drag={type:'marquee',sx:e.clientX,sy:e.clientY,add:e.shiftKey,moved:false};const m=document.getElementById('marquee');m.style.display='block';posMarquee(e.clientX,e.clientY);window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp)}
function posMarquee(cx,cy){const r=stage.getBoundingClientRect(),x=Math.min(drag.sx,cx)-r.left,y=Math.min(drag.sy,cy)-r.top,w=Math.abs(cx-drag.sx),h=Math.abs(cy-drag.sy);const m=document.getElementById('marquee');m.style.left=x+'px';m.style.top=y+'px';m.style.width=w+'px';m.style.height=h+'px'}

function onMove(e){
  if(!drag)return;
  if(drag.type==='pan'){drag.moved=true;view.tx=drag.otx+(e.clientX-drag.sx);view.ty=drag.oty+(e.clientY-drag.sy);applyView();return}
  if(drag.type==='nodePending'){
    if(Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)<4)return;
    drag.type='node';justDragged=true;document.body.style.userSelect='none';
    if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
    if(!sel.includes(drag.id))selectOnly(drag.id);
    drag.origins=sel.map(id=>{const n=N(id);return{id,ox:n.x,oy:n.y}});
    const movingSet=new Set(sel);
    drag.snapX=[];drag.snapY=[];
    state.nodes.forEach(n=>{if(movingSet.has(n.id))return;const w=n._w||W_NODE,h=n._h||90;drag.snapX.push(n.x,n.x+w,n.x+w/2);drag.snapY.push(n.y,n.y+h,n.y+h/2)});
    drag.bbox=(()=>{let a=1e9,b=1e9,c=-1e9,d=-1e9;sel.forEach(id=>{const n=N(id),w=n._w||W_NODE,h=n._h||90;a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x+w);d=Math.max(d,n.y+h)});return{x:a,y:b,w:c-a,h:d-b}})();
  }
  if(drag.type==='node'){
    let dx=(e.clientX-drag.sx)/view.scale,dy=(e.clientY-drag.sy)/view.scale;
    if(TOOLBAR.snap&&drag.snapX){
      const TH=6;
      const bx=drag.bbox.x+dx,bw=drag.bbox.w,by=drag.bbox.y+dy,bh=drag.bbox.h;
      const candX=[bx,bx+bw,bx+bw/2],candY=[by,by+bh,by+bh/2];
      let bestX=null,bestXd=TH;
      candX.forEach(c=>drag.snapX.forEach(t=>{const d=Math.abs(c-t);if(d<bestXd){bestXd=d;bestX={off:t-c,line:t}}}));
      let bestY=null,bestYd=TH;
      candY.forEach(c=>drag.snapY.forEach(t=>{const d=Math.abs(c-t);if(d<bestYd){bestYd=d;bestY={off:t-c,line:t}}}));
      const gv=document.getElementById('snapV'),gh=document.getElementById('snapH');
      if(bestX){dx+=bestX.off;gv.style.display='block';gv.style.left=bestX.line+'px';gv.style.top=(Math.min(by,drag.bbox.y)-400)+'px';gv.style.height='2000px'}else gv.style.display='none';

    }

  }
  if(drag.type==='link'){
    if(!drag.moved&&Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)<6)return;  // 임계 전엔 선 안 그림(클릭 무시)
    drag.moved=true;
    const a=N(drag.from),A=anchor(a,drag.fromSide),p=worldPt(e.clientX,e.clientY),d1=DIR[drag.fromSide],k=70;
    const snap=hi(p,drag.from),end=snap||p;   // 노드 위면 4점 자석으로 흡착
    document.getElementById('tmp').setAttribute('d',`M${A.x},${A.y} C${A.x+d1[0]*k},${A.y+d1[1]*k} ${end.x},${end.y} ${end.x},${end.y}`);return;
  }

    const snap=hi(p,excl),end=snap||p;
    document.getElementById('tmp').setAttribute('d',`M${fixed.x},${fixed.y} C${(fixed.x+end.x)/2},${fixed.y} ${(fixed.x+end.x)/2},${end.y} ${end.x},${end.y}`);return;

function portSnap(n,pt){let best=null,bd=1e9;['top','right','bottom','left'].forEach(s=>{const a=anchor(n,s),d=Math.hypot(a.x-pt.x,a.y-pt.y);if(d<bd){bd=d;best={side:s,x:a.x,y:a.y}}});const c=centerOf(n),w=n._w||W_NODE,h=n._h||90;if(Math.hypot(pt.x-c.x,pt.y-c.y)<Math.min(w,h)*0.30){const s=nearestSide(n,pt),a=anchor(n,s);return{side:'auto',x:a.x,y:a.y}}return best}
function snapAt(pt,exclude){const over=nodeAt(pt);if(!over||over.id===exclude)return null;const s=portSnap(over,pt);return{node:over.id,side:s.side,x:s.x,y:s.y}}
function clearLinkHi(){document.querySelectorAll('.node.linktarget,.node.linkhover').forEach(n=>n.classList.remove('linktarget','linkhover'));document.querySelectorAll('.port.snaptarget').forEach(p=>p.classList.remove('snaptarget'))}
function hi(pt,exclude){clearLinkHi();const snap=snapAt(pt,exclude);if(snap){const el=q(snap.node);if(el){el.classList.add('linktarget','linkhover');if(snap.side!=='auto'){const pe=el.querySelector('.port.'+snap.side);if(pe)pe.classList.add('snaptarget')}}}return snap}

  document.getElementById('tmp').setAttribute('d','');clearLinkHi();

  if(d.type==='nodePending'){if(e.shiftKey)toggleSel(d.id);else selectOnly(d.id);selEdge=null;paint();return}
  if(d.type==='node'){setTimeout(()=>justDragged=false,30);markDirty();return}
  if(d.type==='link'){
    if(!d.moved){return}                    // 포트 클릭만 — 아무 동작 안 함(노드 추가 방지)
    const p=worldPt(e.clientX,e.clientY),snap=snapAt(p,d.from);
    if(snap){addEdge(d.from,d.fromSide,snap.node,snap.side);paint();toast('연결됨')}        // 4점 자석/auto
    else{const nn=makeNode(p.x-W_NODE/2,p.y-30);addEdge(d.from,d.fromSide,nn.id,'auto');render();selectOnly(nn.id);toast('노드 생성·연결')}
    markDirty();return;
  }
  if(d.type==='endpoint'){
    const ed=E(d.edge);if(!ed)return;
    if(!d.moved){return}                     // 핸들 클릭만 — 재연결 안 함
    const p=worldPt(e.clientX,e.clientY),other=d.end==='from'?ed.to:ed.from,snap=snapAt(p,other);

    markDirty();paint();return;
  }
  if(d.type==='marquee'){
    document.getElementById('marquee').style.display='none';

    const a=worldPt(Math.min(d.sx,e.clientX),Math.min(d.sy,e.clientY)),b=worldPt(Math.max(d.sx,e.clientX),Math.max(d.sy,e.clientY));
    const hit=state.nodes.filter(n=>n.x<b.x&&n.x+n._w>a.x&&n.y<b.y&&n.y+(n._h||90)>a.y).map(n=>n.id);
    selEdge=null;setSel(d.add?[...new Set([...sel,...hit])]:hit);paint();
  }
}

/* auto layout */
function autoLayout(dir){
  if(!state.nodes.length)return;measure();
  const layer={},vis={};
  const lay=id=>{if(layer[id]!=null)return layer[id];if(vis[id])return 0;vis[id]=1;const ps=parentsOf(id);let m=0;if(ps.length)m=Math.max(...ps.map(p=>lay(p)+1));layer[id]=m;vis[id]=0;return m};
  state.nodes.forEach(n=>lay(n.id));
  const byL={};state.nodes.forEach(n=>{(byL[layer[n.id]]=byL[layer[n.id]]||[]).push(n)});
  const layers=Object.keys(byL).map(Number).sort((a,b)=>a-b);
  const PAD=40;
  if(dir==='h'){
    layers.forEach(L=>{const col=byL[L].slice().sort((a,b)=>a.y-b.y);let cy=PAD;const x=PAD+L*330;col.forEach(n=>{n.x=x;n.y=cy;cy+=(n._h||90)+38})});
    state.edges.forEach(e=>{e.fromSide='right';e.toSide='left'});
  }else{
    let cy=PAD;layers.forEach(L=>{const row=byL[L].slice().sort((a,b)=>a.x-b.x);let cx=PAD,mh=0;row.forEach(n=>{n.x=cx;n.y=cy;cx+=(n._w||W_NODE)+50;mh=Math.max(mh,n._h||90)});cy+=mh+56});
    state.edges.forEach(e=>{e.fromSide='bottom';e.toSide='top'});
  }
  render();fitView();markDirty();toast(dir==='h'?'가로 정렬':'세로 정렬');
}

function fitView(){if(!state.nodes.length)return;measure();let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;state.nodes.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x+n._w);maxy=Math.max(maxy,n.y+(n._h||90))});const r=stage.getBoundingClientRect(),pad=70,s=Math.min(2.4,Math.max(.3,Math.min((r.width-pad*2)/(maxx-minx),(r.height-pad*2)/(maxy-miny))));view.scale=s;view.tx=pad-minx*s+(r.width-pad*2-(maxx-minx)*s)/2;view.ty=pad-miny*s+(r.height-pad*2-(maxy-miny)*s)/2;applyView()}

const _mctx=document.createElement('canvas').getContext('2d');
function _exX(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function _wrap(text,fontPx,fontW,maxW){_mctx.font=`${fontW} ${fontPx}px Pretendard,sans-serif`;const out=[];(text||'').split('\n').forEach(seg=>{let line='';for(const ch of seg){const t=line+ch;if(_mctx.measureText(t).width>maxW&&line){out.push(line);line=ch}else line=t}out.push(line)});return out}
function _trunc(text,fontPx,fontW,maxW){_mctx.font=`${fontW} ${fontPx}px Pretendard,sans-serif`;let t=text||'';if(_mctx.measureText(t).width<=maxW)return t;while(t&&_mctx.measureText(t+'…').width>maxW)t=t.slice(0,-1);return t+'…'}
function _txt(s,x,y,sz,wt,col,anc){return`<text x="${x}" y="${y}" font-family="Pretendard,-apple-system,'Malgun Gothic',sans-serif" font-size="${sz}" font-weight="${wt}" fill="${col}"${anc?` text-anchor="${anc}"`:''}>${_exX(s)}</text>`}
function _exColors(){const cs=getComputedStyle(document.documentElement),V=k=>cs.getPropertyValue(k).trim();return{bg:V('--bg'),surface:V('--surface'),raised:V('--raised'),line:V('--line'),txt:V('--txt'),muted:V('--muted'),gold:V('--gold'),edge:V('--edge')}}
function _svgNode(n,C){
  const t=n.type||'full',w=n._w||W_NODE,h=n._h||90,x=n.x,y=n.y,pad=13,bg=n.bg||C.surface;
  let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="13" fill="${bg}" stroke="${C.line}" stroke-width="1.5"/>`;
  if(t==='icon'){const ic=ICONS[n.iconId]||'';s+=`<g transform="translate(${x+w/2-19},${y+12}) scale(1.58)" fill="none" stroke="${C.gold}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">${ic}</g>`;s+=_txt(_trunc(n.title||'',12,600,w-12),x+w/2,y+h-12,12,600,C.txt,'middle');return s}
  if(t==='mini'){s+=_txt(_trunc(n.title||'',12.5,700,w-pad*2),x+pad,y+h/2+4,12.5,700,C.txt);return s}
  let ty=y+pad+12;
  _wrap(n.title||'',14,700,w-pad*2).forEach(ln=>{s+=_txt(ln,x+pad,ty,14,700,C.txt);ty+=18});
  if(n.desc){ty+=2;_wrap(n.desc,11.5,400,w-pad*2).forEach(ln=>{s+=_txt(ln,x+pad,ty,11.5,400,C.muted);ty+=16})}
  if(n.thumb){const src=imgSrc(n.thumb.imgId);if(src){const iy=ty+4,iw=w-pad*2,ih=Math.max(34,(y+h-pad)-iy);if(ih>20){s+=`<clipPath id="exc-${n.id}"><rect x="${x+pad}" y="${iy}" width="${iw}" height="${ih}" rx="9"/></clipPath><image xlink:href="${src}" x="${x+pad}" y="${iy}" width="${iw}" height="${ih}" preserveAspectRatio="xMidYMid slice" clip-path="url(#exc-${n.id})"/>`}}}
  return s;
}
function buildSVG(){
  measure();const C=_exColors(),PAD=64;
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  state.nodes.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x+(n._w||W_NODE));maxy=Math.max(maxy,n.y+(n._h||90))});
  (state.groups||[]).forEach(g=>g.nodes.map(N).filter(Boolean).forEach(n=>{minx=Math.min(minx,n.x-20);miny=Math.min(miny,n.y-34);maxx=Math.max(maxx,n.x+n._w+20);maxy=Math.max(maxy,n.y+(n._h||90)+20)}));
  if(!isFinite(minx)){minx=0;miny=0;maxx=400;maxy=300}
  const W=Math.round(maxx-minx+PAD*2),H=Math.round(maxy-miny+PAD*2),ox=PAD-minx,oy=PAD-miny;
  let body='';
  (state.groups||[]).forEach(g=>{const ns=g.nodes.map(N).filter(Boolean);if(!ns.length)return;let a=1e9,b=1e9,c=-1e9,d=-1e9;ns.forEach(n=>{a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x+n._w);d=Math.max(d,n.y+(n._h||90))});const p=18;body+=`<rect x="${a-p}" y="${b-p}" width="${c-a+p*2}" height="${d-b+p*2}" rx="16" fill="none" stroke="${C.line}" stroke-dasharray="6 5"/>`+_txt(g.title,a-p+4,b-p-7,12,600,C.muted)});
  state.edges.forEach(e=>{const g=edgeGeo(e);if(!g)return;const sw=EWIDTHS[e.width||2],dash=e.style==='dashed'?' stroke-dasharray="7 5"':'',mk=e.arrow!==false?' marker-start="url(#exdot)" marker-end="url(#exarw)"':'';body+=`<path d="${g.d}" fill="none" stroke="${C.edge}" stroke-width="${sw}"${dash}${mk}/>`;if(e.label){const mx=(g.A.x+g.B.x)/2,my=(g.A.y+g.B.y)/2;_mctx.font='600 11px Pretendard,sans-serif';const tw=_mctx.measureText(e.label).width;body+=`<rect x="${mx-tw/2-7}" y="${my-10}" width="${tw+14}" height="20" rx="6" fill="${C.raised}" stroke="${C.line}"/>`+_txt(e.label,mx,my+4,11,600,C.txt,'middle')}});
  state.nodes.forEach(n=>{body+=_svgNode(n,C)});
  const defs=`<defs><marker id="exarw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="${C.edge}"/></marker><marker id="exdot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto"><circle cx="5" cy="5" r="3.5" fill="${C.edge}"/></marker></defs>`;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="${canvasBg||C.bg}"/>${defs}<g transform="translate(${ox},${oy})">${body}</g></svg>`;
  return{svg,w:W,h:H};
}
function _dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}
function exportSVG(){const{svg}=buildSVG();_dl(new Blob([svg],{type:'image/svg+xml;charset=utf-8'}),'scoopboard.svg');toast('SVG 내보냄')}
function exportPNG(){const{svg,w,h}=buildSVG();const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml;charset=utf-8'})),img=new Image();
  img.onload=()=>{const sc=2,cv=document.createElement('canvas');cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);const cx=cv.getContext('2d');cx.scale(sc,sc);cx.drawImage(img,0,0);URL.revokeObjectURL(url);try{cv.toBlob(b=>{b?(_dl(b,'scoopboard.png'),toast('PNG 내보냄')):toast('PNG 변환 실패')},'image/png')}catch(err){toast('PNG 변환 실패')}};
  img.onerror=()=>{URL.revokeObjectURL(url);toast('PNG 변환 실패')};img.src=url}
function toggleExportPop(e){if(e)e.stopPropagation();closeMenus('exPop');const el=document.getElementById('exPop'),b=document.getElementById('exBtn'),open=el.classList.toggle('open');if(open&&b){const r=b.getBoundingClientRect();el.style.top=(r.bottom+6)+'px';el.style.right=(window.innerWidth-r.right)+'px'}}
function closeMenus(except){['exPop','bgPop'].forEach(id=>{if(id!==except){const el=document.getElementById(id);if(el)el.classList.remove('open')}})}
document.getElementById('impFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
  if(d.images&&typeof d.images==='object')Object.assign(IMAGES,d.images);
  if(d.toolbar&&typeof d.toolbar==='object'){Object.assign(TOOLBAR,d.toolbar);renderToolbar()}
  if(d.library)LIBRARY.length=0,d.library.forEach(x=>LIBRARY.push({id:x.id,label:x.label}));
  if(Array.isArray(d.canvases)&&d.canvases.length){canvases=d.canvases;activeId=(d.activeId&&canvases.some(c=>c.id===d.activeId))?d.activeId:canvases[0].id}
  else{const st=d.state||d;if(!st.groups)st.groups=[];const c={id:uid('c'),title:'불러온 캔버스',nodes:st.nodes||[],edges:st.edges||[],groups:st.groups||[],view:d.view||{tx:30,ty:20,scale:1},updated:stamp()};canvases=[c];activeId=c.id}
  canvases.forEach(c=>{(c.nodes||[]).forEach(n=>{n.thumb=(n.thumb&&n.thumb.imgId)?{imgId:n.thumb.imgId,label:n.thumb.label}:null})});
  loadCanvas(activeId);refreshSidebar();
  if(SERVER_OK){Promise.all(Object.keys(d.images||{}).map(k=>apiPost({op:'putimg',id:k,src:d.images[k]}).catch(()=>{}))).then(()=>apiPost({op:'replace',doc:{canvases,meta:{library:LIBRARY.map(l=>({id:l.id,label:l.label})),activeId,toolbar:TOOLBAR}}})).then(()=>setSaveState('saved')).catch(()=>setSaveState('offline'))}
  toast('불러오기 완료')}catch(err){toast('JSON 형식 오류')}};r.readAsText(f);e.target.value=''});
function resetAll(){if(confirm('모든 캔버스를 기본 구성으로 초기화할까요?')){Object.keys(IMAGES).forEach(k=>delete IMAGES[k]);LIBRARY.forEach(l=>{if(l.src)IMAGES[l.id]=l.src});const c=seedCanvas();canvases=[c];activeId=c.id;loadCanvas(c.id);refreshSidebar();if(SERVER_OK){apiPost({op:'replace',doc:{canvases,meta:{library:LIBRARY.map(l=>({id:l.id,label:l.label})),activeId,toolbar:TOOLBAR}}}).then(()=>setSaveState('saved')).catch(()=>setSaveState('offline'))}toast('초기화됨')}}

/* lightbox / toast */
function zoom(id){if(justDragged)return;const n=N(id);if(n&&n.thumb){document.getElementById('lbimg').src=imgSrc(n.thumb.imgId);document.getElementById('lb').classList.add('on')}}
function closeZoom(){document.getElementById('lb').classList.remove('on')}
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),1500)}

function seedCanvas(title){
  const ds=defaultState();
  return {id:uid('c'),title:title||'VDI 접속 흐름',nodes:ds.nodes,edges:ds.edges,groups:ds.groups,view:{tx:30,ty:20,scale:1},updated:stamp()};
}
async function boot(){
  try{
    const doc=await apiGet();
    SERVER_OK=true;
    await loadImages();
    if(doc&&Array.isArray(doc.canvases)&&doc.canvases.length){
      canvases=doc.canvases;
      if(doc.meta&&Array.isArray(doc.meta.library)){LIBRARY.length=0;doc.meta.library.forEach(x=>LIBRARY.push(x))}
      if(doc.meta&&doc.meta.toolbar)Object.assign(TOOLBAR,doc.meta.toolbar);
      activeId=(doc.meta&&doc.meta.activeId&&canvases.some(c=>c.id===doc.meta.activeId))?doc.meta.activeId:canvases[0].id;
      loadCanvas(activeId);
      setSaveState('saved');
    }else{
      const c=seedCanvas();canvases=[c];activeId=c.id;loadCanvas(c.id);
      try{await apiPost({op:'replace',doc:{canvases,meta:{library:LIBRARY.map(l=>({id:l.id,label:l.label})),activeId,toolbar:TOOLBAR}}});setSaveState('saved')}catch(e){setSaveState('offline')}
    }
  }catch(e){
    SERVER_OK=false;
    const c=seedCanvas();canvases=[c];activeId=c.id;loadCanvas(c.id);
    setSaveState('offline');
  }
  if(typeof renderSidebar==='function')renderSidebar();
  renderToolbar();
  renderPalette();
}
boot();
</script>
