<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 공지 등록</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 폼 행 (incident-new/apply와 동일 패턴) */
  .frow { display: grid; grid-template-columns: 150px 1fr; gap: 18px; align-items: start; padding: 15px 0; border-bottom: 1px solid var(--border); }
  .frow:first-child { padding-top: 4px; }
  .frow:last-child { padding-bottom: 4px; border-bottom: none; }
  .frow-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); padding-top: 9px; display: flex; align-items: center; gap: 5px; }
  .frow-field { min-width: 0; }
  .frow-help { font-size: 12.5px; color: var(--text-tertiary); margin-top: 7px; line-height: 1.5; }
  .fi.full, .fs.full, .fta.full { width: 100%; }
  .info-text { font-size: 14.5px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; padding: 6px 0 6px 2px; }

  /* 포탈 노출 토글 */
  .expose-toggle { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--border-strong);
    border-radius: 12px; background: var(--surface-2); cursor: pointer; transition: all 0.14s; }
  .expose-toggle:hover { border-color: var(--kb-yellow-dark); }
  .expose-toggle.on { border-color: var(--kb-yellow-dark); background: var(--kb-yellow-soft); }
  .expose-toggle input { width: 18px; height: 18px; accent-color: var(--kb-yellow-dark); margin: 1px 0 0; flex-shrink: 0; cursor: pointer; }
  .et-text b { display: block; font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .et-text i { display: block; font-size: 12.5px; color: var(--text-tertiary); font-style: normal; margin-top: 3px; line-height: 1.5; }

  @media (max-width: 760px) {
    .frow { grid-template-columns: 1fr; gap: 8px; }
    .frow-label { padding-top: 0; }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header" data-header></header>

<div class="layout">

  <!-- SIDEBAR (부모: 공지사항 active) -->
  <aside class="sidebar" data-sidebar="notice"></aside>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <a href="notice.html">공지사항</a>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-secondary);font-weight:600">공지 등록</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">공지 등록</h1>
        <p class="page-desc">사용자에게 안내할 공지를 등록합니다. 등록된 공지는 공지사항 목록 최상단에 표시됩니다.</p>
      </div>
      <div class="page-header-right">
        <a class="btn btn-outline" href="notice.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          공지 목록
        </a>
      </div>
    </div>

    <!-- 섹션 1: 공지 내용 -->
    <div class="fc reveal" style="animation-delay:.14s">
      <div class="fc-head">
        <div class="fc-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          공지 내용
        </div>
        <div class="fc-ctrl"></div>
      </div>
      <div class="fc-body">
        <div class="frow">
          <div class="frow-label">제목 <span class="req">*</span></div>
          <div class="frow-field">
            <input class="fi full" id="f_title" placeholder="공지 제목을 입력해주세요. (예: [정기점검] 06.15(일) VDI 인프라 정기 점검 안내)">
          </div>
        </div>
        <div class="frow">
          <div class="frow-label">분류</div>
          <div class="frow-field">
            <select class="fs" id="f_cat" style="max-width:280px;width:100%">
              <option>운영 안내</option>
              <option>시스템 점검</option>
              <option>보안</option>
              <option>업데이트 · 배포</option>
              <option>기타</option>
            </select>
            <div class="frow-help">분류는 운영 관리용이며, 사용자 목록에는 제목·작성자·등록일만 표시됩니다.</div>
          </div>
        </div>
        <div class="frow">
          <div class="frow-label">본문 <span class="req">*</span></div>
          <div class="frow-field">
            <textarea class="fta full" id="f_body" rows="8" placeholder="공지 본문을 입력해주세요. 점검·작업 시간, 영향 범위, 사용자 조치사항, 문의처 등을 구체적으로 안내하면 좋습니다."></textarea>
          </div>
        </div>
        <div class="frow">
          <div class="frow-label">작성자</div>
          <div class="frow-field">
            <div class="info-text">관리자 (VDI 운영팀)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 섹션 2: 포탈 노출 -->
    <div class="fc reveal" style="animation-delay:.18s">
      <div class="fc-head">
        <div class="fc-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          포탈 노출
        </div>
        <div class="fc-ctrl"></div>
      </div>
      <div class="fc-body">
        <label class="expose-toggle" id="exposeToggle">
          <input type="checkbox" id="f_expose">
          <span class="et-text">
            <b>포탈 메인 하단에 노출</b>
            <i>체크하면 이 공지가 포탈 첫 화면(내 가상PC) 하단 안내 영역에 표시됩니다. 노출은 <strong>1건만</strong> 가능하며, 기존 노출 공지는 자동 해제됩니다.</i>
          </span>
        </label>
      </div>
    </div>

    <!-- 액션 바 -->
    <div class="action-bar reveal">
      <div class="action-hint">필수 항목(<span class="req">*</span>)을 입력하면 공지를 등록할 수 있습니다.</div>
      <div class="action-btns">
        <button class="btn btn-outline" onclick="location.href='notice.html'">취소</button>
        <button class="btn btn-primary" onclick="submitNotice()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          공지 등록
        </button>
      </div>
    </div>

  </main>
</div>

<script src="common.js"></script>
<script>
  const $ = id => document.getElementById(id);

  // ===== 포탈 노출 토글 시각 상태 =====
  const exposeToggle = $('exposeToggle'), fExpose = $('f_expose');
  fExpose.addEventListener('change', () => exposeToggle.classList.toggle('on', fExpose.checked));

  // ===== 등록 =====
  function submitNotice() {
    if (!$('f_title').value.trim()) { showToast('공지 제목을 입력해주세요.'); return; }
    if (!$('f_body').value.trim())  { showToast('공지 본문을 입력해주세요.'); return; }
    const msg = fExpose.checked
      ? '공지가 등록되었습니다. 포탈 메인 하단에 노출됩니다.'
      : '공지가 등록되었습니다.';
    showToast(msg);
    setTimeout(() => location.href = 'notice.html', 1600);
  }
</script>
</body>
</html>
