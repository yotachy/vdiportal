<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 자료실</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 920px; margin: 0 auto; }

  /* 다운로드 섹션 (.fc 컨테이너 안에 헤더 + 링크 리스트) */
  .dl-section { margin-bottom: 16px; scroll-margin-top: 84px; }
  .dl-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .dl-head-ico { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: var(--kb-yellow-soft); color: var(--kb-yellow-dark); }
  .dl-head-ico svg { width: 18px; height: 18px; }
  .dl-head-title { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
  .dl-head-count { font-size: 12px; font-weight: 700; color: var(--text-tertiary); background: var(--bg-subtle);
    border-radius: 10px; padding: 1px 9px; min-width: 22px; text-align: center; }

  /* 링크(다운로드) 행 — 카드형 X, 리스트 행 */
  .dl-row { display: flex; align-items: center; gap: 15px; padding: 14px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.12s; text-decoration: none; }
  .dl-row:last-child { border-bottom: none; }
  .dl-row:hover { background: var(--surface-2); }
  .dl-badge { width: 44px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 800; letter-spacing: -0.02em; }
  .dl-main { flex: 1; min-width: 0; }
  .dl-name { display: block; font-size: 14.5px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-desc { display: block; font-size: 12.5px; color: var(--text-tertiary); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-meta { font-size: 12.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
  .dl-meta i { color: var(--border-strong); font-style: normal; margin: 0 6px; }
  .dl-act { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 13px; border-radius: 8px; flex-shrink: 0;
    border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--text-secondary);
    font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; transition: all 0.14s; }
  .dl-act svg { width: 15px; height: 15px; }
  .dl-row:hover .dl-act { background: var(--kb-yellow); border-color: var(--kb-yellow); color: var(--ink); }

  /* 딥링크 진입 시 잠깐 강조 */
  .dl-section.flash { animation: dlFlash 1.6s ease; }
  @keyframes dlFlash {
    0% { box-shadow: 0 0 0 0 rgba(255,188,0,0); }
    18% { box-shadow: 0 0 0 3px rgba(255,188,0,.55); }
    100% { box-shadow: 0 0 0 0 rgba(255,188,0,0); }
  }

  @media (max-width: 640px) {
    .dl-meta { display: none; }
    .dl-row { gap: 12px; padding: 13px 16px; }
    .dl-head { padding: 14px 16px; }
  }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header" data-header></header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" data-sidebar="qna"></aside>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-secondary);font-weight:600">자료실</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">자료실</h1>
        <p class="page-desc">VDI 이용에 필요한 설치 파일·매뉴얼·신청 서식·정책 자료를 내려받을 수 있습니다.</p>
      </div>
      <div class="page-header-right">
        <button type="button" class="btn btn-admin admin-only" onclick="showToast('자료 등록 화면으로 이동합니다. (관리자 전용)')" title="관리자 전용">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          자료 등록
        </button>
      </div>
    </div>

    <div id="sections"></div>

  </main>
</div>
<script src="common.js"></script>
<script>
  // ===== 파일 유형 → 배지 색/라벨 =====
  const TYPE = {
    pdf:  { color: '#D93B30', label: 'PDF' },
    exe:  { color: '#6B7280', label: 'EXE' },
    zip:  { color: '#8B5CF6', label: 'ZIP' },
    hwp:  { color: '#1A6BD4', label: 'HWP' },
    xlsx: { color: '#1E8E3E', label: 'XLS' }
  };

  // 섹션 아이콘
  const SEC_ICON = {
    install: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    manual:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    form:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    policy:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
  };

  // ===== 제공 자료 (섹션별, 총 9건) =====
  const SECTIONS = [
    { id: 'install', title: '설치 프로그램', items: [
      { type: 'exe', name: 'Citrix Workspace 설치파일',   desc: 'VDI 접속용 표준 클라이언트 · Windows',  file: 'CitrixWorkspace_설치파일.exe',   size: '78.5 MB', date: '2026.05.26' },
      { type: 'zip', name: 'VDI 접속프로그램 패키지',       desc: '접속에 필요한 설치 파일 일괄 패키지',     file: 'VDI_접속프로그램_패키지.zip',    size: '92.3 MB', date: '2026.05.10' }
    ]},
    { id: 'manual', title: '사용자 매뉴얼', items: [
      { type: 'pdf', name: 'VDI 사용자 매뉴얼 v2.0',        desc: '전체 기능 안내서 (최신판)',              file: 'VDI_사용자매뉴얼_v2.0.pdf',      size: '4.2 MB',  date: '2026.05.20' },
      { type: 'pdf', name: 'VDI 빠른시작 가이드',           desc: '최초 접속 · 기본 사용법 요약',           file: 'VDI_빠른시작_가이드.pdf',        size: '1.1 MB',  date: '2026.05.18' },
      { type: 'pdf', name: '원격접속 설정 가이드',          desc: '사외 원격근무 환경 설정 절차',           file: '원격접속_설정_가이드.pdf',       size: '880 KB',  date: '2026.04.30' }
    ]},
    { id: 'form', title: '신청 서식', items: [
      { type: 'hwp',  name: 'VDI 추가신청서',               desc: '신규 가상PC 신청 양식',                 file: 'VDI_추가신청서.hwp',             size: '64 KB',   date: '2026.05.02' },
      { type: 'xlsx', name: '자원증설 신청서',              desc: 'CPU · 메모리 · 디스크 증설 양식',       file: '자원증설_신청서.xlsx',           size: '48 KB',   date: '2026.05.02' }
    ]},
    { id: 'policy', title: '정책 · 보안', items: [
      { type: 'pdf', name: 'VDI 보안 이용수칙',             desc: '필수 준수 보안 정책',                   file: 'VDI_보안_이용수칙.pdf',          size: '320 KB',  date: '2026.05.28' },
      { type: 'pdf', name: '데이터 백업 정책',              desc: 'D드라이브 백업 · 보존 기준',            file: '데이터_백업_정책.pdf',           size: '256 KB',  date: '2026.04.18' }
    ]}
  ];

  const $ = id => document.getElementById(id);
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const DL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function rowHtml(it) {
    const t = TYPE[it.type];
    return `
      <div class="dl-row" onclick="download('${esc(it.file)}')" title="${esc(it.file)}">
        <span class="dl-badge" style="background:${t.color}">${t.label}</span>
        <span class="dl-main">
          <span class="dl-name">${esc(it.name)}</span>
          <span class="dl-desc">${esc(it.desc)}</span>
        </span>
        <span class="dl-meta">${it.size}<i>·</i>${it.date}</span>
        <span class="dl-act">${DL_SVG} 다운로드</span>
      </div>`;
  }

  function render() {
    $('sections').innerHTML = SECTIONS.map((s, i) => `
      <section class="fc dl-section reveal" id="sec-${s.id}" style="animation-delay:${(0.1 + i * 0.04).toFixed(2)}s">
        <div class="dl-head">
          <span class="dl-head-ico">${SEC_ICON[s.id] || ''}</span>
          <span class="dl-head-title">${s.title}</span>
          <span class="dl-head-count">${s.items.length}</span>
        </div>
        ${s.items.map(rowHtml).join('')}
      </section>`).join('');
  }

  function download(file) {
    showToast('파일을 다운로드합니다: ' + file);
  }

  render();

  // 딥링크: portal 등에서 ?cat=manual / install 로 진입 시 해당 섹션으로 이동 + 강조
  const cat = new URLSearchParams(location.search).get('cat');
  if (cat) {
    const el = $('sec-' + cat);
    if (el) {
      requestAnimationFrame(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 1600);
      });
    }
  }
</script>
</body>
</html>
