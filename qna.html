<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - 자료실</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* 다운로드 섹션 (.fc 컨테이너 안에 헤더 + 링크 리스트) */
  /* 섹션 2개를 넓은 폭에 2단으로 배치 (좁아지면 1단) */
  #sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); gap: 18px; align-items: start; }
  #sections .fc { margin-bottom: 0; }
  .dl-section { scroll-margin-top: 84px; }
  .dl-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .dl-head-ico { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: var(--kb-yellow-soft); color: var(--kb-yellow-dark); }
  .dl-head-ico svg { width: 18px; height: 18px; }
  .dl-head-title { font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }

  /* 링크(다운로드) 행 — 리스트 행 */
  .dl-row { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.12s; text-decoration: none; }
  .dl-row:last-child { border-bottom: none; }
  .dl-row:hover { background: var(--surface-2); }
  .dl-badge { width: 44px; height: 30px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 800; letter-spacing: -0.02em; }
  .dl-name { flex: 1; min-width: 0; font-size: 14.5px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-meta { font-size: 12.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
  .dl-meta i { color: var(--border-strong); font-style: normal; margin: 0 6px; }
  .dl-act { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 13px; border-radius: 8px; flex-shrink: 0;
    border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--text-secondary);
    font-size: 12.5px; font-weight: 700; letter-spacing: -0.01em; transition: all 0.14s; }
  .dl-act svg { width: 15px; height: 15px; }
  .dl-row:hover .dl-act { background: var(--kb-yellow); border-color: var(--kb-yellow); color: var(--ink); }

  /* 관리자 — 항목 수정 */
  .dl-edit { width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--text-tertiary); cursor: pointer; transition: all 0.14s; }
  .dl-edit:hover { border-color: var(--kb-yellow-dark); color: var(--ink); background: var(--kb-yellow-soft); }
  .dl-edit svg { width: 15px; height: 15px; }

  /* 관리자 모달 폼 */
  .dl-form-row { margin-bottom: 14px; }
  .dl-form-row:last-child { margin-bottom: 0; }
  .dl-form-row .lbl { margin-bottom: 6px; }

  /* 파일 업로드 컨트롤 */
  .dl-upload { display: flex; align-items: center; gap: 11px; }
  .dl-upload-btn { display: inline-flex; align-items: center; gap: 7px; height: 40px; padding: 0 15px; border-radius: 9px; flex-shrink: 0;
    border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--text-secondary);
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.14s; }
  .dl-upload-btn:hover { border-color: var(--kb-yellow-dark); color: var(--ink); background: var(--kb-yellow-soft); }
  .dl-upload-btn svg { width: 15px; height: 15px; }
  .dl-file-info { min-width: 0; font-size: 13px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-file-info.has { color: var(--text-primary); font-weight: 600; }
  .dl-file-info b { color: var(--text-tertiary); font-weight: 600; margin-left: 6px; font-variant-numeric: tabular-nums; }


  @media (max-width: 640px) {
    .dl-meta { display: none; }
    .dl-row { gap: 12px; padding: 14px 16px; }
    .dl-head { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header class="top-header" data-header></header>

<div class="layout">

  <aside class="sidebar" data-sidebar="qna"></aside>

  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <span class="bc-cur">자료실</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">자료실</h1>
        <p class="page-desc">VDI 이용에 필요한 설치 파일과 사용자 매뉴얼을 내려받을 수 있습니다.</p>
      </div>
      <div class="page-header-right">
        <button type="button" class="btn btn-admin admin-only" onclick="openDlModal()" title="관리자 전용">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          자료 추가
        </button>
      </div>
    </div>

    <div id="sections"></div>

  </main>
</div>

<!-- 자료 추가/수정 모달 (관리자 전용) -->
<div class="modal" id="dlModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDlModal()" aria-label="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title" id="dlModalTitle">자료 추가</div>
    <div class="modal-meta">자료실에 게시할 파일 정보를 입력합니다. (관리자 전용)</div>
    <div class="modal-body">
      <div class="dl-form-row">
        <div class="lbl">분류 <span class="req">*</span></div>
        <select class="fs" id="fSec">
          <option value="install">설치 프로그램</option>
          <option value="manual">사용자 매뉴얼</option>
        </select>
      </div>
      <div class="dl-form-row">
        <div class="lbl">제목 <span class="req">*</span></div>
        <input class="fi" id="fName" placeholder="자료 제목을 입력하세요">
      </div>
      <div class="dl-form-row">
        <div class="lbl">파일 유형 <span class="req">*</span></div>
        <select class="fs" id="fType">
          <option value="pdf">PDF 문서</option>
          <option value="exe">실행 파일 (EXE)</option>
          <option value="zip">압축 파일 (ZIP)</option>
          <option value="hwp">한글 문서 (HWP)</option>
          <option value="doc">워드 문서 (DOC)</option>
          <option value="xlsx">엑셀 문서 (XLSX)</option>
          <option value="ppt">파워포인트 (PPT)</option>
          <option value="etc">기타 파일</option>
        </select>
      </div>
      <div class="dl-form-row">
        <div class="lbl">파일 <span class="req">*</span></div>
        <div class="dl-upload">
          <input type="file" id="fUpload" hidden onchange="onFilePick(this)">
          <button type="button" class="dl-upload-btn" onclick="document.getElementById('fUpload').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            파일 선택
          </button>
          <div class="dl-file-info" id="fFileInfo">선택된 파일 없음</div>
        </div>
        <div class="frow-help" style="font-size:12px;color:var(--text-tertiary);margin-top:8px">용량과 등록일은 업로드 시 자동으로 처리됩니다.</div>
      </div>
    </div>
    <div class="action-btns" style="margin-top:22px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeDlModal()">취소</button>
      <button class="btn btn-primary" onclick="saveDl()">저장</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
  // ===== 파일 유형 → 배지 색/라벨 =====
  // 파일 유형 식별색은 각 포맷 고유색(PDF·Word·PPT 등)이라 디자인 토큰 예외로 직접 지정한다.
  const TYPE = {
    pdf:  { color: '#D93B30', label: 'PDF' },
    exe:  { color: '#6B7280', label: 'EXE' },
    zip:  { color: '#8B5CF6', label: 'ZIP' },
    hwp:  { color: '#1A6BD4', label: 'HWP' },
    xlsx: { color: '#1E8E3E', label: 'XLS' },
    doc:  { color: '#2B579A', label: 'DOC' },
    ppt:  { color: '#E08600', label: 'PPT' },
    etc:  { color: '#64748B', label: 'FILE' }
  };

  const SEC_ICON = {
    install: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    manual:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'
  };

  // ===== 제공 자료 (섹션별) =====
  const SECTIONS = [
    { id: 'install', title: '설치 프로그램', items: [
      { type: 'exe', name: 'Citrix Workspace 설치파일',   file: 'CitrixWorkspace_설치파일.exe',   size: '78.5 MB', date: '2026.05.26' },
      { type: 'zip', name: 'VDI 접속프로그램 패키지',       file: 'VDI_접속프로그램_패키지.zip',    size: '92.3 MB', date: '2026.05.10' }
    ]},
    { id: 'manual', title: '사용자 매뉴얼', items: [
      { type: 'pdf', name: 'VDI 사용자 매뉴얼 v2.0',        file: 'VDI_사용자매뉴얼_v2.0.pdf',      size: '4.2 MB',  date: '2026.05.20' },
      { type: 'pdf', name: 'VDI 빠른시작 가이드',           file: 'VDI_빠른시작_가이드.pdf',        size: '1.1 MB',  date: '2026.05.18' },
      { type: 'pdf', name: '원격접속 설정 가이드',          file: '원격접속_설정_가이드.pdf',       size: '0.9 MB',  date: '2026.04.30' }
    ]}
  ];

  const $ = id => document.getElementById(id);
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let admin = document.body.classList.contains('admin-mode');
  let editRef = null;   // null = 추가, { s, i } = 수정

  const DL_SVG   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  const EDIT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>';

  function rowHtml(it, si, ii) {
    const t = TYPE[it.type] || { color: '#6B7280', label: '파일' };
    return `
      <div class="dl-row" onclick="download('${esc(it.file)}')" title="${esc(it.file)}">
        <span class="dl-badge" style="background:${t.color}">${t.label}</span>
        <span class="dl-name">${esc(it.name)}</span>
        <span class="dl-meta">${it.size}<i>·</i>${it.date}</span>
        <span class="dl-act">${DL_SVG} 다운로드</span>
        ${admin ? `<button class="dl-edit" title="수정" onclick="event.stopPropagation();openDlModal(${si},${ii})">${EDIT_SVG}</button>` : ''}
      </div>`;
  }

  function render() {
    $('sections').innerHTML = SECTIONS.map((s, si) => `
      <section class="fc dl-section reveal" id="sec-${s.id}" style="animation-delay:.1s">
        <div class="dl-head">
          <span class="dl-head-ico">${SEC_ICON[s.id] || ''}</span>
          <span class="dl-head-title">${s.title}</span>
        </div>
        ${s.items.map((it, ii) => rowHtml(it, si, ii)).join('')
          || '<div style="padding:22px 20px;color:var(--text-tertiary);font-size:13.5px">등록된 자료가 없습니다.</div>'}
      </section>`).join('');
  }

  function download(file) {
    showToast('파일을 다운로드합니다: ' + file);
  }

  // ===== 관리자 — 추가/수정 =====
  function secIndexById(id) { return SECTIONS.findIndex(s => s.id === id); }

  // 업로드 파일 → 확장자로 유형 자동 추정
  const EXT_TYPE = { pdf: 'pdf', exe: 'exe', zip: 'zip', hwp: 'hwp', doc: 'doc', docx: 'doc',
    xls: 'xlsx', xlsx: 'xlsx', ppt: 'ppt', pptx: 'ppt' };
  function bytesToMB(bytes) {
    const mb = bytes / (1024 * 1024);
    return (mb >= 0.1 ? mb : 0.1).toFixed(1) + ' MB';   // 용량 자동 (MB 단위)
  }
  function todayStr() {
    const d = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '.' + mm + '.' + dd;        // 등록일 = 오늘
  }

  let pendingFile = null;   // { file, size } — 업로드(또는 수정 시 기존) 파일 정보

  function showFileInfo() {
    const el = $('fFileInfo');
    if (pendingFile) {
      el.classList.add('has');
      el.innerHTML = esc(pendingFile.file) + '<b>' + pendingFile.size + '</b>';
    } else {
      el.classList.remove('has');
      el.textContent = '선택된 파일 없음';
    }
  }

  // 파일 선택 → 파일명·용량 자동 반영, 유형 확장자로 자동 추정
  function onFilePick(input) {
    const f = input.files && input.files[0];
    if (!f) return;
    pendingFile = { file: f.name, size: bytesToMB(f.size) };
    const ext = (f.name.split('.').pop() || '').toLowerCase();
    $('fType').value = EXT_TYPE[ext] || 'etc';
    showFileInfo();
  }

  function openDlModal(s, i) {
    $('fUpload').value = '';
    if (typeof i === 'number') {                 // 수정
      editRef = { s, i };
      const it = SECTIONS[s].items[i];
      $('dlModalTitle').textContent = '자료 수정';
      $('fSec').value = SECTIONS[s].id;
      $('fName').value = it.name;
      $('fType').value = it.type;
      pendingFile = { file: it.file, size: it.size };   // 기존 파일 유지(재업로드 시 교체)
    } else {                                     // 추가
      editRef = null;
      $('dlModalTitle').textContent = '자료 추가';
      $('fSec').value = 'install';
      $('fName').value = '';
      $('fType').value = 'pdf';
      pendingFile = null;
    }
    showFileInfo();
    $('dlModal').classList.add('open');
    setTimeout(() => $('fName').focus(), 50);
  }
  function closeDlModal() { $('dlModal').classList.remove('open'); }

  function saveDl() {
    const name = $('fName').value.trim();
    if (!name) { showToast('제목을 입력해주세요.'); return; }
    if (!pendingFile) { showToast('파일을 선택해주세요.'); return; }
    const prev = editRef ? SECTIONS[editRef.s].items[editRef.i] : null;
    const item = {
      type: $('fType').value,
      name,
      file: pendingFile.file,
      size: pendingFile.size,                  // 업로드 시 자동 산정된 용량
      date: prev ? prev.date : todayStr()      // 수정은 기존 등록일 유지, 추가는 오늘
    };
    const target = secIndexById($('fSec').value);
    if (editRef) {
      if (editRef.s === target) {
        SECTIONS[target].items[editRef.i] = item;
      } else {                                 // 분류 변경 시 이동
        SECTIONS[editRef.s].items.splice(editRef.i, 1);
        SECTIONS[target].items.push(item);
      }
      showToast('자료가 수정되었습니다.');
    } else {
      SECTIONS[target].items.push(item);
      showToast('자료가 추가되었습니다.');
    }
    closeDlModal();
    render();
  }

  // 모달 배경 클릭 시 닫기
  $('dlModal').addEventListener('click', e => { if (e.target === $('dlModal')) closeDlModal(); });

  // 관리자 권한 토글 시 추가/수정 버튼 노출 갱신
  window.onAdminModeChange = function (on) { admin = on; render(); };

  render();
</script>
</body>
</html>
