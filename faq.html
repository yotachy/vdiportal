<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KB손해보험 VDI 사용자 포탈 - FAQ</title>
<link rel="stylesheet" href="common.css">
<style>
  .main { max-width: 1320px; margin: 0 auto; }

  /* FAQ 카테고리 라벨 (질문 우측 소형) */
  .faq-cat { font-size: 11px; font-weight: 700; color: var(--text-tertiary); background: var(--bg-subtle);
    border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
  .faq-q-left { min-width: 0; }
  .faq-q-left > span:not(.faq-q-num) { overflow: hidden; text-overflow: ellipsis; }
  .faq-a a { color: var(--info); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }
  .faq-a strong { color: var(--ink); font-weight: 700; }
  .faq-a ul { margin: 8px 0 0 0; padding-left: 18px; }
  .faq-a li { margin-bottom: 5px; }
  .faq-empty { padding: 52px 16px; text-align: center; color: var(--text-tertiary); font-size: 14px; }


  /* 관리자 모드 — FAQ 추가/수정/삭제 (팝업 관리) */
  .faq-admin-actions { display: flex; gap: 6px; }
  .faq-act { width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid var(--border-strong);
    background: var(--surface); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .faq-act:hover { border-color: var(--kb-yellow-dark); color: var(--ink); background: var(--kb-yellow-soft); }
  .faq-act.del:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-soft); }
  .faq-act svg { width: 15px; height: 15px; }
  .faq-form-row { margin-bottom: 16px; }
  .faq-form-row:last-child { margin-bottom: 0; }
  .faq-form-row .fi, .faq-form-row .fs, .faq-form-row .fta { width: 100%; }
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header" data-header></header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" data-sidebar="faq"></aside>

  <!-- MAIN -->
  <main class="main">

    <div class="breadcrumb reveal">
      <a href="portal.html">홈</a>
      <span class="breadcrumb-sep">›</span>
      <span>지원 · 서비스</span>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text-secondary);font-weight:600">FAQ</span>
    </div>

    <div class="page-header reveal" style="animation-delay:.06s">
      <div class="page-header-left">
        <h1 class="page-title">자주 묻는 질문</h1>
        <p class="page-desc">VDI 사용 중 자주 발생하는 궁금증을 모았습니다. 카테고리·검색으로 빠르게 찾아보세요.</p>
      </div>
      <div class="page-header-right">
        <button type="button" class="btn btn-admin admin-only" id="addFaqBtn" onclick="openFaqModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          FAQ 추가
        </button>
      </div>
    </div>

    <!-- 검색 + 필터 -->
    <div class="filter-bar reveal" style="animation-delay:.14s">
      <div class="search-hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="궁금한 내용을 검색하세요  예) 비밀번호, 접속 오류">
      </div>
      <div class="filter-chips">
        <div class="filter-seg" id="filterSeg">
          <button class="fsb on" data-filter="all">전체</button>
          <button class="fsb" data-filter="access">접속·로그인</button>
          <button class="fsb" data-filter="apply">신청·결재</button>
          <button class="fsb" data-filter="spec">자원·사양</button>
          <button class="fsb" data-filter="trouble">장애·오류</button>
          <button class="fsb" data-filter="etc">기타</button>
        </div>
      </div>
    </div>

    <!-- FAQ 아코디언 -->
    <div class="fc reveal" style="animation-delay:.18s">
      <div id="faqList"></div>
    </div>
    <div class="pager" id="faqPager"></div>

    <!-- 하단 안내 배너 -->
    <div class="info-box reveal" style="margin-top:18px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div>원하는 답변을 찾지 못하셨나요? <a href="incident-new.html" style="color:#0F4DA0;font-weight:700">장애신고 등록</a> 또는 헬프데스크 <strong>1544-8119</strong>(평일 09:00~18:00)로 문의해 주세요.</div>
    </div>

  </main>
</div>

<!-- FAQ 추가/수정 모달 (관리자 전용) -->
<div class="modal" id="faqModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeFaqModal()" aria-label="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-title" id="faqModalTitle">FAQ 추가</div>
    <div class="modal-meta">자주 묻는 질문 항목을 작성합니다. (관리자 전용)</div>
    <div class="modal-body">
      <div class="faq-form-row">
        <div class="lbl">카테고리 <span class="req">*</span></div>
        <select class="fs" id="fCat">
          <option value="access">접속·로그인</option>
          <option value="apply">신청·결재</option>
          <option value="spec">자원·사양</option>
          <option value="trouble">장애·오류</option>
          <option value="etc">기타</option>
        </select>
      </div>
      <div class="faq-form-row">
        <div class="lbl">질문 <span class="req">*</span></div>
        <input class="fi" id="fQ" placeholder="질문을 입력하세요">
      </div>
      <div class="faq-form-row">
        <div class="lbl">답변 <span class="req">*</span></div>
        <textarea class="fta" id="fA" rows="7" placeholder="답변을 입력하세요. (HTML 태그 사용 가능: &lt;strong&gt;, &lt;ul&gt;&lt;li&gt;, &lt;a&gt; 등)"></textarea>
      </div>
    </div>
    <div class="action-btns" style="margin-top:22px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeFaqModal()">취소</button>
      <button class="btn btn-primary" onclick="saveFaq()">저장</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
  // ===== 데이터 =====
  const CAT_LABEL = { access: '접속·로그인', apply: '신청·결재', spec: '자원·사양', trouble: '장애·오류', etc: '기타' };
  const FAQS = [
    { cat: 'access', q: '가상PC에 접속이 되지 않습니다. 어떻게 하나요?',
      a: `먼저 아래 순서로 확인해 주세요.<ul><li>인터넷·사내망 연결 상태 확인</li><li>Citrix Workspace 종료 후 재실행</li><li>포탈에서 가상PC <strong>일반 리부팅</strong> 후 재접속</li></ul>그래도 해결되지 않으면 <a href="incident-new.html">장애신고 등록</a> 또는 헬프데스크(1544-8119)로 문의해 주세요.` },
    { cat: 'access', q: '로그인 2차 인증번호(OTP)가 오지 않아요.',
      a: `앱알리미 알림 수신 설정을 확인하고, 로그인 화면의 <strong>인증번호 재전송</strong>을 눌러주세요. 휴대폰 시간이 자동(네트워크 시간)으로 설정되어 있는지도 확인이 필요합니다. 지속될 경우 헬프데스크로 연락 바랍니다.` },
    { cat: 'access', q: '비밀번호를 잊어버렸습니다.',
      a: `마이포탈에서 비밀번호 재설정을 진행해 주세요. 로그인 <strong>5회 이상 실패 시 계정이 잠금</strong> 처리되며, 이 경우 헬프데스크(1544-8119)를 통해 잠금 해제를 요청해야 합니다.` },
    { cat: 'apply', q: 'VDI(가상PC)는 어떻게 추가로 신청하나요?',
      a: `<a href="apply.html">VDI 추가신청</a> 메뉴에서 <strong>정보입력 → 사양선택 → 결재선 → 신청완료</strong> 순으로 진행합니다. 신청 후 결재 승인을 거쳐 가상PC가 생성되며, 완료 시 알림으로 안내됩니다.` },
    { cat: 'apply', q: '신청한 건의 결재 진행 상태는 어디서 확인하나요?',
      a: `<a href="approval.html">결재 현황</a> 메뉴에서 확인할 수 있습니다. 항목을 클릭하면 신청 정보와 단계별 결재 진행 상황, 결재 이력을 볼 수 있습니다.` },
    { cat: 'apply', q: '제출한 신청을 취소(회수)할 수 있나요?',
      a: `결재가 <strong>진행 중인 경우</strong>에만 결재 상세 화면에서 <strong>신청 회수</strong>가 가능합니다. 이미 승인이 완료되었거나 적용 중인 건은 회수할 수 없으며, 별도 변경·반납 신청이 필요합니다.` },
    { cat: 'spec', q: 'CPU·메모리 등 자원을 늘리고 싶습니다.',
      a: `<a href="change.html">변경 · 증설 · 반납</a> 메뉴의 <strong>자원 증설</strong> 탭에서 신청합니다. 고사양(8 Core / 32 GB 이상)으로 증설 시 IT운영부 검토가 추가되어 승인까지 영업일 기준 2~3일이 소요될 수 있습니다.` },
    { cat: 'spec', q: '고정가상화는 어떤 유형의 가상PC인가요?',
      a: `본 포탈에서 제공하는 가상PC는 <strong>고정가상화</strong> 한 가지입니다. 개인 전용 가상PC로, 데이터·설정이 그대로 유지되어 상시 업무에 적합합니다. 사용자별로 할당되며 사용 기간 연장·자원 증설 신청이 가능합니다.` },
    { cat: 'spec', q: '사용하지 않는 VDI는 어떻게 반납하나요?',
      a: `<a href="change.html">변경 · 증설 · 반납</a>의 <strong>반납</strong> 탭에서 신청합니다. 반납이 완료되면 가상PC와 D 드라이브의 <strong>모든 데이터가 영구 삭제</strong>되므로, 반납 전 필요한 데이터를 반드시 백업해 주세요.` },
    { cat: 'trouble', q: '화면이 느리거나 끊깁니다.',
      a: `사용량이 많은 시간대에 일시적으로 지연될 수 있습니다.<ul><li>불필요한 프로그램·브라우저 탭 종료</li><li>가상PC 일반 리부팅 후 재접속</li><li>네트워크 연결 상태 점검</li></ul>증상이 지속되면 <a href="incident-new.html">장애신고</a>로 접수해 주세요.` },
    { cat: 'trouble', q: '프린터·주변기기가 가상PC에서 인식되지 않아요.',
      a: `장치를 재연결하고 가상PC를 재접속해 보세요. 네트워크 프린터의 경우 드라이버 매핑이 필요할 수 있으므로, 해결되지 않으면 장치명·모델명과 함께 <a href="incident-new.html">장애신고</a>를 등록해 주세요.` },
    { cat: 'etc', q: '헬프데스크 운영 시간과 연락처를 알려주세요.',
      a: `헬프데스크는 <strong>평일 09:00~18:00</strong>(공휴일 제외) 운영하며, 연락처는 <strong>1544-8119</strong>입니다. 업무가 즉시 중단되는 긴급 장애는 신고와 함께 헬프데스크로 직통 연락하시면 빠르게 처리됩니다.` }
  ];

  const $ = id => document.getElementById(id);
  let curFilter = 'all', curSearch = '', admin = document.body.classList.contains('admin-mode'), editIndex = null, curPage = 1;
  // 전역 관리자 모드(헤더 토글)와 연동 — 관리자 전용 추가/수정/삭제 노출
  window.onAdminModeChange = function (on) { admin = on; render(); };

  const CHEVRON = '<svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
  const EDIT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
  const DEL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

  function render() {
    const q = curSearch.trim().toLowerCase();
    const list = FAQS
      .map((f, idx) => ({ f, idx }))                 // 원본 인덱스 보존(수정/삭제용)
      .filter(({ f }) => {
        const okFilter = curFilter === 'all' || f.cat === curFilter;
        const okSearch = !q || (f.q + ' ' + f.a).toLowerCase().includes(q);
        return okFilter && okSearch;
      });

    if (!list.length) {
      $('faqList').innerHTML = `<div class="faq-empty">검색 조건에 맞는 FAQ가 없습니다.</div>`;
      renderPager('faqPager', 0, 1, () => {});
      return;
    }

    const pages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (curPage > pages) curPage = pages;
    const base = (curPage - 1) * PAGE_SIZE;
    const pageItems = list.slice(base, base + PAGE_SIZE);

    const autoOpen = q.length > 0; // 검색 시 자동 펼침
    $('faqList').innerHTML = pageItems.map(({ f, idx }, i) => `
      <div class="faq-item${autoOpen ? ' open' : ''}">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
          <div class="faq-q-left">
            <span class="faq-q-num">${base + i + 1}</span>
            <span>${f.q}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
            ${admin ? `<div class="faq-admin-actions">
              <button class="faq-act" title="수정" onclick="event.stopPropagation();openFaqModal(${idx})">${EDIT_SVG}</button>
              <button class="faq-act del" title="삭제" onclick="event.stopPropagation();deleteFaq(${idx})">${DEL_SVG}</button>
            </div>` : ''}
            <span class="faq-cat">${CAT_LABEL[f.cat]}</span>
            ${CHEVRON}
          </div>
        </div>
        <div class="faq-a">${f.a}</div>
      </div>`).join('');

    renderPager('faqPager', list.length, curPage, p => {
      curPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ===== 관리자 추가/수정/삭제 (팝업) — 노출은 전역 관리자 모드가 제어 =====
  function openFaqModal(index) {
    editIndex = (typeof index === 'number') ? index : null;
    $('faqModalTitle').textContent = editIndex === null ? 'FAQ 추가' : 'FAQ 수정';
    if (editIndex === null) {
      $('fCat').value = 'access'; $('fQ').value = ''; $('fA').value = '';
    } else {
      const f = FAQS[editIndex];
      $('fCat').value = f.cat; $('fQ').value = f.q; $('fA').value = f.a;
    }
    $('faqModal').classList.add('open');
    setTimeout(() => $('fQ').focus(), 50);
  }
  function closeFaqModal() { $('faqModal').classList.remove('open'); }

  function saveFaq() {
    const cat = $('fCat').value, qv = $('fQ').value.trim(), av = $('fA').value.trim();
    if (!qv || !av) { showToast('질문과 답변을 모두 입력해주세요.'); return; }
    if (editIndex === null) {
      FAQS.push({ cat, q: qv, a: av });
      showToast('FAQ가 추가되었습니다.');
    } else {
      FAQS[editIndex] = { cat, q: qv, a: av };
      showToast('FAQ가 수정되었습니다.');
    }
    closeFaqModal();
    render();
  }

  function deleteFaq(index) {
    if (!confirm('이 FAQ를 삭제하시겠습니까?\n\n' + FAQS[index].q)) return;
    FAQS.splice(index, 1);
    showToast('FAQ가 삭제되었습니다.');
    render();
  }

  // 모달 배경 클릭 시 닫기
  $('faqModal').addEventListener('click', e => { if (e.target === $('faqModal')) closeFaqModal(); });

  // 필터 / 검색
  document.querySelectorAll('#filterSeg .fsb').forEach(btn => {
    btn.addEventListener('click', () => {
      curFilter = btn.dataset.filter;
      curPage = 1;
      document.querySelectorAll('#filterSeg .fsb').forEach(b => b.classList.toggle('on', b === btn));
      render();
    });
  });
  $('searchInput').addEventListener('input', e => { curSearch = e.target.value; curPage = 1; render(); });

  render();
</script>
</body>
</html>
