<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>정성인연 — 자산관리</title>
<style>
  :root{
    --font-display:"KBFGDisplayB","KBFG Display Bold","KBFGDisplay","KB체 Bold","KB체","KBIns체","Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --font-body:"KBFGTextM","KBFG Text Medium","KBFGText","KB체","KBIns체","Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --font-bold:"KBFGTextB","KBFG Text Bold","KBFGText","KB체 Bold","KB체","KBIns체","Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;

    --ink:#1c2430; --ink-soft:#4a5568; --ink-faint:#8a94a3;
    --paper:#f5f6f8; --card:#ffffff;
    --line:#e8ebf0; --line-strong:#cfd6df; --line-faint:#eef1f5;
    --gold:#f5b500; --gold-soft:#fff7e0; --gold-strong:#d99800;
    --navy:#2b3a55; --navy-soft:#3a4d70;

    --shadow-sm:0 1px 2px rgba(28,36,48,.05);
    --shadow-card:0 1px 2px rgba(28,36,48,.04), 0 6px 22px rgba(28,36,48,.055);
    --shadow-md:0 8px 28px rgba(28,36,48,.10);
    --shadow-lg:0 24px 64px rgba(28,36,48,.20);
    --r:14px; --r-sm:9px;
  }

  /* ===================== 다크 테마 ===================== */
  html[data-theme="dark"]{
    --ink:#e7ebf1; --ink-soft:#aab4c2; --ink-faint:#7e8896;
    --paper:#13171f; --card:#1c222d;
    --line:#2a323e; --line-strong:#3c4757; --line-faint:#222a35;
    --gold:#f5b500; --gold-soft:rgba(245,181,0,.13); --gold-strong:#ffc933;
    --navy:#141c2b; --navy-soft:#23304a;
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow-card:0 1px 2px rgba(0,0,0,.4), 0 6px 22px rgba(0,0,0,.35);
    --shadow-md:0 8px 28px rgba(0,0,0,.5);
    --shadow-lg:0 24px 64px rgba(0,0,0,.65);
  }
  html[data-theme="dark"] .btn{background:var(--card);}
  html[data-theme="dark"] .btn.ghost{background:transparent;}
  html[data-theme="dark"] .btn.gold{background:var(--gold); color:#2b2410;}          /* 골드 버튼: 다크에서도 골드 배경+진한 글자 유지 */
  html[data-theme="dark"] .btn.gold:hover{background:var(--gold-strong); color:#2b2410;}
  html[data-theme="dark"] .apphd .btn{background:rgba(255,255,255,.08); color:#eaeef5;}  /* 헤더 버튼: 네이비 위 반투명 흰색 유지 */
  html[data-theme="dark"] .apphd .btn.ghost{background:transparent; color:#dfe5ee;}
  html[data-theme="dark"] .nav-item.active{color:#ffd255;}
  html[data-theme="dark"] .atable th{background:#222b39;}

  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:16.5px;}
  body{font-family:var(--font-body); background:var(--paper); color:var(--ink); padding:0 0 30px; -webkit-font-smoothing:antialiased;}
  b,strong{font-family:var(--font-bold); font-weight:700;}

  /* 버튼 */
  .btn{border:1px solid var(--line); background:#fff; color:var(--ink-soft); font-family:var(--font-bold); font-size:.8rem; padding:8px 14px; border-radius:var(--r-sm); cursor:pointer; transition:background .14s,border-color .14s,color .14s,transform .07s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap;}
  .btn:hover{background:var(--line-faint); color:var(--ink); border-color:var(--line-strong);}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}
  .btn .ic{width:16px; height:16px;}
  .btn.gold{background:var(--gold); border-color:var(--gold); color:#2b2410; box-shadow:0 1px 2px rgba(217,152,0,.25);}
  .btn.gold:hover{background:var(--gold-strong); color:#2b2410; border-color:var(--gold-strong);}

  /* 글로벌 헤더 */
  .apphd{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:11px; background:var(--navy); color:#fff; padding:0 20px; height:58px; box-shadow:0 2px 0 var(--gold);}
  .apphd-brand{display:flex; align-items:center; gap:11px; user-select:none; cursor:pointer;}
  .apphd-brand:hover .apphd-t{text-decoration:underline; text-underline-offset:3px;}
  .apphd-mark{width:34px; height:34px; border-radius:9px; background:var(--gold); color:#211a05; display:flex; align-items:center; justify-content:center; flex:none;}
  .apphd-mark svg{width:19px; height:19px;}
  .apphd-t{font-family:var(--font-display); font-size:.92rem; line-height:1.12; letter-spacing:-.01em;}
  .apphd-s{font-size:.69rem; color:#c4cddc; margin-top:2px; font-family:var(--font-bold);}
  .apphd-grow{flex:1;}
  .apphd .btn{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.18); color:#eaeef5;}
  .apphd .btn:hover{background:rgba(255,255,255,.16); color:#fff; border-color:rgba(255,255,255,.32);}
  .apphd .btn.ghost{background:transparent; border-color:transparent; color:#dfe5ee;}
  .apphd .btn.ghost:hover{background:rgba(255,255,255,.12); color:#fff;}
  .sync-badge{font-size:.72rem; font-family:var(--font-bold);}
  .sync-badge.sync-ok{color:#7ee0b8;} .sync-badge.sync-saving,.sync-badge.sync-loading{color:#ffe08a;}
  .sync-badge.sync-offline,.sync-badge.sync-error{color:#ff9a93;}
  .fx-badge{font-size:.74rem; font-family:var(--font-bold); color:#c4cddc; padding:0 4px; white-space:nowrap;}
  .hd-select{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); color:#eaeef5; border-radius:9px; padding:7px 8px; font-size:.76rem; font-family:var(--font-bold); cursor:pointer;}
  .hd-select option{color:#1c2430;}
  /* 읽기 전용(잠금) 시 편집 UI 숨김 */
  body:not(.can-edit) #btnAdd,
  body:not(.can-edit) #btnImport,
  body:not(.can-edit) #btnSort,
  body:not(.can-edit) .row-act{display:none;}
  body:not(.can-edit) .inc-chk{opacity:.55; cursor:default;}
  body.can-edit #btnLock .lk-label{color:#7ee0b8;}

  /* 셸: 사이드바 + 본문 */
  .hub{display:flex; align-items:flex-start;}
  .side{position:sticky; top:58px; align-self:flex-start; width:264px; flex:none; height:calc(100vh - 58px); overflow-y:auto; background:var(--card); border-right:1px solid var(--line); padding:14px 12px 30px; transition:width .2s ease, padding .2s ease;}
  .content{flex:1; min-width:0;}
  #sideToggle{position:fixed; top:50%; left:264px; transform:translateY(-50%); z-index:40; width:21px; height:48px; display:flex; align-items:center; justify-content:center; padding:0; border:1px solid var(--line-strong); border-left:none; border-radius:0 9px 9px 0; background:var(--card); color:var(--ink-faint); cursor:pointer; box-shadow:var(--shadow-sm); transition:left .2s ease, background .12s, color .12s;}
  #sideToggle:hover{background:var(--gold-soft); color:var(--gold-strong); border-color:var(--gold);}
  #sideToggle svg{width:15px; height:15px; transition:transform .2s;}
  body.side-collapsed #sideToggle svg{transform:rotate(180deg);}
  body.side-collapsed .side{width:0; padding-left:0; padding-right:0; border-right:none; overflow:hidden;}
  body.side-collapsed #sideToggle{left:0;}

  /* 사이드바 내비 */
  .nav-pinned{padding-bottom:9px; margin-bottom:8px; border-bottom:1px solid var(--line);}
  .nav-cat-head2{display:flex; align-items:center; gap:6px; padding:10px 13px 4px;}
  .nav-cat-head2 .nav-cat-name{font-size:.72rem; letter-spacing:.04em; color:var(--ink-faint); font-family:var(--font-bold);}
  .nav-items{padding:1px 0 5px;}
  .nav-item{display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:none; background:transparent; cursor:pointer; padding:8px 9px 8px 13px; border-radius:8px; color:var(--ink); font-size:.81rem; font-family:var(--font-body); position:relative; line-height:1.3;}
  .nav-item:hover{background:var(--line-faint);}
  .nav-item.active{background:var(--gold-soft); color:#6b4e00; font-family:var(--font-bold);}
  .nav-item.active::before{content:""; position:absolute; left:3px; top:8px; bottom:8px; width:3px; border-radius:3px; background:var(--gold);}
  .nav-item .ni-dot{width:7px; height:7px; border-radius:50%; flex:none; background:var(--line-strong);}
  .nav-item .ni-dot.ni-all{background:var(--ink-faint);}
  .nav-item .ni-ico{width:16px; height:16px; flex:none; color:var(--ink-faint);}
  .nav-item.active .ni-ico{color:var(--gold-strong);}
  .nav-dash .ni-name{font-family:var(--font-bold);}
  .nav-item .ni-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ni-count{flex:none; margin-left:auto; font-size:.7rem; color:var(--ink-faint); background:var(--line-faint); padding:1px 7px; border-radius:9px; font-family:var(--font-bold); font-variant-numeric:tabular-nums;}
  .nav-item.active .ni-count{background:var(--gold-soft); color:var(--gold-strong);}
  .area-chip-sm{width:10px; height:10px; border-radius:3px; flex:none;}

  /* 본문 컨테이너 */
  .pad{max-width:1360px; padding:24px 34px 60px;}
  .vhd{display:flex; align-items:flex-end; justify-content:space-between; gap:14px; padding:6px 0 18px; flex-wrap:wrap;}
  .vhd .eyebrow{font-family:var(--font-bold); font-size:.7rem; letter-spacing:.16em; color:var(--gold-strong); margin-bottom:6px;}
  .vhd h1{font-family:var(--font-display); font-size:1.4rem; letter-spacing:-.015em;}
  .vhd .sub{margin-top:5px; font-size:.82rem; color:var(--ink-faint);}
  .view.hidden{display:none;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:20px; box-shadow:var(--shadow-sm);}
  .card-t{font-family:var(--font-bold); font-size:.82rem; color:var(--ink-soft); margin-bottom:14px; letter-spacing:.01em;}

  /* 총자산 카드 */
  .total-card{background:var(--navy); color:#fff; border:none; border-radius:var(--r); padding:22px 24px; box-shadow:var(--shadow-md); position:relative; overflow:hidden;}
  .total-card::after{content:""; position:absolute; right:-50px; top:-70px; width:240px; height:240px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(245,181,0,.26), transparent 68%); pointer-events:none;}
  .total-card{cursor:pointer;}
  .total-card:hover{box-shadow:var(--shadow-lg);}
  .total-card .tc-label{font-size:.74rem; color:#c4cddc; font-family:var(--font-bold); letter-spacing:.04em;}
  .total-card .tc-num{font-family:var(--font-display); font-size:2.1rem; letter-spacing:-.02em; margin-top:6px; color:#fff; font-variant-numeric:tabular-nums;}
  .total-card .tc-kor{font-size:.92rem; color:var(--gold); margin-top:4px; font-family:var(--font-bold);}
  .total-card .tc-meta{margin-top:12px; font-size:.74rem; color:#aebbcf;}

  .dash{display:flex; flex-direction:column; gap:16px;}
  .dash-row{display:grid; grid-template-columns:300px 1fr; gap:16px; align-items:stretch;}
  @media(max-width:840px){ .dash-row{grid-template-columns:1fr;} }
  .dash-row2{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;}
  @media(max-width:840px){ .dash-row2{grid-template-columns:1fr;} }
  .bar-name.owner-name{width:92px; overflow:hidden; text-overflow:ellipsis;}
  .list-card{padding:0; overflow:hidden;}
  .list-search{display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line-strong); border-radius:var(--r-sm); padding:0 12px; margin-bottom:12px; max-width:380px;}
  .list-search svg{width:16px; height:16px; color:var(--ink-faint); flex:none;}
  .list-search input{flex:1; border:none; background:transparent; padding:9px 0; font-size:.86rem; color:var(--ink); font-family:var(--font-body); outline:none;}
  .list-search:focus-within{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold-soft);}
  .atable th.th-sort{cursor:pointer; user-select:none;}
  .atable th.th-sort:hover{color:var(--ink);}
  .atable th.th-sort.on{color:var(--gold-strong);}
  /* 모바일 카드형 목록 */
  .acard-list{display:flex; flex-direction:column;}
  .acard{border-bottom:1px solid var(--line-faint); padding:9px 13px;}
  .acard:last-child{border-bottom:none;}
  .acard.off{opacity:.62;}
  .acard-main{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; cursor:pointer; border-radius:8px;}
  .acard-main:active{background:var(--line-faint);}
  .acard-l{min-width:0; flex:1;}
  .acard-name{font-family:var(--font-bold); font-size:.9rem; color:var(--ink); line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .acard.off .acard-name{color:var(--ink-faint);}
  .acard-sub{font-size:.75rem; color:var(--ink-faint); margin-top:2px; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .acard-cat{color:var(--ink-soft); font-family:var(--font-bold);}
  .acard-sub .area-chip-sm{display:inline-block; vertical-align:middle; position:relative; top:-1px; margin-right:4px;}
  .acard-r{flex:none; text-align:right;}
  .acard-amt{font-family:var(--font-bold); font-size:.96rem; white-space:nowrap; font-variant-numeric:tabular-nums; flex:none;}
  .acard-part{font-size:.66rem; color:var(--gold-strong); font-family:var(--font-bold); margin-top:2px; white-space:nowrap;}
  .acard.off .acard-amt{color:var(--ink-faint); text-decoration:line-through;}
  .acard-foot{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:7px;}
  .acard-inc{display:inline-flex; align-items:center; gap:7px; font-size:.78rem; color:var(--ink-soft); cursor:pointer; user-select:none;}
  .acard-inc input{width:18px; height:18px; accent-color:var(--gold-strong); flex:none;}
  .acard-acts{display:flex; gap:6px;}
  .acard-acts button{border:1px solid var(--line); background:var(--card); color:var(--ink-soft); width:33px; height:33px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer;}
  .acard-acts button svg{width:16px; height:16px;}
  .acard-acts .del:active{background:rgba(192,57,43,.14); color:#c0392b;}
  .acard-allbar{display:flex; align-items:center; gap:8px; padding:8px 13px; border-bottom:1px solid var(--line); background:var(--line-faint); font-size:.8rem; font-family:var(--font-bold); color:var(--ink-soft); cursor:pointer;}
  .acard-allbar input{width:18px; height:18px; accent-color:var(--gold-strong);}
  /* 간단히 보기(모바일·폴드): 체크박스 맨 앞 + 항목명 + 금액 — 전 행 동일 높이(한 줄 고정) */
  #btnDense{display:none;}
  .acard.dense{display:flex; align-items:center; gap:4px; padding:1px 13px 1px 9px;}
  .acard.dense .acard-inc{padding:6px; margin:0;}
  .acard.dense .acard-main{flex:1; min-width:0; align-items:center; gap:7px; padding:4px 0;}
  .acard.dense .acard-name{flex:1; min-width:0; font-size:.82rem;}
  .acard.dense .acard-amt{font-size:.84rem;}
  .acard-pbdg{flex:none; font-size:.6rem; font-family:var(--font-bold); color:var(--gold-strong); border:1px solid var(--gold-strong); border-radius:4px; padding:0 3px; line-height:1.55;}
  #sideBackdrop{display:none;}

  /* ===================== 모바일 반응형 ===================== */
  @media(max-width:760px){
    html{font-size:15.5px;}
    /* 헤더: 아이콘만(라벨 숨김), 간격 축소 */
    .apphd{padding:0 10px; gap:3px;}
    .apphd-s{display:none;}
    .apphd-t{font-size:.85rem;}
    .apphd .btn{padding:7px 8px;}
    .apphd .btn .ic{margin:0;}
    #btnExport span,#btnImport span,#btnLock .lk-label,#themeLabel,#syncBadge,#fxBadge{display:none;}
    .apphd{gap:2px;}
    .apphd .btn{padding:7px 6px;}
    .hd-select{padding:6px 4px; font-size:.7rem;}
    /* 사이드바 = 오버레이 드로어 */
    .side{position:fixed; top:58px; left:0; width:248px; height:calc(100vh - 58px); z-index:60; box-shadow:var(--shadow-lg); transform:translateX(0); transition:transform .22s ease;}
    body.side-collapsed .side{width:248px; padding:14px 12px 30px; border-right:1px solid var(--line); overflow-y:auto; transform:translateX(-100%);}
    #sideBackdrop{display:block; position:fixed; inset:58px 0 0 0; background:rgba(20,26,36,.45); z-index:55; opacity:0; pointer-events:none; transition:opacity .2s;}
    body:not(.side-collapsed) #sideBackdrop{opacity:1; pointer-events:auto;}
    /* 토글 = 좌하단 FAB */
    #sideToggle{top:auto; bottom:18px; left:14px; transform:none; width:46px; height:46px; border:1px solid var(--line-strong); border-radius:50%; z-index:61; box-shadow:var(--shadow-md);}
    body.side-collapsed #sideToggle{left:14px;}
    /* 본문 패딩 축소 */
    .pad{padding:16px 13px 60px;}
    .vhd{padding:4px 0 12px;}
    .vhd h1{font-size:1.2rem;}
    .vhd-actions{gap:6px;}
    #btnDense{display:inline-flex;}
    /* 표 가로 스크롤 */
    #view-list .list-card{overflow:visible;}
    #listBody{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .atable{min-width:1140px;}
    .atable td.name,.atable th{white-space:nowrap;}
    /* 총자산 카드 */
    .total-card{padding:18px 18px;}
    .total-card .tc-num{font-size:1.55rem;}
    /* 모바일 모달: 콤팩트(높이 축소) + 화면 넘침 방지(본문 스크롤·저장버튼 항상 보임) */
    .modal-bg{padding:8px; align-items:flex-start;}
    .modal{max-height:calc(100vh - 16px);}
    @supports(height:100dvh){ .modal{max-height:calc(100dvh - 16px);} }
    .modal-hd{padding:12px 16px;}
    .modal-ft{padding:10px 16px;}
    .modal-bd{padding:12px 15px; gap:9px;}
    .modal-bd .field label{margin-bottom:3px;}
    /* 터치 타깃은 유지하되 과한 높이만 축소 */
    .modal-bd .field input,.modal-bd .field select{padding:9px 11px; font-size:.9rem;}
    .modal-bd .chk input,.modal-bd .field select#fCur{min-height:40px;}
    .modal-bd .chk input{width:20px; height:20px;}
    /* 목표 카드 모바일 정리 (.goal-card 접두로 우선순위 확보) */
    .goal-card .goal-head{flex-direction:column; align-items:flex-start; gap:9px;}
    .goal-card .goal-target{font-size:1.3rem;}
    .goal-card .goal-head-act{width:100%; justify-content:space-between;}
    .goalscale .gs-goal-label{font-size:.72rem;}
    .goalscale .gs-ends span{font-size:.68rem;}
    .goal-target .gt-kor{display:block; margin:2px 0 0; font-size:.78rem;}
    /* 막대 폭 축소 */
    .bar-name{width:58px;} .bar-name.owner-name{width:64px;}
    .bar-val{width:96px; font-size:.74rem;} .bar-pct{width:36px;}
    .card{padding:16px;}
  }
  .owner-row,.cat-row{width:100%; border:none; background:transparent; cursor:pointer; padding:7px 6px; border-radius:7px; color:var(--ink); font-family:var(--font-body); text-align:left;}
  .owner-row:hover,.cat-row:hover{background:var(--line-faint);}
  .owner-row:hover .owner-name,.cat-row:hover .bar-name{text-decoration:underline; text-underline-offset:2px;}
  .donut-seg{cursor:pointer; transition:opacity .12s;}
  .donut-seg:hover{opacity:.82;}

  /* 도넛 */
  .donut-wrap{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .donut{position:relative; width:200px; height:200px;}
  .donut svg{width:200px; height:200px; display:block;}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none;}
  .donut-center .dc-k{font-size:.68rem; color:var(--ink-faint); font-family:var(--font-bold);}
  .donut-center .dc-v{font-family:var(--font-display); font-size:1.05rem; margin-top:2px; letter-spacing:-.01em;}

  /* 가로 바 */
  .bar-row{display:flex; align-items:center; gap:10px; padding:7px 0;}
  .bar-chip{width:10px; height:10px; border-radius:3px; flex:none;}
  .bar-name{width:74px; font-size:.8rem; font-family:var(--font-bold); flex:none; white-space:nowrap;}
  .bar-track{flex:1; height:9px; background:var(--line-faint); border-radius:6px; overflow:hidden; min-width:40px;}
  .bar-fill{display:block; height:100%; border-radius:6px; transition:width .3s ease;}
  .bar-val{width:118px; text-align:right; font-size:.79rem; font-variant-numeric:tabular-nums; flex:none; font-family:var(--font-bold);}
  .bar-pct{width:46px; text-align:right; font-size:.74rem; color:var(--ink-faint); flex:none; font-variant-numeric:tabular-nums;}

  /* 목표(매수가) 달성 위젯 */
  .goal-card{}
  .goal-head{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px;}
  .goal-target{font-family:var(--font-display); font-size:1.5rem; letter-spacing:-.02em;}
  .gt-label{display:block; font-size:.72rem; color:var(--ink-faint); font-family:var(--font-bold); letter-spacing:.03em; margin-bottom:3px;}
  .gt-tax-inline{font-size:.62rem; color:var(--gold-strong); font-family:var(--font-bold); background:var(--gold-soft); padding:2px 8px; border-radius:999px; vertical-align:middle; margin-left:8px; letter-spacing:0; white-space:nowrap;}
  .gt-kor{font-size:.82rem; color:var(--ink-faint); font-family:var(--font-bold); letter-spacing:0; margin-left:4px;}
  .gt-done{font-size:.66rem; color:#fff; background:var(--st-fix); font-family:var(--font-bold); padding:2px 9px; border-radius:999px; vertical-align:middle; margin-left:8px; letter-spacing:0; white-space:nowrap;}
  .goal-done{box-shadow:inset 0 0 0 1.5px var(--st-fix);}
  .goal-foot-line{margin-top:4px;}
  .goal-foot-line .done{color:var(--st-fix); font-family:var(--font-bold);}
  .goal-foot-line .fl-up{color:var(--st-fix); font-family:var(--font-bold);}      /* 목표 초과(+) */
  .goal-foot-line .fl-down{color:#c0392b; font-family:var(--font-bold);}          /* 목표 미달(-) */
  html[data-theme="dark"] .goal-foot-line .fl-down{color:#e8786b;}
  .gs-ends .gs-inc.done,.gs-ends .gs-all.done{color:var(--st-fix);}
  .tc-sub2{margin-top:8px; font-size:.78rem; color:#aebbcf;}
  .goal-head-act{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .gt-check{display:inline-flex; align-items:center; gap:6px; font-size:.82rem; color:var(--ink-soft); font-family:var(--font-bold); cursor:pointer; user-select:none;}
  .gt-check input{width:16px; height:16px; accent-color:var(--gold-strong); cursor:pointer;}
  .btn-sm{padding:5px 11px; font-size:.76rem;}
  .goal-big{font-family:var(--font-display); font-size:2.1rem; color:var(--gold-strong); letter-spacing:-.02em; margin:10px 0 12px;}
  .goal-big span{font-size:1.05rem;}
  .goal-big .goal-big-sub{font-size:.8rem; color:var(--ink-faint); font-family:var(--font-bold); margin-left:8px; letter-spacing:0;}
  .goalscale{position:relative; margin:30px 0 8px; padding-bottom:54px;}
  .gs-goal-label{position:absolute; top:-24px; transform:translateX(-50%); font-size:.82rem; font-family:var(--font-bold); color:var(--ink); white-space:nowrap; background:var(--card); padding:0 5px;}
  .gs-goal-label.right{transform:translateX(-100%);}
  .gs-goalline{position:absolute; top:-7px; height:38px; width:3px; background:var(--ink); border-radius:2px; box-shadow:0 0 0 2px var(--card);}
  .gs-ends{position:absolute; left:0; right:0; top:0; bottom:0; pointer-events:none;}
  /* 5억 단위 눈금자 */
  .goal-axis{position:absolute; left:0; right:0; bottom:0; height:22px;}
  .gax-tick{position:absolute; top:0; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; pointer-events:none;}
  .gax-tick i{display:block; width:1.5px; height:4px; background:var(--line); border-radius:1px;}
  .gax-tick.lbl i{height:7px; background:var(--ink-faint);}
  .gax-tick b{font-size:.66rem; color:var(--ink-faint); font-family:var(--font-bold); white-space:nowrap; margin-top:3px; letter-spacing:0; font-variant-numeric:tabular-nums;}
  .gs-ends span{position:absolute; bottom:32px; transform:translateX(-50%); font-size:.74rem; font-family:var(--font-bold); white-space:nowrap;}
  .gs-ends span.pin-l{transform:translateX(0);}              /* 좌측 끝 라벨: 안쪽으로 정렬(잘림 방지) */
  .gs-ends span.pin-r{transform:translateX(-100%);}          /* 우측 끝 라벨: 안쪽으로 정렬 */
  .gs-ends .gs-inc{color:var(--gold-strong);}
  .gs-ends .gs-all{color:#caa23a;}
  .goal-track{position:relative; height:24px; background:var(--line-faint); border-radius:12px; overflow:hidden;}
  .goal-fill{position:absolute; left:0; top:0; height:100%; border-radius:12px; transition:width .4s ease;}
  .goal-fill.all{background:#f3cf7a;}
  .goal-fill.inc{background:var(--gold);}
  .goal-foot{margin-top:12px; font-size:.9rem; color:var(--ink-soft);}
  .goal-foot b{font-family:var(--font-bold); color:var(--ink);}
  .goal-legend{display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid var(--line-faint); font-size:.85rem;}
  .goal-legend .gl{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle;}
  .goal-legend .gl.inc{background:var(--gold);}
  .goal-legend .gl.all{background:#ffe39a;}
  .goal-legend b{font-family:var(--font-bold);}
  .goal-legend .gl-ex{color:var(--ink-faint);}
  .goal-empty{color:var(--ink-faint); font-size:.86rem; padding:8px 0;}
  /* 목표선 드래그 설정 */
  .gs-goal-label.left{transform:translateX(0);}
  .gs-goalline.draggable{cursor:ew-resize; z-index:6; touch-action:none;}
  .gs-goalline.draggable::before{content:""; position:absolute; left:-14px; right:-14px; top:-8px; bottom:-8px;}
  .gs-knob{position:absolute; left:50%; top:11px; transform:translate(-50%,-50%); width:15px; height:15px; border-radius:50%; background:var(--ink); border:2.5px solid var(--card); box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:ew-resize; touch-action:none;}
  .goal-track.grabbable{cursor:pointer; touch-action:none;}
  .goalscale.dragging .gs-goalline,.goalscale.dragging .gs-goal-label{transition:none;}
  .goalscale.dragging .gs-goal-label{opacity:0;}                                  /* 드래그 중엔 정적 라벨 숨기고 툴팁만 */
  .gs-tooltip{position:absolute; top:-36px; transform:translateX(-50%); background:var(--navy); color:#fff; font-family:var(--font-display); font-size:1rem; padding:4px 11px; border-radius:8px; white-space:nowrap; box-shadow:0 3px 10px rgba(0,0,0,.28); pointer-events:none; z-index:8; letter-spacing:-.01em;}
  .gs-tooltip::after{content:""; position:absolute; left:50%; top:100%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--navy);}
  .gs-tooltip.left{transform:translateX(0);} .gs-tooltip.left::after{left:15px;}
  .gs-tooltip.right{transform:translateX(-100%);} .gs-tooltip.right::after{left:auto; right:15px;}
  .gs-tooltip[hidden]{display:none;}
  .gs-tooltip.confirm{background:var(--gold); color:var(--navy); font-size:1.05rem; animation:gsConfirmPulse .7s ease-out;}
  .gs-tooltip.confirm::after{border-top-color:var(--gold);}
  @keyframes gsConfirmPulse{0%{box-shadow:0 0 0 0 rgba(245,181,0,.6);} 70%{box-shadow:0 0 0 10px rgba(245,181,0,0);} 100%{box-shadow:0 0 0 0 rgba(245,181,0,0);}}
  .goal-hint-drag{margin-top:12px; font-size:.82rem; color:var(--ink-faint);}
  .goal-hint-drag b{font-family:var(--font-bold); color:var(--ink-soft);}
  html[data-theme="dark"] .goal-fill.all,html[data-theme="dark"] .goal-legend .gl.all{background:#7a6a3a;}

  .recent-empty{color:var(--ink-faint); font-size:.84rem; padding:10px 6px;}

  /* 테이블 */
  .list-tools{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap;}
  .list-tools .lt-grow{flex:1;}
  .atable{width:100%; border-collapse:collapse; font-size:.85rem;}
  .atable th{text-align:left; font-size:.72rem; color:var(--ink-faint); font-family:var(--font-bold); padding:9px 10px; border-bottom:1px solid var(--line); background:var(--line-faint);}
  .atable th.num,.atable td.num{text-align:right; font-variant-numeric:tabular-nums;}
  .atable td{padding:10px; border-bottom:1px solid var(--line-faint); vertical-align:middle;}
  .atable td.num{font-family:var(--font-bold);}
  .atable td.name{font-family:var(--font-bold); color:var(--ink);}
  .atable td.inst{color:var(--ink-soft); font-size:.83rem; white-space:nowrap;}
  .atable td.ticker{color:var(--ink-soft); font-size:.83rem; white-space:nowrap;}
  .atable td.qty,.atable td.price{color:var(--ink-soft); font-size:.83rem;}
  .field input.ro{background:var(--line-faint); color:var(--ink-soft); cursor:not-allowed;}
  .atable td.owner{color:var(--ink-soft); font-size:.83rem; white-space:nowrap;}
  .atable td.note{color:var(--ink-faint); font-size:.8rem;}
  .atable tbody tr:hover td{background:var(--line-faint);}
  .atable tfoot td{padding:12px 10px; font-family:var(--font-bold); border-top:2px solid var(--line-strong); background:var(--card);}
  .cat-tag{display:inline-flex; align-items:center; gap:7px; font-size:.81rem; white-space:nowrap;}
  .row-act{white-space:nowrap; text-align:right;}
  .row-act button{border:none; background:transparent; cursor:pointer; color:var(--ink-faint); padding:5px 7px; border-radius:6px; line-height:0;}
  .row-act button svg{width:15px; height:15px;}
  .row-act button:hover{background:var(--line); color:var(--ink);}
  .row-act button.del:hover{background:rgba(192,57,43,.12); color:#c0392b;}
  .empty{padding:48px 20px; text-align:center; color:var(--ink-faint); font-size:.86rem;}
  .atable th.inc,.atable td.inc{width:66px; text-align:center;}
  .atable th.inc .inc-all{display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none;}
  .atable th.inc .inc-all input{cursor:pointer;}
  .atable input[type=checkbox]{width:16px; height:16px; cursor:pointer; accent-color:var(--gold-strong); vertical-align:middle;}
  .atable tr.row-off td.name,.atable tr.row-off td.note,.atable tr.row-off td.owner,.atable tr.row-off td.inst,.atable tr.row-off td.ticker,.atable tr.row-off td.qty,.atable tr.row-off td.price{color:var(--ink-faint);}
  .atable tr.row-off td.num{color:var(--ink-faint); text-decoration:line-through;}
  .atable tr.row-off .cat-tag{opacity:.55;}
  .vhd-actions{display:flex; align-items:center; gap:8px;}
  .atable th.grip,.atable td.grip{width:34px; text-align:center;}
  .row-grip{cursor:grab; color:var(--ink-faint); user-select:none; font-size:1.05rem; line-height:1; display:inline-block; padding:2px 4px; border-radius:5px;}
  .row-grip:hover{background:var(--line); color:var(--ink);}
  .atable tr[draggable] .row-grip:active{cursor:grabbing;}
  .atable tr.row-dragging{opacity:.4;}
  .atable tr.drop-before td{box-shadow:inset 0 3px 0 var(--gold);}
  .atable tr.drop-after td{box-shadow:inset 0 -3px 0 var(--gold);}

  /* 모달 */
  .modal-bg{position:fixed; inset:0; background:rgba(20,26,36,.5); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--card); border-radius:var(--r); width:100%; max-width:440px; box-shadow:var(--shadow-lg); overflow:hidden; display:flex; flex-direction:column; max-height:calc(100vh - 32px);}
  @supports(height:100dvh){ .modal{max-height:calc(100dvh - 32px);} }
  .modal-hd{padding:16px 20px; border-bottom:1px solid var(--line); font-family:var(--font-display); font-size:1rem; display:flex; align-items:center; justify-content:space-between; flex:none;}
  .modal-hd button{border:none; background:transparent; cursor:pointer; color:var(--ink-faint); font-size:1.3rem; line-height:1; padding:2px 6px; border-radius:6px;}
  .modal-hd button:hover{background:var(--line-faint); color:var(--ink);}
  .modal-bd{padding:18px 20px; display:flex; flex-direction:column; gap:13px; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-ft{padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:8px; justify-content:flex-end; flex:none;}
  .field label{display:block; font-size:.74rem; color:var(--ink-faint); font-family:var(--font-bold); margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%; border:1px solid var(--line-strong); background:var(--card); color:var(--ink); border-radius:var(--r-sm); padding:9px 11px; font-size:.86rem; font-family:var(--font-body);}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold); outline-offset:0; border-color:var(--gold);}
  .field .hint{font-size:.72rem; color:var(--ink-faint); margin-top:4px;}
  .auto-badge{display:none; font-size:.62rem; color:var(--gold-strong); background:var(--gold-soft); padding:1px 7px; border-radius:999px; margin-left:6px; font-family:var(--font-bold); letter-spacing:0;}
  .part-badge{display:inline-block; font-size:.62rem; color:var(--gold-strong); background:var(--gold-soft); padding:1px 6px; border-radius:999px; font-family:var(--font-bold); white-space:nowrap; letter-spacing:0; vertical-align:middle;}
  html[data-theme="dark"] .part-badge,html[data-theme="dark"] .auto-badge{background:rgba(245,181,0,.16);}
  .inc-row{display:flex; align-items:center; gap:12px 14px; flex-wrap:wrap;}
  .sold-wrap{display:none; align-items:center; gap:6px; font-size:.82rem; color:var(--ink-soft); font-family:var(--font-body);}
  .sold-wrap.on{display:inline-flex;}
  .sold-wrap input{width:76px; border:1px solid var(--line-strong); background:var(--card); color:var(--ink); border-radius:var(--r-sm); padding:7px 9px; font-size:.85rem; font-family:var(--font-body); text-align:right;}
  .sold-wrap input:focus{outline:2px solid var(--gold); outline-offset:0; border-color:var(--gold);}
  .sold-hint{margin-top:-2px; color:var(--gold-strong); font-size:.8rem; font-family:var(--font-bold);}
  .sold-hint:empty{display:none;}
  .modal-bd .chk{display:flex; align-items:center; gap:8px; font-size:.84rem; color:var(--ink); font-family:var(--font-body); cursor:pointer; user-select:none;}
  .modal-bd .chk input{width:16px; height:16px; accent-color:var(--gold-strong); cursor:pointer;}

  /* 토스트 */
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:#1c2430; color:#fff; padding:11px 20px; border-radius:10px; font-size:.84rem; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:80; box-shadow:var(--shadow-md);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.toast-top{bottom:auto; top:16px; transform:translateX(-50%) translateY(-20px);}
  .toast.toast-top.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header class="apphd">
  <div class="apphd-brand" id="goHome" title="정성인연 홈으로">
    <span class="apphd-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13.5 12 4l9 9.5"/><path d="M5 12v7.5h14V12"/><path d="M10 20v-5h4v5"/></svg></span>
    <div class="apphd-tt"><div class="apphd-t">정성인연 자산관리</div><div class="apphd-s">보유 자산 현황 대시보드</div></div>
  </div>
  <span class="apphd-grow"></span>
  <span class="fx-badge" id="fxBadge" title="실시간 USD/KRW 환율(자동)"></span>
  <select id="quoteInterval" class="hd-select" title="티커(#) 종목 시세 자동 갱신 주기">
    <option value="0">갱신 끔</option>
    <option value="60000">1분</option>
    <option value="300000">5분</option>
    <option value="600000">10분</option>
    <option value="1800000">30분</option>
  </select>
  <button class="btn ghost" id="btnLock" title="편집 잠금 해제(쓰기 키)">
    <svg class="ic lk-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    <span class="lk-label"></span>
  </button>
  <button class="btn ghost" id="btnSync" title="서버에서 새로고침 (공유 데이터)">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
    <span class="sync-badge" id="syncBadge"></span>
  </button>
  <button class="btn ghost" id="btnExport" title="데이터 파일 내보내기(JSON)">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
    <span>내보내기</span>
  </button>
  <button class="btn ghost" id="btnImport" title="데이터 파일 불러오기(JSON)">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 8 5-5 5 5"/><path d="M5 21h14"/></svg>
    <span>불러오기</span>
  </button>
  <input type="file" id="fileImport" accept="application/json,.json" hidden>
  <button class="btn ghost" id="btnTheme" aria-label="화면 테마 전환" title="라이트/다크 전환">
    <svg class="ic ic-theme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"></svg>
    <span id="themeLabel"></span>
  </button>
</header>

<div class="hub">
  <aside class="side" id="sidebar"></aside>
  <div id="sideBackdrop"></div>
  <button id="sideToggle" aria-label="사이드바 접기/펼치기" title="사이드바 접기/펼치기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
  <div class="content">

    <!-- 대시보드 -->
    <section id="view-dash" class="view hidden">
      <div class="pad">
        <div class="vhd">
          <div>
            <div class="eyebrow">ASSET DASHBOARD</div>
            <h1>자산 대시보드</h1>
            <div class="sub">보유 자산을 항목별로 입력하고 전체 비중을 한눈에 확인합니다.</div>
          </div>
        </div>
        <div class="dash" id="dashBody"></div>
      </div>
    </section>

    <!-- 자산 목록 -->
    <section id="view-list" class="view hidden">
      <div class="pad">
        <div class="vhd">
          <div>
            <div class="eyebrow" id="listEyebrow">ASSETS</div>
            <h1 id="listTitle">전체 자산</h1>
            <div class="sub" id="listSub"></div>
          </div>
          <div class="vhd-actions">
            <button class="btn" id="btnDense" title="목록 표시 전환 (간단히 ↔ 자세히)"></button>
            <button class="btn" id="btnSort" title="정렬 방식 전환 (금액순 ↔ 수동 드래그)"></button>
            <button class="btn gold" id="btnAdd">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              자산 추가
            </button>
          </div>
        </div>
        <div class="list-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input id="listSearch" type="search" placeholder="항목명·기관·종목·이름·메모 검색" autocomplete="off">
        </div>
        <div class="card list-card">
          <div id="listBody"></div>
        </div>
      </div>
    </section>

  </div>
</div>

<!-- 자산 입력/수정 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-hd"><span id="modalTitle">자산 추가</span><button id="modalClose" aria-label="닫기">&times;</button></div>
    <div class="modal-bd">
      <div class="field"><label for="fCat">분류</label><select id="fCat"></select></div>
      <div class="field"><label for="fInst">기관</label><input id="fInst" type="text" placeholder="예) 키움증권, 국민은행, 업비트" maxlength="30"></div>
      <div class="field"><label for="fName">항목명</label><input id="fName" type="text" placeholder="예) 삼성전자, 전세보증금, 비트코인" maxlength="40"></div>
      <div id="stockFields">
        <div class="field"><label for="fTicker">보유종목</label><input id="fTicker" type="text" placeholder="예) #TSLA(현재가 자동), 005930" maxlength="30"></div>
        <div class="field"><label for="fQty">보유수</label><input id="fQty" type="number" min="0" step="1" inputmode="numeric" placeholder="0"></div>
        <div class="field"><label for="fPrice">현재가 <span id="priceAutoBadge" class="auto-badge">시세 자동</span></label>
          <div style="display:flex; gap:8px;">
            <select id="fCur" style="width:88px; flex:none;"><option value="KRW">원</option><option value="USD">달러</option></select>
            <input id="fPrice" type="text" inputmode="decimal" placeholder="0" style="flex:1;">
          </div>
        </div>
      </div>
      <div class="field"><label for="fOwner">이름</label><input id="fOwner" type="text" placeholder="예) 최정식, 공동" maxlength="20"></div>
      <div class="field"><label for="fAmount">평가금액 (원)</label><input id="fAmount" type="text" inputmode="numeric" placeholder="0"><div class="hint" id="fAmountKor"></div></div>
      <div class="field"><label for="fNote">메모 (선택)</label><input id="fNote" type="text" placeholder="예) 250주 / $9,000 / 분당" maxlength="60"></div>
      <div class="inc-row">
        <label class="chk"><input type="checkbox" id="fInclude" checked> 자산 합계에 포함</label>
        <span class="sold-wrap" id="soldWrap">합계 포함 수량 <input id="fInclQty" type="number" min="0" step="1" inputmode="numeric" placeholder="전량"> 주</span>
      </div>
      <div class="sold-hint" id="soldHint"></div>
    </div>
    <div class="modal-ft">
      <button class="btn" id="modalCancel">취소</button>
      <button class="btn gold" id="modalSave">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===================== 데이터 모델 ===================== */
const STORE_KEY="jsiy_assets_v1";
const NAV_KEY="jsiy_nav";
const THEME_KEY="jsiy_theme";
const SIDE_KEY="jsiy_sidebar";
const DENSE_KEY="jsiy_dense";   // 모바일 목록 간단히 보기(체크박스+항목명+금액만)

const CATS=[
  {id:"kr",      name:"국내주식", color:"#3b6ea5"},
  {id:"us",      name:"해외주식", color:"#0f8a6d"},
  {id:"pension", name:"퇴직연금", color:"#6f42c1"},
  {id:"cash",    name:"현금",     color:"#b06f00"},
  {id:"estate",  name:"부동산",   color:"#c0392b"},
  {id:"crypto",  name:"암호화폐", color:"#d99800"},
  {id:"etc",     name:"기타",     color:"#5b6b7c"},
];
const catById=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];

function genId(){ return "a"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }

const DEFAULT_DATA={
  items:[
    {cat:"kr",      name:"삼성전자",     amount:18500000, note:"",       owner:"최정식", inst:"키움증권",     ticker:"005930", qty:250, price:74000},
    {cat:"kr",      name:"카카오",       amount:6120000,  note:"",       owner:"최정식", inst:"키움증권",     ticker:"035720", qty:180, price:34000},
    {cat:"us",      name:"Apple",        amount:12420000, note:"$9,000", owner:"이수진", inst:"미래에셋증권", ticker:"AAPL",   qty:60,  price:207000},
    {cat:"us",      name:"Tesla",        amount:5800000,  note:"",       owner:"이수진", inst:"미래에셋증권", ticker:"TSLA",   qty:25,  price:232000},
    {cat:"pension", name:"DC형 퇴직연금", amount:34000000, note:"미래에셋", owner:"최정식", inst:"미래에셋증권"},
    {cat:"cash",    name:"입출금 통장",   amount:8700000,  note:"",       owner:"최정식", inst:"국민은행"},
    {cat:"cash",    name:"CMA",          amount:15000000, note:"",       owner:"이수진", inst:"삼성증권"},
    {cat:"estate",  name:"전세보증금",    amount:320000000,note:"분당",    owner:"공동",   inst:""},
    {cat:"crypto",  name:"비트코인",      amount:9300000,  note:"0.1 BTC",owner:"최정식", inst:"업비트"},
    {cat:"etc",     name:"금(골드바)",    amount:4500000,  note:"",       owner:"이수진", inst:"한국금거래소"},
  ].map((x,i)=>({id:genId(), ...x, updatedAt:Date.now()-i*3600000})),
  meta:{title:"정성인연 자산 현황"}
};

let data;
function normalizeItem(it){ if(!it.id) it.id=genId(); it.amount=Number(it.amount)||0; if(!catById(it.cat)) it.cat="etc"; it.include=it.include!==false; if(it.owner==null) it.owner=""; if(it.inst==null) it.inst=""; if(it.ticker==null) it.ticker=""; it.qty=Number(it.qty)||0; it.price=Number(it.price)||0; it.cur=it.cur==="USD"?"USD":"KRW";
  if(isStockCat(it.cat)){
    // 정규 필드=incQty(합계에 포함할 주식수). 미설정=전량 포함. 구버전 soldQty(매도=제외분)는 남은 수량으로 변환(금액 보존)
    if(it.incQty!=null&&it.incQty!==""&&isFinite(Number(it.incQty))){ it.incQty=Math.max(0,Math.min(Math.round(Number(it.incQty)),it.qty)); if(it.incQty>=it.qty) delete it.incQty; }
    else if(it.soldQty!=null&&it.soldQty!==""&&isFinite(Number(it.soldQty))){ const inc=it.qty-Math.max(0,Math.min(Math.round(Number(it.soldQty)),it.qty)); if(inc<it.qty) it.incQty=Math.max(0,inc); }  // 구버전 soldQty(매도수량)→incQty(포함수량)
    delete it.soldQty;
  } else { delete it.soldQty; delete it.incQty; }
}
function normalizeData(d){ if(!d||!Array.isArray(d.items)) return null; d.items.forEach(normalizeItem); if(!d.meta) d.meta={title:"정성인연 자산 현황"}; return d; }
function loadData(){
  let d=null;
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw) d=JSON.parse(raw); }catch(e){}
  data=normalizeData(d)||normalizeData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
}
function saveData(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){} }  // 로컬 캐시만(서버는 연산으로 별도 반영)

/* ===================== 서버 동기화 (연산 기반, 동시 편집 안전) ===================== */
const SERVER_URL="api.php";  // 같은 디렉터리의 PHP 엔드포인트
const KEY_KEY="jsiy_key";    // 쓰기 키(이 기기에만 저장)
let writeKey=""; try{ writeKey=localStorage.getItem(KEY_KEY)||""; }catch(e){}
let syncState="";            // ""|"ok"|"saving"|"loading"|"offline"|"error"
let lastRev=null;            // 서버 리비전(폴링 변경 감지)
function setSync(s){ syncState=s; updateSyncUI(); }
function updateSyncUI(){
  const el=document.getElementById("syncBadge"); if(!el) return;
  const map={ok:"동기화됨",saving:"저장 중…",loading:"불러오는 중…",offline:"오프라인",error:"저장 실패"};
  el.textContent=map[syncState]||"";
  el.className="sync-badge sync-"+(syncState||"");
}
// 연산을 서버에 전송(전체 문서 대신 변경분만 → 동시 편집 시 서로 덮어쓰지 않음)
function sendOp(op){
  saveData();  // 로컬 즉시 반영
  if(!isUnlocked()) return;  // 읽기 전용이면 서버 미전송
  setSync("saving");
  fetch(SERVER_URL,{method:"POST",headers:{"Content-Type":"application/json","X-Write-Key":writeKey},body:JSON.stringify(op)})
    .then(r=>{ if(r.status===403){ setSync("error"); toast("쓰기 권한이 없습니다 — 잠금 해제 키를 확인하세요."); throw "forbidden"; } return r.ok?r.json():Promise.reject(); })
    .then(j=>{ if(j&&j.ok){ lastRev=j.rev; setSync("ok"); } else setSync("error"); })
    .catch(e=>{ if(e!=="forbidden") setSync("offline"); });
}
function opUpsert(it){ sendOp({op:"upsert",item:it}); }
function opDelete(id){ sendOp({op:"delete",id:id}); }
function opReorder(){ sendOp({op:"reorder",order:data.items.map(i=>i.id)}); }
function opMeta(m){ sendOp({op:"meta",meta:m}); }
function opReplace(){ sendOp({op:"replace",doc:{items:data.items,meta:data.meta}}); }
function opBulkInclude(ids,include){ sendOp({op:"bulkInclude",ids:ids,include:include}); }
function applyServerData(d){
  const nd=normalizeData(d); if(!nd) return false;
  data=nd; recomputeFx(); saveData(); render(); refreshQuotes(); return true;
}

/* ===================== 환율(USD/KRW) ===================== */
let usdRate=1380;  // 기본값(서버 조회 전)
function fmtRate(){ return "$1=₩"+Math.round(usdRate).toLocaleString("ko-KR"); }
function updateFxBadge(){ const el=document.getElementById("fxBadge"); if(el) el.textContent=fmtRate(); }
// 주식 항목 평가금액을 보유수×현재가(×환율) 로 재계산(메모리·표시용, 서버에 다시 쓰지 않음)
function recomputeFx(){ if(!data||!data.items) return; data.items.forEach(it=>{ if(isStockCat(it.cat)) it.amount=Math.round((Number(it.qty)||0)*(Number(it.price)||0)*(it.cur==="USD"?usdRate:1)); }); }
function fetchRate(){
  fetch(SERVER_URL+"?rate=1",{cache:"no-store"})
    .then(r=>r.ok?r.json():Promise.reject()).then(j=>{
      if(j&&j.rate){ usdRate=Number(j.rate)||usdRate; updateFxBadge(); recomputeFx(); saveData(); render(); }
    }).catch(()=>{});
}
// 티커(#붙은 종목)의 현재가를 시세 API로 자동 갱신(메모리·표시용)
const tickerSym=it=>{ const t=String(it.ticker||"").trim(); return t.charAt(0)==="#"?t.slice(1).trim():""; };
let lastQuotes=0;
function refreshQuotes(force){
  if(!data||!data.items) return;
  if(!force && Date.now()-lastQuotes<60000) return;
  const list=data.items.filter(it=>isStockCat(it.cat)&&tickerSym(it));
  if(!list.length) return;
  lastQuotes=Date.now();
  Promise.all(list.map(it=>{
    const mk=it.cat==="kr"?"kr":"us";
    return fetch(SERVER_URL+"?quote="+encodeURIComponent(tickerSym(it))+"&market="+mk,{cache:"no-store"})
      .then(r=>r.json()).then(j=>{ if(j&&j.ok){ it.price=Number(j.price)||it.price; it.cur=j.cur==="USD"?"USD":"KRW"; } }).catch(()=>{});
  })).then(()=>{ recomputeFx(); saveData(); render(); });
}
/* 시세 자동 갱신 주기 */
const QI_KEY="jsiy_quote_interval";
let quoteIntervalMs=300000;  // 기본 5분
try{ const s=localStorage.getItem(QI_KEY); if(s!==null) quoteIntervalMs=Number(s)||0; }catch(e){}
let quoteTimer=null;
function startQuoteTimer(){
  clearInterval(quoteTimer); quoteTimer=null;
  if(quoteIntervalMs>0){
    quoteTimer=setInterval(()=>{
      if(document.hidden) return;
      if(document.getElementById("modalBg").classList.contains("open")) return;
      refreshQuotes(true);
    }, quoteIntervalMs);
  }
}
function pullFromServer(opts){
  opts=opts||{};
  if(!opts.quiet) setSync("loading");
  fetch(SERVER_URL,{cache:"no-store"})
    .then(r=>r.ok?r.text():Promise.reject()).then(txt=>{
      let d=null; try{ d=JSON.parse(txt); }catch(e){}
      if(d&&Array.isArray(d.items)){
        if(d._rev!==lastRev){ applyServerData(d); lastRev=d._rev; }
        setSync("ok");
      } else if(d===null){ if(opts.initial&&isUnlocked()) opReplace(); else setSync("ok"); }  // 빈 서버는 편집 권한 있을 때만 시드
      else setSync("ok");
    })
    .catch(()=>setSync("offline"));
}
// 주기적 폴링: 다른 기기 변경을 자동 반영(편집 중/드래그 중에는 건너뜀)
let dragId=null;
function startPolling(){
  setInterval(()=>{
    if(document.hidden) return;
    if(document.getElementById("modalBg").classList.contains("open")) return;
    if(dragId) return;
    pullFromServer({quiet:true});
  },6000);
}

/* ===================== 편집 잠금(쓰기 키) ===================== */
const ICON_LOCK=`<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>`;
const ICON_UNLOCK=`<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V6.5A4 4 0 0 1 15.5 5"/>`;
function isUnlocked(){ return !!writeKey; }
function requireEdit(){ if(!isUnlocked()){ toast("편집하려면 우측 상단에서 잠금을 해제하세요."); return false; } return true; }
function applyLockUI(){
  document.body.classList.toggle("can-edit", isUnlocked());
  const b=document.getElementById("btnLock"); if(!b) return;
  b.querySelector(".lk-ico").innerHTML=isUnlocked()?ICON_UNLOCK:ICON_LOCK;
  b.querySelector(".lk-label").textContent=isUnlocked()?"편집 가능":"읽기 전용";
  b.title=isUnlocked()?"편집 잠그기":"편집 잠금 해제(쓰기 키)";
}
function lockEdit(){ writeKey=""; try{ localStorage.removeItem(KEY_KEY); }catch(e){} applyLockUI(); render(); toast("읽기 전용으로 잠갔습니다."); }
function unlockEdit(){
  const k=prompt("편집하려면 쓰기 키를 입력하세요"); if(k==null) return;
  setSync("loading");
  fetch(SERVER_URL+"?check=1",{headers:{"X-Write-Key":k}})
    .then(r=>r.json()).then(j=>{
      if(j&&j.valid){ writeKey=k; try{ localStorage.setItem(KEY_KEY,k); }catch(e){} applyLockUI(); render(); toast("편집 잠금을 해제했습니다."); pullFromServer({initial:true}); }
      else { toast("쓰기 키가 올바르지 않습니다."); setSync("ok"); }
    })
    .catch(()=>{ toast("서버에 연결할 수 없습니다."); setSync("offline"); });
}
function toggleLock(){ isUnlocked()?lockEdit():unlockEdit(); }

/* ===================== 포맷 ===================== */
function fmtWon(n){ return "₩"+(Number(n)||0).toLocaleString("ko-KR"); }
function korUnit(n){
  n=Math.round(Number(n)||0);
  if(n<10000) return n.toLocaleString("ko-KR")+"원";
  const eok=Math.floor(n/1e8), man=Math.floor((n%1e8)/1e4);
  if(eok>0) return eok.toLocaleString("ko-KR")+"억"+(man>0?" "+man.toLocaleString("ko-KR")+"만":"");
  return man.toLocaleString("ko-KR")+"만";
}
function korShort(n){
  n=Math.round(Number(n)||0);
  if(n<=0) return "0";
  if(n>=1e8) return (n/1e8).toFixed(n%1e8===0?0:1)+"억";
  if(n>=1e4) return Math.round(n/1e4).toLocaleString("ko-KR")+"만";
  return n.toLocaleString("ko-KR");
}
function escHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

/* ===================== 집계 ===================== */
const isIncluded=it=>it.include!==false;  // 합계 포함 여부(미설정=포함)
// 주식 일부 반영: incQty(합계에 포함할 주식수)만큼만 가능자산에 반영. 미설정=전량 포함. 나머지(보유수-포함)는 제외
function inclQty(it){ if(!isStockCat(it.cat)) return Number(it.qty)||0; const q=Number(it.qty)||0; if(it.incQty==null||it.incQty==="") return q; let n=Number(it.incQty); if(!isFinite(n)||n<0) n=0; return Math.min(n,q); }
function exclQty(it){ return Math.max(0,(Number(it.qty)||0)-inclQty(it)); }  // 합계에서 제외되는 주식수
function isPartial(it){ if(!isIncluded(it)||!isStockCat(it.cat)) return false; const q=Number(it.qty)||0; return q>0&&it.incQty!=null&&it.incQty!==""&&inclQty(it)<q; }
function incAmt(it){ if(!isIncluded(it)) return 0; const q=Number(it.qty)||0; if(isStockCat(it.cat)&&q>0&&isPartial(it)) return Math.round((Number(it.amount)||0)*inclQty(it)/q); return Number(it.amount)||0; }  // 합계(가능자산)에 반영되는 금액
function totalsByCat(){ const t={}; CATS.forEach(c=>t[c.id]=0); data.items.forEach(it=>{ t[it.cat]=(t[it.cat]||0)+incAmt(it); }); return t; }
function grandTotal(){ return data.items.reduce((s,it)=>s+incAmt(it),0); }
function allItemsTotal(){ return data.items.reduce((s,it)=>s+(Number(it.amount)||0),0); }  // 제외 항목·미포함분까지 보유 전량

/* ===================== 내비게이션 ===================== */
let scope="dash"; // "dash" | "all" | <catId>
function loadScope(){ try{ const s=localStorage.getItem(NAV_KEY); if(s) scope=s; }catch(e){} if(scope!=="dash"&&scope!=="all"&&!catById2(scope)&&scope.indexOf("owner:")!==0&&scope.indexOf("inst:")!==0) scope="dash"; }
function catById2(id){ return CATS.some(c=>c.id===id); }
const isMobile=()=>window.innerWidth<=760;
function navTo(s, fromPop){ const prev=scope; scope=s; try{ localStorage.setItem(NAV_KEY,s); }catch(e){} if(typeof colSort!=="undefined")colSort=null; const ls=document.getElementById("listSearch"); if(ls) ls.value=""; if(isMobile()) document.body.classList.add("side-collapsed"); render(); if(!fromPop && s!==prev) _histPush({}); }

/* ===================== 렌더: 사이드바 ===================== */
const DASH_ICO=`<svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="11" width="8" height="10" rx="1.5"/><rect x="3" y="14" width="8" height="7" rx="1.5"/></svg>`;
function renderSidebar(){
  const sb=document.getElementById("sidebar");
  const t=totalsByCat(), total=grandTotal();
  let h="";
  h+=`<div class="nav-pinned">
    <button class="nav-item nav-dash${scope==="dash"?" active":""}" data-nav="dash">${DASH_ICO}<span class="ni-name">대시보드</span></button>
    <button class="nav-item${scope==="all"?" active":""}" data-nav="all"><span class="ni-dot ni-all"></span><span class="ni-name">전체 자산</span><span class="ni-count">${korShort(total)}</span></button>
  </div>`;
  h+=`<div class="nav-cat"><div class="nav-cat-head2"><span class="nav-cat-name">분류</span></div><div class="nav-items">`;
  CATS.forEach(c=>{
    h+=`<button class="nav-item${scope===c.id?" active":""}" data-nav="${c.id}" title="${escHtml(c.name)}"><span class="area-chip-sm" style="background:${c.color}"></span><span class="ni-name">${escHtml(c.name)}</span><span class="ni-count">${korShort(t[c.id])}</span></button>`;
  });
  h+=`</div></div>`;
  sb.innerHTML=h;
  sb.querySelectorAll(".nav-item").forEach(b=>b.addEventListener("click",()=>navTo(b.dataset.nav)));
}

/* ===================== 렌더: 대시보드 ===================== */
const TAX_PCT=3.3;  // 부동산 보유세(취득세 등) 가산율
function goalTarget(){ return Number(data.meta&&data.meta.target)||0; }
function taxOn(){ return !!(data.meta&&data.meta.taxOn); }
function effectiveTarget(){ const b=goalTarget(); return taxOn()?Math.round(b*(1+TAX_PCT/100)):b; }
function renderGoal(){
  const inc=grandTotal(), all=allItemsTotal(), base=goalTarget(), target=effectiveTarget(), tax=taxOn();
  const hasExcl=all>inc+0.5;                                 // 합산 제외 항목이 있을 때만 '전체' 별도 표시
  const editable=isUnlocked();
  const taxChk=base?`<label class="gt-check"><input type="checkbox" id="taxChk" ${tax?"checked":""} ${editable?"":"disabled"}> 보유세 +${TAX_PCT}%</label>`:"";
  const done=base>0&&inc>=target;                            // 포함 자산 기준 목표 달성
  const head=`<div class="goal-head">
      <div class="goal-target"><span class="gt-label">목표 매수가 (부동산)</span>${base?`${fmtWon(target)} <span class="gt-kor">(${korUnit(target)})</span>${tax?` <span class="gt-tax-inline">보유세 +${TAX_PCT}% 포함</span>`:""}${done?` <span class="gt-done">달성 ${(inc/target*100).toFixed(0)}%</span>`:""}`:`<span style="color:var(--ink-faint)">미설정</span>`}</div>
      <div class="goal-head-act">${taxChk}</div>
    </div>`;
  let viz="";
  if(target>0||editable){                                    // 편집 모드면 목표 미설정이라도 막대를 띄워 드래그로 설정
    const STEP=5e8;
    const rawMax=Math.max(all,target);
    let scaleMax=(Math.floor(rawMax/STEP)+1)*STEP;           // 5억 격자 + 목표선 우측 여유(드래그로 더 높이 설정 가능)
    if(scaleMax-rawMax<STEP*0.35) scaleMax+=STEP;
    const pct=v=>Math.max(0,Math.min(100,v/scaleMax*100));
    const goalLeft=target>0?pct(target):0;
    const allW=pct(all), incW=pct(inc);
    const anchorRight=goalLeft>72, anchorLeft=goalLeft<10;
    const pctInc=target>0?inc/target*100:0, pctAll=target>0?all/target*100:0;
    const eokSign=v=>(v>=0?"+":"-")+(Math.abs(v)/1e8).toFixed(1)+"억";   // 목표 대비 차액(억, 부호)
    const footLine=(label,amt)=>{const d=amt-target; return `<div class="goal-foot-line"><b>${label}</b> : <span class="${d>=0?"fl-up":"fl-down"}">${eokSign(d)}</span></div>`;};
    // 5억 단위 눈금자(라벨이 겹치지 않게 최대 7개만 표시, 사이는 보조 눈금만)
    const maxTick=Math.floor(scaleMax/STEP);
    let axis="";
    if(maxTick>=1){
      let labelEvery=1;
      while((maxTick/labelEvery)+1>7) labelEvery++;
      let ticks="";
      for(let i=0;i<=maxTick;i++){
        const left=i*STEP/scaleMax*100, lbl=(i%labelEvery===0);
        const align=i===0?";transform:translateX(0)":(left>=99?";transform:translateX(-100%)":"");
        ticks+=`<span class="gax-tick${lbl?" lbl":""}" style="left:${left.toFixed(2)}%${align}"><i></i>${lbl?`<b>${i===0?"0":(i*5)+"억"}</b>`:""}</span>`;
      }
      axis=`<div class="goal-axis">${ticks}</div>`;
    }
    const labelTxt=target>0?`🎯 목표 ${fmtWon(target)}${tax?" (세포함)":""}`:"🎯 목표 설정";
    const labelCls=anchorRight?" right":(anchorLeft?" left":"");
    // 한 줄 배치: 가능(작은 값)은 점 왼쪽, 전체(큰 값)은 점 오른쪽으로 벌려 겹침 방지(끝에선 안쪽 정렬)
    const incAnchor=incW<16?" pin-l":" pin-r";
    const allAnchor=allW>84?" pin-r":" pin-l";
    const ends=(target>0&&hasExcl)?`<div class="gs-ends"><span class="gs-inc${pctInc>=100?" done":""}${incAnchor}" style="left:${incW.toFixed(2)}%">가능</span><span class="gs-all${pctAll>=100?" done":""}${allAnchor}" style="left:${allW.toFixed(2)}%">전체</span></div>`:"";
    viz=`
      <div class="goalscale${editable?" editable":""}" data-smax="${scaleMax}"${editable?' data-editable="1"':""}>
        <div class="gs-goal-label${labelCls}" style="left:${goalLeft.toFixed(2)}%"${editable?' title="드래그하거나 더블클릭해 직접 입력"':""}>${labelTxt}</div>
        <div class="goal-track${editable?" grabbable":""}">
          ${hasExcl?`<div class="goal-fill all" style="width:${allW.toFixed(2)}%"></div>`:""}
          <div class="goal-fill inc" style="width:${incW.toFixed(2)}%"></div>
        </div>
        <div class="gs-goalline${editable?" draggable":""}" style="left:${goalLeft.toFixed(2)}%">${editable?'<span class="gs-knob"></span>':""}</div>
        ${editable?`<div class="gs-tooltip" hidden></div>`:""}
        ${ends}
        ${axis}
      </div>
      ${target>0?`<div class="goal-foot">${hasExcl?footLine("가능자산",inc)+footLine("전체자산",all):footLine("보유자산",inc)}</div>`:(editable?`<div class="goal-hint-drag">막대의 <b>🎯 목표선</b>을 좌우로 드래그해 목표 매수가를 설정하세요 <span style="opacity:.8">(1억원 단위 · 더블클릭 시 직접 입력)</span></div>`:"")}`;
  }else{
    viz=`<div class="goal-empty">목표 매수가를 설정하면 달성률을 시각화합니다.</div>`;
  }
  return `<div class="card goal-card${done?" goal-done":""}">${head}${viz}</div>`;
}
function renderDonut(t,total){
  const r=70, C=2*Math.PI*r, sw=28;
  const track=`<circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--line-faint)" stroke-width="${sw}"/>`;
  let off=0, segs="";
  if(total>0){
    CATS.forEach(c=>{
      const v=t[c.id]; if(v<=0) return;
      const len=(v/total)*C;
      segs+=`<circle class="donut-seg" data-cat="${c.id}" cx="100" cy="100" r="${r}" fill="none" stroke="${c.color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 100 100)" stroke-linecap="butt"><title>${escHtml(c.name)} ${fmtWon(v)}</title></circle>`;
      off+=len;
    });
  }
  return `<div class="donut"><svg viewBox="0 0 200 200">${track}${segs}</svg>
    <div class="donut-center"><div class="dc-k">총 자산</div><div class="dc-v">${korUnit(total)}</div></div></div>`;
}

// 목표선 드래그로 목표 매수가 설정 (버튼 대체)
function setupGoalDrag(){
  const scaleEl=document.querySelector(".goalscale[data-editable='1']");
  if(!scaleEl) return;
  const track=scaleEl.querySelector(".goal-track");
  const line=scaleEl.querySelector(".gs-goalline");
  const label=scaleEl.querySelector(".gs-goal-label");
  const tip=scaleEl.querySelector(".gs-tooltip");
  const smax=Number(scaleEl.dataset.smax)||1;
  const SNAP=1e8;                                            // 1억원 단위 스냅(정확한 억 단위로 자동 이동)
  let dragging=false;
  const baseAt=clientX=>{
    const r=track.getBoundingClientRect();
    let ratio=(clientX-r.left)/r.width; ratio=Math.max(0,Math.min(1,ratio));
    let b=ratio*smax; if(taxOn()) b=b/(1+TAX_PCT/100);       // 막대는 세포함 기준 → 기준가로 환산
    b=Math.round(b/SNAP)*SNAP; if(b<SNAP) b=0;
    return b;
  };
  const preview=b=>{
    const eff=taxOn()?Math.round(b*(1+TAX_PCT/100)):b;
    const left=Math.max(0,Math.min(100,eff/smax*100));
    line.style.left=left.toFixed(2)+"%";
    if(label){
      label.style.left=left.toFixed(2)+"%";
      label.classList.toggle("right",left>72);
      label.classList.toggle("left",left<10);
      label.textContent=b>0?`🎯 목표 ${fmtWon(eff)}${taxOn()?" (세포함)":""}`:"🎯 목표 설정";
    }
    if(tip){                                                  // 드래그 중 현재 억 단위 값 툴팁
      tip.style.left=left.toFixed(2)+"%";
      tip.classList.toggle("right",left>92);
      tip.classList.toggle("left",left<8);
      tip.textContent=b>0?korUnit(eff):"목표 해제";
    }
  };
  const down=e=>{
    if(!isUnlocked()) return;
    dragging=true; scaleEl.classList.add("dragging");
    if(tip){ clearTimeout(tip._t); tip.classList.remove("confirm"); tip.hidden=false; }
    try{ track.setPointerCapture(e.pointerId); }catch(_){}
    preview(baseAt(e.clientX)); e.preventDefault();
  };
  const move=e=>{ if(dragging){ preview(baseAt(e.clientX)); e.preventDefault(); } };
  const up=e=>{
    if(!dragging) return; dragging=false; scaleEl.classList.remove("dragging");
    if(tip) tip.hidden=true;
    const b=baseAt(e.clientX);
    if(!data.meta) data.meta={};
    data.meta.target=b; opMeta({target:b}); render();
    if(b>0) flashGoalConfirm(); else toast("목표를 해제했습니다.");   // 확정값은 막대 위에 강조(토스트 대체)
  };
  const cancel=()=>{                                          // 모바일 스크롤 등으로 포인터 취소 시: 값 변경 없이 원복(0 고정 방지)
    if(!dragging) return; dragging=false; scaleEl.classList.remove("dragging");
    if(tip) tip.hidden=true; render();
  };
  track.addEventListener("pointerdown",down);
  line.addEventListener("pointerdown",down);
  track.addEventListener("pointermove",move);
  track.addEventListener("pointerup",up);
  track.addEventListener("pointercancel",cancel);
  if(label) label.addEventListener("dblclick",e=>{ e.preventDefault(); editGoal(); });  // 정밀 입력(버튼 아님)
}
// 드래그 확정 시 막대 위에 확정값(억 단위) 강조 — 토스트 대신
function flashGoalConfirm(){
  const sc=document.querySelector(".goalscale[data-editable='1']"); if(!sc) return;
  const ln=sc.querySelector(".gs-goalline"), tp=sc.querySelector(".gs-tooltip"), lbl=sc.querySelector(".gs-goal-label");
  if(!tp||!ln) return;
  const eff=effectiveTarget(); if(eff<=0) return;
  const left=parseFloat(ln.style.left)||0;
  tp.style.left=left.toFixed(2)+"%";
  tp.classList.toggle("right",left>92); tp.classList.toggle("left",left<8);
  tp.textContent="✓ "+korUnit(eff);
  tp.classList.add("confirm"); tp.hidden=false;
  if(lbl) lbl.style.opacity="0";                            // 잠깐 정적 라벨 숨기고 확정 배지만 강조
  clearTimeout(tp._t);
  tp._t=setTimeout(()=>{ tp.hidden=true; tp.classList.remove("confirm"); if(lbl) lbl.style.opacity=""; },1400);
}

const COL_LABELS={cat:"분류",inst:"기관",name:"항목명",ticker:"보유종목",qty:"보유수",price:"현재가",amount:"평가금액",owner:"이름",note:"메모"};
function colLabel(k){ return COL_LABELS[k]||k; }
function cmpCol(a,b,k){
  if(k==="cat") return CATS.findIndex(c=>c.id===a.cat)-CATS.findIndex(c=>c.id===b.cat);
  if(k==="amount"||k==="qty"||k==="price") return (Number(a[k])||0)-(Number(b[k])||0);

function renderList(){

  const cat=isCat?catById(scope):null;
  document.getElementById("listEyebrow").textContent=isOwner?"OWNER":isInst?"INSTITUTION":(isCat?"ASSETS":"ALL ASSETS");
  document.getElementById("listTitle").textContent=isOwner?ownerName:isInst?instName:(isCat?cat.name:"전체 자산");
  const manual=sortMode()==="manual";
  const editable=isUnlocked();
  const q=((document.getElementById("listSearch")||{}).value||"").trim().toLowerCase();
  let items=data.items.slice();
  if(isCat) items=items.filter(it=>it.cat===scope);
  else if(isOwner) items=items.filter(it=>ownerOf(it)===ownerName);
  else if(isInst) items=items.filter(it=>instOf(it)===instName);
  const totalCount=items.length;
  if(q) items=items.filter(it=>[it.name,it.inst,it.ticker,it.owner,it.note,catById(it.cat).name].some(s=>String(s||"").toLowerCase().indexOf(q)>=0));
  if(colSort){ const d=colSort.dir==="desc"?-1:1; items.sort((a,b)=>d*cmpCol(a,b,colSort.key)); }
  else if(!manual){ items.sort((a,b)=>(Number(b.amount)||0)-(Number(a.amount)||0)); }  // 수동 모드는 저장 순서 유지
  const canDrag=manual&&editable&&!colSort&&!q;  // 정렬/검색 중엔 드래그 비활성
  const incItems=items.filter(isIncluded);
  const sum=incItems.reduce((s,it)=>s+incAmt(it),0);  // 일부 포함(incQty) 반영

const SORT_ICO_AMOUNT=`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M7 20l-3-3M7 20l3-3"/><path d="M13 6h7M13 11h5M13 16h3"/></svg>`;
const SORT_ICO_MANUAL=`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>`;
function sortMode(){ return data.meta&&data.meta.sortMode==="manual"?"manual":"amount"; }
function toggleSort(){
  if(!requireEdit()) return;
  colSort=null;  // 컬럼 정렬 해제
  if(!data.meta) data.meta={};
  data.meta.sortMode=sortMode()==="manual"?"amount":"manual";
  opMeta({sortMode:data.meta.sortMode}); render();
  toast(sortMode()==="manual"?"수동 정렬 — 드래그로 순서를 바꾸세요.":"금액순으로 정렬합니다.");
}
function wireRowDrag(body){
  const clearMarks=()=>body.querySelectorAll("tr.drop-before,tr.drop-after").forEach(t=>t.classList.remove("drop-before","drop-after"));
  body.querySelectorAll("tr[data-id]").forEach(tr=>{
    tr.addEventListener("dragstart",e=>{ dragId=tr.dataset.id; tr.classList.add("row-dragging"); e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragId);}catch(_){} });
    tr.addEventListener("dragend",()=>{ dragId=null; tr.classList.remove("row-dragging"); clearMarks(); });
    tr.addEventListener("dragover",e=>{
      if(!dragId||tr.dataset.id===dragId) return;
      e.preventDefault(); e.dataTransfer.dropEffect="move";
      const r=tr.getBoundingClientRect(); const after=e.clientY>r.top+r.height/2;
      clearMarks(); tr.classList.add(after?"drop-after":"drop-before");
    });
    tr.addEventListener("drop",e=>{
      if(!dragId||tr.dataset.id===dragId){ clearMarks(); return; }
      e.preventDefault();
      const after=tr.classList.contains("drop-after");
      moveItem(dragId,tr.dataset.id,after);
    });
  });
}
function moveItem(id,targetId,after){
  const arr=data.items;
  const from=arr.findIndex(x=>x.id===id); if(from<0) return;
  const item=arr.splice(from,1)[0];
  let to=arr.findIndex(x=>x.id===targetId); if(to<0){ arr.splice(from,0,item); return; }
  if(after) to++;
  arr.splice(to,0,item);
  opReorder(); render();
}

function updateSoldHint(){  // 입력 기준 안내: 입력한 수량만큼 합계에 반영되는 금액·제외분 실시간 표시(미입력=전량)
  const el=document.getElementById("soldHint"); if(!el) return;
  const stock=isStockCat(document.getElementById("fCat").value);
  const inc=document.getElementById("fInclude").checked;
  const qty=Math.max(0,Math.round(Number(document.getElementById("fQty").value)||0));
  const raw=String(document.getElementById("fInclQty").value).trim();
  if(!(stock&&inc)||raw===""||qty<=0){ el.textContent=""; return; }  // 미입력=전량 반영(안내 생략)
  let incl=Math.max(0,Math.round(Number(raw)||0)); incl=Math.min(incl,qty);
  const excl=Math.max(0,qty-incl);
  const usd=document.getElementById("fCur").value==="USD";
  const amt=Math.round(incl*rawNum("fPrice")*(usd?usdRate:1));
  el.textContent=`→ 합계 반영 ${incl.toLocaleString("ko-KR")}주 · ${fmtWon(amt)}${excl>0?` (제외 ${excl.toLocaleString("ko-KR")}주)`:""}`;
}
function updateTickerLockUI(){  // #티커면 현재가·통화는 시세 자동 → readonly+배지

function rawNum(id){ return Number(String(document.getElementById(id).value).replace(/[^\d.]/g,""))||0; }  // 콤마 등 제거 후 숫자

function fetchTickerPrice(){  // 보유종목이 #으로 시작하면 현재가 자동 조회
  const tk=document.getElementById("fTicker").value.trim();
  const cat=document.getElementById("fCat").value;
  if(!isStockCat(cat)||tk.charAt(0)!=="#") return;
  const sym=tk.slice(1).trim(); if(!sym) return;
  const mk=cat==="kr"?"kr":"us";
  document.getElementById("fAmountKor").textContent="시세 조회 중…";
  fetch(SERVER_URL+"?quote="+encodeURIComponent(sym)+"&market="+mk,{cache:"no-store"})
    .then(r=>r.json()).then(j=>{
      if(j&&j.ok){
        document.getElementById("fCur").value=j.cur==="USD"?"USD":"KRW";
        document.getElementById("fPrice").value=Number(j.price).toLocaleString("ko-KR");
        recalcAmount();
        toast(sym+" 현재가 "+(j.cur==="USD"?"$":"₩")+Number(j.price).toLocaleString("ko-KR"));
      }else{ updateAmountKor(); toast("시세를 찾지 못했습니다: "+sym); }
    }).catch(()=>{ updateAmountKor(); toast("시세 조회 실패"); });
}

  document.getElementById("fAmount").value=v?v.toLocaleString("ko-KR"):"";

function saveModal(){
  const cat=document.getElementById("fCat").value;
  const inst=document.getElementById("fInst").value.trim();
  const name=document.getElementById("fName").value.trim();
  const stock=isStockCat(cat);
  const ticker=stock?document.getElementById("fTicker").value.trim():"";
  const qty=stock?Math.max(0,Math.round(Number(document.getElementById("fQty").value)||0)):0;
  let inclQ=null;  // 합계에 포함할 수량. null(미입력)이면 전량 반영
  if(stock){ const raw=String(document.getElementById("fInclQty").value).trim(); if(raw!==""){ inclQ=Math.max(0,Math.min(Math.round(Number(raw)||0),qty)); } }

  const cur=stock?document.getElementById("fCur").value:"KRW";

  const amount=stock?Math.round(qty*price*(cur==="USD"?usdRate:1)):Math.max(0,Math.round(rawNum("fAmount")));  // 주식: 보유수×현재가(×환율)
  const note=document.getElementById("fNote").value.trim();
  const include=document.getElementById("fInclude").checked;
  if(!name){ toast("항목명을 입력하세요."); document.getElementById("fName").focus(); return; }
  try{ localStorage.setItem("jsiy_lastcat",cat); }catch(e){}  // 다음 추가 시 기본 분류로
  let saved;
  if(editingId){
    const it=data.items.find(x=>x.id===editingId);
    if(it){ it.cat=cat; it.inst=inst; it.name=name; it.ticker=ticker; it.qty=qty; it.price=price; it.cur=cur; it.owner=owner; it.amount=amount; it.note=note; it.include=include; if(inclQ!=null&&inclQ<qty) it.incQty=inclQ; else delete it.incQty; delete it.soldQty; it.updatedAt=Date.now(); }
    saved=it; toast("수정되었습니다.");
  }else{
    saved={id:genId(),cat,inst,name,ticker,qty,price,cur,owner,amount,note,include,updatedAt:Date.now()}; if(inclQ!=null&&inclQ<qty) saved.incQty=inclQ;
    data.items.push(saved); toast("자산이 추가되었습니다.");
  }
  if(saved) opUpsert(saved);
  closeModal(); render();
}
function delItem(id){
  if(!requireEdit()) return;
  const it=data.items.find(x=>x.id===id); if(!it) return;
  if(!confirm(`'${it.name}' 항목을 삭제할까요?`)) return;
  data.items=data.items.filter(x=>x.id!==id);
  opDelete(id); render(); toast("삭제되었습니다.");
}
function toggleTax(){
  if(!requireEdit()){ render(); return; }
  if(!data.meta) data.meta={};
  data.meta.taxOn=!data.meta.taxOn;
  opMeta({taxOn:data.meta.taxOn}); render();
  toast(data.meta.taxOn?("보유세 +"+TAX_PCT+"% 적용"):"보유세 미적용");
}
function editGoal(){
  if(!requireEdit()) return;
  const cur=goalTarget();
  const v=prompt("목표 매수가(원)를 입력하세요 (비우면 해제)", cur||"");
  if(v==null) return;
  const n=Math.max(0,Math.round(Number(String(v).replace(/[,\s₩]/g,""))||0));
  if(!data.meta) data.meta={};
  data.meta.target=n;
  opMeta({target:n}); render();
  toast(n?("목표 매수가: "+fmtWon(n)):"목표를 해제했습니다.");
}
function dupItem(id){
  if(!requireEdit()) return;
  const i=data.items.findIndex(x=>x.id===id); if(i<0) return;
  const src=data.items[i];
  const clone={...src, id:genId(), name:(src.name||"")+" (복사)", updatedAt:Date.now()};
  data.items.splice(i+1,0,clone);  // 원본 바로 아래에 삽입
  sendOp({op:"upsertAfter",item:clone,afterId:id});  // 서버에도 원본 뒤 삽입(원자적)
  render(); toast("항목을 복제했습니다.");
}

/* ===================== 데이터 파일 (공유/백업) ===================== */
function pad2(n){ return n<10?"0"+n:""+n; }
function exportData(){
  const d=new Date();
  const fn=`정성인연_자산_${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}.json`;
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fn; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast("데이터 파일을 내보냈습니다.");
}
function importData(file){
  if(!requireEdit()) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const nd=normalizeData(JSON.parse(rd.result));
      if(!nd) throw 0;
      if(!confirm("현재 데이터를 불러온 파일로 덮어쓸까요? (서버에도 반영됩니다)")) return;
      data=nd; opReplace(); render(); toast("데이터를 불러왔습니다.");
    }catch(e){ toast("올바른 자산 데이터 파일이 아닙니다."); }
  };
  rd.readAsText(file);
}

/* ===================== 토스트 ===================== */
let toastTimer=null;
function toast(msg){
  const el=document.getElementById("toast"); el.textContent=msg;
  const modalOpen=document.getElementById("modalBg").classList.contains("open");
  el.classList.toggle("toast-top",modalOpen);  // 입력 중엔 상단으로(키보드 가림 방지)
  el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

const ICON_SUN=`<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.4M12 19.6V22M22 12h-2.4M4.4 12H2M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7M19.1 19.1l-1.7-1.7M6.6 6.6 4.9 4.9"/>`;
function applyTheme(t){
  const dark=t==="dark";
  document.documentElement.setAttribute("data-theme",dark?"dark":"light");
  const ic=document.querySelector("#btnTheme .ic-theme");
  const lab=document.getElementById("themeLabel");
  if(ic) ic.innerHTML=dark?ICON_SUN:ICON_MOON;
  if(lab) lab.textContent=dark?"라이트":"다크";
  document.getElementById("btnTheme").setAttribute("aria-pressed",dark);
}
function initTheme(){ let t="light"; try{ const s=localStorage.getItem(THEME_KEY); if(s==="dark"||s==="light") t=s; }catch(e){} applyTheme(t); }
