<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>정성인연 — 자산관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --font:"Pretendard","Pretendard Variable",system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;

    --navy:#2b3a55; --navy2:#3a4d70;
    --gold:#f5b500; --gold-ink:#211a05; --gold-txt:#d99800; --gold-bg:#fef4dc; --gold-field:#fffdf5;

    --ink:#1c2430; --ink-soft:#4a5568; --ink-faint:#8a94a3; --ink-ph:#b3bcc8;
    --paper:#f4f6fa; --card:#ffffff; --field:#f7f9fc; --field2:#f2f5f9;
    --line:#eaeef4; --line-row:#f1f4f8; --line-in:#e3e9f1; --line-seg:#eef2f7;
    --up:#0f8a6d; --up-lite:#8fe6c3; --down:#c0392b;

    --r-lg:20px; --r-md:16px; --r:13px; --r-sm:11px; --r-xs:8px;
    --sh-1:0 1px 3px rgba(20,26,40,.05);
    --sh-card:0 1px 3px rgba(20,26,40,.05), 0 12px 30px rgba(20,26,40,.05);
    --sh-gold:0 4px 14px rgba(245,181,0,.36);
    --sh-modal:0 30px 70px rgba(20,26,40,.32);
    --sh-fab:0 10px 26px rgba(245,181,0,.42);
    --hero-g:linear-gradient(135deg,#2b3a55,#3a4d70);
    --chip-a:13%;  /* 분류색 아이콘 칩 배경 농도 — color-mix 로 라이트/다크 공통 처리 */
  }

  /* ===================== 다크 테마 (토큰만 재정의) ===================== */
  html[data-theme="dark"]{
    --ink:#e7ebf1; --ink-soft:#aab4c2; --ink-faint:#7f8996; --ink-ph:#5d6773;
    --paper:#11151c; --card:#1a202a; --field:#222a35; --field2:#262f3c;
    --line:#2a323e; --line-row:#232b36; --line-in:#333d4b; --line-seg:#2b3441;
    --gold-bg:rgba(245,181,0,.14); --gold-field:rgba(245,181,0,.07); --gold-txt:#ffc933;
    --up:#3fbf95; --down:#e8786b;
    --sh-1:0 1px 3px rgba(0,0,0,.35);
    --sh-card:0 1px 3px rgba(0,0,0,.4), 0 12px 30px rgba(0,0,0,.35);
    --sh-modal:0 30px 70px rgba(0,0,0,.65);
    --hero-g:linear-gradient(135deg,#1b2434,#26354f);
    --chip-a:26%;
  }
  html[data-theme="dark"] .cchip,
  html[data-theme="dark"] .grp-sq,
  html[data-theme="dark"] .bar-chip,
  html[data-theme="dark"] .lg-dot{filter:brightness(1.35);}
  html[data-theme="dark"] .btn.gold{color:#231c07;}

  *{box-sizing:border-box; margin:0; padding:0;}
  html{font-size:16px;}
  body{font-family:var(--font); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; padding-bottom:30px;}
  button,input,select{font-family:inherit;}
  .num{font-variant-numeric:tabular-nums;}

  /* ===================== 버튼 ===================== */
  .btn{border:1.5px solid var(--line-in); background:var(--card); color:var(--ink-soft); font-size:.82rem; font-weight:700; padding:0 15px; height:40px; border-radius:var(--r-sm); cursor:pointer; display:inline-flex; align-items:center; gap:7px; white-space:nowrap; transition:background .14s,border-color .14s,color .14s,box-shadow .14s;}
  .btn:hover{background:var(--field); color:var(--ink);}
  .btn:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}
  .btn .ic{width:16px; height:16px; flex:none;}
  .btn.gold{background:var(--gold); border-color:var(--gold); color:var(--gold-ink); box-shadow:0 2px 8px rgba(245,181,0,.3);}
  .btn.gold:hover{background:var(--gold); box-shadow:var(--sh-gold);}
  .btn.sm{height:34px; padding:0 11px; font-size:.76rem;}

  /* ===================== 헤더 ===================== */
  .apphd{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:12px; height:60px; padding:0 22px; background:var(--card); border-bottom:1px solid var(--line);}
  .apphd-brand{display:flex; align-items:center; gap:11px; cursor:pointer; user-select:none;}
  .apphd-mark{width:30px; height:30px; border-radius:9px; background:var(--navy); color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.82rem; flex:none;}
  .apphd-t{font-size:.9rem; font-weight:800; color:var(--ink); letter-spacing:-.01em; white-space:nowrap;}
  .apphd-grow{flex:1;}
  .tabs{display:flex; gap:4px; margin-left:8px;}
  .tabs button{border:none; background:transparent; color:var(--ink-faint); font-size:.84rem; font-weight:700; padding:8px 14px; border-radius:999px; cursor:pointer; white-space:nowrap;}
  .tabs button:hover{background:var(--field2); color:var(--ink-soft);}
  .tabs button.on{background:var(--navy); color:#fff;}
  html[data-theme="dark"] .tabs button.on{background:var(--gold); color:#231c07;}
  .fx-pill{font-size:.72rem; font-weight:700; color:var(--ink-faint); background:var(--field2); padding:6px 12px; border-radius:999px; white-space:nowrap;}
  .sync-badge{font-size:.72rem; font-weight:700;}
  .sync-badge.sync-ok{color:var(--up);} .sync-badge.sync-saving,.sync-badge.sync-loading{color:var(--gold-txt);}
  .sync-badge.sync-offline,.sync-badge.sync-error{color:var(--down);}
  .icobtn{width:38px; height:38px; border-radius:11px; border:1.5px solid var(--line-in); background:var(--card); color:var(--ink-soft); display:inline-flex; align-items:center; justify-content:center; cursor:pointer;}
  .icobtn:hover{background:var(--field); color:var(--ink);}
  .icobtn svg{width:18px; height:18px;}
  .icobtn.on{border-color:var(--gold); color:var(--gold-txt); background:var(--gold-bg);}

  /* 도구 드롭다운 */
  .menu-wrap{position:relative;}
  .menu{position:absolute; right:0; top:46px; z-index:60; min-width:236px; background:var(--card); border:1px solid var(--line); border-radius:var(--r-md); box-shadow:var(--sh-card); padding:7px; display:none;}
  .menu.open{display:block;}
  .menu-lbl{font-size:.68rem; font-weight:700; color:var(--ink-faint); padding:8px 10px 4px; letter-spacing:.03em;}
  .menu button.mi{display:flex; width:100%; align-items:center; gap:10px; border:none; background:transparent; color:var(--ink); font-size:.84rem; font-weight:600; padding:9px 10px; border-radius:var(--r-xs); cursor:pointer; text-align:left;}
  .menu button.mi:hover{background:var(--field);}
  .menu button.mi svg{width:17px; height:17px; flex:none; color:var(--ink-faint);}
  .menu button.mi .mi-tail{margin-left:auto; font-size:.74rem; font-weight:700; color:var(--ink-faint);}
  .menu .mi-sep{height:1px; background:var(--line); margin:6px 4px;}
  .menu select{width:100%; border:1.5px solid var(--line-in); background:var(--card); color:var(--ink); border-radius:var(--r-xs); padding:8px 10px; font-size:.82rem; font-weight:600; cursor:pointer;}

  /* ===================== 레이아웃 ===================== */
  .pad{max-width:1180px; margin:0 auto; padding:26px 26px 70px;}
  .view.hidden{display:none;}
  .vhd{display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap;}
  .vhd h1{font-size:1.3rem; font-weight:800; letter-spacing:-.02em; color:var(--ink);}
  .vhd .sub{font-size:.8rem; color:var(--ink-faint); margin-top:3px;}
  .vhd-actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}

  .card{background:var(--card); border-radius:var(--r-lg); box-shadow:var(--sh-card); padding:20px 22px;}
  .card-t{font-size:.78rem; font-weight:700; color:var(--ink-faint); margin-bottom:14px; letter-spacing:.02em;}
  .dash{display:flex; flex-direction:column; gap:18px;}
  .dash-top{display:grid; grid-template-columns:1.15fr 1fr; gap:18px; align-items:stretch;}
  .dash-2col{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start;}
  @media(max-width:900px){ .dash-top,.dash-2col{grid-template-columns:1fr;} }

  /* ===================== 히어로(총 자산) ===================== */
  .hero{position:relative; overflow:hidden; background:var(--hero-g); border-radius:var(--r-lg); padding:26px; color:#fff; cursor:pointer; display:flex; flex-direction:column; justify-content:center; box-shadow:var(--sh-card);}
  .hero::after{content:""; position:absolute; right:-46px; top:-72px; width:250px; height:250px; border-radius:50%; background:radial-gradient(circle at 32% 32%, rgba(245,181,0,.3), transparent 68%); pointer-events:none;}
  .hero-k{font-size:.76rem; font-weight:700; color:#c4cddc; letter-spacing:.03em;}
  .hero-v{font-size:2.5rem; font-weight:800; letter-spacing:-.03em; margin-top:6px; font-variant-numeric:tabular-nums; line-height:1.1;}
  .hero-kor{font-size:.88rem; font-weight:700; color:var(--gold); margin-top:5px;}
  .hero-stats{display:flex; gap:22px; margin-top:20px; position:relative;}
  .hero-stat{position:relative; padding-right:22px;}
  .hero-stat+.hero-stat{border-left:1px solid rgba(255,255,255,.18); padding-left:22px;}
  .hero-stat .hs-k{font-size:.7rem; color:#aebbcf; font-weight:600;}
  .hero-stat .hs-v{font-size:.92rem; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums;}
  .hero-stat .hs-v.excl{color:var(--up-lite);}

  /* ===================== 도넛 ===================== */
  .donut-row{display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
  .donut{position:relative; width:158px; height:158px; flex:none;}
  .donut svg{width:158px; height:158px; display:block;}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none;}
  .donut-center .dc-k{font-size:.66rem; color:var(--ink-faint); font-weight:700;}
  .donut-center .dc-v{font-size:1rem; font-weight:800; margin-top:2px; letter-spacing:-.01em;}
  .donut-seg{cursor:pointer; transition:opacity .12s;}
  .donut-seg:hover{opacity:.82;}
  .lg{flex:1; min-width:150px; display:flex; flex-direction:column; gap:2px;}
  .lg-row{display:flex; align-items:center; gap:8px; border:none; background:transparent; cursor:pointer; padding:5px 7px; border-radius:var(--r-xs); color:var(--ink); text-align:left;}
  .lg-row:hover{background:var(--field);}
  .lg-dot{width:8px; height:8px; border-radius:50%; flex:none;}
  .lg-name{font-size:.8rem; font-weight:700; flex:1; white-space:nowrap;}
  .lg-pct{font-size:.78rem; font-weight:800; color:var(--ink-soft); font-variant-numeric:tabular-nums;}

  /* ===================== 가로 바 ===================== */
  .bar-row{display:flex; align-items:center; gap:11px; width:100%; border:none; background:transparent; cursor:pointer; padding:7px 7px; border-radius:var(--r-xs); color:var(--ink); text-align:left;}
  .bar-row:hover{background:var(--field);}
  .bar-chip{width:10px; height:10px; border-radius:3px; flex:none;}
  .bar-name{width:78px; font-size:.8rem; font-weight:700; flex:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar-track{flex:1; height:8px; background:var(--line-row); border-radius:6px; overflow:hidden; min-width:40px;}
  .bar-fill{display:block; height:100%; border-radius:6px; transition:width .3s ease;}
  .bar-val{width:112px; text-align:right; font-size:.79rem; font-weight:800; flex:none; font-variant-numeric:tabular-nums;}
  .bar-pct{width:46px; text-align:right; font-size:.73rem; color:var(--ink-faint); flex:none; font-variant-numeric:tabular-nums;}
  .empty-line{color:var(--ink-faint); font-size:.84rem; padding:10px 6px;}

  /* ===================== 목표(매수가) 위젯 ===================== */
  .goal-head{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:6px;}
  .goal-target{font-size:1.5rem; font-weight:800; letter-spacing:-.02em;}
  .gt-label{display:block; font-size:.72rem; color:var(--ink-faint); font-weight:700; letter-spacing:.03em; margin-bottom:4px;}
  .gt-kor{font-size:.82rem; color:var(--ink-faint); font-weight:700; margin-left:4px; letter-spacing:0;}
  .gt-tax-inline{font-size:.62rem; color:var(--gold-txt); font-weight:700; background:var(--gold-bg); padding:3px 9px; border-radius:999px; vertical-align:middle; margin-left:8px; letter-spacing:0; white-space:nowrap;}
  .gt-done{font-size:.64rem; color:#fff; background:var(--up); font-weight:700; padding:3px 10px; border-radius:999px; vertical-align:middle; margin-left:8px; letter-spacing:0; white-space:nowrap;}
  .goal-done{box-shadow:var(--sh-card), inset 0 0 0 1.5px var(--up);}
  .goal-head-act{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .gt-check{display:inline-flex; align-items:center; gap:7px; font-size:.8rem; color:var(--ink-soft); font-weight:700; cursor:pointer; user-select:none;}
  .gt-check input{width:16px; height:16px; accent-color:var(--gold-txt); cursor:pointer;}
  .goalscale{position:relative; margin:32px 0 8px; padding-bottom:54px;}
  .gs-goal-label{position:absolute; top:-25px; transform:translateX(-50%); font-size:.82rem; font-weight:700; color:var(--ink); white-space:nowrap; background:var(--card); padding:0 5px;}
  .gs-goal-label.right{transform:translateX(-100%);}
  .gs-goal-label.left{transform:translateX(0);}
  .gs-goalline{position:absolute; top:-7px; height:38px; width:3px; background:var(--ink); border-radius:2px; box-shadow:0 0 0 2px var(--card);}
  .gs-goalline.draggable{cursor:ew-resize; z-index:6; touch-action:none;}
  .gs-goalline.draggable::before{content:""; position:absolute; left:-14px; right:-14px; top:-8px; bottom:-8px;}
  .gs-knob{position:absolute; left:50%; top:11px; transform:translate(-50%,-50%); width:15px; height:15px; border-radius:50%; background:var(--ink); border:2.5px solid var(--card); box-shadow:0 1px 4px rgba(0,0,0,.35); cursor:ew-resize; touch-action:none;}
  .goal-track{position:relative; height:24px; background:var(--line-row); border-radius:12px; overflow:hidden;}
  .goal-track.grabbable{cursor:pointer; touch-action:none;}
  .goal-fill{position:absolute; left:0; top:0; height:100%; border-radius:12px; transition:width .4s ease;}
  .goal-fill.all{background:#f3cf7a;}
  .goal-fill.inc{background:var(--gold);}
  html[data-theme="dark"] .goal-fill.all{background:#7a6a3a;}
  .gs-ends{position:absolute; left:0; right:0; top:0; bottom:0; pointer-events:none;}
  .gs-ends span{position:absolute; bottom:32px; transform:translateX(-50%); font-size:.74rem; font-weight:700; white-space:nowrap;}
  .gs-ends span.pin-l{transform:translateX(0);}
  .gs-ends span.pin-r{transform:translateX(-100%);}
  .gs-ends .gs-inc{color:var(--gold-txt);} .gs-ends .gs-all{color:#caa23a;}
  .gs-ends .gs-inc.done,.gs-ends .gs-all.done{color:var(--up);}
  .goal-axis{position:absolute; left:0; right:0; bottom:0; height:22px;}
  .gax-tick{position:absolute; top:0; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; pointer-events:none;}
  .gax-tick i{display:block; width:1.5px; height:4px; background:var(--line); border-radius:1px;}
  .gax-tick.lbl i{height:7px; background:var(--ink-faint);}
  .gax-tick b{font-size:.66rem; color:var(--ink-faint); font-weight:700; white-space:nowrap; margin-top:3px; font-variant-numeric:tabular-nums;}
  .goalscale.dragging .gs-goalline,.goalscale.dragging .gs-goal-label{transition:none;}
  .goalscale.dragging .gs-goal-label{opacity:0;}
  .gs-tooltip{position:absolute; top:-38px; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:1rem; font-weight:800; padding:5px 12px; border-radius:var(--r-xs); white-space:nowrap; box-shadow:0 3px 10px rgba(0,0,0,.28); pointer-events:none; z-index:8; letter-spacing:-.01em;}
  .gs-tooltip::after{content:""; position:absolute; left:50%; top:100%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--navy);}
  .gs-tooltip.left{transform:translateX(0);} .gs-tooltip.left::after{left:15px;}
  .gs-tooltip.right{transform:translateX(-100%);} .gs-tooltip.right::after{left:auto; right:15px;}
  .gs-tooltip[hidden]{display:none;}
  .gs-tooltip.confirm{background:var(--gold); color:var(--navy); animation:gsPulse .7s ease-out;}
  .gs-tooltip.confirm::after{border-top-color:var(--gold);}
  @keyframes gsPulse{0%{box-shadow:0 0 0 0 rgba(245,181,0,.6);} 70%{box-shadow:0 0 0 10px rgba(245,181,0,0);} 100%{box-shadow:0 0 0 0 rgba(245,181,0,0);}}
  .goal-foot{margin-top:14px; font-size:.86rem; color:var(--ink-soft);}
  .goal-foot-line{margin-top:4px;}
  .goal-foot-line b{font-weight:800; color:var(--ink);}
  .goal-foot-line .fl-up{color:var(--up); font-weight:800;}
  .goal-foot-line .fl-down{color:var(--down); font-weight:800;}
  .goal-hint-drag{margin-top:14px; font-size:.82rem; color:var(--ink-faint);}
  .goal-hint-drag b{font-weight:700; color:var(--ink-soft);}
  .goal-empty{color:var(--ink-faint); font-size:.85rem; padding:8px 0;}

  /* ===================== 목록: 검색·칩·정렬 ===================== */
  .search{display:flex; align-items:center; gap:9px; background:var(--card); border:1.5px solid var(--line-in); border-radius:var(--r-sm); padding:0 13px; height:40px; width:250px;}
  .search svg{width:16px; height:16px; color:var(--ink-faint); flex:none;}
  .search input{flex:1; min-width:0; border:none; background:transparent; padding:0; font-size:.82rem; color:var(--ink); outline:none;}
  .search input::placeholder{color:var(--ink-ph);}
  .search:focus-within{border-color:var(--gold);}
  .sortsel{height:40px; border:1.5px solid var(--line-in); background:var(--card); color:var(--ink-soft); border-radius:var(--r-sm); padding:0 10px; font-size:.8rem; font-weight:700; cursor:pointer;}
  .chips{display:flex; gap:7px; margin-bottom:16px; flex-wrap:wrap;}
  .chip{font-size:.76rem; font-weight:700; color:var(--ink-soft); background:var(--card); border:1px solid var(--line-in); padding:7px 15px; border-radius:999px; cursor:pointer; white-space:nowrap; display:inline-flex; align-items:center; gap:6px;}
  .chip:hover{border-color:var(--ink-faint);}
  .chip.on{background:var(--navy); border-color:var(--navy); color:#fff;}
  html[data-theme="dark"] .chip.on{background:var(--gold); border-color:var(--gold); color:#231c07;}
  .chip .x{font-size:.9rem; line-height:1; opacity:.7;}

  /* 분류 그룹 */
  .grp{display:flex; align-items:center; gap:9px; margin:20px 3px 10px;}
  .grp:first-child{margin-top:2px;}
  .grp-sq{width:10px; height:10px; border-radius:3px; flex:none;}
  .grp-n{font-size:.82rem; font-weight:800; color:var(--ink);}
  .grp-c{font-size:.72rem; color:var(--ink-faint);}
  .grp-line{flex:1; height:1px; background:var(--line);}
  .grp-sum{font-size:.8rem; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;}
  .grp-pct{font-size:.7rem; color:var(--ink-faint); width:46px; text-align:right; font-variant-numeric:tabular-nums;}

  /* 자산 행 */
  .rows{background:var(--card); border-radius:var(--r-md); box-shadow:var(--sh-1); overflow:hidden;}
  .arow{display:flex; align-items:center; gap:13px; padding:13px 18px; border-bottom:1px solid var(--line-row); transition:background .12s;}
  .arow:last-child{border-bottom:none;}
  .arow:hover{background:var(--field);}
  .arow.off{opacity:.6;}
  .cchip{width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.8rem; flex:none;}
  .arow-l{flex:1; min-width:0; cursor:pointer;}
  .arow-name{font-size:.86rem; font-weight:800; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .arow-qty{font-size:.68rem; color:var(--ink-faint); font-weight:600; margin-left:5px;}
  .arow-meta{font-size:.72rem; color:var(--ink-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .arow-r{flex:none; text-align:right; cursor:pointer;}
  .arow-amt{font-size:.92rem; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;}
  .arow.off .arow-amt{text-decoration:line-through; color:var(--ink-faint);}
  .arow-part{font-size:.66rem; color:var(--gold-txt); font-weight:700; margin-top:2px; white-space:nowrap;}
  .arow-act{display:flex; gap:3px; margin-left:4px; flex:none; opacity:.3; transition:opacity .12s;}   /* 평소엔 희미하게 — 자리는 유지해 금액 위치가 흔들리지 않게 */
  .arow:hover .arow-act,.arow:focus-within .arow-act{opacity:1;}
  .arow-act button{width:30px; height:30px; border:none; border-radius:var(--r-xs); background:var(--field2); color:var(--ink-faint); display:inline-flex; align-items:center; justify-content:center; cursor:pointer;}
  .arow-act button svg{width:15px; height:15px;}
  .arow-act button:hover{background:var(--line-in); color:var(--ink);}
  .arow-act button.del:hover{background:rgba(192,57,43,.14); color:var(--down);}
  .arow-act button.inc.on{color:var(--up);}
  .allbar{display:flex; align-items:center; gap:9px; font-size:.78rem; font-weight:700; color:var(--ink-faint); cursor:pointer; user-select:none; margin-bottom:10px; padding:0 3px;}
  .allbar input{width:16px; height:16px; accent-color:var(--gold-txt); cursor:pointer;}
  .empty{padding:56px 20px; text-align:center; color:var(--ink-faint); font-size:.86rem; background:var(--card); border-radius:var(--r-md); box-shadow:var(--sh-1);}
  .empty b{font-weight:800; color:var(--ink-soft);}
  .fab{display:none;}
  #btnDense{display:none;}   /* 간단히 보기는 모바일 전용 */

  /* ===================== 모달 / 시트 ===================== */
  .modal-bg{position:fixed; inset:0; background:rgba(20,26,40,.5); display:none; align-items:center; justify-content:center; z-index:70; padding:20px;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--card); border-radius:22px; width:100%; max-width:460px; box-shadow:var(--sh-modal); overflow:hidden; display:flex; flex-direction:column; max-height:calc(100vh - 40px);}
  @supports(height:100dvh){ .modal{max-height:calc(100dvh - 40px);} }
  .modal-hd{padding:18px 22px 14px; display:flex; align-items:center; justify-content:space-between; flex:none;}
  .modal-hd span{font-size:1rem; font-weight:800; letter-spacing:-.01em;}
  .modal-hd button{border:none; background:transparent; cursor:pointer; color:var(--ink-faint); font-size:1.4rem; line-height:1; padding:2px 6px; border-radius:var(--r-xs);}
  .modal-hd button:hover{background:var(--field); color:var(--ink);}
  .modal-bd{padding:4px 22px 20px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-ft{padding:14px 22px 18px; border-top:1px solid var(--line-row); display:flex; gap:9px; flex:none;}
  .modal-ft .btn{flex:1; justify-content:center; height:50px; border-radius:var(--r);}
  .modal-ft .btn.gold{flex:1.45;}
  .field label{display:block; font-size:.72rem; color:var(--ink-faint); font-weight:700; margin-bottom:6px;}
  .field input,.field select{width:100%; border:1.5px solid var(--line-in); background:var(--card); color:var(--ink); border-radius:var(--r); padding:0 13px; height:48px; font-size:.9rem; font-weight:700;}
  .field input::placeholder{color:var(--ink-ph); font-weight:600;}
  .field input:focus,.field select:focus{outline:none; border-color:var(--gold);}
  .field input.ro{background:var(--field); color:var(--ink-soft); cursor:not-allowed;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .row-in{display:flex; gap:8px;}

  /* 분류 세그먼트 */
  .segrid{display:grid; grid-template-columns:repeat(4,1fr); gap:7px;}
  .seg{border:1.5px solid var(--line-seg); background:var(--card); border-radius:var(--r); padding:9px 3px 8px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; transition:border-color .14s, background .14s;}
  .seg .sg-ic{width:29px; height:29px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:800;}
  .seg .sg-n{font-size:.63rem; font-weight:700; color:var(--ink-soft); white-space:nowrap;}
  .seg:hover{border-color:var(--line-in);}
  .seg.on .sg-n{color:var(--ink);}

  /* 주식 정보 박스(조건부) */
  .stockbox{background:var(--field); border-radius:var(--r-md); padding:14px; display:flex; flex-direction:column; gap:11px;}
  .stockbox-hd{display:flex; align-items:center; gap:7px; font-size:.7rem; font-weight:700; color:#3b6ea5;}
  html[data-theme="dark"] .stockbox-hd{color:#79a6d8;}
  .stockbox-hd i{width:6px; height:6px; border-radius:50%; background:currentColor; display:block;}
  .stockbox .field input,.stockbox .field select{background:var(--card); height:44px; border-radius:var(--r-sm); font-size:.86rem;}
  .auto-badge{display:none; font-size:.62rem; color:var(--gold-txt); background:var(--gold-bg); padding:2px 8px; border-radius:999px; margin-left:6px; font-weight:700;}

  /* 평가금액 강조 */
  .amt-field label{display:flex; align-items:center;}
  .amt-wrap{display:flex; align-items:center; gap:8px; border:1.5px solid var(--gold); background:var(--gold-field); border-radius:var(--r); padding:0 14px; height:56px;}
  .amt-wrap:focus-within{box-shadow:0 0 0 3px var(--gold-bg);}
  .amt-wrap .pre{font-size:1.1rem; font-weight:800; color:var(--gold-txt); flex:none;}
  .amt-wrap input{border:none; background:transparent; height:auto; padding:0; font-size:1.38rem; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .amt-wrap input:focus{outline:none;}
  .amt-wrap input.ro{background:transparent; color:var(--ink);}
  .hint{font-size:.74rem; font-weight:700; color:var(--gold-txt); margin-top:6px;}
  .hint:empty{display:none;}

  /* 토글 pill */
  .tgl-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:2px 0;}
  .tgl-row .tl{font-size:.86rem; font-weight:700; color:var(--ink);}
  input.tgl{appearance:none; -webkit-appearance:none; width:44px; height:26px; border-radius:999px; background:var(--line-in); position:relative; cursor:pointer; flex:none; transition:background .16s; border:none;}
  input.tgl::after{content:""; position:absolute; left:3px; top:3px; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .16s;}
  input.tgl:checked{background:var(--gold);}
  input.tgl:checked::after{transform:translateX(18px);}
  input.tgl:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .sold-wrap{display:none; align-items:center; gap:8px; font-size:.82rem; color:var(--ink-soft); font-weight:700;}
  .sold-wrap.on{display:flex;}
  .sold-wrap input{width:92px; border:1.5px solid var(--line-in); background:var(--card); color:var(--ink); border-radius:var(--r-sm); padding:0 11px; height:42px; font-size:.86rem; font-weight:700; text-align:right;}
  .sold-wrap input:focus{outline:none; border-color:var(--gold);}
  .sold-hint{color:var(--gold-txt); font-size:.78rem; font-weight:700; margin-top:-6px;}
  .sold-hint:empty{display:none;}

  /* ===================== PIN 잠금 화면 ===================== */
  .pin-gate{position:fixed; inset:0; z-index:100; background:var(--paper); display:none; align-items:center; justify-content:center; padding:20px;}
  body.locked .pin-gate{display:flex;}
  body.locked .apphd,body.locked .view{display:none;}
  .pin-box{width:100%; max-width:330px; background:var(--card); border-radius:22px; box-shadow:var(--sh-card); padding:34px 28px 28px; text-align:center;}
  .pin-mark{width:46px; height:46px; border-radius:14px; background:var(--navy); color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.1rem; margin:0 auto 16px;}
  .pin-t{font-size:1rem; font-weight:800; letter-spacing:-.01em;}
  .pin-s{font-size:.8rem; color:var(--ink-faint); margin-top:5px;}
  #pinInput{width:100%; margin-top:20px; height:54px; border:1.5px solid var(--line-in); border-radius:var(--r); background:var(--card); color:var(--ink); text-align:center; font-size:1.4rem; font-weight:800; letter-spacing:.4em; text-indent:.4em;}
  #pinInput:focus{outline:none; border-color:var(--gold);}
  .pin-err{min-height:19px; margin:9px 0 4px; font-size:.76rem; font-weight:700; color:var(--down);}
  #pinGo{width:100%; justify-content:center; height:48px;}

  /* ===================== 토스트 ===================== */
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:#1c2430; color:#fff; padding:12px 20px; border-radius:12px; font-size:.84rem; font-weight:700; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:90; box-shadow:0 10px 30px rgba(20,26,40,.3);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.toast-top{bottom:auto; top:16px; transform:translateX(-50%) translateY(-20px);}
  .toast.toast-top.show{transform:translateX(-50%) translateY(0);}

  /* ===================== 모바일 ===================== */
  @media(max-width:760px){
    html{font-size:15.5px;}
    .apphd{padding:0 13px; gap:8px; height:56px;}
    .apphd-t{display:none;}   /* 좁은 화면: 로고 칩만 (탭·환율 자리 확보) */
    .tabs{margin-left:0;} .tabs button{padding:7px 11px; font-size:.8rem;}
    .fx-pill{padding:5px 9px; font-size:.68rem;}
    #syncBadge{display:none;}
    .pad{padding:16px 13px 90px;}
    .vhd{margin-bottom:14px;}
    .vhd h1{font-size:1.15rem;}
    .vhd-actions{width:100%;}
    .search{flex:1; width:auto;}
    #btnAdd{display:none;}
    #btnDense{display:inline-flex;}
    .card{padding:15px 16px; border-radius:var(--r-md);}
    .dash{gap:12px;} .dash-top,.dash-2col{gap:12px;}
    .hero{padding:20px 18px; border-radius:22px;}
    .hero-v{font-size:1.9rem;}
    .hero-stats{margin-top:15px; gap:16px;}
    .hero-stat+.hero-stat{padding-left:16px;}
    .donut-row{justify-content:center;}
    .goalscale{margin:28px 0 4px; padding-bottom:48px;}
    .goal-target{font-size:1.2rem;}
    .goal-head{flex-direction:column; align-items:flex-start; gap:7px;}
    .bar-name{width:64px; font-size:.77rem;}
    .bar-val{width:98px; font-size:.75rem;} .bar-pct{width:38px;}
    .arow{padding:11px 14px 9px; gap:11px; flex-wrap:wrap;}
    .cchip{width:34px; height:34px; border-radius:10px;}
    /* 모바일: 액션을 아랫줄 전체 폭으로 (항목명이 밀려 잘리지 않게) */
    .arow-act{opacity:1; order:5; width:100%; margin:7px 0 0; justify-content:flex-end; gap:6px;}
    .arow.dense .arow-act{display:none;}
    .arow-act button{width:34px; height:34px;}
    /* 모바일: 우하단 골드 FAB */
    .fab{display:flex; position:fixed; right:18px; bottom:20px; z-index:50; width:56px; height:56px; border-radius:50%; border:none; background:var(--gold); color:var(--gold-ink); align-items:center; justify-content:center; box-shadow:var(--sh-fab); cursor:pointer;}
    .fab svg{width:24px; height:24px;}
    /* 간단히 보기 */
    .arow.dense{padding:2px 12px 2px 8px; gap:5px;}
    .arow.dense .arow-l{display:flex; align-items:center; gap:7px; padding:7px 0;}
    .arow.dense .arow-name{flex:1; min-width:0; font-size:.82rem;}
    .arow.dense .arow-amt{font-size:.84rem;}
    .dchk{width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; flex:none;}
    .dchk input{width:18px; height:18px; accent-color:var(--gold-txt);}
    /* 시트: 풀스크린 + 하단 고정 저장바 */
    .modal-bg{padding:0; align-items:flex-end;}
    .modal{max-width:none; border-radius:0; height:100vh; max-height:100vh;}
    @supports(height:100dvh){ .modal{height:100dvh; max-height:100dvh;} }
    .modal-bd{padding-bottom:24px;}
    .modal-ft{box-shadow:0 -6px 20px rgba(20,26,40,.06); padding:14px 18px 18px;}
    .segrid{gap:6px;}
  }
</style>
</head>
<body>

<header class="apphd">
  <div class="apphd-brand" id="goHome" title="대시보드로">
    <span class="apphd-mark">정</span>
    <span class="apphd-t">정성인연 자산관리</span>
  </div>
  <nav class="tabs" id="tabs">
    <button data-tab="dash">대시보드</button>
    <button data-tab="all">자산</button>
  </nav>
  <span class="apphd-grow"></span>
  <span class="fx-pill" id="fxBadge" title="실시간 USD/KRW 환율(자동)"></span>
  <span class="sync-badge" id="syncBadge"></span>
  <div class="menu-wrap">
    <button class="icobtn" id="btnTools" aria-label="도구" title="도구">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.64 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z"/></svg>
    </button>
    <div class="menu" id="toolsMenu">
      <div class="menu-lbl">시세 자동 갱신</div>
      <div style="padding:0 6px 6px;">
        <select id="quoteInterval" title="티커(#) 종목 시세 자동 갱신 주기">
          <option value="0">갱신 끔</option>
          <option value="60000">1분마다</option>
          <option value="300000">5분마다</option>
          <option value="600000">10분마다</option>
          <option value="1800000">30분마다</option>
        </select>
      </div>
      <div class="mi-sep"></div>
      <button class="mi" id="btnSync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
        서버에서 새로고침
      </button>
      <div class="mi-sep"></div>
      <button class="mi" id="btnExport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        데이터 내보내기
      </button>
      <button class="mi" id="btnImport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 8 5-5 5 5"/><path d="M5 21h14"/></svg>
        데이터 불러오기
      </button>
      <div class="mi-sep"></div>
      <button class="mi" id="btnPin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        PIN 변경
      </button>
      <button class="mi" id="btnDeviceLock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17-5-5 5-5"/><path d="M15 12H5"/></svg>
        이 기기 잠그기
      </button>
      <div class="mi-sep"></div>
      <button class="mi" id="btnTheme" aria-label="화면 테마 전환">
        <svg class="ic-theme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        화면 테마 <span class="mi-tail" id="themeLabel"></span>
      </button>
    </div>
  </div>
  <input type="file" id="fileImport" accept="application/json,.json" hidden>
</header>

<!-- 대시보드 -->
<section id="view-dash" class="view hidden">
  <div class="pad">
    <div class="dash" id="dashBody"></div>
  </div>
</section>

<!-- 자산 목록 -->
<section id="view-list" class="view hidden">
  <div class="pad">
    <div class="vhd">
      <div>
        <h1 id="listTitle">보유 자산</h1>
        <div class="sub" id="listSub"></div>
      </div>
      <div class="vhd-actions">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input id="listSearch" type="search" placeholder="항목·기관·이름 검색" autocomplete="off">
        </div>
        <select class="sortsel" id="sortSel" title="정렬 기준">
          <option value="amount">금액순</option>
          <option value="name">이름순</option>
          <option value="recent">최근 수정순</option>
        </select>
        <button class="btn sm" id="btnDense" title="목록 표시 전환 (간단히 ↔ 자세히)"></button>
        <button class="btn gold" id="btnAdd">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          자산 추가
        </button>
      </div>
    </div>
    <div class="chips" id="catChips"></div>
    <div id="listBody"></div>
  </div>
  <button class="fab" id="btnFab" aria-label="자산 추가">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</section>

<!-- 자산 입력/수정 시트 -->
<div class="modal-bg" id="modalBg">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-hd"><span id="modalTitle">자산 추가</span><button id="modalClose" aria-label="닫기">&times;</button></div>
    <div class="modal-bd">
      <select id="fCat" hidden></select>
      <div class="field"><label>분류</label><div class="segrid" id="catSeg"></div></div>
      <div class="field"><label for="fName">항목명</label><input id="fName" type="text" placeholder="예) 삼성전자, 전세보증금" maxlength="40"></div>
      <div class="grid2">
        <div class="field"><label for="fInst">기관</label><input id="fInst" type="text" placeholder="키움증권" maxlength="30"></div>
        <div class="field"><label for="fOwner">이름</label><input id="fOwner" type="text" placeholder="최정식" maxlength="20"></div>
      </div>
      <div class="stockbox" id="stockFields">
        <div class="stockbox-hd"><i></i>주식 정보 · 시세 자동</div>
        <div class="grid2">
          <div class="field"><label for="fTicker">보유종목</label><input id="fTicker" type="text" placeholder="#TSLA" maxlength="30"></div>
          <div class="field"><label for="fQty">보유수</label><input id="fQty" type="number" min="0" step="1" inputmode="numeric" placeholder="0"></div>
        </div>
        <div class="field"><label for="fPrice">현재가 <span id="priceAutoBadge" class="auto-badge">시세 자동</span></label>
          <div class="row-in">
            <select id="fCur" style="width:78px; flex:none;"><option value="KRW">원</option><option value="USD">$</option></select>
            <input id="fPrice" type="text" inputmode="decimal" placeholder="0" style="flex:1;">
          </div>
        </div>
      </div>
      <div class="field amt-field">
        <label for="fAmount">평가금액 <span id="amtAutoBadge" class="auto-badge">자동 계산</span></label>
        <div class="amt-wrap"><span class="pre">₩</span><input id="fAmount" type="text" inputmode="numeric" placeholder="0"></div>
        <div class="hint" id="fAmountKor"></div>
      </div>
      <div class="field"><label for="fNote">메모 (선택)</label><input id="fNote" type="text" placeholder="예) 분당 / 0.1 BTC" maxlength="60"></div>
      <div class="tgl-row"><span class="tl">자산 합계에 포함</span><input type="checkbox" class="tgl" id="fInclude" checked></div>
      <div class="sold-wrap" id="soldWrap">합계 포함 수량 <input id="fInclQty" type="number" min="0" step="1" inputmode="numeric" placeholder="전량"> 주</div>
      <div class="sold-hint" id="soldHint"></div>
    </div>
    <div class="modal-ft">
      <button class="btn" id="modalCancel">취소</button>
      <button class="btn gold" id="modalSave" style="justify-content:center;">저장</button>
    </div>
  </div>
</div>

<!-- PIN 잠금 화면 -->
<div class="pin-gate" id="pinGate">
  <div class="pin-box">
    <div class="pin-mark">정</div>
    <div class="pin-t">정성인연 자산관리</div>
    <div class="pin-s">PIN을 입력하세요</div>
    <input id="pinInput" type="password" inputmode="numeric" autocomplete="off" maxlength="8" aria-label="PIN">
    <div class="pin-err" id="pinErr"></div>
    <button class="btn gold" id="pinGo">확인</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===================== 데이터 모델 ===================== */
const STORE_KEY="jsiy_assets_v1";
const NAV_KEY="jsiy_nav";
const THEME_KEY="jsiy_theme";
const DENSE_KEY="jsiy_dense";   // 모바일 목록 간단히 보기(체크박스+항목명+금액만)
const SORT_KEY="jsiy_sort";     // 목록 정렬 기준

const CATS=[
  {id:"kr",      name:"국내주식", color:"#3b6ea5"},
  {id:"us",      name:"해외주식", color:"#0f8a6d"},
  {id:"pension", name:"퇴직연금", color:"#6f42c1"},
  {id:"cash",    name:"현금",     color:"#b06f00"},
  {id:"estate",  name:"부동산",   color:"#c0392b"},
  {id:"crypto",  name:"암호화폐", color:"#d99800"},
  {id:"etc",     name:"기타",     color:"#5b6b7c"},
];
const catById=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];

function genId(){ return "a"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }

const DEFAULT_DATA={
  items:[
    {cat:"kr",      name:"삼성전자",     amount:18500000, note:"",       owner:"최정식", inst:"키움증권",     ticker:"005930", qty:250, price:74000},
    {cat:"kr",      name:"카카오",       amount:6120000,  note:"",       owner:"최정식", inst:"키움증권",     ticker:"035720", qty:180, price:34000},
    {cat:"us",      name:"Apple",        amount:12420000, note:"$9,000", owner:"이수진", inst:"미래에셋증권", ticker:"AAPL",   qty:60,  price:207000},
    {cat:"us",      name:"Tesla",        amount:5800000,  note:"",       owner:"이수진", inst:"미래에셋증권", ticker:"TSLA",   qty:25,  price:232000},
    {cat:"pension", name:"DC형 퇴직연금", amount:34000000, note:"미래에셋", owner:"최정식", inst:"미래에셋증권"},
    {cat:"cash",    name:"입출금 통장",   amount:8700000,  note:"",       owner:"최정식", inst:"국민은행"},
    {cat:"cash",    name:"CMA",          amount:15000000, note:"",       owner:"이수진", inst:"삼성증권"},
    {cat:"estate",  name:"전세보증금",    amount:320000000,note:"분당",    owner:"공동",   inst:""},
    {cat:"crypto",  name:"비트코인",      amount:9300000,  note:"0.1 BTC",owner:"최정식", inst:"업비트"},
    {cat:"etc",     name:"금(골드바)",    amount:4500000,  note:"",       owner:"이수진", inst:"한국금거래소"},
  ].map((x,i)=>({id:genId(), ...x, updatedAt:Date.now()-i*3600000})),
  meta:{title:"정성인연 자산 현황"}
};

let data;
function normalizeItem(it){ if(!it.id) it.id=genId(); it.amount=Number(it.amount)||0; if(!catById(it.cat)) it.cat="etc"; it.include=it.include!==false; if(it.owner==null) it.owner=""; if(it.inst==null) it.inst=""; if(it.ticker==null) it.ticker=""; it.qty=Number(it.qty)||0; it.price=Number(it.price)||0; it.cur=it.cur==="USD"?"USD":"KRW";
  if(isStockCat(it.cat)){
    // 정규 필드=incQty(합계에 포함할 주식수). 미설정=전량 포함. 구버전 soldQty(매도=제외분)는 남은 수량으로 변환(금액 보존)
    if(it.incQty!=null&&it.incQty!==""&&isFinite(Number(it.incQty))){ it.incQty=Math.max(0,Math.min(Math.round(Number(it.incQty)),it.qty)); if(it.incQty>=it.qty) delete it.incQty; }
    else if(it.soldQty!=null&&it.soldQty!==""&&isFinite(Number(it.soldQty))){ const inc=it.qty-Math.max(0,Math.min(Math.round(Number(it.soldQty)),it.qty)); if(inc<it.qty) it.incQty=Math.max(0,inc); }  // 구버전 soldQty(매도수량)→incQty(포함수량)
    delete it.soldQty;
  } else { delete it.soldQty; delete it.incQty; }
}
function normalizeData(d){ if(!d||!Array.isArray(d.items)) return null; d.items.forEach(normalizeItem); if(!d.meta) d.meta={title:"정성인연 자산 현황"}; return d; }
function loadData(){
  let d=null;
  try{ const raw=localStorage.getItem(STORE_KEY); if(raw) d=JSON.parse(raw); }catch(e){}
  data=normalizeData(d)||normalizeData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
}
function saveData(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){} }  // 로컬 캐시만(서버는 연산으로 별도 반영)

/* ===================== 서버 동기화 (연산 기반, 동시 편집 안전) ===================== */
const SERVER_URL="api.php";  // 같은 디렉터리의 PHP 엔드포인트
const PIN_KEY="jsiy_pin";    // 이 기기에 기억해 둔 PIN (서버엔 sha256 만 보관)
let pin=""; try{ pin=localStorage.getItem(PIN_KEY)||""; }catch(e){}
const pinHdr=extra=>Object.assign({"X-Pin":pin}, extra||{});   // 모든 요청에 PIN 동봉
let syncState="";            // ""|"ok"|"saving"|"loading"|"offline"|"error"
let lastRev=null;            // 서버 리비전(폴링 변경 감지)
function setSync(s){ syncState=s; updateSyncUI(); }
function updateSyncUI(){
  const el=document.getElementById("syncBadge"); if(!el) return;
  const map={ok:"동기화됨",saving:"저장 중…",loading:"불러오는 중…",offline:"오프라인",error:"저장 실패"};
  el.textContent=map[syncState]||"";
  el.className="sync-badge sync-"+(syncState||"");
}
// 연산을 서버에 전송(전체 문서 대신 변경분만 → 동시 편집 시 서로 덮어쓰지 않음)
function sendOp(op){
  saveData();  // 로컬 즉시 반영
  setSync("saving");
  fetch(SERVER_URL,{method:"POST",headers:pinHdr({"Content-Type":"application/json"}),body:JSON.stringify(op)})
    .then(r=>{ if(r.status===401){ lockOut("PIN이 변경되었습니다. 다시 입력하세요."); throw "pin"; } return r.ok?r.json():Promise.reject(); })
    .then(j=>{ if(j&&j.ok){ lastRev=j.rev; setSync("ok"); } else setSync("error"); })
    .catch(e=>{ if(e!=="pin") setSync("offline"); });
}
function opUpsert(it){ sendOp({op:"upsert",item:it}); }
function opDelete(id){ sendOp({op:"delete",id:id}); }
function opMeta(m){ sendOp({op:"meta",meta:m}); }
function opReplace(){ sendOp({op:"replace",doc:{items:data.items,meta:data.meta}}); }
function opBulkInclude(ids,include){ sendOp({op:"bulkInclude",ids:ids,include:include}); }
function applyServerData(d){
  const nd=normalizeData(d); if(!nd) return false;
  data=nd; recomputeFx(); saveData(); render(); refreshQuotes(); return true;
}

/* ===================== 환율(USD/KRW) ===================== */
let usdRate=1380;  // 기본값(서버 조회 전)
function fmtRate(){ return "$1=₩"+Math.round(usdRate).toLocaleString("ko-KR"); }
function updateFxBadge(){ const el=document.getElementById("fxBadge"); if(el) el.textContent=fmtRate(); }
// 주식 항목 평가금액을 보유수×현재가(×환율) 로 재계산(메모리·표시용, 서버에 다시 쓰지 않음)
function recomputeFx(){ if(!data||!data.items) return; data.items.forEach(it=>{ if(isStockCat(it.cat)) it.amount=Math.round((Number(it.qty)||0)*(Number(it.price)||0)*(it.cur==="USD"?usdRate:1)); }); }
function fetchRate(){
  fetch(SERVER_URL+"?rate=1",{cache:"no-store",headers:pinHdr()})
    .then(r=>r.ok?r.json():Promise.reject()).then(j=>{
      if(j&&j.rate){ usdRate=Number(j.rate)||usdRate; updateFxBadge(); recomputeFx(); saveData(); render(); }
    }).catch(()=>{});
}
// 티커(#붙은 종목)의 현재가를 시세 API로 자동 갱신(메모리·표시용)
const tickerSym=it=>{ const t=String(it.ticker||"").trim(); return t.charAt(0)==="#"?t.slice(1).trim():""; };
let lastQuotes=0;
function refreshQuotes(force){
  if(!data||!data.items) return;
  if(!force && Date.now()-lastQuotes<60000) return;
  const list=data.items.filter(it=>isStockCat(it.cat)&&tickerSym(it));
  if(!list.length) return;
  lastQuotes=Date.now();
  Promise.all(list.map(it=>{
    const mk=it.cat==="kr"?"kr":"us";
    return fetch(SERVER_URL+"?quote="+encodeURIComponent(tickerSym(it))+"&market="+mk,{cache:"no-store",headers:pinHdr()})
      .then(r=>r.json()).then(j=>{ if(j&&j.ok){ it.price=Number(j.price)||it.price; it.cur=j.cur==="USD"?"USD":"KRW"; } }).catch(()=>{});
  })).then(()=>{ recomputeFx(); saveData(); render(); });
}
/* 시세 자동 갱신 주기 */
const QI_KEY="jsiy_quote_interval";
let quoteIntervalMs=300000;  // 기본 5분
try{ const s=localStorage.getItem(QI_KEY); if(s!==null) quoteIntervalMs=Number(s)||0; }catch(e){}
let quoteTimer=null;
function startQuoteTimer(){
  clearInterval(quoteTimer); quoteTimer=null;
  if(quoteIntervalMs>0){
    quoteTimer=setInterval(()=>{
      if(document.hidden) return;
      if(document.getElementById("modalBg").classList.contains("open")) return;
      refreshQuotes(true);
    }, quoteIntervalMs);
  }
}
function pullFromServer(opts){
  opts=opts||{};
  if(!opts.quiet) setSync("loading");
  fetch(SERVER_URL,{cache:"no-store",headers:pinHdr()})
    .then(r=>{ if(r.status===401){ lockOut("PIN이 변경되었습니다. 다시 입력하세요."); throw "pin"; } return r.ok?r.text():Promise.reject(); }).then(txt=>{
      let d=null; try{ d=JSON.parse(txt); }catch(e){}
      if(d&&Array.isArray(d.items)){
        if(d._rev!==lastRev){ applyServerData(d); lastRev=d._rev; }
        setSync("ok");
      } else if(d===null){ if(opts.initial) opReplace(); else setSync("ok"); }  // 서버가 비어 있으면 최초 접속 기기의 데이터로 시드
      else setSync("ok");
    })
    .catch(()=>setSync("offline"));
}
// 주기적 폴링: 다른 기기 변경을 자동 반영(편집 중에는 건너뜀)
function startPolling(){
  setInterval(()=>{
    if(document.hidden) return;
    if(document.getElementById("modalBg").classList.contains("open")) return;
    pullFromServer({quiet:true});
  },6000);
}

/* ===================== PIN 잠금 =====================
   열람·편집 모두 PIN 필요. 서버는 sha256 만 갖고 있고 이 기기는 평문을 localStorage 에 기억한다.
   (기기를 이미 장악한 상대는 막지 못한다 — 링크만 아는 제3자를 막는 수준의 보호) */
function tryPin(v){
  return fetch(SERVER_URL+"?check=1",{cache:"no-store",headers:{"X-Pin":v}})
    .then(r=>r.json().then(j=>({st:r.status, valid:!!(j&&j.valid)})));
}
function pinErr(msg){ const el=document.getElementById("pinErr"); if(el) el.textContent=msg||""; }
function showGate(msg){
  document.body.classList.add("locked");
  pinErr(msg);
  const i=document.getElementById("pinInput"); if(i){ i.value=""; setTimeout(()=>i.focus(),50); }
}
function lockOut(msg){   // 서버가 401 → 저장된 PIN 폐기하고 다시 잠금
  pin=""; try{ localStorage.removeItem(PIN_KEY); }catch(e){}
  setSync(""); showGate(msg);
}
function submitPin(){
  const v=String(document.getElementById("pinInput").value||"").trim();
  if(!/^\d{4,8}$/.test(v)){ pinErr("숫자 4~8자리로 입력하세요."); return; }
  pinErr("확인 중…");
  tryPin(v).then(r=>{
    if(r.valid){ pin=v; try{ localStorage.setItem(PIN_KEY,v); }catch(e){} document.body.classList.remove("locked"); pinErr(""); startApp(); }
    else if(r.st===429) pinErr("시도가 너무 많습니다. 10분 뒤 다시 시도하세요.");
    else pinErr("PIN이 올바르지 않습니다.");
  }).catch(()=>pinErr("서버에 연결할 수 없습니다."));
}
function changePin(){
  const a=prompt("새 PIN을 입력하세요 (숫자 4~8자리)"); if(a==null) return;
  if(!/^\d{4,8}$/.test(String(a).trim())){ toast("숫자 4~8자리로 입력하세요."); return; }
  const b=prompt("확인을 위해 새 PIN을 한 번 더 입력하세요"); if(b==null) return;
  if(String(a).trim()!==String(b).trim()){ toast("두 번 입력한 PIN이 서로 다릅니다."); return; }
  const np=String(a).trim();
  fetch(SERVER_URL,{method:"POST",headers:pinHdr({"Content-Type":"application/json"}),body:JSON.stringify({op:"setpin",pin:np})})
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(j=>{
      if(j&&j.ok){ pin=np; try{ localStorage.setItem(PIN_KEY,np); }catch(e){} toast("PIN을 변경했습니다. 다른 기기에서는 새 PIN으로 다시 들어가세요."); }
      else toast("PIN 변경에 실패했습니다.");
    })
    .catch(()=>toast("PIN 변경에 실패했습니다 — 서버 연결을 확인하세요."));
}
function lockDevice(){   // 이 기기에서만 PIN 기억을 지운다(서버 PIN 은 그대로)
  pin=""; try{ localStorage.removeItem(PIN_KEY); }catch(e){}
  showGate("이 기기에서 잠갔습니다.");
}

/* ===================== 포맷 ===================== */
function fmtWon(n){ return "₩"+(Number(n)||0).toLocaleString("ko-KR"); }
function fmtNum(n){ return (Number(n)||0).toLocaleString("ko-KR"); }
function korUnit(n){
  n=Math.round(Number(n)||0);
  if(n<10000) return n.toLocaleString("ko-KR")+"원";
  const eok=Math.floor(n/1e8), man=Math.floor((n%1e8)/1e4);
  if(eok>0) return eok.toLocaleString("ko-KR")+"억"+(man>0?" "+man.toLocaleString("ko-KR")+"만":"");
  return man.toLocaleString("ko-KR")+"만";
}
function korShort(n){
  n=Math.round(Number(n)||0);
  if(n<=0) return "0";
  if(n>=1e8) return (n/1e8).toFixed(n%1e8===0?0:1)+"억";
  if(n>=1e4) return Math.round(n/1e4).toLocaleString("ko-KR")+"만";
  return n.toLocaleString("ko-KR");
}
function escHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
// 분류색 위에 얹는 연한 배경(라이트/다크 공통 — 알파 hex 를 토큰으로 뺐다)
function chipStyle(color){ return `background:color-mix(in srgb, ${color} var(--chip-a), transparent);color:${color}`; }
// 아이콘 칩 글자: 주식은 종목(항목명) 첫 글자, 그 외는 분류 첫 글자
function chipCh(it){ const c=catById(it.cat); const s=(isStockCat(it.cat)?(it.name||c.name):c.name).trim(); return escHtml(s.charAt(0)||"—"); }

/* ===================== 집계 ===================== */
const isIncluded=it=>it.include!==false;  // 합계 포함 여부(미설정=포함)
// 주식 일부 반영: incQty(합계에 포함할 주식수)만큼만 가능자산에 반영. 미설정=전량 포함. 나머지(보유수-포함)는 제외
function inclQty(it){ if(!isStockCat(it.cat)) return Number(it.qty)||0; const q=Number(it.qty)||0; if(it.incQty==null||it.incQty==="") return q; let n=Number(it.incQty); if(!isFinite(n)||n<0) n=0; return Math.min(n,q); }
function exclQty(it){ return Math.max(0,(Number(it.qty)||0)-inclQty(it)); }  // 합계에서 제외되는 주식수
function isPartial(it){ if(!isIncluded(it)||!isStockCat(it.cat)) return false; const q=Number(it.qty)||0; return q>0&&it.incQty!=null&&it.incQty!==""&&inclQty(it)<q; }
function incAmt(it){ if(!isIncluded(it)) return 0; const q=Number(it.qty)||0; if(isStockCat(it.cat)&&q>0&&isPartial(it)) return Math.round((Number(it.amount)||0)*inclQty(it)/q); return Number(it.amount)||0; }  // 합계(가능자산)에 반영되는 금액
function totalsByCat(){ const t={}; CATS.forEach(c=>t[c.id]=0); data.items.forEach(it=>{ t[it.cat]=(t[it.cat]||0)+incAmt(it); }); return t; }
function grandTotal(){ return data.items.reduce((s,it)=>s+incAmt(it),0); }
function allItemsTotal(){ return data.items.reduce((s,it)=>s+(Number(it.amount)||0),0); }  // 제외 항목·미포함분까지 보유 전량

/* ===================== 내비게이션 ===================== */
let scope="dash"; // "dash" | "all" | <catId> | "owner:<이름>" | "inst:<기관>"
function loadScope(){ try{ const s=localStorage.getItem(NAV_KEY); if(s) scope=s; }catch(e){} if(scope!=="dash"&&scope!=="all"&&!catById2(scope)&&scope.indexOf("owner:")!==0&&scope.indexOf("inst:")!==0) scope="dash"; }
function catById2(id){ return CATS.some(c=>c.id===id); }
const isMobile=()=>window.innerWidth<=760;
function navTo(s, fromPop){ const prev=scope; scope=s; try{ localStorage.setItem(NAV_KEY,s); }catch(e){} const ls=document.getElementById("listSearch"); if(ls) ls.value=""; render(); window.scrollTo(0,0); if(!fromPop && s!==prev) _histPush({}); }

/* ===================== 렌더: 탭 · 분류 칩 ===================== */
function renderTabs(){
  document.querySelectorAll("#tabs button").forEach(b=>{
    b.classList.toggle("on", b.dataset.tab==="dash" ? scope==="dash" : scope!=="dash");
  });
}
function renderChips(){
  const wrap=document.getElementById("catChips");
  const t=totalsByCat();
  const counts={}; CATS.forEach(c=>counts[c.id]=0);
  data.items.forEach(it=>{ counts[it.cat]=(counts[it.cat]||0)+1; });
  const isOwner=scope.indexOf("owner:")===0, isInst=scope.indexOf("inst:")===0;
  let h="";
  if(isOwner||isInst){  // 대시보드에서 들어온 소유자/기관 스코프 — 해제 가능한 칩
    h+=`<button class="chip on" data-nav="all" title="필터 해제">${escHtml(isOwner?scope.slice(6):scope.slice(5))} <span class="x">&times;</span></button>`;
  }
  h+=`<button class="chip${scope==="all"?" on":""}" data-nav="all">전체 ${data.items.length}</button>`;
  CATS.forEach(c=>{
    if(!counts[c.id]) return;  // 비어 있는 분류는 숨김
    h+=`<button class="chip${scope===c.id?" on":""}" data-nav="${c.id}" title="${escHtml(c.name)} ${fmtWon(t[c.id])}">${escHtml(c.name)} ${counts[c.id]}</button>`;
  });
  wrap.innerHTML=h;
  wrap.querySelectorAll(".chip[data-nav]").forEach(b=>b.addEventListener("click",()=>navTo(b.dataset.nav)));
}

/* ===================== 렌더: 대시보드 ===================== */
const TAX_PCT=3.3;  // 부동산 보유세(취득세 등) 가산율
function goalTarget(){ return Number(data.meta&&data.meta.target)||0; }
function taxOn(){ return !!(data.meta&&data.meta.taxOn); }
function effectiveTarget(){ const b=goalTarget(); return taxOn()?Math.round(b*(1+TAX_PCT/100)):b; }
function renderGoal(){
  const inc=grandTotal(), all=allItemsTotal(), base=goalTarget(), target=effectiveTarget(), tax=taxOn();
  const hasExcl=all>inc+0.5;                                 // 합산 제외 항목이 있을 때만 '전체' 별도 표시
  const taxChk=base?`<label class="gt-check"><input type="checkbox" id="taxChk" ${tax?"checked":""}> 보유세 +${TAX_PCT}%</label>`:"";
  const done=base>0&&inc>=target;                            // 포함 자산 기준 목표 달성
  const head=`<div class="goal-head">
      <div class="goal-target"><span class="gt-label">목표 매수가 (부동산)</span>${base?`${fmtWon(target)} <span class="gt-kor">(${korUnit(target)})</span>${tax?` <span class="gt-tax-inline">보유세 +${TAX_PCT}% 포함</span>`:""}${done?` <span class="gt-done">달성 ${(inc/target*100).toFixed(0)}%</span>`:""}`:`<span style="color:var(--ink-faint)">미설정</span>`}</div>
      <div class="goal-head-act">${taxChk}</div>
    </div>`;
  let viz="";
  {                                                          // 목표 미설정이라도 막대를 띄워 드래그로 설정할 수 있게
    const STEP=5e8;
    const rawMax=Math.max(all,target);
    let scaleMax=(Math.floor(rawMax/STEP)+1)*STEP;           // 5억 격자 + 목표선 우측 여유(드래그로 더 높이 설정 가능)
    if(scaleMax-rawMax<STEP*0.35) scaleMax+=STEP;
    const pct=v=>Math.max(0,Math.min(100,v/scaleMax*100));
    const goalLeft=target>0?pct(target):0;
    const allW=pct(all), incW=pct(inc);
    const anchorRight=goalLeft>72, anchorLeft=goalLeft<10;
    const pctInc=target>0?inc/target*100:0, pctAll=target>0?all/target*100:0;
    const eokSign=v=>(v>=0?"+":"-")+(Math.abs(v)/1e8).toFixed(1)+"억";   // 목표 대비 차액(억, 부호)
    const footLine=(label,amt)=>{const d=amt-target; return `<div class="goal-foot-line"><b>${label}</b> : <span class="${d>=0?"fl-up":"fl-down"}">${eokSign(d)}</span></div>`;};
    // 5억 단위 눈금자(라벨이 겹치지 않게 최대 7개만 표시, 사이는 보조 눈금만)
    const maxTick=Math.floor(scaleMax/STEP);
    let axis="";
    if(maxTick>=1){
      let labelEvery=1;
      while((maxTick/labelEvery)+1>7) labelEvery++;
      let ticks="";
      for(let i=0;i<=maxTick;i++){
        const left=i*STEP/scaleMax*100, lbl=(i%labelEvery===0);
        const align=i===0?";transform:translateX(0)":(left>=99?";transform:translateX(-100%)":"");
        ticks+=`<span class="gax-tick${lbl?" lbl":""}" style="left:${left.toFixed(2)}%${align}"><i></i>${lbl?`<b>${i===0?"0":(i*5)+"억"}</b>`:""}</span>`;
      }
      axis=`<div class="goal-axis">${ticks}</div>`;
    }
    const labelTxt=target>0?`🎯 목표 ${fmtWon(target)}${tax?" (세포함)":""}`:"🎯 목표 설정";
    const labelCls=anchorRight?" right":(anchorLeft?" left":"");
    // 한 줄 배치: 가능(작은 값)은 점 왼쪽, 전체(큰 값)은 점 오른쪽으로 벌려 겹침 방지(끝에선 안쪽 정렬)
    const incAnchor=incW<16?" pin-l":" pin-r";
    const allAnchor=allW>84?" pin-r":" pin-l";
    const ends=(target>0&&hasExcl)?`<div class="gs-ends"><span class="gs-inc${pctInc>=100?" done":""}${incAnchor}" style="left:${incW.toFixed(2)}%">가능</span><span class="gs-all${pctAll>=100?" done":""}${allAnchor}" style="left:${allW.toFixed(2)}%">전체</span></div>`:"";
    viz=`
      <div class="goalscale editable" data-smax="${scaleMax}" data-editable="1">
        <div class="gs-goal-label${labelCls}" style="left:${goalLeft.toFixed(2)}%" title="드래그하거나 더블클릭해 직접 입력">${labelTxt}</div>
        <div class="goal-track grabbable">
          ${hasExcl?`<div class="goal-fill all" style="width:${allW.toFixed(2)}%"></div>`:""}
          <div class="goal-fill inc" style="width:${incW.toFixed(2)}%"></div>
        </div>
        <div class="gs-goalline draggable" style="left:${goalLeft.toFixed(2)}%"><span class="gs-knob"></span></div>
        <div class="gs-tooltip" hidden></div>
        ${ends}
        ${axis}
      </div>
      ${target>0?`<div class="goal-foot">${hasExcl?footLine("가능자산",inc)+footLine("전체자산",all):footLine("보유자산",inc)}</div>`:`<div class="goal-hint-drag">막대의 <b>🎯 목표선</b>을 좌우로 드래그해 목표 매수가를 설정하세요 <span style="opacity:.8">(1억원 단위 · 더블클릭 시 직접 입력)</span></div>`}`;
  }
  return `<div class="card goal-card${done?" goal-done":""}">${head}${viz}</div>`;
}
function renderDonut(t,total){
  const r=70, C=2*Math.PI*r, sw=30;
  const track=`<circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--line-row)" stroke-width="${sw}"/>`;
  let off=0, segs="";
  if(total>0){
    CATS.forEach(c=>{
      const v=t[c.id]; if(v<=0) return;
      const len=(v/total)*C;
      segs+=`<circle class="donut-seg" data-cat="${c.id}" cx="100" cy="100" r="${r}" fill="none" stroke="${c.color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 100 100)" stroke-linecap="butt"><title>${escHtml(c.name)} ${fmtWon(v)}</title></circle>`;
      off+=len;
    });
  }
  // 중앙에는 최대 비중 분류를 표시(시안 1b)
  let topName="—", topPct="";
  if(total>0){
    const top=[...CATS].filter(c=>t[c.id]>0).sort((a,b)=>t[b.id]-t[a.id])[0];
    if(top){ topName=top.name; topPct=(t[top.id]/total*100).toFixed(0)+"%"; }
  }
  return `<div class="donut"><svg viewBox="0 0 200 200">${track}${segs}</svg>
    <div class="donut-center"><div class="dc-k">${escHtml(topName)}</div><div class="dc-v">${topPct}</div></div></div>`;
}

// 목표선 드래그로 목표 매수가 설정 (버튼 대체)
function setupGoalDrag(){
  const scaleEl=document.querySelector(".goalscale[data-editable='1']");
  if(!scaleEl) return;
  const track=scaleEl.querySelector(".goal-track");
  const line=scaleEl.querySelector(".gs-goalline");
  const label=scaleEl.querySelector(".gs-goal-label");
  const tip=scaleEl.querySelector(".gs-tooltip");
  const smax=Number(scaleEl.dataset.smax)||1;
  const SNAP=1e8;                                            // 1억원 단위 스냅(정확한 억 단위로 자동 이동)
  let dragging=false;
  const baseAt=clientX=>{
    const r=track.getBoundingClientRect();
    let ratio=(clientX-r.left)/r.width; ratio=Math.max(0,Math.min(1,ratio));
    let b=ratio*smax; if(taxOn()) b=b/(1+TAX_PCT/100);       // 막대는 세포함 기준 → 기준가로 환산
    b=Math.round(b/SNAP)*SNAP; if(b<SNAP) b=0;
    return b;
  };
  const preview=b=>{
    const eff=taxOn()?Math.round(b*(1+TAX_PCT/100)):b;
    const left=Math.max(0,Math.min(100,eff/smax*100));
    line.style.left=left.toFixed(2)+"%";
    if(label){
      label.style.left=left.toFixed(2)+"%";
      label.classList.toggle("right",left>72);
      label.classList.toggle("left",left<10);
      label.textContent=b>0?`🎯 목표 ${fmtWon(eff)}${taxOn()?" (세포함)":""}`:"🎯 목표 설정";
    }
    if(tip){                                                  // 드래그 중 현재 억 단위 값 툴팁
      tip.style.left=left.toFixed(2)+"%";
      tip.classList.toggle("right",left>92);
      tip.classList.toggle("left",left<8);
      tip.textContent=b>0?korUnit(eff):"목표 해제";
    }
  };
  const down=e=>{
    dragging=true; scaleEl.classList.add("dragging");
    if(tip){ clearTimeout(tip._t); tip.classList.remove("confirm"); tip.hidden=false; }
    try{ track.setPointerCapture(e.pointerId); }catch(_){}
    preview(baseAt(e.clientX)); e.preventDefault();
  };
  const move=e=>{ if(dragging){ preview(baseAt(e.clientX)); e.preventDefault(); } };
  const up=e=>{
    if(!dragging) return; dragging=false; scaleEl.classList.remove("dragging");
    if(tip) tip.hidden=true;
    const b=baseAt(e.clientX);
    if(!data.meta) data.meta={};
    data.meta.target=b; opMeta({target:b}); render();
    if(b>0) flashGoalConfirm(); else toast("목표를 해제했습니다.");   // 확정값은 막대 위에 강조(토스트 대체)
  };
  const cancel=()=>{                                          // 모바일 스크롤 등으로 포인터 취소 시: 값 변경 없이 원복(0 고정 방지)
    if(!dragging) return; dragging=false; scaleEl.classList.remove("dragging");
    if(tip) tip.hidden=true; render();
  };
  track.addEventListener("pointerdown",down);
  line.addEventListener("pointerdown",down);
  track.addEventListener("pointermove",move);
  track.addEventListener("pointerup",up);
  track.addEventListener("pointercancel",cancel);
  if(label) label.addEventListener("dblclick",e=>{ e.preventDefault(); editGoal(); });  // 정밀 입력(버튼 아님)
}
// 드래그 확정 시 막대 위에 확정값(억 단위) 강조 — 토스트 대신
function flashGoalConfirm(){
  const sc=document.querySelector(".goalscale[data-editable='1']"); if(!sc) return;
  const ln=sc.querySelector(".gs-goalline"), tp=sc.querySelector(".gs-tooltip"), lbl=sc.querySelector(".gs-goal-label");
  if(!tp||!ln) return;
  const eff=effectiveTarget(); if(eff<=0) return;
  const left=parseFloat(ln.style.left)||0;
  tp.style.left=left.toFixed(2)+"%";
  tp.classList.toggle("right",left>92); tp.classList.toggle("left",left<8);
  tp.textContent="✓ "+korUnit(eff);
  tp.classList.add("confirm"); tp.hidden=false;
  if(lbl) lbl.style.opacity="0";                            // 잠깐 정적 라벨 숨기고 확정 배지만 강조
  clearTimeout(tp._t);
  tp._t=setTimeout(()=>{ tp.hidden=true; tp.classList.remove("confirm"); if(lbl) lbl.style.opacity=""; },1400);
}

  const q=((document.getElementById("listSearch")||{}).value||"").trim().toLowerCase();
  let items=data.items.slice();
  if(isCat) items=items.filter(it=>it.cat===scope);
  else if(isOwner) items=items.filter(it=>ownerOf(it)===ownerName);
  else if(isInst) items=items.filter(it=>instOf(it)===instName);
  const totalCount=items.length;
  if(q) items=items.filter(it=>[it.name,it.inst,it.ticker,it.owner,it.note,catById(it.cat).name].some(s=>String(s||"").toLowerCase().indexOf(q)>=0));
  sortItems(items);
  const incItems=items.filter(isIncluded);
  const sum=incItems.reduce((s,it)=>s+incAmt(it),0);  // 일부 포함(incQty) 반영
  const excl=items.length-incItems.length;
  document.getElementById("listSub").textContent=`${items.length}개 자산${q?` / 전체 ${totalCount}개`:""} · 합계 ${fmtWon(sum)}`+(excl>0?` · 합계 제외 ${excl}건`:"");
  const ss=document.getElementById("sortSel"); if(ss) ss.value=listSort;
  renderChips();
  const body=document.getElementById("listBody");
  if(!items.length){ body.innerHTML=`<div class="empty">${q?`'${escHtml(q)}' 검색 결과가 없습니다.`:`등록된 자산이 없습니다. <b>＋ 자산 추가</b>로 입력하세요.`}</div>`; return; }
  const allInc=incItems.length===items.length, someInc=incItems.length>0&&!allInc;
  const cardMode=isMobile();
  const bd=document.getElementById("btnDense");
  if(bd) bd.innerHTML=(denseList?FULL_ICO:DENSE_ICO)+`<span>${denseList?"자세히":"간단히"}</span>`;
  const allbar=`<label class="allbar"><input type="checkbox" id="incAll" ${allInc?"checked":""}> 표시된 ${items.length}건 합계 포함</label>`;

  if(cardMode&&denseList){
    body.innerHTML=allbar+`<div class="rows">${items.map(it=>denseRowHtml(it)).join("")}</div>`;
  }else{
    // 분류 그룹(소계·비중) — 단일 분류 스코프에서는 그룹 머리글 생략
    let inner="";
    if(isCat){
      inner=`<div class="rows">${items.map(it=>rowHtml(it)).join("")}</div>`;
    }else{
      const groups=[];
      CATS.forEach(c=>{
        const list=items.filter(it=>it.cat===c.id);
        if(list.length) groups.push({c:c, list:list, sub:list.reduce((s,it)=>s+incAmt(it),0)});
      });
      groups.sort((a,b)=>b.sub-a.sub);
      inner=groups.map(g=>`
        <div class="grp">
          <span class="grp-sq" style="background:${g.c.color}"></span>
          <span class="grp-n">${escHtml(g.c.name)}</span>
          <span class="grp-c">${g.list.length}개</span>
          <span class="grp-line"></span>
          <span class="grp-sum">${fmtNum(g.sub)}</span>
          <span class="grp-pct">${sum>0?(g.sub/sum*100).toFixed(1):"0.0"}%</span>
        </div>
        <div class="rows">${g.list.map(it=>rowHtml(it)).join("")}</div>`).join("");
    }
    body.innerHTML=allbar+inner;
  }
  // 공통 와이어링
  body.querySelectorAll("[data-id]").forEach(el=>{
    const id=el.dataset.id;
    const dup=el.querySelector(".dup"); if(dup) dup.addEventListener("click",e=>{e.stopPropagation();dupItem(id);});
    const ed=el.querySelector(".edit"); if(ed) ed.addEventListener("click",e=>{e.stopPropagation();openModal(id);});
    const del=el.querySelector(".del"); if(del) del.addEventListener("click",e=>{e.stopPropagation();delItem(id);});
    const inc=el.querySelector("button.inc"); if(inc) inc.addEventListener("click",e=>{e.stopPropagation();toggleInclude(id);});
    const chk=el.querySelector(".inc-chk"); if(chk) chk.addEventListener("change",()=>toggleInclude(id));
    el.querySelectorAll("[data-edit]").forEach(m=>m.addEventListener("click",()=>openModal(id)));
  });
  const ia=document.getElementById("incAll"); if(ia){ ia.indeterminate=someInc; ia.addEventListener("change",toggleAllInclude); }
}
function toggleInclude(id){
  const it=data.items.find(x=>x.id===id); if(!it) return;
  it.include=!isIncluded(it); it.updatedAt=Date.now();
  opUpsert(it); render();
  toast(it.include?"합계에 포함했습니다.":"합계에서 제외했습니다.");
}
function toggleAllInclude(){
  const ids=[...document.querySelectorAll("#listBody [data-id]")].map(el=>el.dataset.id);
  if(!ids.length) return;
  const want=document.getElementById("incAll").checked;  // 클릭 후 상태가 목표값
  const set=new Set(ids), now=Date.now();
  data.items.forEach(it=>{ if(set.has(it.id)){ it.include=want; it.updatedAt=now; } });
  saveData(); opBulkInclude(ids,want); render();
  toast(want?`표시된 ${ids.length}건 합계 포함`:`표시된 ${ids.length}건 합계 제외`);
}

let editingId=null;
const isStockCat=c=>c==="kr"||c==="us";
function fillCatSelect(){
  document.getElementById("fCat").innerHTML=CATS.map(c=>`<option value="${c.id}">${escHtml(c.name)}</option>`).join("");
  // 아이콘 세그먼트(시안 2b) — 값은 숨김 select 가 계속 단일 진실원
  const seg=document.getElementById("catSeg");
  seg.innerHTML=CATS.map(c=>`<button type="button" class="seg" data-cat="${c.id}">
      <span class="sg-ic" style="${chipStyle(c.color)}">${escHtml(c.name.charAt(0))}</span>

    </button>`).join("");
  seg.querySelectorAll(".seg").forEach(b=>b.addEventListener("click",()=>{
    document.getElementById("fCat").value=b.dataset.cat;

function syncCatSeg(){
  const v=document.getElementById("fCat").value;
  document.querySelectorAll("#catSeg .seg").forEach(b=>{
    const on=b.dataset.cat===v, c=catById(b.dataset.cat);
    b.classList.toggle("on",on);
    b.style.borderColor=on?c.color:"";
    b.style.background=on?`color-mix(in srgb, ${c.color} var(--chip-a), transparent)`:"";
  });
}
function updateStockFields(){
  const stock=isStockCat(document.getElementById("fCat").value);
  document.getElementById("stockFields").style.display=stock?"":"none";
  const amt=document.getElementById("fAmount");
  amt.readOnly=stock; amt.classList.toggle("ro",stock);
  document.getElementById("amtAutoBadge").style.display=stock?"inline-block":"none";
  updateTickerLockUI();
  updateSoldUI();
  if(stock) recalcAmount(); else updateAmountKor();
}
function updateSoldUI(){  // 합계 포함 수량 입력은 주식 + 합계 포함일 때만 노출
  const stock=isStockCat(document.getElementById("fCat").value);
  const inc=document.getElementById("fInclude").checked;
  document.getElementById("soldWrap").classList.toggle("on", stock&&inc);
  updateSoldHint();
}
function updateSoldHint(){  // 입력 기준 안내: 입력한 수량만큼 합계에 반영되는 금액·제외분 실시간 표시(미입력=전량)
  const el=document.getElementById("soldHint"); if(!el) return;
  const stock=isStockCat(document.getElementById("fCat").value);
  const inc=document.getElementById("fInclude").checked;
  const qty=Math.max(0,Math.round(Number(document.getElementById("fQty").value)||0));
  const raw=String(document.getElementById("fInclQty").value).trim();
  if(!(stock&&inc)||raw===""||qty<=0){ el.textContent=""; return; }  // 미입력=전량 반영(안내 생략)
  let incl=Math.max(0,Math.round(Number(raw)||0)); incl=Math.min(incl,qty);
  const excl=Math.max(0,qty-incl);
  const usd=document.getElementById("fCur").value==="USD";
  const amt=Math.round(incl*rawNum("fPrice")*(usd?usdRate:1));
  el.textContent=`→ 합계 반영 ${incl.toLocaleString("ko-KR")}주 · ${fmtWon(amt)}${excl>0?` (제외 ${excl.toLocaleString("ko-KR")}주)`:""}`;
}
function updateTickerLockUI(){  // #티커면 현재가·통화는 시세 자동 → readonly+배지
  const isT=isStockCat(document.getElementById("fCat").value) && document.getElementById("fTicker").value.trim().charAt(0)==="#";
  const pr=document.getElementById("fPrice"), cur=document.getElementById("fCur"), badge=document.getElementById("priceAutoBadge");
  pr.readOnly=isT; pr.classList.toggle("ro",isT); cur.disabled=isT;
  if(badge) badge.style.display=isT?"inline-block":"none";
}
function rawNum(id){ return Number(String(document.getElementById(id).value).replace(/[^\d.]/g,""))||0; }  // 콤마 등 제거 후 숫자
function fmtNumIn(id){ const n=rawNum(id); document.getElementById(id).value=n?n.toLocaleString("ko-KR"):""; }   // 콤마 포맷
function unfmtNumIn(id){ const el=document.getElementById(id); if(el.readOnly) return; const n=rawNum(id); el.value=n?String(n):""; }  // 편집용 평문
function fetchTickerPrice(){  // 보유종목이 #으로 시작하면 현재가 자동 조회
  const tk=document.getElementById("fTicker").value.trim();
  const cat=document.getElementById("fCat").value;
  if(!isStockCat(cat)||tk.charAt(0)!=="#") return;
  const sym=tk.slice(1).trim(); if(!sym) return;
  const mk=cat==="kr"?"kr":"us";
  document.getElementById("fAmountKor").textContent="시세 조회 중…";
  fetch(SERVER_URL+"?quote="+encodeURIComponent(sym)+"&market="+mk,{cache:"no-store",headers:pinHdr()})
    .then(r=>r.json()).then(j=>{
      if(j&&j.ok){
        document.getElementById("fCur").value=j.cur==="USD"?"USD":"KRW";
        document.getElementById("fPrice").value=Number(j.price).toLocaleString("ko-KR");
        recalcAmount();
        toast(sym+" 현재가 "+(j.cur==="USD"?"$":"₩")+Number(j.price).toLocaleString("ko-KR"));
      }else{ updateAmountKor(); toast("시세를 찾지 못했습니다: "+sym); }
    }).catch(()=>{ updateAmountKor(); toast("시세 조회 실패"); });
}
function recalcAmount(){
  const qty=Number(document.getElementById("fQty").value)||0;
  const price=rawNum("fPrice");
  const usd=document.getElementById("fCur").value==="USD";
  const v=Math.round(qty*price*(usd?usdRate:1));  // 달러면 환율 적용
  document.getElementById("fAmount").value=v?v.toLocaleString("ko-KR"):"";
  updateAmountKor();
  updateSoldHint();
}
function openModal(id){
  editingId=id||null;
  const m=document.getElementById("modalBg");
  document.getElementById("modalTitle").textContent=editingId?"자산 수정":"자산 추가";
  const it=editingId?data.items.find(x=>x.id===editingId):null;
  let lastCat=""; try{ lastCat=localStorage.getItem("jsiy_lastcat")||""; }catch(e){}
  const defCat=catById2(scope)?scope:(catById2(lastCat)?lastCat:"cash");  // 필터뷰=그 분류, 아니면 최근 선택(없으면 현금)
  const defOwner=scope.indexOf("owner:")===0?scope.slice(6):"";  // 소유자 필터 뷰면 그 이름 기본
  const defInst=scope.indexOf("inst:")===0?scope.slice(5):"";    // 기관 필터 뷰면 그 기관 기본
  document.getElementById("fCat").value=it?it.cat:defCat;
  document.getElementById("fInst").value=it?(it.inst||""):(defInst==="미지정"?"":defInst);
  document.getElementById("fName").value=it?it.name:"";
  document.getElementById("fTicker").value=it?(it.ticker||""):"";
  document.getElementById("fQty").value=it&&it.qty>0?it.qty:"";
  document.getElementById("fInclQty").value=(it&&it.incQty!=null&&it.incQty!=="")?it.incQty:"";
  document.getElementById("fPrice").value=it&&it.price>0?Number(it.price).toLocaleString("ko-KR"):"";
  document.getElementById("fCur").value=it&&it.cur==="USD"?"USD":"KRW";
  document.getElementById("fOwner").value=it?(it.owner||""):(defOwner==="미지정"?"":defOwner);
  document.getElementById("fAmount").value=it&&it.amount?Number(it.amount).toLocaleString("ko-KR"):"";
  document.getElementById("fNote").value=it?(it.note||""):"";
  document.getElementById("fInclude").checked=it?isIncluded(it):true;
  syncCatSeg();
  updateStockFields();  // 주식이면 평가금액 자동계산·읽기전용·#티커 잠금 처리 포함
  m.classList.add("open");
  _histPush({modal:true});  // 뒤로가기로 모달 닫기
  if(!isMobile()) setTimeout(()=>document.getElementById("fName").focus(),30);  // 모바일은 자동 포커스 끔(키보드가 폼 가림 방지)
}
function closeModal(){ document.getElementById("modalBg").classList.remove("open"); editingId=null; if(_navReady && history.state && history.state.modal){ _suppressPop=true; try{ history.back(); }catch(e){ _suppressPop=false; } } }
function updateAmountKor(){
  const v=rawNum("fAmount");
  const stock=isStockCat(document.getElementById("fCat").value);
  const usd=stock&&document.getElementById("fCur").value==="USD";
  const hint=stock?(" · 보유수×현재가"+(usd?" × 환율("+fmtRate()+")":"")+" 자동"):"";
  document.getElementById("fAmountKor").textContent=v>0?(korUnit(v)+hint):(stock?("보유수×현재가 자동 계산"+(usd?" (환율 적용)":"")):"");
}
function saveModal(){
  const cat=document.getElementById("fCat").value;
  const inst=document.getElementById("fInst").value.trim();
  const name=document.getElementById("fName").value.trim();
  const stock=isStockCat(cat);
  const ticker=stock?document.getElementById("fTicker").value.trim():"";
  const qty=stock?Math.max(0,Math.round(Number(document.getElementById("fQty").value)||0)):0;
  let inclQ=null;  // 합계에 포함할 수량. null(미입력)이면 전량 반영
  if(stock){ const raw=String(document.getElementById("fInclQty").value).trim(); if(raw!==""){ inclQ=Math.max(0,Math.min(Math.round(Number(raw)||0),qty)); } }
  const price=stock?Math.max(0,rawNum("fPrice")):0;  // 달러는 소수 허용
  const cur=stock?document.getElementById("fCur").value:"KRW";
  const owner=document.getElementById("fOwner").value.trim();
  const amount=stock?Math.round(qty*price*(cur==="USD"?usdRate:1)):Math.max(0,Math.round(rawNum("fAmount")));  // 주식: 보유수×현재가(×환율)
  const note=document.getElementById("fNote").value.trim();
  const include=document.getElementById("fInclude").checked;
  if(!name){ toast("항목명을 입력하세요."); document.getElementById("fName").focus(); return; }
  try{ localStorage.setItem("jsiy_lastcat",cat); }catch(e){}  // 다음 추가 시 기본 분류로
  let saved;
  if(editingId){
    const it=data.items.find(x=>x.id===editingId);
    if(it){ it.cat=cat; it.inst=inst; it.name=name; it.ticker=ticker; it.qty=qty; it.price=price; it.cur=cur; it.owner=owner; it.amount=amount; it.note=note; it.include=include; if(inclQ!=null&&inclQ<qty) it.incQty=inclQ; else delete it.incQty; delete it.soldQty; it.updatedAt=Date.now(); }
    saved=it; toast("수정되었습니다.");
  }else{
    saved={id:genId(),cat,inst,name,ticker,qty,price,cur,owner,amount,note,include,updatedAt:Date.now()}; if(inclQ!=null&&inclQ<qty) saved.incQty=inclQ;
    data.items.push(saved); toast("자산이 추가되었습니다.");
  }
  if(saved) opUpsert(saved);
  closeModal(); render();
}
function delItem(id){
  const it=data.items.find(x=>x.id===id); if(!it) return;
  if(!confirm(`'${it.name}' 항목을 삭제할까요?`)) return;
  data.items=data.items.filter(x=>x.id!==id);
  opDelete(id); render(); toast("삭제되었습니다.");
}
function toggleTax(){
  if(!data.meta) data.meta={};
  data.meta.taxOn=!data.meta.taxOn;
  opMeta({taxOn:data.meta.taxOn}); render();
  toast(data.meta.taxOn?("보유세 +"+TAX_PCT+"% 적용"):"보유세 미적용");
}
function editGoal(){
  const cur=goalTarget();
  const v=prompt("목표 매수가(원)를 입력하세요 (비우면 해제)", cur||"");
  if(v==null) return;
  const n=Math.max(0,Math.round(Number(String(v).replace(/[,\s₩]/g,""))||0));
  if(!data.meta) data.meta={};
  data.meta.target=n;
  opMeta({target:n}); render();
  toast(n?("목표 매수가: "+fmtWon(n)):"목표를 해제했습니다.");
}
function dupItem(id){
  const i=data.items.findIndex(x=>x.id===id); if(i<0) return;
  const src=data.items[i];
  const clone={...src, id:genId(), name:(src.name||"")+" (복사)", updatedAt:Date.now()};
  data.items.splice(i+1,0,clone);  // 원본 바로 아래에 삽입
  sendOp({op:"upsertAfter",item:clone,afterId:id});  // 서버에도 원본 뒤 삽입(원자적)
  render(); toast("항목을 복제했습니다.");
}

function pad2(n){ return n<10?"0"+n:""+n; }
function exportData(){
  const d=new Date();
  const fn=`정성인연_자산_${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}.json`;
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fn; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast("데이터 파일을 내보냈습니다.");
}
function importData(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const nd=normalizeData(JSON.parse(rd.result));
      if(!nd) throw 0;
      if(!confirm("현재 데이터를 불러온 파일로 덮어쓸까요? (서버에도 반영됩니다)")) return;
      data=nd; opReplace(); render(); toast("데이터를 불러왔습니다.");
    }catch(e){ toast("올바른 자산 데이터 파일이 아닙니다."); }
  };
  rd.readAsText(file);
}
