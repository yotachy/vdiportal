let _started=false;
function startApp(){
  if(_started) return; _started=true;
  render();
  updateFxBadge(); fetchRate();    // 환율 표시 + 실시간 조회
  const qi=document.getElementById("quoteInterval"); if(qi) qi.value=String(quoteIntervalMs);
  refreshQuotes(); startQuoteTimer();  // 티커(#) 종목 현재가 자동 조회 + 주기 갱신
  pullFromServer({initial:true});   // 로드 시 서버(공유) 데이터로 동기화
  startPolling();                   // 6초마다 다른 기기 변경 자동 반영
  window.addEventListener("focus",focusPull);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) focusPull(); });
}
(function boot(){
  if(!pin){ showGate(); return; }
  tryPin(pin).then(r=>{
    if(r.valid) startApp();
    else if(r.st===429) showGate("시도가 너무 많습니다. 10분 뒤 다시 시도하세요.");
    else lockOut("PIN이 변경되었습니다. 다시 입력하세요.");
  }).catch(()=>startApp());   // 서버 연결 불가: 이 기기에 저장된 PIN 을 믿고 오프라인 사용
})();

// ===== 인앱 뒤로가기 (History API): 모달 닫기 → 이전 뷰 → (더 없으면) 종료 =====
let _navReady=false, _suppressPop=false;
function _histPush(extra){ if(!_navReady) return; try{ history.pushState(Object.assign({app:1,scope:scope}, extra||{}), ""); }catch(e){} }
try{ history.replaceState({app:1,scope:scope}, ""); }catch(e){}
_navReady=true;
window.addEventListener("popstate",function(e){
  if(_suppressPop){ _suppressPop=false; return; }
  const mb=document.getElementById("modalBg");
  if(mb && mb.classList.contains("open")){ mb.classList.remove("open"); editingId=null; return; }  // 1) 모달 열림 → 닫기
  const st=e.state;
  if(st && st.scope){ if(st.scope!==scope) navTo(st.scope,true); }  // 2) 이전 뷰 복원
  // st 없으면 더 돌아갈 인앱 상태 없음 → 기본 동작(이전 페이지/앱 종료)
});
let focusPullTimer=null;
function focusPull(){ clearTimeout(focusPullTimer); focusPullTimer=setTimeout(()=>{ if(!document.getElementById("modalBg").classList.contains("open")) pullFromServer(); },150); }

document.getElementById("pinGo").addEventListener("click",submitPin);
document.getElementById("pinInput").addEventListener("keydown",e=>{ if(e.key==="Enter") submitPin(); });
document.getElementById("btnPin").addEventListener("click",()=>{ toolsMenu(false); changePin(); });
document.getElementById("btnDeviceLock").addEventListener("click",()=>{ toolsMenu(false); lockDevice(); });
document.getElementById("btnTools").addEventListener("click",e=>{ e.stopPropagation(); toolsMenu(); });
document.addEventListener("click",e=>{ if(!e.target.closest(".menu-wrap")) toolsMenu(false); });
document.getElementById("btnTheme").addEventListener("click",()=>{
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  try{ localStorage.setItem(THEME_KEY,next); }catch(e){} applyTheme(next);
});
document.querySelectorAll("#tabs button").forEach(b=>b.addEventListener("click",()=>navTo(b.dataset.tab==="dash"?"dash":(scope==="dash"?"all":scope))));
document.getElementById("goHome").addEventListener("click",()=>navTo("dash"));
document.getElementById("btnSync").addEventListener("click",()=>{ toolsMenu(false); pullFromServer(); refreshQuotes(true); });
document.getElementById("quoteInterval").addEventListener("change",e=>{
  quoteIntervalMs=Number(e.target.value)||0;
  try{ localStorage.setItem(QI_KEY,String(quoteIntervalMs)); }catch(_){}
  startQuoteTimer();
  if(quoteIntervalMs>0){ refreshQuotes(true); toast("시세 자동 갱신: "+(quoteIntervalMs/60000)+"분마다"); }
  else toast("시세 자동 갱신 끔");
});
document.getElementById("btnAdd").addEventListener("click",()=>openModal());
document.getElementById("btnFab").addEventListener("click",()=>openModal());
document.getElementById("btnDense").addEventListener("click",toggleDense);
document.getElementById("sortSel").addEventListener("change",e=>setSort(e.target.value));
document.getElementById("listSearch").addEventListener("input",()=>{ if(scope!=="dash") renderList(); });
document.getElementById("modalClose").addEventListener("click",closeModal);
document.getElementById("modalCancel").addEventListener("click",closeModal);
document.getElementById("modalSave").addEventListener("click",saveModal);
document.getElementById("fAmount").addEventListener("input",updateAmountKor);
document.getElementById("fInclude").addEventListener("change",updateSoldUI);
document.getElementById("fInclQty").addEventListener("input",updateSoldHint);
document.getElementById("fQty").addEventListener("input",recalcAmount);
document.getElementById("fPrice").addEventListener("input",recalcAmount);
document.getElementById("fCur").addEventListener("change",recalcAmount);
document.getElementById("fTicker").addEventListener("input",updateTickerLockUI);
document.getElementById("fTicker").addEventListener("blur",fetchTickerPrice);
document.getElementById("fTicker").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); fetchTickerPrice(); } });
["fAmount","fPrice"].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener("focus",()=>unfmtNumIn(id));
  el.addEventListener("blur",()=>fmtNumIn(id));
});
document.getElementById("fName").addEventListener("keydown",e=>{ if(e.key==="Enter") saveModal(); });
document.getElementById("fAmount").addEventListener("keydown",e=>{ if(e.key==="Enter") saveModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeModal(); toolsMenu(false); } });
document.getElementById("btnExport").addEventListener("click",()=>{ toolsMenu(false); exportData(); });
document.getElementById("btnImport").addEventListener("click",()=>{ toolsMenu(false); document.getElementById("fileImport").click(); });
document.getElementById("fileImport").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });
window.addEventListener("resize",()=>{ if(scope!=="dash") renderList(); });
</script>
