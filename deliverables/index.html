<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>산출물 목록 | KB손해보험 업무가상화 사용자 포탈</title>
<style>
  :root{
    --kb-yellow:#FFBC00; --kb-yellow-dark:#EFA600; --kb-yellow-soft:#FFF6DC; --kb-yellow-line:#FFE49A;
    --ink:#1A1714; --t1:#1A1714; --t2:#5C564E; --t3:#948E84;
    --surface:#FFFFFF; --surface-2:#FBFAF7; --page:#F4F1EB; --subtle:#F7F5F0;
    --border:#EBE7DF; --border-strong:#DAD4C9;
    --info:#1A6BD4; --info-soft:#E9F1FD; --success:#1E8E3E; --success-soft:#E7F4EA;
    --t3-soft:#F0EEE9;
    --font:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--t1);font-family:var(--font);
    font-size:14px;line-height:1.6;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:44px 24px 80px}

  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .mark{width:36px;height:36px;border-radius:10px;background:var(--kb-yellow);
    display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .mark svg{width:21px;height:21px}
  .brand-t{font-size:14.5px;font-weight:800;color:var(--ink)}
  .brand-t span{color:var(--t3);font-weight:600;margin-left:6px}

  .head{margin-bottom:26px}
  .eyebrow{font-size:12px;font-weight:800;color:#8A6A00;letter-spacing:.06em;text-transform:uppercase}
  h1{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin:8px 0 6px}
  .desc{font-size:15px;color:var(--t2)}

  .sec-label{font-size:12.5px;font-weight:800;color:var(--t3);letter-spacing:.04em;
    text-transform:uppercase;margin:30px 0 12px}

  .doc-list{display:flex;flex-direction:column;gap:12px}
  .doc-card{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;text-decoration:none;color:inherit;
    box-shadow:0 1px 2px rgba(26,23,20,.04);transition:transform .15s,box-shadow .15s,border-color .15s}
  .doc-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(26,23,20,.08);border-color:var(--kb-yellow-dark)}
  .doc-ico{width:46px;height:46px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    background:var(--kb-yellow-soft);color:var(--kb-yellow-dark)}
  .doc-ico svg{width:24px;height:24px}
  .doc-main{flex:1;min-width:0}
  .doc-no{font-size:11.5px;font-weight:800;color:var(--t3);letter-spacing:.03em;font-variant-numeric:tabular-nums}
  .doc-name{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;margin:2px 0}
  .doc-meta{font-size:12.5px;color:var(--t2)}
  .doc-state{flex-shrink:0;font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:100px;
    background:var(--info-soft);color:var(--info);border:1px solid #C2DAFB}
  .doc-arrow{flex-shrink:0;width:18px;height:18px;color:var(--t3)}
  .doc-card:hover .doc-arrow{color:var(--ink)}

  .placeholder{display:flex;align-items:center;gap:14px;padding:16px 20px;border:1px dashed var(--border-strong);
    border-radius:14px;color:var(--t3);font-size:13.5px;background:var(--surface-2)}
  .placeholder svg{width:18px;height:18px;flex-shrink:0}

  .foot{margin-top:46px;padding-top:18px;border-top:1px solid var(--border);
    font-size:12.5px;color:var(--t3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .priv{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--t2)}
  .priv svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <span class="mark"><svg viewBox="0 0 100 100" fill="currentColor"><path d="M50 6 C54 34,66 46,94 50 C66 54,54 66,50 94 C46 66,34 54,6 50 C34 46,46 34,50 6 Z"/></svg></span>
    <span class="brand-t">KB손해보험<span>업무가상화(VDI) 사용자 포탈 구축</span></span>
  </div>

  <div class="head">
    <div class="eyebrow">Deliverables · 수행사 전달용</div>
    <h1>산출물 목록</h1>
    <p class="desc">프로젝트 진행에 따라 산출물이 추가됩니다. 각 항목을 클릭하면 문서를 확인할 수 있습니다.</p>
  </div>

  <div class="sec-label">화면정의서 (Screen Definition)</div>
  <div class="doc-list">
    <a class="doc-card" href="login-spec.html">
      <span class="doc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></span>
      <div class="doc-main">
        <div class="doc-no">VDI-SD-001 · VDI-SCR-001</div>
        <div class="doc-name">로그인 화면정의서</div>
        <div class="doc-meta">v1.0 · 2026.06.02 · 대상 login.html</div>
      </div>
      <span class="doc-state">검토 요청</span>
      <svg class="doc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

    <div class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      이후 화면정의서가 순차적으로 추가됩니다.
    </div>
  </div>

  <div class="foot">
    <span class="priv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      대외비 · 비공개(noindex) 문서
    </span>
    <span>KB손해보험 · 업무가상화(VDI) 사용자 포탈 구축</span>
  </div>

</div>
</body>
</html>
